async function arSaveReceipt(info){
  const date  = document.getElementById("arRDate").value;
  const amt   = parseFloat(document.getElementById("arRAmt").value);
  const bank  = document.getElementById("arRBank").value.trim();
  const note  = document.getElementById("arRNote").value.trim();
  const errEl = document.getElementById("arRErr");
  if(!date){ errEl.textContent="กรุณาระบุวันที่"; errEl.style.display=""; return; }
  if(!amt || amt<=0){ errEl.textContent="กรุณาระบุจำนวนเงิน > 0"; errEl.style.display=""; return; }
  errEl.style.display="none";
  const btn = document.getElementById("arRSaveBtn");
  btn.disabled=true; btn.textContent="กำลังบันทึก...";
  try{
    const d = arGet();
    const o = d.orders.find(x=>x.order_no===info.order_no);
    const companyId = (o && o.company_id) || d.companyId;
    if(!companyId) throw new Error("ไม่พบ company_id — ลอง refresh ใหม่");
    const id = `ar|${state.company}|${info.order_no}|${date}|${Date.now()}`;
    const { error } = await sb.from("ar_receipts").insert({
      id, company_id: companyId,
      order_no: info.order_no,
      iv_no:    info.iv_no || null,
      received_date: date,
      received_amount: amt,
      bank_account: bank || null,
      note: note || null,
      created_by: AUTH.user ? AUTH.user.id : null
    });
    if(error) throw error;
    document.getElementById("arReceiptModal").remove();
    await arLoad();
    renderToolAr();
  }catch(err){
    btn.disabled=false; btn.textContent="✅ บันทึก";
    errEl.textContent="บันทึกไม่สำเร็จ: "+(err.message||err);
    errEl.style.display="";
  }
}

/* ============================================================
   USER MANAGEMENT — admin only
   ใช้ service_role key ที่ user paste ครั้งเดียวต่อ session
   (เก็บใน sessionStorage — ไม่ขึ้น cloud, ปิด tab = หาย)
   ============================================================ */
state.users = state.users || { list:null, companies:null, access:null, srKey:null, busy:false };

function usrSrKey(){
  return state.users.srKey || sessionStorage.getItem("ft-sr-key") || "";
}
function usrSrSet(k){
  state.users.srKey = k;
  if(k) sessionStorage.setItem("ft-sr-key", k);
  else  sessionStorage.removeItem("ft-sr-key");
}
function usrSb(){
  // client ใหม่ที่ใช้ service_role (ข้าม RLS, เรียก admin APIs ได้)
  const k = usrSrKey();
  if(!k) return null;
  return window.supabase.createClient(SUPABASE_URL, k, { auth:{ persistSession:false } });
}

const ROLES = [
  { v:"admin",       l:"Admin",         d:"ทำได้ทุกอย่าง" },
  { v:"finance_mgr", l:"Finance Mgr",   d:"จัดการการเงิน อนุมัติ" },
  { v:"accountant",  l:"Accountant",    d:"คีย์ IV, รับเงิน, AR/AP" },
  { v:"treasury",    l:"Treasury",      d:"ธนาคาร, กระทบยอด" },
  { v:"sales_ops",   l:"Sales Ops",     d:"คีย์ออเดอร์, จัดการขาย" },
  { v:"approver",    l:"Approver",      d:"อนุมัติเอกสาร" },
  { v:"executive",   l:"Executive",     d:"ผู้บริหาร ดู KPI" },
  { v:"viewer",      l:"Viewer",        d:"ดูอย่างเดียว" },
];

async function usrLoadAll(){
  const sb2 = usrSb();
  if(!sb2) throw new Error("ต้องใส่ service_role key ก่อน");
  // 1) auth users (admin API)
  const url = SUPABASE_URL + "/auth/v1/admin/users?per_page=200";
  const res = await fetch(url, {
    headers: { apikey: usrSrKey(), Authorization: "Bearer " + usrSrKey() }
  });
  if(!res.ok){
    const txt = await res.text();
    throw new Error("โหลด users ไม่สำเร็จ: " + res.status + " " + txt.slice(0,200));
  }
  const j = await res.json();
  state.users.list = j.users || [];

  // 2) companies
  const { data: cos, error: e1 } = await sb2.from("companies").select("id,code,name").order("name");
  if(e1) throw e1;
  state.users.companies = cos || [];

  // 3) user_company_access
  const { data: acc, error: e2 } = await sb2.from("user_company_access")
    .select("id,user_id,company_id,role,is_active");
  if(e2) throw e2;
  state.users.access = acc || [];
}

function usrAccessByUser(uid){
  return (state.users.access||[]).filter(a => a.user_id === uid && a.is_active !== false);
}
function usrCoName(id){
  const c = (state.users.companies||[]).find(x => x.id === id);
  return c ? c.name : "—";
}

function usrSaveKey(){

  usrSrSet(v);

function usrClearKey(){

          <button type="button" class="btn ghost btn sm" style="margin-top:5px" onclick="document.getElementById('uAddPwd').value=usrGenPwd()">สุ่มรหัส</button>

          <select id="uAddRole" style="width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff">

              <div style="display:flex;align-items:center;gap:8px">
                <label style="display:flex;align-items:center;gap:6px;flex:1;font-size:13px;font-weight:600;color:var(--ink)">

                  ${esc(c.name)} <code style="font-size:11px;color:var(--ink-3)">${esc(c.code)}</code>
                </label>
                <select id="uAddCoRole-${c.id}" style="padding:5px 9px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:#fff">
                  ${ROLES.map(r => `<option value="${r.v}">${r.l}</option>`).join("")}
                </select>
              </div>
            `).join("")}
          </div>
        </div>
        <div id="uAddErr" style="color:var(--bad);font-size:13px;display:none;background:#fef2f2;padding:8px 12px;border-radius:7px"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end">
        <button onclick="document.getElementById('usrModal').remove()"
          style="padding:9px 16px;border:1px solid var(--line);background:#fff;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px">ยกเลิก</button>
        <button id="uAddBtn" class="btn" onclick="usrCreate()">สร้าง user</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  wrap.onclick = (e)=>{ if(e.target===wrap) wrap.remove(); };
}

function usrGenPwd(){
  const c = "ABCDEFGHJKMNPQRSTUVWXYZ23456789abcdefghjkmnpqrstuvwxyz!@#$";
  let p = ""; for(let i=0;i<14;i++) p += c[Math.floor(Math.random()*c.length)];
  return p;
}

async function usrCreate(){
  const err = document.getElementById("uAddErr");
  const btn = document.getElementById("uAddBtn");
  const email = document.getElementById("uAddEmail").value.trim();
  const pwd   = document.getElementById("uAddPwd").value;
  const name  = document.getElementById("uAddName").value.trim();
  const role  = document.getElementById("uAddRole").value;
  if(!email || !pwd){
    err.textContent = "กรุณาระบุอีเมล + รหัสผ่าน";
    err.style.display = ""; return;
  }
  if(pwd.length < 8){
    err.textContent = "รหัสผ่านต้องอย่างน้อย 8 ตัว"; err.style.display = ""; return;
  }
  err.style.display = "none";
  btn.disabled = true; btn.textContent = "กำลังสร้าง...";

  try{
    // 1) Create auth user via admin API
    const res = await fetch(SUPABASE_URL + "/auth/v1/admin/users", {
      method: "POST",
      headers: {
        apikey: usrSrKey(),
        Authorization: "Bearer " + usrSrKey(),
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password: pwd,
        email_confirm: true,
        app_metadata: { role },
        user_metadata: name ? { display_name: name } : {}
      })
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error("สร้าง user ไม่สำเร็จ: " + res.status + " " + t.slice(0,300));
    }
    const j = await res.json();
    const newUserId = j.id || (j.user && j.user.id);

    // 2) Insert user_company_access for each ticked company
    const sb2 = usrSb();
    const cos = state.users.companies || [];
    const accessRows = [];
    for(const c of cos){
      const cb = document.getElementById("uAddCo-" + c.id);
      if(cb && cb.checked){
        const r = document.getElementById("uAddCoRole-" + c.id).value || role;
        accessRows.push({ user_id: newUserId, company_id: c.id, role: r, is_active: true });
      }
    }
    if(accessRows.length){
      const { error: e } = await sb2.from("user_company_access").insert(accessRows);
      if(e) throw new Error("user สร้างแล้ว แต่ assign บริษัทไม่ได้: " + e.message);
    }

    document.getElementById("usrModal").remove();
    alert("สร้าง user สำเร็จ\n\nEmail: " + email + "\nPassword: " + pwd + "\n\nก๊อปแจ้ง user แล้วให้เขา login เปลี่ยนรหัสเอง");
    renderToolUsers();
  }catch(e){
    btn.disabled = false; btn.textContent = "สร้าง user";
    err.textContent = e.message || String(e);
    err.style.display = "";
  }
}

/* ---------- Edit user modal ---------- */
function usrOpenEdit(uid){
  const u = (state.users.list||[]).find(x => x.id === uid);
  if(!u){ alert("ไม่พบ user"); return; }
  const cos = state.users.companies || [];
  const meta = u.app_metadata || {};
  const accByCo = {};
  usrAccessByUser(uid).forEach(a => { accByCo[a.company_id] = a; });

  const wrap = document.createElement("div");
  wrap.id = "usrModal";
  wrap.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";
  wrap.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:28px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto">
      <h3 style="margin:0 0 4px;font-size:17px;font-weight:800">แก้ไขผู้ใช้</h3>
      <div style="color:var(--ink-3);font-size:12.5px;margin-bottom:18px;font-family:monospace">${esc(u.email)}</div>
      <div style="display:grid;gap:12px">
        <label>
          <div style="font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:4px">Default Role</div>
          <select id="uEdRole" style="width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff">
            ${ROLES.map(r => `<option value="${r.v}" ${r.v===meta.role?'selected':''}>${r.l} — ${r.d}</option>`).join("")}
          </select>
        </label>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:6px">สิทธิ์เข้าบริษัท</div>
          <div style="display:flex;flex-direction:column;gap:8px;background:var(--bg);padding:10px;border-radius:8px">
            ${cos.map(c => {
              const a = accByCo[c.id];
              return `
              <div style="display:flex;align-items:center;gap:8px">
                <label style="display:flex;align-items:center;gap:6px;flex:1;font-size:13px;font-weight:600">
                  <input type="checkbox" id="uEdCo-${c.id}" ${a?'checked':''} style="width:15px;height:15px;accent-color:var(--brand)">
                  ${esc(c.name)} <code style="font-size:11px;color:var(--ink-3)">${esc(c.code)}</code>
                </label>
                <select id="uEdCoRole-${c.id}" style="padding:5px 9px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:#fff">
                  ${ROLES.map(r => `<option value="${r.v}" ${a&&a.role===r.v?'selected':''}>${r.l}</option>`).join("")}
                </select>
              </div>`;
            }).join("")}
          </div>
        </div>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:4px">รีเซ็ตรหัสผ่าน (ไม่ใส่ = ไม่เปลี่ยน)</div>
          <input id="uEdPwd" type="text" placeholder="ปล่อยว่างถ้าไม่ต้องการเปลี่ยน"
            style="width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit">
        </div>
        <div id="uEdErr" style="color:var(--bad);font-size:13px;display:none;background:#fef2f2;padding:8px 12px;border-radius:7px"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end">
        <button onclick="document.getElementById('usrModal').remove()"
          style="padding:9px 16px;border:1px solid var(--line);background:#fff;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px">ยกเลิก</button>
        <button id="uEdBtn" class="btn" onclick="usrUpdate('${uid}')">บันทึก</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  wrap.onclick = (e)=>{ if(e.target===wrap) wrap.remove(); };
}

async function usrUpdate(uid){
  const err = document.getElementById("uEdErr");
  const btn = document.getElementById("uEdBtn");
  const role = document.getElementById("uEdRole").value;
  const pwd  = document.getElementById("uEdPwd").value;
  err.style.display = "none";
  btn.disabled = true; btn.textContent = "กำลังบันทึก...";

  try{
    // 1) update app_metadata.role + (optional) password
    const body = { app_metadata: { role } };
    if(pwd){
      if(pwd.length < 8) throw new Error("รหัสผ่านต้องอย่างน้อย 8 ตัว");
      body.password = pwd;
    }
    const res = await fetch(SUPABASE_URL + "/auth/v1/admin/users/" + uid, {
      method: "PUT",
      headers: {
        apikey: usrSrKey(),
        Authorization: "Bearer " + usrSrKey(),
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error("update ไม่สำเร็จ: " + res.status + " " + t.slice(0,300));
    }

    // 2) sync user_company_access
    const sb2 = usrSb();
    const cos = state.users.companies || [];
    const accByCo = {};
    usrAccessByUser(uid).forEach(a => { accByCo[a.company_id] = a; });

    const toInsert = [], toDelete = [];
    for(const c of cos){
      const ck = document.getElementById("uEdCo-" + c.id).checked;
      const r  = document.getElementById("uEdCoRole-" + c.id).value;
      const ex = accByCo[c.id];
      if(ck && !ex){
        toInsert.push({ user_id: uid, company_id: c.id, role: r, is_active: true });
      } else if(ck && ex && ex.role !== r){
        const { error: eu } = await sb2.from("user_company_access").update({ role: r }).eq("id", ex.id);
        if(eu) throw eu;
      } else if(!ck && ex){
        toDelete.push(ex.id);
      }
    }
    if(toInsert.length){
      const { error: ei } = await sb2.from("user_company_access").insert(toInsert);
      if(ei) throw ei;
    }
    if(toDelete.length){
      const { error: ed } = await sb2.from("user_company_access").delete().in("id", toDelete);
      if(ed) throw ed;
    }

    document.getElementById("usrModal").remove();
    renderToolUsers();
  }catch(e){
    btn.disabled = false; btn.textContent = "บันทึก";
    err.textContent = e.message || String(e);
    err.style.display = "";
  }
}

/* ---------- Delete user ---------- */
async function usrConfirmDelete(uid, email){
  if(!confirm(`ลบ user "${email}" จริง?\n\nการลบนี้ลบจาก auth.users + ลบ user_company_access ทั้งหมดด้วย`)) return;
  try{
    const sb2 = usrSb();
    // ลบ user_company_access ก่อน (กัน FK)
    await sb2.from("user_company_access").delete().eq("user_id", uid);
    // ลบ auth user
    const res = await fetch(SUPABASE_URL + "/auth/v1/admin/users/" + uid, {
      method: "DELETE",
      headers: { apikey: usrSrKey(), Authorization: "Bearer " + usrSrKey() }
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error("ลบไม่สำเร็จ: " + res.status + " " + t.slice(0,300));
    }
    renderToolUsers();
  }catch(e){
    alert("ลบไม่สำเร็จ: " + (e.message||e));
  }
}

}
