<!-- ============================================================
     style.html  —  central <style> for Finance Tools (REDESIGN)
     Drop-in replacement: every selector/class name is unchanged,
     so existing markup + onclick handlers keep working as-is.
     Only VALUES changed (glass cards, pastel gradients, brand vars,
     teal/pink universal accents, bigger headings, micro-interactions).
     The .ed-* Executive Dashboard block + @media print are UNTOUCHED.
     ============================================================ -->
<style>
  :root{
    /* brand (overridden per company below) */
    --brand:#1e3a8a; --brand-dark:#172554; --brand-soft:#eff6ff;
    --brand-rgb:37,99,235;                 /* for rgba() glows */
    --page-1:#F0F4FF; --page-2:#E0E7FF;     /* page bg gradient */

    /* universal accents (same on both brands — match Exec Cash Flow) */
    --in:#14B8A6;  --in-soft:#dff6f1;  --in-ink:#0d7c70;   /* positive / money-in (teal soft) */
    --out:#E18AAA; --out-soft:#fbe6ee; --out-ink:#b14070;  /* negative / money-out (pink soft) */
    --warn:#f59e0b; --warn-soft:#fef3c7; --warn-ink:#92400e;

    /* legacy aliases kept so old code that referenced --ok/--bad still resolves */
    --ok:#0d7c70; --bad:#b14070;

    --ink:#0f172a; --ink-2:#475569; --ink-3:#94a3b8;
    --line:#e2e8f0;
    --bg:#f4f6f9;
    --card:#ffffff;

    /* glass surfaces */
    --glass:rgba(255,255,255,.78);
    --glass-strong:rgba(255,255,255,.92);
    --glass-border:rgba(37,99,235,.16);

    --radius:14px;
    --shadow:0 1px 2px rgba(15,23,42,.05),0 6px 20px rgba(30,58,138,.06);
    --shadow-md:0 2px 8px rgba(15,23,42,.07),0 16px 40px rgba(30,58,138,.10);
    --lift:0 10px 30px rgba(var(--brand-rgb),.16);
  }
  /* M Bark — navy / royal blue, corporate */
  body[data-co="mbark"]{
    --brand:#1e3a8a; --brand-dark:#172554; --brand-soft:#dbeafe; --brand-rgb:37,99,235;
    --page-1:#F0F4FF; --page-2:#E0E7FF; --glass-border:rgba(37,99,235,.16);
    --gradient-1:#1e3a8a; --gradient-2:#2563eb;
  }
  /* Benya — teal / cyan, clean medical */
  body[data-co="benya"]{
    --brand:#0d9488; --brand-dark:#115e59; --brand-soft:#ccfbf1; --brand-rgb:13,148,136;
    --page-1:#F0FDFA; --page-2:#CCFBF1; --glass-border:rgba(13,148,136,.18);
    --gradient-1:#0d9488; --gradient-2:#14b8a6;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:"IBM Plex Sans Thai","IBM Plex Sans",ui-sans-serif,system-ui,-apple-system,sans-serif;
    background:linear-gradient(165deg,var(--page-1) 0%,var(--page-2) 100%) fixed;
    color:var(--ink);font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased;
  }
  .page-head h1,.card h3{font-family:"IBM Plex Sans","IBM Plex Sans Thai",ui-sans-serif,sans-serif;letter-spacing:-.3px}
  button{font-family:inherit;cursor:pointer}

  /* ---- topbar (glass) ---- */
  .topbar{display:flex;align-items:center;gap:12px;background:var(--glass-strong);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--glass-border);padding:0 24px;position:sticky;top:0;z-index:20;height:56px}
  .crumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-3);flex:1;min-width:0}
  .crumb .co{font-weight:700;color:var(--brand-dark);font-size:13.5px}
  .crumb .sep{color:var(--line)}
  .crumb .pg{color:var(--ink);font-weight:600;font-size:13px}
  .topbar .date{font-size:12px;color:var(--ink-3);font-weight:500;white-space:nowrap;letter-spacing:.2px}
  .topbar .user{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2)}
  .topbar .user .u-email{color:var(--ink-3);font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar .user .pill{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .topbar .logout{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 12px;font-size:12px;color:var(--ink-2);font-weight:500;transition:.15s}
  .topbar .logout:hover{background:var(--out-soft);color:var(--out-ink);border-color:var(--out)}

  /* ---- sidebar (glass) ---- */
  .wrap{display:flex;min-height:100vh}
  .sidebar{width:232px;flex-shrink:0;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
  .sb-brand{padding:18px 14px 12px;border-bottom:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;gap:6px}
  .sb-brand .sb-logo-img{height:46px;width:auto;max-width:160px;object-fit:contain}
  .sb-brand .sb-tagline{font-size:11px;color:var(--ink-3);font-weight:500;letter-spacing:.3px;margin-top:2px}
  .company-switch{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--glass-border)}
  .company-switch button{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.6);color:var(--ink-3);padding:5px 8px;border-radius:8px;font-weight:600;font-size:11.5px;transition:.15s}
  .company-switch button:hover{border-color:var(--brand);color:var(--brand-dark)}
  .company-switch button.active{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;border-color:var(--brand);box-shadow:0 3px 10px rgba(var(--brand-rgb),.28)}
  .sb-nav{flex:1;overflow-y:auto;padding:8px 6px 16px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .stage-label{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;font-weight:700;color:var(--ink-2);letter-spacing:.4px;padding:12px 10px 6px;cursor:pointer;user-select:none;border-radius:8px;transition:.12s}
  .stage-label:hover{color:var(--brand);background:rgba(var(--brand-rgb),.07)}
  .stage-label .chev{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;color:#475569;transition:transform .2s ease}
  .stage-label .chev svg{width:16px;height:16px;stroke-width:2.4}
  .stage-label:hover .chev{color:var(--brand)}
  .stage-group.collapsed .stage-label .chev{transform:rotate(-90deg)}
  .stage-items{display:flex;flex-direction:column;overflow:hidden;transition:max-height .2s ease}
  .stage-group.collapsed .stage-items{max-height:0!important;display:none}
  .nav-item{display:flex;gap:9px;align-items:center;padding:8px 10px;border-radius:9px;cursor:pointer;transition:transform .12s ease,background .12s,color .12s;margin-bottom:1px;color:var(--ink-2)}
  .nav-item:hover{background:rgba(var(--brand-rgb),.08);color:var(--ink);transform:translateX(2px)}
  .nav-item.active{background:rgba(var(--brand-rgb),.12);color:var(--brand-dark);font-weight:600}
  .nav-item.active{border-left:2.5px solid var(--brand);padding-left:8px}
  .nav-item .ic{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;flex-shrink:0;color:#64748b}
  .nav-item .ic svg{width:16px;height:16px;stroke-width:1.7}
  .nav-item.active .ic{color:var(--brand)}
  .nav-item:hover .ic{color:var(--brand)}
  .nav-item .t{font-size:12.5px;font-weight:500}
  .nav-item.active .t{font-weight:700;color:var(--brand-dark)}
  .nav-item .badge-mini{margin-left:auto;font-size:9px;background:var(--warn-soft);color:var(--warn-ink);padding:1px 6px;border-radius:999px;font-weight:700;letter-spacing:.2px}
  .sb-footer{padding:10px 12px;border-top:1px solid var(--glass-border);font-size:10.5px;color:var(--ink-3);display:flex;align-items:center;gap:6px}
  .sb-footer .dot{width:6px;height:6px;border-radius:50%;background:var(--in);box-shadow:0 0 0 3px var(--in-soft);flex-shrink:0}

  /* ---- main ---- */
  .main{flex:1;padding:24px 28px;overflow-x:auto;min-width:0;max-width:1400px}

  /* ---- page header (bigger, modern) ---- */
  .page-head{margin-bottom:22px}
  .page-head h1{margin:0 0 5px;font-size:25px;font-weight:800;letter-spacing:-.6px;color:var(--ink)}
  .page-head .sub{color:var(--ink-2);font-size:13.5px}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--brand-soft);color:var(--brand-dark);vertical-align:middle;margin-left:8px;letter-spacing:.2px}

  /* ---- cards (glass + hover lift) ---- */
  .card{background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;transition:transform .18s ease,box-shadow .18s ease}
  .card:hover{box-shadow:var(--shadow-md)}
  .card h3{margin:0 0 4px;font-size:14.5px;font-weight:700;color:var(--ink)}
  .card .note{color:var(--ink-3);font-size:12.5px;margin-bottom:14px}

  /* ---- dropzone ---- */
  .drop{border:1.5px dashed var(--glass-border);border-radius:12px;padding:28px;text-align:center;color:var(--ink-3);transition:.18s;background:rgba(255,255,255,.45);cursor:pointer}
  .drop:hover,.drop.over{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark)}
  .drop .big{font-size:28px;margin-bottom:6px;opacity:.6}
  .drop b{color:var(--brand)}
  .drop .sm{font-size:11.5px;margin-top:6px}
  .filechip{display:inline-flex;align-items:center;gap:8px;background:var(--brand-soft);color:var(--brand-dark);border-radius:999px;padding:5px 14px;font-size:12.5px;font-weight:600;margin-top:10px}
  .filechip button{border:none;background:none;color:var(--brand-dark);font-size:14px;line-height:1;opacity:.7}
  .filechip button:hover{opacity:1}
  .sheet-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;padding:10px 14px;background:rgba(255,255,255,.5);border:1px solid var(--glass-border);border-radius:10px}
  .sheet-row .sheet-lbl{font-size:12.5px;font-weight:700;color:var(--ink-2)}
  .sheet-row select{border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12.5px;font-family:inherit;background:#fff;min-width:180px;color:var(--ink)}
  .sheet-row .sheet-auto{font-size:11.5px;color:var(--in-ink);font-weight:600}
  .sheet-row .sheet-manual{font-size:11.5px;color:var(--warn-ink);font-weight:600}

  /* ---- slots (armap) ---- */
  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:1100px){.slots{grid-template-columns:1fr}}
  .slot{background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:7px;transition:transform .18s ease,box-shadow .18s ease}
  .slot:hover{box-shadow:var(--shadow)}
  .slot .lbl{display:flex;align-items:center;gap:7px;font-weight:700;font-size:13px;color:var(--ink)}
  .slot .lbl .step{display:inline-flex;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;font-size:11px;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
  .slot .hint{font-size:11.5px;color:var(--ink-3);line-height:1.4}
  .slot .drop{padding:16px;font-size:12.5px}
  .slot .drop .big{font-size:20px;margin-bottom:2px}
  .slot.ready{border-color:var(--in);background:var(--in-soft)}
  .slot .files{display:flex;flex-direction:column;gap:4px}
  .slot .fchip{display:flex;align-items:center;justify-content:space-between;gap:6px;background:var(--brand-soft);color:var(--brand-dark);border-radius:8px;padding:5px 10px;font-size:11.5px}
  .slot .fchip .meta{font-size:10px;color:var(--ink-2);opacity:.8}
  .slot .fchip button{border:none;background:none;color:var(--brand-dark);font-size:13px;cursor:pointer;opacity:.7}
  .slot .ok{font-size:11.5px;color:var(--in-ink);font-weight:600;margin-top:2px}
  .slot .err{font-size:11.5px;color:var(--out-ink);font-weight:600;margin-top:2px}
  .bigbtn{padding:12px 28px;font-size:14.5px;border-radius:11px}

  /* ---- tabs (pill group, like Exec) ---- */
  .tabs{display:flex;gap:4px;background:rgba(var(--brand-rgb),.10);padding:4px;border-radius:11px;margin-bottom:14px}
  .tabs button{flex:1;border:none;background:transparent;padding:9px 12px;font-size:12.5px;font-weight:600;color:var(--ink-2);border-radius:8px;cursor:pointer;transition:.15s}
  .tabs button:hover{background:rgba(255,255,255,.55)}
  .tabs button.active{background:#fff;color:var(--brand-dark);box-shadow:0 2px 8px rgba(var(--brand-rgb),.16);font-weight:700}
  .tabs button .c{display:inline-block;margin-left:5px;background:var(--brand-soft);color:var(--brand-dark);border-radius:999px;padding:1px 7px;font-size:10.5px}
  .tabs button.active .c{background:var(--brand);color:#fff}

  /* ---- state colors (teal / pink) ---- */
  .warning-row{background:var(--warn-soft)!important}
  .neg{color:var(--out-ink);font-weight:600}
  .pos{color:var(--in-ink);font-weight:600}

  /* ---- buttons ---- */
  .btn{border:1px solid transparent;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;padding:9px 17px;border-radius:9px;font-weight:600;font-size:13px;transition:transform .14s ease,box-shadow .14s ease,filter .14s;letter-spacing:.1px;box-shadow:0 3px 10px rgba(var(--brand-rgb),.22)}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(var(--brand-rgb),.30);filter:saturate(1.05)}
  .btn:active{transform:translateY(0)}
  .btn[disabled]{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}
  .btn.ghost{background:rgba(255,255,255,.7);color:var(--brand);border-color:var(--brand);box-shadow:none}
  .btn.ghost:hover{background:var(--brand-soft);box-shadow:0 4px 12px rgba(var(--brand-rgb),.14)}
  .btn.sm{padding:6px 13px;font-size:12px;border-radius:8px}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:14px}

  /* ---- dropdown ---- */
  .dd{position:relative;display:inline-block}
  .dd-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--glass-strong);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--glass-border);border-radius:11px;box-shadow:var(--shadow-md);min-width:165px;overflow:hidden;display:none;z-index:10}
  .dd.open .dd-menu{display:block}
  .dd-menu button{display:flex;width:100%;gap:8px;align-items:center;border:none;background:transparent;padding:10px 14px;font-size:13px;text-align:left;color:var(--ink);transition:.12s}
  .dd-menu button:hover{background:var(--brand-soft)}
  .dd-menu .x{font-size:10.5px;color:var(--ink-3)}

  /* ---- table (glass) ---- */
  .table-wrap{overflow:auto;border:1px solid var(--glass-border);border-radius:12px;margin-top:12px;max-height:440px;background:rgba(255,255,255,.5)}
  table{border-collapse:collapse;width:100%;font-size:12.5px;white-space:nowrap}
  th,td{border-bottom:1px solid var(--line);padding:9px 12px;text-align:left}
  th{background:rgba(var(--brand-rgb),.07);position:sticky;top:0;font-weight:700;color:var(--brand-dark);font-size:11px;letter-spacing:.4px;text-transform:uppercase;backdrop-filter:blur(8px)}
  tbody tr{transition:background .12s}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(var(--brand-rgb),.05)}
  .empty{padding:40px;text-align:center;color:var(--ink-3);font-size:13px}

  /* ---- options ---- */
  .opts{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .opt{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2)}
  .opt input{width:15px;height:15px;accent-color:var(--brand)}
  .pill-stat{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0 0}
  .stat{background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:12px;padding:12px 18px;min-width:100px;transition:transform .16s ease,box-shadow .16s ease}
  .stat:hover{transform:translateY(-2px);box-shadow:var(--lift)}
  .stat .n{font-size:22px;font-weight:800;color:var(--brand-dark);letter-spacing:-.5px}
  .stat .l{font-size:11px;color:var(--ink-2);font-weight:600;margin-top:1px}
  .stat.warn{background:var(--warn-soft);border-color:rgba(245,158,11,.25)}.stat.warn .n{color:var(--warn-ink)}
  .stat.bad{background:var(--out-soft);border-color:rgba(225,138,170,.4)}.stat.bad .n{color:var(--out-ink)}
  /* optional money-in/out stat variants — use class="stat in" / "stat out" */
  .stat.in{background:var(--in-soft);border-color:rgba(20,184,166,.3)}.stat.in .n{color:var(--in-ink)}
  .stat.out{background:var(--out-soft);border-color:rgba(225,138,170,.4)}.stat.out .n{color:var(--out-ink)}
  .soon-note{font-size:12px;color:var(--ink-3);background:rgba(255,255,255,.55);border-radius:9px;padding:10px 14px;margin-top:12px;border:1px solid var(--glass-border)}

  /* ---- responsive ---- */
  @media(max-width:820px){
    .sidebar{position:fixed;left:-260px;transition:.22s;height:100%;z-index:30}
    .sidebar.show{left:0}
    .main{padding:16px}
    .menu-toggle{display:inline-block!important}
  }
  .menu-toggle{display:none;border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;font-size:18px;line-height:1;color:var(--ink-2)}

  /* ============================================================
     Executive Dashboard styling — UNCHANGED (reference / nิ่งแล้ว)
     ============================================================ */
  .ed-page{background:linear-gradient(180deg,#f5f9ff 0%,#eef5ff 100%);min-height:calc(100vh - 54px);margin:-24px -28px;padding:24px 28px}
  .ed-card{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:1px solid #d6e4ff;border-radius:14px;box-shadow:0 1px 3px rgba(30,58,138,.06),0 4px 16px rgba(30,58,138,.05);padding:18px 20px;margin-bottom:14px}
  .ed-card h3{margin:0 0 10px;font-family:"IBM Plex Sans","IBM Plex Sans Thai",ui-sans-serif,sans-serif;font-size:14.5px;font-weight:700;color:#1e3a8a;letter-spacing:-.2px}
  .ed-tabs{display:flex;gap:4px;background:rgba(99,179,237,.12);padding:4px;border-radius:11px;margin-bottom:16px;flex-wrap:wrap}
  .ed-tabs button{flex:1;min-width:120px;border:none;background:transparent;padding:9px 14px;font-size:12.5px;font-weight:600;color:#475569;border-radius:8px;cursor:pointer;transition:.15s;font-family:inherit}
  .ed-tabs button:hover{background:rgba(255,255,255,.5)}
  .ed-tabs button.active{background:#fff;color:#1e40af;box-shadow:0 2px 8px rgba(79,138,247,.18);font-weight:700}

  /* Print header (visible only when printing) — UNCHANGED */
  #printHeader{display:none}
  @media print{
    body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .sidebar,.topbar,#exportDD,.ed-tabs,.menu-toggle,.btn,button{display:none!important}
    .main{padding:0!important;max-width:none!important;overflow:visible!important}
    .ed-page{background:#fff!important;margin:0!important;padding:14mm!important;min-height:auto!important}
    .wrap{display:block!important}
    .ed-card,.card{box-shadow:none!important;border:1px solid #cbd5e1!important;backdrop-filter:none!important;background:#fff!important;page-break-inside:avoid;margin-bottom:10px!important}
    #printHeader{display:block;border-bottom:3px solid #4F8AF7;padding:0 0 14px;margin-bottom:18px}
    #printHeader .ph-row{display:flex;align-items:center;justify-content:space-between;gap:14px}
    #printHeader .ph-co{display:flex;align-items:center;gap:14px}
    #printHeader .ph-logo{width:62px;height:62px;object-fit:contain}
    #printHeader .ph-co-name{font-family:"IBM Plex Sans","IBM Plex Sans Thai",ui-sans-serif,sans-serif;font-size:18px;font-weight:800;color:#0f172a;letter-spacing:-.4px}
    #printHeader .ph-co-sub{font-size:11px;color:#64748b;margin-top:2px;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
    #printHeader .ph-meta{text-align:right;font-size:11.5px;color:#475569;line-height:1.7}
    #printHeader .ph-title{font-size:13px;font-weight:700;color:#1e40af;letter-spacing:.3px;text-transform:uppercase}
    #printHeader .ph-period{font-size:14.5px;font-weight:700;color:#0f172a;margin-top:1px}
    #printHeader .ph-ts{color:#94a3b8;font-size:10.5px;margin-top:2px;font-style:italic}
    .page-head,h1{break-after:avoid}
    .table-wrap{max-height:none!important;overflow:visible!important;border:none!important}
    table{font-size:10px!important}
    th,td{padding:5px 7px!important}
    th{background:#eff6ff!important;color:#1e40af!important;border-bottom:1.5px solid #4F8AF7!important}
    .ed-print-only{display:block!important}
    canvas{max-width:100%!important;height:auto!important}
    @page{size:A4 landscape;margin:10mm}
  }
  .ed-print-only{display:none}
</style>
