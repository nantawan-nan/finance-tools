name: db-migrate

on:
  push:
    paths:
      - 'supabase/**.sql'   # รันเมื่อมีไฟล์ .sql เปลี่ยนใน supabase/
  workflow_dispatch:         # กด Run ด้วยมือได้

jobs:
  migrate:
    name: Run SQL Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run all SQL files via Supabase Management API
        env:
          SUPA_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPA_PROJECT_REF: "qbsuynmsjieqglxzbqpw"
        run: |
          # SQL ทุกไฟล์ใน supabase/ เรียงตาม filename (alphabetical)
          # ทุกไฟล์ใช้ IF NOT EXISTS / CREATE OR REPLACE → รันซ้ำปลอดภัย
          SQL_FILES=$(ls supabase/*.sql 2>/dev/null | sort)

          if [ -z "$SQL_FILES" ]; then
            echo "ℹ️ ไม่พบไฟล์ .sql ใน supabase/"
            exit 0
          fi

          ALL_OK=true

          for FILE in $SQL_FILES; do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ รัน: $FILE"

            SQL=$(cat "$FILE")

            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $SUPA_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              --data-binary "$(echo '{}' | python3 -c "
import sys, json
sql = open('$FILE').read()
print(json.dumps({'query': sql}))
")" \
              "https://api.supabase.com/v1/projects/$SUPA_PROJECT_REF/database/query")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ $FILE — สำเร็จ (HTTP $HTTP_CODE)"
              # โชว์ผลลัพธ์ถ้ามี (เช่น แถว verify สุดท้าย)
              echo "$BODY" | python3 -c "
import sys, json
try:
  rows = json.load(sys.stdin)
  if isinstance(rows, list) and rows:
    # แสดงแถวสุดท้าย (มักเป็น SELECT verify)
    last = rows[-1] if isinstance(rows[-1], dict) else {}
    for k,v in last.items():
      print(f'   {k}: {v}')
except: pass
" 2>/dev/null || true
            else
              echo "❌ $FILE — ล้มเหลว (HTTP $HTTP_CODE)"
              echo "$BODY" | python3 -c "
import sys, json
try:
  err = json.load(sys.stdin)
  msg = err.get('message') or err.get('error') or str(err)
  print(f'   Error: {msg}')
except: print(sys.stdin.read())
" 2>/dev/null || echo "$BODY"
              ALL_OK=false
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ "$ALL_OK" = "true" ]; then
            echo "✅ Migration ทั้งหมดสำเร็จ"
          else
            echo "❌ มีบาง migration ล้มเหลว — ดู log ด้านบน"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          FILES=$(ls supabase/*.sql 2>/dev/null | sort | wc -l)
          echo "### Migration Result" >> $GITHUB_STEP_SUMMARY
          echo "- **SQL files:** $FILES ไฟล์" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** qbsuynmsjieqglxzbqpw" >> $GITHUB_STEP_SUMMARY
          echo "- **เวลา:** $(TZ='Asia/Bangkok' date '+%d/%m/%Y %H:%M ICT')" >> $GITHUB_STEP_SUMMARY
