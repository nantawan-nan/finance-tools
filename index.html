<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finance Tools — เครื่องมือคลีนข้อมูล</title>
<link rel="icon" id="appFavicon" href="logos/benya-icon.png" />
<link rel="apple-touch-icon" id="appFaviconApple" href="logos/benya-icon.png" />
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@2.3.0/dist/chartjs-chart-treemap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#1e3a8a; --brand-dark:#172554; --brand-soft:#eff6ff; --brand-rgb:37,99,235;
    --page-1:#F0F4FF; --page-2:#E0E7FF;
    --in:#14B8A6;  --in-soft:#dff6f1;  --in-ink:#0d7c70;
    --out:#E18AAA; --out-soft:#fbe6ee; --out-ink:#b14070;
    --warn:#f59e0b; --warn-soft:#fef3c7; --warn-ink:#92400e;
    --ok:#0d7c70; --bad:#b14070;
    --ink:#0f172a; --ink-2:#475569; --ink-3:#94a3b8;
    --line:#e2e8f0; --bg:#f4f6f9; --card:#ffffff;
    --glass:rgba(255,255,255,.78); --glass-strong:rgba(255,255,255,.92); --glass-border:rgba(37,99,235,.16);
    --radius:14px;
    --shadow:0 1px 2px rgba(15,23,42,.05),0 6px 20px rgba(30,58,138,.06);
    --shadow-md:0 2px 8px rgba(15,23,42,.07),0 16px 40px rgba(30,58,138,.10);
    --lift:0 10px 30px rgba(var(--brand-rgb),.16);
  }
  body[data-co="mbark"]{ --brand:#1e3a8a; --brand-dark:#172554; --brand-soft:#dbeafe; --brand-rgb:37,99,235; --page-1:#F0F4FF; --page-2:#E0E7FF; --glass-border:rgba(37,99,235,.16); }
  body[data-co="benya"]{ --brand:#0d9488; --brand-dark:#115e59; --brand-soft:#ccfbf1; --brand-rgb:13,148,136; --page-1:#F0FDFA; --page-2:#CCFBF1; --glass-border:rgba(13,148,136,.18); }
  *{box-sizing:border-box}
  body{margin:0;font-family:"IBM Plex Sans Thai","IBM Plex Sans",ui-sans-serif,system-ui,-apple-system,sans-serif;background:linear-gradient(165deg,var(--page-1) 0%,var(--page-2) 100%) fixed;color:var(--ink);font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .page-head h1,.card h3{font-family:"IBM Plex Sans","IBM Plex Sans Thai",ui-sans-serif,sans-serif;letter-spacing:-.3px}
  button{font-family:inherit;cursor:pointer}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--glass-strong);backdrop-filter:blur(14px);border-bottom:1px solid var(--glass-border);padding:0 24px;position:sticky;top:0;z-index:20;height:56px}
  .crumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-3);flex:1;min-width:0}
  .crumb .co{font-weight:700;color:var(--brand-dark);font-size:13.5px}
  .crumb .sep{color:var(--line)}
  .crumb .pg{color:var(--ink);font-weight:600;font-size:13px}
  .topbar .date{font-size:12px;color:var(--ink-3);font-weight:500;white-space:nowrap;letter-spacing:.2px}
  .topbar .user{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2)}
  .topbar .user .pill{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .topbar .logout{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 12px;font-size:12px;color:var(--ink-2);font-weight:500;transition:.15s}
  .topbar .logout:hover{background:var(--out-soft);color:var(--out-ink);border-color:var(--out)}
  .wrap{display:flex;min-height:100vh}
  .sidebar{width:236px;flex-shrink:0;background:var(--glass);backdrop-filter:blur(18px);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
  .sb-brand{padding:18px 14px 12px;border-bottom:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;gap:6px}
  .sb-brand .sb-logo{height:42px;display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;color:var(--brand-dark);letter-spacing:-.5px}
  .sb-brand .sb-logo .mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 12px rgba(var(--brand-rgb),.3)}
  .sb-brand .sb-logo .mark svg{width:19px;height:19px}
  .sb-brand .sb-tagline{font-size:11px;color:var(--ink-3);font-weight:500;letter-spacing:.3px;margin-top:2px}
  .company-switch{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--glass-border)}
  .company-switch button{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.6);color:var(--ink-3);padding:5px 8px;border-radius:8px;font-weight:600;font-size:11.5px;transition:.15s}
  .company-switch button:hover{border-color:var(--brand);color:var(--brand-dark)}
  .company-switch button.active{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;border-color:var(--brand);box-shadow:0 3px 10px rgba(var(--brand-rgb),.28)}
  .sb-nav{flex:1;overflow-y:auto;padding:8px 6px 16px}
  .stage-label{font-size:11.5px;font-weight:700;color:var(--ink-2);letter-spacing:.4px;padding:12px 10px 6px}
  .nav-item{display:flex;gap:12px;align-items:center;padding:9px 11px;border-radius:9px;cursor:pointer;transition:transform .12s ease,background .12s,color .12s;margin-bottom:1px;color:var(--ink-2);border-left:2.5px solid transparent}
  .nav-item:hover{background:rgba(var(--brand-rgb),.08);color:var(--ink);transform:translateX(2px)}
  .nav-item.active{background:rgba(var(--brand-rgb),.12);color:var(--brand-dark);font-weight:600;border-left:2.5px solid var(--brand);padding-left:8px}
  .nav-item .ic{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;flex-shrink:0;color:#64748b}
  .nav-item .ic svg{width:16px;height:16px;stroke-width:1.7}
  .nav-item.active .ic,.nav-item:hover .ic{color:var(--brand)}
  .nav-item .t{font-size:12.5px;font-weight:500}
  .nav-item.active .t{font-weight:700;color:var(--brand-dark)}
  .nav-item .badge-mini{margin-left:auto;font-size:9px;background:var(--warn-soft);color:var(--warn-ink);padding:1px 6px;border-radius:999px;font-weight:700}
  .sb-footer{padding:10px 12px;border-top:1px solid var(--glass-border);font-size:10.5px;color:var(--ink-3);display:flex;align-items:center;gap:6px}
  .sb-footer .dot{width:6px;height:6px;border-radius:50%;background:var(--in);box-shadow:0 0 0 3px var(--in-soft);flex-shrink:0}
  .main{flex:1;padding:24px 28px;overflow-x:auto;min-width:0;max-width:none}
  .page-head{margin-bottom:22px}
  .page-head h1{margin:0 0 5px;font-size:25px;font-weight:800;letter-spacing:-.6px;color:var(--ink)}
  .page-head .sub{color:var(--ink-2);font-size:13.5px}
  .badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--brand-soft);color:var(--brand-dark);vertical-align:middle;margin-left:8px}
  .card{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;transition:transform .18s ease,box-shadow .18s ease}
  .card:hover{box-shadow:var(--shadow-md)}
  .card h3{margin:0 0 4px;font-size:14.5px;font-weight:700;color:var(--ink)}
  .card .note{color:var(--ink-3);font-size:12.5px;margin-bottom:14px}
  .drop{border:1.5px dashed var(--glass-border);border-radius:12px;padding:28px;text-align:center;color:var(--ink-3);transition:.18s;background:rgba(255,255,255,.45);cursor:pointer}
  .drop:hover{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark)}
  .drop .big{font-size:28px;margin-bottom:6px;opacity:.6}
  .drop b{color:var(--brand)}
  .drop .sm{font-size:11.5px;margin-top:6px}
  .sheet-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;padding:10px 14px;background:rgba(255,255,255,.5);border:1px solid var(--glass-border);border-radius:10px}
  .sheet-row .sheet-lbl{font-size:12.5px;font-weight:700;color:var(--ink-2)}
  .sheet-row select{border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12.5px;font-family:inherit;background:#fff;min-width:180px;color:var(--ink)}
  .sheet-row .sheet-auto{font-size:11.5px;color:var(--in-ink);font-weight:600}
  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .slot{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:7px;transition:transform .18s ease,box-shadow .18s ease}
  .slot:hover{box-shadow:var(--shadow)}
  .slot .lbl{display:flex;align-items:center;gap:7px;font-weight:700;font-size:13px;color:var(--ink)}
  .slot .lbl .step{display:inline-flex;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;font-size:11px;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
  .slot .hint{font-size:11.5px;color:var(--ink-3);line-height:1.4}
  .slot.ready{border-color:var(--in);background:var(--in-soft)}
  .slot .ok{font-size:11.5px;color:var(--in-ink);font-weight:600;margin-top:2px}
  .tabs{display:flex;gap:4px;background:rgba(var(--brand-rgb),.10);padding:4px;border-radius:11px;margin-bottom:14px}
  .tabs button{flex:1;border:none;background:transparent;padding:9px 12px;font-size:12.5px;font-weight:600;color:var(--ink-2);border-radius:8px;cursor:pointer;transition:.15s}
  .tabs button:hover{background:rgba(255,255,255,.55)}
  .tabs button.active{background:#fff;color:var(--brand-dark);box-shadow:0 2px 8px rgba(var(--brand-rgb),.16);font-weight:700}
  .tabs button .c{display:inline-block;margin-left:5px;background:var(--brand-soft);color:var(--brand-dark);border-radius:999px;padding:1px 7px;font-size:10.5px}
  .tabs button.active .c{background:var(--brand);color:#fff}
  .warning-row{background:var(--warn-soft)!important}
  .neg{color:var(--out-ink);font-weight:600}
  .pos{color:var(--in-ink);font-weight:600}
  .btn{border:1px solid transparent;background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;padding:9px 17px;border-radius:9px;font-weight:600;font-size:13px;transition:transform .14s ease,box-shadow .14s ease,filter .14s;box-shadow:0 3px 10px rgba(var(--brand-rgb),.22)}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(var(--brand-rgb),.30)}
  .btn.ghost{background:rgba(255,255,255,.7);color:var(--brand);border-color:var(--brand);box-shadow:none}
  .btn.ghost:hover{background:var(--brand-soft)}
  .btn.sm{padding:6px 13px;font-size:12px;border-radius:8px}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:14px}
  .table-wrap{overflow:auto;border:1px solid var(--glass-border);border-radius:12px;margin-top:12px;max-height:440px;background:rgba(255,255,255,.5)}
  table{border-collapse:collapse;width:100%;font-size:12.5px;white-space:nowrap}
  th,td{border-bottom:1px solid var(--line);padding:9px 12px;text-align:left}
  th{background:rgba(var(--brand-rgb),.07);position:sticky;top:0;font-weight:700;color:var(--brand-dark);font-size:11px;letter-spacing:.4px;text-transform:uppercase}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:rgba(var(--brand-rgb),.05)}
  .empty{padding:40px;text-align:center;color:var(--ink-3);font-size:13px}
  .opts{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .opt{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2)}
  .opt input{width:15px;height:15px;accent-color:var(--brand)}
  .pill-stat{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0 0}
  .stat{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:12px;padding:12px 18px;min-width:120px;transition:transform .16s ease,box-shadow .16s ease}
  .stat:hover{transform:translateY(-2px);box-shadow:var(--lift)}
  .stat .n{font-size:22px;font-weight:800;color:var(--brand-dark);letter-spacing:-.5px}
  .stat .l{font-size:11px;color:var(--ink-2);font-weight:600;margin-top:1px}
  .stat.warn{background:var(--warn-soft);border-color:rgba(245,158,11,.25)}.stat.warn .n{color:var(--warn-ink)}
  .stat.in{background:var(--in-soft);border-color:rgba(20,184,166,.3)}.stat.in .n{color:var(--in-ink)}
  .stat.out{background:var(--out-soft);border-color:rgba(225,138,170,.4)}.stat.out .n{color:var(--out-ink)}

  /* Cash Flow Staff view */
  .cf-chips{display:flex;gap:6px;flex-wrap:wrap}
  .cf-chips button{border:1px solid var(--glass-border);background:rgba(255,255,255,.6);color:var(--ink-2);padding:5px 13px;border-radius:999px;font-size:12px;font-weight:600;transition:.14s}
  .cf-chips button:hover{border-color:var(--brand);color:var(--brand-dark)}
  .cf-chips button.active{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;border-color:var(--brand);box-shadow:0 3px 10px rgba(var(--brand-rgb),.26)}
  .kpigrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:1100px){.kpigrid{grid-template-columns:repeat(3,1fr)}.bankgrid{grid-template-columns:1fr!important}}
  @media(max-width:760px){.kpigrid{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;display:flex;flex-direction:column;gap:3px;transition:transform .16s ease,box-shadow .16s ease;cursor:pointer;font-family:inherit;text-align:left}
  .kpi:hover{transform:translateY(-3px);box-shadow:var(--lift)}
  .kpi .kpi-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;background:var(--brand-soft);color:var(--brand)}
  .kpi .kpi-ic svg{width:17px;height:17px}
  .kpi .kpi-l{font-size:11.5px;color:var(--ink-2);font-weight:600}
  .kpi .kpi-n{font-size:21px;font-weight:800;color:var(--brand-dark);letter-spacing:-.3px;font-family:"IBM Plex Sans","IBM Plex Sans Thai",sans-serif}
  .kpi .kpi-d{font-size:10.5px;color:var(--ink-3);font-weight:500}
  .kpi.in .kpi-ic{background:var(--in-soft);color:var(--in-ink)} .kpi.in .kpi-n{color:var(--in-ink)}
  .kpi.out .kpi-ic{background:var(--out-soft);color:var(--out-ink)} .kpi.out .kpi-n{color:var(--out-ink)}
  .kpi.warn .kpi-ic{background:var(--warn-soft);color:var(--warn-ink)} .kpi.warn .kpi-n{color:var(--warn-ink)}
  .bridge{display:flex;align-items:stretch;gap:10px;flex-wrap:wrap}
  .br-item{flex:1;min-width:140px;background:rgba(255,255,255,.6);border:1px solid var(--glass-border);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:5px;justify-content:center}
  .br-item .br-l{font-size:11.5px;color:var(--ink-2);font-weight:600}
  .br-item .br-v{font-size:19px;font-weight:800;color:var(--brand-dark);font-family:"IBM Plex Sans","IBM Plex Sans Thai",sans-serif}
  .br-item.in{background:var(--in-soft);border-color:rgba(20,184,166,.3)} .br-item.in .br-v{color:var(--in-ink)}
  .br-item.out{background:var(--out-soft);border-color:rgba(225,138,170,.4)} .br-item.out .br-v{color:var(--out-ink)}
  .br-item.total{background:linear-gradient(135deg,var(--brand),var(--brand-dark));border:none;box-shadow:0 6px 18px rgba(var(--brand-rgb),.28)}.br-item.total .br-l{color:rgba(255,255,255,.85)}.br-item.total .br-v{color:#fff}
  .br-op{display:flex;align-items:center;font-size:24px;font-weight:300;color:var(--ink-3)}
  .bankgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .bankcard{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:13px;padding:16px;display:flex;flex-direction:column;gap:9px;transition:transform .16s ease,box-shadow .16s ease}
  .bankcard:hover{transform:translateY(-2px);box-shadow:var(--lift)}
  .bankcard.neg{border-color:rgba(225,138,170,.5);background:var(--out-soft)}
  .bankcard .bk-top{display:flex;align-items:center;gap:10px}
  .bankcard .bk-logo{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--glass-border);overflow:hidden}
  .bankcard .bk-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
  .bankcard .bk-logo .bk-fb{font-weight:800;font-size:11px;color:var(--brand-dark)}
  .bankcard .bk-name{font-weight:700;font-size:13px;color:var(--ink);line-height:1.2}
  .bankcard .bk-acc{font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums}
  .bankcard .bk-net{font-size:22px;font-weight:800;color:var(--brand-dark);letter-spacing:-.4px;font-family:"IBM Plex Sans","IBM Plex Sans Thai",sans-serif}
  .bankcard.neg .bk-net{color:var(--out-ink)}
  .bankcard .bk-rows{display:flex;flex-direction:column;gap:3px;font-size:11.5px;color:var(--ink-2);border-top:1px dashed var(--glass-border);padding-top:8px}
  .bankcard .bk-rows .r{display:flex;justify-content:space-between}
  .bankcard .bk-rows .r b{font-variant-numeric:tabular-nums;color:var(--ink)}
  .cat-row td{background:rgba(var(--brand-rgb),.07);font-weight:700;color:var(--brand-dark)!important;text-transform:none!important;letter-spacing:0!important}
  .sub-row td:first-child{padding-left:30px;color:var(--ink-2)}
  .tot-row td{border-top:2px solid var(--glass-border);font-weight:800;color:var(--ink);background:rgba(255,255,255,.5)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .muted{color:var(--ink-3)}

  /* multi-select checkbox dropdown */
  .multi-dd{position:relative}
  .multi-dd summary{cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:12px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 12px;min-width:140px;user-select:none}
  .multi-dd summary::-webkit-details-marker{display:none}
  .multi-dd summary::after{content:"▾";color:var(--ink-3);font-size:10px;margin-left:auto}
  .multi-dd[open] summary{border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.12)}
  .multi-dd .multi-pop{position:absolute;top:calc(100% + 4px);left:0;z-index:50;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:6px;min-width:220px;max-height:300px;overflow-y:auto}
  .multi-dd .multi-pop label{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:12.5px;color:var(--ink);border-radius:6px;white-space:nowrap}
  .multi-dd .multi-pop label:hover{background:rgba(var(--brand-rgb),.08)}
  .multi-dd .multi-pop label input{width:14px;height:14px;accent-color:var(--brand);flex-shrink:0}
  .multi-dd .multi-pop .multi-actions{display:flex;justify-content:space-between;padding:5px 10px 8px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .multi-dd .multi-pop .multi-actions button{font-size:11px;font-weight:700;color:var(--brand);background:none;border:none;cursor:pointer;padding:2px 4px}
  .multi-dd .multi-pop .multi-actions button:hover{text-decoration:underline}
  .multi-dd .multi-count{background:var(--brand);color:#fff;font-size:10px;padding:1px 6px;border-radius:999px;font-weight:700;margin-left:4px}
  /* Excel-style per-column filter dropdown */
  .col-fdd{position:relative;display:inline-block}

/* ---------- Supabase ---------- */
const SUPABASE_URL = "https://qbsuynmsjieqglxzbqpw.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFic3V5bm1zamllcWdseHpicXB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzQ5NzEsImV4cCI6MjA5NzI1MDk3MX0.EeE22dBxLtUoW9hWKkd1O2DpTbjAeVFeydRe4YorfnA";

    this.email = this.user ? this.user.email : null;
    this.role = this.user ? (this.user.app_metadata && this.user.app_metadata.role) || null : null;

      return this.role==="accounting";

  },
  isReadOnly(){ return !this.role || this.role==="viewer"; },
  // โหมดพรีเซนต์: เห็นแค่หน้า Executive Cash Flow (ผูกกับบัญชี present)
  isPresent(){ return (this.email||"").toLowerCase() === PRESENT_EMAIL; }
};

/* ---------- Main render — choose login vs app ---------- */
async function renderApp(){
  await AUTH.refresh();
  if(!AUTH.user){ renderLogin(); return; }
  if(!AUTH.role){
    renderLogin("บัญชีนี้ยังไม่ได้ตั้ง role — ติดต่อแอดมิน");
    await authSignOut();
    return;
  }
  if(AUTH.isPresent()) state.tool = "execdash";   // โหมดพรีเซนต์ → เปิดที่ Exec Cash Flow เสมอ
  buildShell();
  applyCompanyTheme(state.company);
  renderSidebar();
  renderTool();
  updateCrumb();
}

function buildShell(){
  document.body.innerHTML = `
<div class="wrap">
  <aside class="sidebar" id="sb"></aside>
  <div style="flex:1;min-width:0;display:flex;flex-direction:column">
    <div class="topbar">
      <button class="menu-toggle" title="ซ่อน/แสดงแถบเมนู" aria-label="ซ่อน/แสดงแถบเมนู" onclick="toggleSidebar()">≡</button>
      <div class="crumb" id="crumb"></div>
      <div class="date" id="topDate"></div>
      <div class="user">
        <span class="u-email">${esc(AUTH.email||"")}</span>
        <span class="pill">${esc(AUTH.role||"")}</span>
        <button class="logout" onclick="authSignOut()">ออกจากระบบ</button>
      </div>
    </div>
    <main class="main" id="main"></main>
  </div>
</div>`;
  try{
    const today = new Date();
    const M=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
    document.getElementById("topDate").textContent = `${today.getDate()} ${M[today.getMonth()]} ${today.getFullYear()+543}`;
  }catch(_){}
  // restore สถานะซ่อน sidebar (เดสก์ท็อป)
  try{ if(localStorage.getItem("ft-sb-hidden")==="1") document.body.classList.add("sb-hidden"); }catch(_){}
}

/* ปุ่ม ≡ — เดสก์ท็อป: ซ่อน/แสดง sidebar (จำค่า) · มือถือ: เลื่อนเข้า/ออก */
function toggleSidebar(){
  if(window.matchMedia("(max-width:820px)").matches){
    document.getElementById("sb").classList.toggle("show");
  } else {
    document.body.classList.toggle("sb-hidden");
    try{ localStorage.setItem("ft-sb-hidden", document.body.classList.contains("sb-hidden")?"1":"0"); }catch(_){}
  }
}

function updateCrumb(){
  const t = TOOLS.find(x=>x.id===state.tool);
  const co = COMPANIES.find(c=>c.id===state.company);
  const el = document.getElementById("crumb");
  if(!el || !t || !co) return;
  el.innerHTML = `<span class="co">${esc(co.name)}</span> <span class="sep">/</span> <span style="color:var(--ink-3);font-size:12.5px">${esc(t.stage||"")}</span> <span class="sep">/</span> <span class="pg">${esc(t.name)}</span>`;
}

  companies: null,

  // ขนาดโลโก้ (px) — null = ใช้ค่าเดิม (login 90 · sidebar 46)
  loginLogoH: null,
  sbLogoH: null,

  // ธีมสี — null = ใช้สีตามบริษัท (teal/navy) · หรือ object override ทั้งแอป
  // { brand, brandDark, brandSoft, brandRgb, in, inSoft, inInk, out, outSoft, outInk }
  theme: null,
};
function appToolEnabled(id){ return !APP_CONFIG.enabledTools || APP_CONFIG.enabledTools.includes(id); }
/* optIn tool = โชว์เฉพาะตอนถูกใส่ใน enabledTools เท่านั้น (ของเดิม enabledTools=null จะไม่เห็น) */
function appToolVisible(t){
  if(!appToolEnabled(t.id)) return false;
  if(t.optIn && !(APP_CONFIG.enabledTools && APP_CONFIG.enabledTools.includes(t.id))) return false;
  return true;
}

function applyCompanyTheme(id){
  document.body.setAttribute("data-co", id);
  // clone theme override — set CSS vars บน body (ทับทั้ง :root + [data-co]) · null = คืนค่าเดิม
  const th = APP_CONFIG.theme, b = document.body.style;
  const set=(k,v)=>{ if(th&&v) b.setProperty(k,v); else b.removeProperty(k); };
  set("--brand", th&&th.brand); set("--brand-dark", th&&th.brandDark); set("--brand-soft", th&&th.brandSoft); set("--brand-rgb", th&&th.brandRgb);
  set("--in", th&&th.in); set("--in-soft", th&&th.inSoft); set("--in-ink", th&&th.inInk);
  set("--out", th&&th.out); set("--out-soft", th&&th.outSoft); set("--out-ink", th&&th.outInk);
  // หัวแท็บเบราว์เซอร์ (favicon + title) = โลโก้/ชื่อบริษัทปัจจุบัน
  const co = COMPANIES.find(c=>c.id===id);
  if(co){
    const setIc=(elId)=>{ let el=document.getElementById(elId); if(!el){ el=document.createElement("link"); el.id=elId; el.rel=elId==="appFaviconApple"?"apple-touch-icon":"icon"; document.head.appendChild(el); } if(co.logo) el.href=co.logo; };
    setIc("appFavicon"); setIc("appFaviconApple");
    document.title = (co.name||co.short||co.code||"Finance Tools") + " — Finance Tools";
  }
}

/* pick the best sheet name from a workbook for the given tool
   returns { name, auto } — auto=true if matched a hint */
function pickSheet(sheetNames, hints){
  if(!sheetNames||!sheetNames.length) return null;
  const norm = s => String(s||"").toLowerCase().replace(/\s+/g,"");
  const list = sheetNames.map(n=>({raw:n, n:norm(n)}));
  const exclude = (hints&&hints.exclude||[]).map(norm);
  const filtered = list.filter(s => !exclude.some(x => s.n.includes(x)));
  const pool = filtered.length ? filtered : list;
  // exact
  for(const x of (hints&&hints.exact||[]).map(norm)){
    const hit = pool.find(s=>s.n===x); if(hit) return {name:hit.raw, auto:true};
  }
  // contains
  for(const x of (hints&&hints.contains||[]).map(norm)){
    const hit = pool.find(s=>s.n.includes(x)); if(hit) return {name:hit.raw, auto:true};
  }
  // no hint matched → no auto pick (let user choose)
  return {name:pool[0].raw, auto:false};
}

/* รัน RE จากเลขเริ่ม + offset i — รักษาความยาว/zero-pad ตามเลขเริ่ม */
function armapRunRE(seed, i){
  if(!seed) return "";
  const m = String(seed).match(/^(\D*)(\d+)$/);   // prefix อักษร (ถ้ามี) + ตัวเลข
  if(!m) return "";

  const next = (BigInt(num) + BigInt(i)).toString();
  return prefix + next.padStart(num.length, "0");
}

/* ---------- helpers ---------- */
function num(v){
  if(v==null||v==="") return 0;

  return isNaN(n)?0:n;
}
function round2(n){ return Math.round(n*100)/100; }
function pad2(n){ return String(n).padStart(2,"0"); }

/* ISO date helpers */
function parseDate(v){
  if(v==null||v==="") return "";
  if(v instanceof Date) return `${v.getFullYear()}-${pad2(v.getMonth()+1)}-${pad2(v.getDate())}`;
  const s=String(v).trim();
  let m=s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
  if(m) return `${m[1]}-${pad2(m[2])}-${pad2(m[3])}`;
  m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})/);
  if(m){
    let y=parseInt(m[3],10);
    if(y<100) y+=2000;
    if(y>=2500) y-=543;
    return `${y}-${pad2(m[2])}-${pad2(m[1])}`;
  }
  return s;
}
function fmtDateDDMMYYYY(iso){
  if(!iso) return "";
  const m=iso.match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return iso;
  return `${m[3]}/${m[2]}/${m[1]}`;
}
function fmtDateDDMMYY(iso){
  if(!iso) return "";
  const m=iso.match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return iso;
  return `${m[3]}/${m[2]}/${m[1].slice(2)}`;
}

/* CSV parser (handles "" escapes + CRLF) */
function csvParse(text){
  const rows=[]; let row=[],field="",inQ=false,i=0;
  while(i<text.length){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false; i++; }
      else { field+=ch; i++; }
    } else {
      if(ch==='"'){ inQ=true; i++; }
      else if(ch===','){ row.push(field); field=""; i++; }
      else if(ch==='\r'){ i++; }
      else if(ch==='\n'){ row.push(field); rows.push(row); row=[]; field=""; i++; }
      else { field+=ch; i++; }
    }
  }
  if(field||row.length){ row.push(field); rows.push(row); }
  return rows;
}

/* read a file as Uint8Array (for XLSX) or decoded text (for CSV) */
function readFileSmart(file){
  return new Promise((resolve,reject)=>{
    const isCSV=/\.csv$/i.test(file.name);
    const r=new FileReader();
    r.onerror=()=>reject(r.error);
    r.onload=()=>{
      if(isCSV){
        // Express exports are TIS-620 / CP874 — decode safely
        const buf=new Uint8Array(r.result);
        let text;
        try{ text=new TextDecoder("utf-8",{fatal:true}).decode(buf); }
        catch(_){ try{ text=new TextDecoder("windows-874").decode(buf); }
                  catch(__){ text=new TextDecoder("tis-620").decode(buf); } }
        resolve({type:"csv", text});
      } else {
        const wb=XLSX.read(new Uint8Array(r.result),{type:"array",cellDates:true});
        const sheets={}, names=wb.SheetNames.slice();
        names.forEach(n=>{
          sheets[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:"",blankrows:false,raw:true});
        });
        resolve({type:"xlsx", names, sheets});
      }
    };
    r.readAsArrayBuffer(file);
  });
}

/* ---------- Parser: Express AR Outstanding (banded CSV) ---------- */
function parseExpressAR(text){
  const rows=csvParse(text);
  const out=[]; let currCode="",currName="";
  for(const r of rows){
    const c1=(r[1]||"").trim();
    const c3=(r[3]||"").trim();
    const c4=(r[4]||"").trim();
    const c5=(r[5]||"").trim();
    const c7=(r[7]||"").trim();
    // Skip subtotal/grand-total rows
    if(/^รวม|^ประเภท/.test(c1)) continue;
    // Customer header: name in c3, code in c4, no date
    if(c3 && c4 && !c5 && !/^IV|^SR|^RE/.test(c4) && !/^---/.test(c3)){
      currName=c3; currCode=c4;
      continue;
    }
    // Detail row: date in c5, doc in c7
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(c5) && /^(IV|SR|RE|CN|DN)/i.test(c7)){
      out.push({
        custCode:currCode, custName:currName,
        doc:c7, date:parseDate(c5),
        bill:num(r[9]), paid:num(r[10]), outstanding:num(r[11]),
        isReturn:/^SR|^CN/i.test(c7)
      });
    }
  }
  return out;
}

/* ---------- Parser: Express Sales Detail (banded text-in-CSV) ---------- */
function parseExpressSales(text){
  const rows=csvParse(text);
  const out=[]; let currCode="",currName="";
  for(const r of rows){
    // Each row is essentially one text line (column 0)
    const line=(r[0]||"").replace(/[ ]/g," ").trimEnd();
    if(!line.trim()) continue;
    const sline=line.trim();
    // Skip separator / header / totals
    if(/^-+$/.test(sline)) continue;
    if(/^รวม|^ทั้งหมด|^เขตการสาขา|^เขตการขาย$|^พิมพ์รายการ|^วันที่จาก|^บริษัท|^วิเคราะห์/.test(sline)) continue;
    // Customer header: "<name> /<CUSTCODE>"
    const ch=sline.match(/^(.+?)\s*\/\s*([A-Z][A-Z0-9 .\-_]*)$/);
    if(ch && !/^IV\d|^SR\d|^RE\d/.test(sline)){
      currName=ch[1].replace(/^ลูกค้าทั่วไป-?/,"").trim();
      currCode=ch[2].trim();
      continue;
    }
    // Detail row: starts with IV/SR + date
    const m=sline.match(/^(IV|SR|RE)(\d{6,15})\s+(\d{1,2}\/\d{1,2}\/\d{2,4})\s+/);
    if(m){
      const doc=m[1]+m[2];
      const date=parseDate(m[3]);
      const rest=sline.slice(m[0].length);
      const tokens=rest.split(/\s+/).filter(Boolean);
      // Find second date (ครบกำหนด)
      let dueIdx=-1;
      for(let i=0;i<tokens.length;i++){
        if(/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(tokens[i])){ dueIdx=i; break; }
      }
      // Numeric tokens BEFORE dueIdx — last one = รวมทั้งสิ้น (with VAT)
      let total=0;
      if(dueIdx>0){
        for(let i=dueIdx-1;i>=0;i--){
          const t=tokens[i].replace(/,/g,"");
          if(/^-?\d+(?:\.\d+)?$/.test(t)){ total=parseFloat(t); break; }
        }
      }
      // อ้างอิง = first long alphanumeric token after dueIdx
      let ref="";
      if(dueIdx>=0){
        for(let i=dueIdx+1;i<tokens.length;i++){
          const t=tokens[i].replace(/"+$/,"");
          if(/^[A-Z0-9]{8,}$/i.test(t) && !/^\d+\.\d+$/.test(t)){ ref=t; break; }
        }
      }
      out.push({ iv:doc, date, custCode:currCode, custName:currName, ref, total });
    }
  }
  return out;
}

/* ---------- Parser: Shopee Income ---------- */
function parseShopeeIncome(book){
  const incomeName = book.names.find(n => /^income$/i.test(n)) || book.names[0];
  const summaryName = book.names.find(n => /summary/i.test(n)) || null;
  let seller="";
  if(summaryName){
    const sumRows=book.sheets[summaryName]||[];
    for(const r of sumRows){
      const c0=String(r[0]||"");
      if(c0.includes("ชื่อผู้ขาย") || c0.includes("ผู้ขาย (ร้านค้า)")){ seller=String(r[1]||"").trim(); break; }
    }
  }
  const rows=book.sheets[incomeName]||[];
  let headerIdx=-1;
  for(let i=0;i<Math.min(15,rows.length);i++){
    const r=rows[i]||[];
    if(r.some(c=>String(c||"").includes("หมายเลขคำสั่งซื้อ"))){ headerIdx=i; break; }
  }
  if(headerIdx<0) return { rows:[], seller };
  const header=rows[headerIdx].map(h=>String(h||""));
  const find=keys=>{
    for(const k of keys){ const i=header.findIndex(h=>h.includes(k)); if(i>=0) return i; }
    return -1;
  };
  const cOrder=find(["หมายเลขคำสั่งซื้อ"]);
  // วันที่โอน: "วันที่โอนชำระเงินสำเร็จ" (โอน success) > "วันที่โอน..." ทั่วไป
  let cPaidDate=header.findIndex(h=>h.includes("วันที่โอนชำระเงินสำเร็จ"));
  if(cPaidDate<0) cPaidDate=find(["วันที่โอน","วันที่จ่ายเงิน","วันที่ปล่อยเงิน"]);
  const cOrderDate=find(["วันที่ทำการสั่งซื้อ"]);
  // ยอดเงินจริงที่ได้รับ: "จำนวนเงินทั้งหมดที่โอนแล้ว (฿)" คือยอดสุทธิที่ผู้ขายได้
  let cNet=header.findIndex(h=>h.includes("จำนวนเงินทั้งหมดที่โอนแล้ว"));
  if(cNet<0) cNet=header.findIndex(h=>h.includes("จำนวนเงินสุทธิที่ผู้ขาย"));
  if(cNet<0) cNet=header.findIndex(h=>h.includes("จำนวนเงิน")&&h.includes("฿")&&!h.includes("คืน")&&!h.includes("ค่า"));
  const cGross=find(["ราคาขายค้าปลีก","ราคาตั้ง"]);
  const out=[];
  for(let i=headerIdx+1;i<rows.length;i++){
    const r=rows[i];
    const o=String(r[cOrder]||"").trim();
    if(!o) continue;
    out.push({
      orderNo:o,
      paymentDate:parseDate(r[cPaidDate]),
      orderDate:parseDate(r[cOrderDate]),
      net:num(r[cNet]),
      gross:num(r[cGross])
    });
  }
  return { rows:out, seller };
}

/* ---------- Parser: TikTok Income ---------- */
function parseTikTokIncome(book){
  const detailName = book.names.find(n => n.includes("รายละเอียดคำสั่งซื้อ")) || book.names[0];
  const rows=book.sheets[detailName]||[];
  if(!rows.length) return { rows:[], seller:"" };
  const header=rows[0].map(h=>String(h||""));
  const find=keys=>{
    for(const k of keys){ const i=header.findIndex(h=>h.includes(k)); if(i>=0) return i; }
    return -1;
  };
  const cOrder=find(["หมายเลขคำสั่งซื้อ"]);
  const cClose=find(["เวลาที่ชำระคำสั่งซื้อ","เวลาที่ปิดคำสั่งซื้อ"]);
  const cCreate=find(["เวลาที่สร้างคำสั่งซื้อ"]);
  const cNet=find(["จำนวนเงินที่ชำระทั้งหมด","จำนวนเงินที่จะถึง"]);
  const cGross=find(["รายได้รวม","มูลค่าสั่ง"]);
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const o=String(r[cOrder]||"").trim();
    if(!o) continue;
    out.push({
      orderNo:o,
      paymentDate:parseDate(r[cClose])||parseDate(r[cCreate]),
      orderDate:parseDate(r[cCreate]),
      net:num(r[cNet]),
      gross:num(r[cGross])
    });
  }
  return { rows:out, seller:"" };
}

/* ---------- Detect platform kind + brand ---------- */
function detectPlatform(file, book){
  const nm=file.name.toLowerCase();
  const seller=(detectSeller(book)||"").toLowerCase();
  let kind="";
  if(/tiktok|รายละเอียดคำสั่งซื้อ/i.test(nm) || book.names.some(n=>/รายละเอียดคำสั่งซื้อ/.test(n))) kind="TT";
  else if(/shopee|income/i.test(nm) || book.names.some(n=>/^income$/i.test(n))) kind="SP";
  let brand="";
  const all=(nm+" "+seller);
  if(/betra|^be[ _\-]|\bbe[ _\-]/i.test(all)) brand="BT";
  else if(/qi[ _-]?care|benya_official|^qi[ _\-]|\bqi[ _\-]/i.test(all)) brand="QI";
  else if(/mbark|mmark|m[ _\-]?bark/i.test(all)) brand="MB";
  return { kind, brand, seller };
}
function detectSeller(book){
  const sumName=book.names.find(n=>/summary/i.test(n));
  if(sumName){
    for(const r of (book.sheets[sumName]||[])){
      const c0=String(r[0]||"");
      if(c0.includes("ชื่อผู้ขาย")||c0.includes("ผู้ขาย (ร้านค้า)")) return String(r[1]||"").trim();
    }
  }
  // TikTok: รายงาน sheet doesn't have explicit seller — use filename hint
  return "";
}

/* ---------- Brand guess from Express customer code ---------- */
function guessBrandFromCustCode(code){
  const c=String(code||"").toUpperCase();
  // Express ใช้รหัสสั้น: "SHOPEE BE" = Betra, "SHOPEE QI" = QI Care
  if(/BETRA|\bBT\b|\bBE\b/.test(c)) return "BT";
  if(/QI[\s-]?CARE|\bQI\b/.test(c)) return "QI";
  if(/MBARK|MMARK|M[ -]?BARK|\bMB\b/.test(c)) return "MB";
  return "";
}
function guessChannelFromCustCode(code){
  const c=String(code||"").toUpperCase();
  if(/SHOPEE|\bSP\b/.test(c)) return "SP";
  if(/TIKTOK|\bTT\b|\bTK\b/.test(c)) return "TT";
  if(/LAZADA|\bLZ\b/.test(c)) return "LZ";
  return "";
}
function bankCodeOf(kind,brand){
  const map={ "SP|BT":"SB","SP|QI":"SI","TT|BT":"TB","TT|QI":"TQ","SP|MB":"SM","TT|MB":"TM" };
  return map[kind+"|"+brand]||"";
}

/* AutoKey "เลือก Bank" command — key by BRAND × CHANNEL (ไม่ใช่บริษัท)
   ตัวเลข = ตำแหน่งของช่องทาง+แบรนด์ใน dropdown ของระบบ
   เบญญา (BT/QI brands):   SB=6, SI=7, TB=9, TQ=10
   M Bark (MB brand):       ยังไม่รู้ — รอแนนบอก  */
const BANK_DOWN = {
  BT: { SP:6, TT:9 },     // SHOPEE-BETRA → 6 · TIKTOK-BETRA → 9
  QI: { SP:7, TT:10 },    // SHOPEE-QI    → 7 · TIKTOK-QI    → 10
  MB: { SP:null, TT:null } // M Bark template — TBD
};
function bankDownCmd(brand, kind){
  const n=(BANK_DOWN[brand]||{})[kind];
  return n ? `{Down ${n}}` : "";
}

/* ---------- ARMAP: file slot handlers ---------- */
async function armapHandleFile(slot, files){
  const data=armapGet();
  for(const file of files){
    try{
      const parsed=await readFileSmart(file);
      if(slot==="ar"){
        if(parsed.type!=="csv"){ alert("ช่องลูกหนี้คงค้าง: ต้องเป็น CSV จาก Express"); continue; }
        const rows=parseExpressAR(parsed.text);
        data.ar={ file:file.name, rows };
      } else if(slot==="sales"){
        if(parsed.type!=="csv"){ alert("ช่องรายงานขาย: ต้องเป็น CSV จาก Express"); continue; }
        const rows=parseExpressSales(parsed.text);
        data.sales={ file:file.name, rows };
      } else if(slot==="platform"){
        if(parsed.type!=="xlsx"){ alert("ช่องหลังบ้าน: ต้องเป็น XLSX จาก Shopee/TikTok"); continue; }
        const det=detectPlatform(file,parsed);
        let parsedRows={ rows:[], seller:"" };
        if(det.kind==="SP") parsedRows=parseShopeeIncome(parsed);
        else if(det.kind==="TT") parsedRows=parseTikTokIncome(parsed);
        data.platforms.push({
          file:file.name, kind:det.kind, brand:det.brand,
          sellerName:parsedRows.seller||det.seller, rows:parsedRows.rows
        });
      }
    }catch(err){
      alert(`อ่านไฟล์ "${file.name}" ไม่สำเร็จ: `+err.message);
    }
  }
  data.result=null;   // invalidate previous result
  renderTool();
}
function armapRemoveFile(slot, idx){
  const d=armapGet();
  if(slot==="ar") d.ar=null;
  else if(slot==="sales") d.sales=null;
  else if(slot==="platform") d.platforms.splice(idx,1);
  d.result=null;
  renderTool();
}
function armapClearAll(){
  const d=armapGet();
  d.ar=null; d.sales=null; d.platforms=[]; d.result=null;
  renderTool();
}

/* ---------- ARMAP: compute ---------- */
function armapCompute(){
  const d=armapGet();
  if(!d.ar||!d.sales||!d.platforms.length){
    alert("ใส่ไฟล์ให้ครบ 3 ช่องก่อนค่ะ");
    return;
  }
  // Index sales by IV
  const salesByDoc={};
  for(const s of d.sales.rows){
    if(!s.iv) continue;
    (salesByDoc[s.iv]=salesByDoc[s.iv]||[]).push(s);
  }
  // Index platform rows by orderNo (with kind+brand tags)
  const platByOrder={};
  for(const p of d.platforms){
    for(const r of p.rows){
      if(!r.orderNo) continue;
      (platByOrder[r.orderNo]=platByOrder[r.orderNo]||[]).push({
        ...r, _kind:p.kind, _brand:p.brand, _seller:p.sellerName, _file:p.file
      });
    }
  }
  const usedOrders=new Set();
  const A=[],B=[];
  // For each outstanding IV (positive, only IV docs)
  for(const ar of d.ar.rows){
    if(!/^IV/i.test(ar.doc)) continue;
    if(ar.outstanding<=0) continue;
    const sList=salesByDoc[ar.doc];
    if(!sList||!sList.length){ B.push({ ar, reason:"ไม่เจอในรายงานขาย (ตกหล่น?)" }); continue; }
    const sale=sList[0];
    if(!sale.ref){ B.push({ ar, sale, reason:"รายงานขายไม่มีเลขออเดอร์อ้างอิง" }); continue; }
    const plats=platByOrder[sale.ref];
    if(!plats||!plats.length){ B.push({ ar, sale, reason:"รอเงินเข้า (ยังไม่อยู่ในไฟล์หลังบ้าน)" }); continue; }
    const plat=plats[0];
    usedOrders.add(sale.ref);
    const expBrand=guessBrandFromCustCode(ar.custCode);
    const expChan =guessChannelFromCustCode(ar.custCode);
    const warning=[];
    if(expBrand && plat._brand && expBrand!==plat._brand)
      warning.push(`บัญชีคีย์แบรนด์ "${expBrand}" แต่เงินเข้า "${plat._brand}"`);
    if(expChan && plat._kind && expChan!==plat._kind)
      warning.push(`บัญชีคีย์ช่องทาง "${expChan}" แต่เงินเข้า "${plat._kind}"`);
    A.push({
      arIv:ar.doc, arDate:ar.date, arCustCode:ar.custCode, arCustName:ar.custName,
      arOutstanding:ar.outstanding,
      orderNo:sale.ref, saleTotal:sale.total,
      channel:plat._kind, paymentDate:plat.paymentDate,
      netAmount:plat.net, gross:plat.gross||0,
      diff:round2(ar.outstanding-plat.net),
      actualBrand:plat._brand, sellerName:plat._seller,
      sourceFile:plat._file,
      bankCode:bankCodeOf(plat._kind,plat._brand),
      warning:warning.join(" · ")
    });
  }
  // Bucket C: platform rows not consumed
  const C=[];
  for(const p of d.platforms){
    for(const r of p.rows){
      if(!r.orderNo||usedOrders.has(r.orderNo)) continue;
      C.push({
        orderNo:r.orderNo, paymentDate:r.paymentDate,
        net:r.net, gross:r.gross,
        channel:p.kind, brand:p.brand,
        seller:p.sellerName, file:p.file
      });
    }
  }
  d.result={ A, B, C, totals:{
    arIvs:d.ar.rows.filter(r=>r.outstanding>0&&/^IV/i.test(r.doc)).length,
    salesIvs:d.sales.rows.length,
    platOrders:Object.keys(platByOrder).length,
    matched:A.length, waiting:B.length, orphan:C.length
  } };
  d.activeTab="a";
  renderTool();
}

function armapWireDrops(){
  document.querySelectorAll('.slot .drop').forEach(drop=>{
    const slot=drop.dataset.slot;
    const inp=document.querySelector(`input[data-slotinp="${slot}"]`);
    drop.onclick=()=>inp.click();
    inp.onchange=e=>{
      // ⚠️ ต้อง clone FileList เป็น Array ก่อน เพราะ inp.value="" จะล้าง e.target.files
      // ทำให้ async loop อ่านไฟล์ที่ 2+ ไม่ได้
      const arr=Array.from(e.target.files);
      inp.value="";
      if(arr.length) armapHandleFile(slot,arr);
    };
    drop.ondragover=e=>{e.preventDefault();drop.classList.add("over");};
    drop.ondragleave=()=>drop.classList.remove("over");
    drop.ondrop=e=>{
      e.preventDefault();drop.classList.remove("over");
      const arr=Array.from(e.dataTransfer.files);
      if(arr.length) armapHandleFile(slot,arr);
    };
  });
}

const A_HEAD=["ลำดับที่","เลขที่เอกสาร","วันที่ IV","เลข IV","แบรนด์","ยอดคงค้าง (IV)","รหัสออเดอร์","ช่องทาง","วันที่รับชำระ (DD/MM/YYYY)","วันที่รับชำระ (DD/MM/YY)","ยอดเงินเข้า (หลังหักค่าธรรมเนียม)","ส่วนต่างที่ต้องบันทึก","รหัสลูกค้า","เลือก LETT OTHER","Enter less other","เลือก Bank","ธนาคาร","รหัสเช็ค","หมายเหตุ"];

/* เฉพาะ M Bark: bank down ตามรหัสลูกค้า (จากรายงานขาย) */
function mbarkBankDownByCust(custCode){
  const c = String(custCode||"").toUpperCase();
  if(/LAZADA|\bLZ\b/.test(c)) return "{Down 11}";
  if(/TIKTOK|\bTT\b|\bTK\b/.test(c)) return "{Down 12}";
  if(/SHOPEE|\bSP\b|\bSH\b/.test(c)) return "{Down 13}";
  return "";
}

/* เฉพาะ M Bark: รหัสเช็ค ตามรหัสลูกค้า (legend จาก Excel ของแนน)
   LZ=Lazada · SH=Shopee · TT=Tiktok · DR=Dealer · FB=Facebook · IG=Instagram · LI=LINE · 61=C-BBL · 63=C-TFB */
function mbarkCheckCode(custCode){
  const c = String(custCode||"").toUpperCase();
  // ใช้ tokens (split ทุกตัวที่ไม่ใช่ A-Z 0-9) เพื่อเช็ครหัสสั้นแม่นยำ — "IG_99" → ["IG","99"]
  const tokens = c.split(/[^A-Z0-9]+/).filter(Boolean);
  const has = (...keys) => tokens.some(t => keys.includes(t));
  if(/LAZADA/.test(c)   || has("LZ"))         return "LZ";
  if(/SHOPEE/.test(c)   || has("SP","SH"))    return "SH";
  if(/TIKTOK/.test(c)   || has("TT","TK"))    return "TT";
  if(/DEALER/.test(c)   || has("DR"))         return "DR";
  if(/FACEBOOK/.test(c) || has("FB"))         return "FB";
  if(/INSTAGRAM/.test(c)|| has("IG"))         return "IG";
  if(/LINE/.test(c)     || has("LI"))         return "LI";
  if(/C-?BBL|กรุงเทพ/.test(c) || has("61"))   return "61";
  if(/C-?TFB|กสิกร/.test(c)   || has("63"))   return "63";
  return "";
}

function aRowOf(r,i,company){
  // เลข RE auto-run จาก seed ที่ผู้ใช้กรอก + offset i (2 บริษัทเหมือนกัน)
  const seed = armapGet().reSeed;
  // M Bark: bank ตามรหัสลูกค้า + "เลือก LETT OTHER" = {Down 18} · บริษัทอื่นใช้ BANK_DOWN (brand × channel) + {Up 1}
  // หมายเหตุ: "Enter less other" คงเป็น {Enter} ทั้งคู่
  const isMbark = company === "mbark";
  const lettOther = isMbark ? "{Down 18}" : "{Up 1}";
  const enterCmd = "{Enter}";
  const downCmd  = isMbark ? mbarkBankDownByCust(r.arCustCode) : bankDownCmd(r.actualBrand, r.channel);
  const checkCode = isMbark ? mbarkCheckCode(r.arCustCode) : "";   // Benya เว้นว่างก่อน รอข้อมูล
  return {
    ลำดับ:i+1,
    doc_no: armapRunRE(seed, i),         // ★ คอลัมน์ B — รัน RE +1 ทุกแถว
    iv_date:fmtDateDDMMYYYY(r.arDate),
    iv:r.arIv,
    brand:r.actualBrand||"",
    outstanding:round2(r.arOutstanding),
    orderNo:r.orderNo,
    channel:r.channel,
    pay_date_long:fmtDateDDMMYYYY(r.paymentDate),
    pay_date_short:fmtDateDDMMYY(r.paymentDate),
    net:round2(r.netAmount),
    diff:round2(r.diff),
    cust:r.arCustCode,
    lett_other:lettOther,
    enter:enterCmd,
    bank_down:downCmd,
    bank_code:r.bankCode||"",            // SB/SI/TB/TQ
    check_code:checkCode,                // รหัสเช็ค (M Bark) / "" (Benya)
    warning:r.warning||""
  };
}

  const base=`ARMap_${COMPANIES.find(c=>c.id===state.company).name}_${stamp()}.xlsx`;
  XLSX.writeFile(wb, base);
}

  return { yy:m[1], mm:m[2], running:parseInt(m[3],10), raw:s };

/* ---------- Thai date "07 มิ.ย. 2026 23:40" → ISO ---------- */
const BS_THAI_MONTH = {
  "ม.ค.":1,"ก.พ.":2,"มี.ค.":3,"เม.ย.":4,"พ.ค.":5,"มิ.ย.":6,
  "ก.ค.":7,"ส.ค.":8,"ก.ย.":9,"ต.ค.":10,"พ.ย.":11,"ธ.ค.":12,
  "มกราคม":1,"กุมภาพันธ์":2,"มีนาคม":3,"เมษายน":4,"พฤษภาคม":5,"มิถุนายน":6,
  "กรกฎาคม":7,"สิงหาคม":8,"กันยายน":9,"ตุลาคม":10,"พฤศจิกายน":11,"ธันวาคม":12
};
function bsParseDate(v){
  if(v==null||v==="") return "";
  if(v instanceof Date) return `${v.getFullYear()}-${pad2(v.getMonth()+1)}-${pad2(v.getDate())}`;
  const s=String(v).trim();
  // "07 มิ.ย. 2026 23:40"
  const m=s.match(/^(\d{1,2})\s+(\S+)\s+(\d{4})/);
  if(m && BS_THAI_MONTH[m[2]]){
    let y=parseInt(m[3],10);
    if(y>=2500) y-=543;
    return `${y}-${pad2(BS_THAI_MONTH[m[2]])}-${pad2(parseInt(m[1],10))}`;
  }
  // fallback to generic date parser
  return parseDate(s);
}

/* ---------- BigSeller parser ---------- */
function bsParse(book){
  const sheet = book.names[0];
  const rows = book.sheets[sheet] || [];
  if(rows.length<2) return { items:[], shops:[] };
  const header = rows[0].map(h=>String(h||"").trim());
  const find = name => header.findIndex(h => h===name);
  const c = {
    order:   find("หมายเลขคำสั่งซื้อ"),
    platform:find("แพลตฟอร์ม"),
    shop:    find("ร้านค้าเพลตฟอร์ม"),
    sku:     find("SKU"),
    qty:     find("จำนวน"),
    priceOrig:find("ราคาสินค้าเดิม"),   // AJ — ไม่มี mask ***
    priceFallback: find("ราคา"),
    total:   find("รวมค่าสินค้า"),
    ship:    find("ค่าจัดส่ง"),
    discount:find("ส่วนลดผู้ขาย"),       // BP — ส่วนลดท้ายบิล
    time:    find("เวลาสั่งซื้อ"),
    status:  find("สถานะคำสั่งซื้อ"),
    pstatus: find("สถานะแพลตฟอร์ม")
  };
  // BP fallback by position ถ้าหาด้วยชื่อไม่เจอ
  if(c.discount<0 && header.length>67) c.discount = 67;
  const items = [];
  const shopsSeen = new Set();
  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    const orderNo = String(r[c.order]||"").trim();
    if(!orderNo) continue;
    const platform = String(r[c.platform]||"").trim();
    const shop = String(r[c.shop]||"").trim();
    if(shop) shopsSeen.add(shop);
    const priceCell = r[c.priceOrig];
    const priceStr = String(priceCell==null?"":priceCell);
    // ถ้า "ราคาสินค้าเดิม" ว่าง/เป็น *** → ใช้ "ราคา" แทน
    let price = num(priceCell);
    if(!price || priceStr.includes("*")){
      price = num(r[c.priceFallback]);
    }
    items.push({
      orderNo,
      platform,
      shop,
      channel: bsChannelFromPlatform(platform),
      sku: String(r[c.sku]||"").trim(),
      qty: num(r[c.qty]),
      price,
      ship: num(r[c.ship]),
      billDiscount: c.discount>=0 ? num(r[c.discount]) : 0,
      saleDate: bsParseDate(r[c.time]),
      status: String(r[c.status]||"").trim(),
      pstatus: String(r[c.pstatus]||"").trim()
    });
  }
  return { items, shops:Array.from(shopsSeen) };
}

/* ---------- Brand จากชื่อร้าน (Benya = QI/Betra, Mbark = MB เสมอ) ---------- */
function bsBrandFromShop(company, shop){
  if(company==="mbark") return "MB";
  const s = String(shop||"");
  if(/qi/i.test(s))    return "QI";
  if(/betra|be\b/i.test(s)) return "BT";
  return "";
}

/* ---------- Build output rows ---------- */
function bsBuildResult(){
  const d = bsGet();
  if(!d.raw) return null;
  const company = state.company;
  const sku = bsLoadJSON(BS_LS_SKU, {});
  const skuCloud = (state.skuCloud && state.skuCloud[company]) || [];
  const skuSet = new Set([
    ...bsSeedSkuFor(company),
    ...skuCloud.map(s=>String(s).trim()),
    ...(sku[company]||[]).map(s=>String(s).trim())
  ]);
  const history = bsLoadJSON(BS_LS_HISTORY, {});
  const hist = new Set((history[company]||[]).map(o=>String(o)));

  // Group items by order (กรองออเดอร์ที่ user กดลบออก)
  const deleted = d.opts.deletedOrders || new Set();
  const byOrder = {};
  const orderList = [];
  for(const it of d.raw.items){
    if(deleted.has(it.orderNo)) continue;
    if(!byOrder[it.orderNo]){ byOrder[it.orderNo]=[]; orderList.push(it.orderNo); }
    byOrder[it.orderNo].push(it);
  }

  // Detect unknown shops — ร้านที่ regex QI/Betra ไม่จับ
  const unknownShops = [];
  for(const sh of d.raw.shops){
    if(!bsBrandFromShop(company, sh)) unknownShops.push(sh);
  }

  // IV auto-numbering seed
  const seed = bsParseIvSeed(d.opts.lastIv);
  let nextRun = seed ? seed.running + 1 : null;
  const crossMonth = [];

  const lines = [];
  const newSku = new Set();
  const dupOrders = new Set();
  const cancelOrders = new Set();

  let seq = 0;
  for(const orderNo of orderList){
    const its = byOrder[orderNo];
    const isCancel = its.some(x => /ยกเลิก|cancel/i.test(x.status) || /cancel/i.test(x.pstatus));
    if(isCancel) cancelOrders.add(orderNo);
    if(hist.has(orderNo)) dupOrders.add(orderNo);

    // Assign IV per order (skip cancelled — ไม่กิน IV)
    let ivNo = "";
    if(seed && !isCancel){
      ivNo = bsFormatIv(seed.yy, seed.mm, nextRun);
      nextRun++;
      // Cross-month warning: order's sale month ≠ seed's mm
      const m = (its[0].saleDate||"").match(/^\d{4}-(\d{2})/);
      if(m && m[1]!==seed.mm) crossMonth.push({orderNo, expected:seed.mm, actual:m[1]});
    }

    // ค่าส่ง + ส่วนลด — ใช้ค่าจาก item แรกเป็นตัวแทนของออเดอร์ (BigSeller ลงค่าเดียวกันทุก line)
    const orderShip = its.reduce((mx,x)=>Math.max(mx, x.ship||0), 0);
    const orderDiscount = its.reduce((mx,x)=>Math.max(mx, x.billDiscount||0), 0);
    // ออเดอร์ manual (FB / OD) → cust = FACE
    const isManual = /^(FB|OD)/i.test(orderNo);
    const shipSkuCode = BS_SHIP_SKU[company] || "";
    its.forEach((it, idx) => {
      seq++;
      const brand = bsBrandFromShop(company, it.shop);
      const channel = it.channel || "";
      const cust = isManual ? "FACE" : bsCustomerCode(company, channel, brand);
      const isFirst = idx===0;
      const isLast  = idx===its.length-1;
      const isNewSku = it.sku && !skuSet.has(it.sku);
      if(isNewSku) newSku.add(it.sku);
      // 3 ฟิลด์ AutoKey ค่าส่ง — เฉพาะบรรทัดสุดท้าย ที่ออเดอร์มีค่าส่ง > 0
      const hasShip = isLast && orderShip > 0;
      lines.push({
        seq,
        ivShow: isFirst ? ivNo : "",     // โชว์เฉพาะแถวแรกของออเดอร์
        ivNo,                             // เก็บ IV เต็มไว้สำหรับ tracking/export
        orderShow: isFirst ? orderNo : "",
        orderNo,
        saleDate: it.saleDate,
        channel, brand, cust, shop: it.shop,
        sku: it.sku,
        qty: it.qty,
        price: it.price,
        ship: isLast ? orderShip : 0,         // ค่าส่ง → บรรทัดสุดท้าย
        discount: isFirst ? orderDiscount : 0, // ส่วนลดท้ายบิล (BP) → บรรทัดแรก
        shipSku:    hasShip ? shipSkuCode : "",
        shipEnter:  hasShip ? "{Enter}"    : "",
        shipAmount: hasShip ? orderShip    : 0,
        manual: isManual,
        cancelled: isCancel,
        duplicate: hist.has(orderNo),
        unknownShop: !isManual && !brand,
        newSku: isNewSku
      });
    });
  }

  return {
    lines,
    summary:{
      orders: orderList.length,
      items: lines.length,
      cancelled: cancelOrders.size,
      duplicates: dupOrders.size,
      newSkus: Array.from(newSku),
      unknownShops,
      ivSeed: seed,
      ivAssigned: seed ? (orderList.length - cancelOrders.size) : 0,
      ivFirst: seed ? bsFormatIv(seed.yy, seed.mm, seed.running+1) : "",
      ivLast: seed && (orderList.length-cancelOrders.size>0) ? bsFormatIv(seed.yy, seed.mm, nextRun-1) : "",
      crossMonth
    }
  };
}

/* ---------- Supabase: SKU master (ทีมเห็นร่วม) ---------- */
state.skuCloud = state.skuCloud || {};
async function bsLoadSkuCloud(){
  const company = state.company;
  const { data, error } = await sb.from("sku_master").select("sku").eq("company", company);
  if(error){ console.error("loadSku", error); return; }
  state.skuCloud[company] = (data||[]).map(r=>r.sku);
}
async function bsSaveSkuCloud(skus){
  if(!AUTH.can("upload_bigseller")){ alert("คุณไม่มีสิทธิ์เพิ่ม SKU"); return; }
  const company = state.company;
  const rows = skus.map(sku => ({
    id: `${company}|${sku}`,
    company,
    sku,
    added_by: AUTH.email,
    added_at: new Date().toISOString()
  }));
  const { error } = await sb.from("sku_master").upsert(rows);
  if(error){ alert("บันทึก SKU ไม่สำเร็จ: "+error.message); return; }
  await bsLoadSkuCloud();
  // rebuild result เพื่อเอา SKU ใหม่ออกจากรายการเตือน
  const d = bsGet(); if(d.raw) d.result = bsBuildResult();
}

async function bsConfirmSku(){
  const checks = document.querySelectorAll("#skuModal input[type=checkbox]:checked");
  const skus = Array.from(checks).map(c=>c.dataset.sku);
  if(!skus.length){ document.getElementById("skuModal").remove(); return; }
  const btn = document.getElementById("skuSaveBtn");
  btn.disabled = true; btn.textContent = "กำลังบันทึก...";
  await bsSaveSkuCloud(skus);
  document.getElementById("skuModal").remove();
  renderTool();
}

/* ---------- Supabase: save BigSeller orders to cloud (diff mode)
   - ออเดอร์ใหม่ → INSERT พร้อมรายการสินค้า
   - ออเดอร์เดิม + status เปลี่ยน (เช่น pending → cancelled) → UPDATE เฉพาะ status
   - ออเดอร์เดิม + status เหมือนเดิม → SKIP
   - ไม่ทับ iv_no / cust_code / key_date ของออเดอร์ที่บัญชีคีย์ไปแล้ว
   ---------- */
async function bsSaveToCloud(){
  const d = bsGet();
  if(!d.result || !d.result.lines.length){ alert("ยังไม่มีข้อมูลให้บันทึก"); return; }
  if(!AUTH.can("upload_bigseller")){ alert("คุณไม่มีสิทธิ์อัปโหลด BigSeller"); return; }
  const company = state.company;
  const lines = d.result.lines;

  // group by order
  const byOrder = {};
  for(const l of lines){
    if(!byOrder[l.orderNo]) byOrder[l.orderNo] = { header:l, items:[] };
    byOrder[l.orderNo].items.push(l);
  }
  const orderNos = Object.keys(byOrder);

  const btn = document.getElementById("bsCloudBtn");
  if(btn){ btn.disabled=true; btn.textContent="กำลังตรวจของเดิม..."; }

  try{
    // 1) ดึงของเดิมใน DB มาเทียบ (เฉพาะออเดอร์ในไฟล์นี้)
    const existing = {};
    for(let i=0;i<orderNos.length;i+=500){
      const slice = orderNos.slice(i, i+500);
      const { data, error } = await sb.from("orders")
        .select("order_no,status,iv_no").eq("company", company).in("order_no", slice);
      if(error) throw error;
      (data||[]).forEach(o => existing[o.order_no] = o);
    }

    // 2) แยกเป็น 3 กอง
    const newOrders = [], statusUpdates = [], skipped = [];
    const newItemRows = [];
    for(const ono of orderNos){
      const g = byOrder[ono];
      const h = g.header;
      const newStatus = h.cancelled ? "cancelled" : "pending";
      const ex = existing[ono];
      if(!ex){
        const orderNetAmt = g.items.reduce((s,it)=>s+((it.qty||0)*(it.price||0)),0);
        newOrders.push({
          id: `${company}|${ono}`,
          order_no: ono, company,
          platform: h.channel || "",
          shop_name: h.shop || "",
          brand: h.brand || "",
          sale_date: h.saleDate || null,
          cust_code: h.cust || "",
          iv_no: null,
          net_amount: Math.round(orderNetAmt*100)/100,
          status: newStatus,
          updated_at: new Date().toISOString()
        });
        g.items.forEach((it, idx)=>{
          newItemRows.push({
            id: `${company}|${ono}|${idx}`,
            order_no: ono, company,
            sku: it.sku || "",
            qty: it.qty || 0,
            price: it.price || 0,
            ship: it.ship || 0,
            discount: it.discount || 0
          });
        });
      } else if(ex.status !== newStatus){
        statusUpdates.push({
          id: `${company}|${ono}`,
          order_no: ono, company,
          status: newStatus,
          updated_at: new Date().toISOString()
        });
      } else {
        skipped.push(ono);
      }
    }

    if(btn) btn.textContent = `กำลังบันทึก (ใหม่ ${newOrders.length} · อัปเดต ${statusUpdates.length})...`;

    // 3) INSERT ใหม่
    for(let i=0;i<newOrders.length;i+=500){
      const { error } = await sb.from("orders").insert(newOrders.slice(i,i+500));
      if(error) throw error;
    }
    for(let i=0;i<newItemRows.length;i+=500){
      const { error } = await sb.from("order_items").insert(newItemRows.slice(i,i+500));
      if(error) throw error;
    }
    // 4) UPSERT status updates (id เดิม) — ใช้ upsert จะแทน status + ไม่แตะ iv_no/cust_code (เพราะเราไม่ส่งฟิลด์เหล่านี้)
    //    แต่ upsert จะแทนทั้งแถว → ต้องใช้ update แทน
    for(const u of statusUpdates){
      const { error } = await sb.from("orders")
        .update({ status:u.status, updated_at:u.updated_at })
        .eq("id", u.id);
      if(error) throw error;
    }

    alert(`บันทึกลง Supabase สำเร็จ\n• เพิ่มออเดอร์ใหม่: ${newOrders.length}\n• อัปเดตสถานะ: ${statusUpdates.length}\n• ข้ามที่มีอยู่แล้ว: ${skipped.length}`);

    // 5) เปิด popup SKU ใหม่ (ถ้ามี)
    if(d.result.summary.newSkus.length && AUTH.can("upload_bigseller")){
      bsOpenSkuModal();
    } else {
      renderTool();
    }
  }catch(err){
    alert("บันทึกไม่สำเร็จ: " + (err.message||err));
  }finally{
    if(btn){ btn.disabled=false; btn.textContent="☁️ บันทึกลง Supabase"; }
  }
}

/* ---------- File handler ---------- */
async function bsHandleFile(file){
  try{
    const parsed = await readFileSmart(file);
    if(parsed.type!=="xlsx"){ alert("ต้องเป็นไฟล์ Excel จาก Big Seller"); return; }
    const d = bsGet();
    d.file = file.name;
    d.raw = bsParse(parsed);
    d.result = bsBuildResult();
    renderTool();
  }catch(err){
    alert(`อ่านไฟล์ไม่สำเร็จ: ${err.message}`);
  }
}
function bsClear(){
  const d = bsGet();
  d.file=null; d.raw=null; d.result=null;
  renderTool();
}
function bsToggleHideCancel(){
  const d = bsGet();
  d.opts.hideCancelled = !d.opts.hideCancelled;
  renderTool();
}
function bsSetLastIv(v){
  const d = bsGet();
  d.opts.lastIv = String(v||"").trim();
  if(d.raw) d.result = bsBuildResult();
  renderTool();
}

/* ---------- SKU master ---------- */
async function bsImportSku(file){
  try{
    const parsed = await readFileSmart(file);
    let skus = [];
    if(parsed.type==="csv"){
      const rows = csvParse(parsed.text);
      for(const r of rows) for(const v of r){
        const s = String(v||"").trim();
        if(s && !/sku/i.test(s) && s.length<40) skus.push(s);
      }
    } else {
      // xlsx — pick all non-empty unique cells from any sheet
      for(const sn of parsed.names){
        for(const r of parsed.sheets[sn]||[]){
          for(const v of r){
            const s = String(v||"").trim();
            if(s && s.length<40 && !/^[\d\.\-\s]+$/.test(s) && !/sku/i.test(s)) skus.push(s);
          }
        }
      }
    }
    skus = Array.from(new Set(skus));
    const cur = bsLoadJSON(BS_LS_SKU, {});
    cur[state.company] = Array.from(new Set([...(cur[state.company]||[]), ...skus]));
    bsSaveJSON(BS_LS_SKU, cur);
    alert(`นำเข้า SKU ${skus.length} รายการ → รวมในระบบ ${cur[state.company].length} รายการ`);
    const d=bsGet(); if(d.raw) d.result=bsBuildResult();
    renderTool();
  }catch(err){ alert("นำเข้า SKU ไม่สำเร็จ: "+err.message); }
}
function bsClearSku(){
  if(!confirm(`ล้างรหัส SKU ที่เพิ่มเองของ ${COMPANIES.find(c=>c.id===state.company).name} (ไม่กระทบรหัส built-in)?`)) return;
  const cur = bsLoadJSON(BS_LS_SKU, {});
  delete cur[state.company];
  bsSaveJSON(BS_LS_SKU, cur);
  const d=bsGet(); if(d.raw) d.result=bsBuildResult();
  renderTool();
}

/* ---------- History ---------- */
function bsRecordHistory(){
  const d = bsGet(); if(!d.result) return;
  const cur = bsLoadJSON(BS_LS_HISTORY, {});
  const list = new Set(cur[state.company]||[]);
  for(const l of d.result.lines){ if(!l.cancelled) list.add(l.orderNo); }
  cur[state.company] = Array.from(list);
  bsSaveJSON(BS_LS_HISTORY, cur);
  d.result = bsBuildResult();
  renderTool();
}
function bsExportHistory(){
  const cur = bsLoadJSON(BS_LS_HISTORY, {});
  download(JSON.stringify(cur,null,2), `bigseller_history_${stamp()}.json`, "application/json");
}
function bsImportHistory(file){
  const isCSV=/\.csv$/i.test(file.name);
  if(isCSV){
    // รายงานขายแบบเห็นออเดอร์ (Express) — ดึงเลขออเดอร์ (ref) ที่มีเลข IV แล้ว มาเป็นประวัติคีย์
    const r=new FileReader();
    r.onload=()=>{
      try{
        const buf=new Uint8Array(r.result);
        let text;
        try{ text=new TextDecoder("utf-8",{fatal:true}).decode(buf); }
        catch(_){ try{ text=new TextDecoder("windows-874").decode(buf); }
                  catch(__){ text=new TextDecoder("tis-620").decode(buf); } }
        const rows=parseExpressSales(text);
        const cur=bsLoadJSON(BS_LS_HISTORY, {});
        const list=new Set(cur[state.company]||[]);
        let added=0;
        for(const row of rows){
          if(row.ref){ if(!list.has(row.ref)) added++; list.add(row.ref); }
        }
        cur[state.company]=Array.from(list);
        bsSaveJSON(BS_LS_HISTORY, cur);
        const d=bsGet(); if(d.raw) d.result=bsBuildResult();
        alert(`นำเข้าประวัติจาก CSV: พบ ${rows.length} ใบ IV, เพิ่มออเดอร์ใหม่ ${added} รายการ (รวม ${list.size} รายการ)`);
        renderTool();
      }catch(err){ alert("อ่านไฟล์ CSV ไม่สำเร็จ: "+err.message); }
    };
    r.readAsArrayBuffer(file);
    return;
  }
  const r=new FileReader();
  r.onload=()=>{
    try{
      const obj=JSON.parse(r.result);
      bsSaveJSON(BS_LS_HISTORY, obj);
      const d=bsGet(); if(d.raw) d.result=bsBuildResult();
      alert("นำเข้าประวัติแล้ว");
      renderTool();
    }catch(err){ alert("ไฟล์ผิดรูปแบบ"); }
  };
  r.readAsText(file);
}

function bsWireDrops(){
  document.querySelectorAll('.slot .drop').forEach(drop=>{
    const slot=drop.dataset.slot;
    const inp=document.querySelector(`input[data-slotinp="${slot}"]`);
    if(!inp) return;
    drop.onclick=()=>inp.click();
    inp.onchange=e=>{
      const arr=Array.from(e.target.files);
      inp.value="";
      if(!arr.length) return;
      if(slot==="bsmain") bsHandleFile(arr[0]);
      else if(slot==="bssku") bsImportSku(arr[0]);
    };
    drop.ondragover=e=>{e.preventDefault();drop.classList.add("over");};
    drop.ondragleave=()=>drop.classList.remove("over");
    drop.ondrop=e=>{
      e.preventDefault();drop.classList.remove("over");
      const arr=Array.from(e.dataTransfer.files);
      if(!arr.length) return;
      if(slot==="bsmain") bsHandleFile(arr[0]);
      else if(slot==="bssku") bsImportSku(arr[0]);
    };
  });
}

  const ff = d.opts.problemFilter;
  if(ff.size > 0){
    const okOrders = new Set();
    for(const l of lines){
      if(ff.has("cancelled")   && l.cancelled)   okOrders.add(l.orderNo);
      if(ff.has("duplicate")   && l.duplicate)   okOrders.add(l.orderNo);
      if(ff.has("newSku")      && l.newSku)      okOrders.add(l.orderNo);
      if(ff.has("unknownShop") && l.unknownShop) okOrders.add(l.orderNo);

function bsLineHTML(l){
  const cls = l.cancelled?"warning-row":(l.duplicate?"":"");
  const style = l.cancelled?'background:#fee2e2':l.duplicate?'background:#eff6ff':'';
  const notes = [];
  if(l.cancelled) notes.push("❌ ยกเลิก");
  if(l.duplicate) notes.push("🔁 ซ้ำ");
  if(l.manual)    notes.push("✋ Manual → FACE");
  if(l.unknownShop) notes.push("❓ ร้านไม่รู้แบรนด์");
  if(l.newSku) notes.push("🆕 SKU ใหม่");
  // ปุ่มลบโชว์เฉพาะบรรทัดแรกของออเดอร์ (orderShow ไม่ว่าง)
  const delBtn = l.orderShow
    ? `<button title="ลบออเดอร์นี้" onclick="bsDeleteOrder(${JSON.stringify(l.orderNo)})" style="border:none;background:transparent;color:#dc2626;cursor:pointer;font-size:14px;padding:2px 4px">✕</button>`
    : "";
  return `<tr class="${cls}" style="${style}">
    <td>${l.seq}</td>
    <td style="font-family:monospace;font-weight:600;color:var(--brand-dark)">${esc(l.ivShow)}</td>
    <td style="font-family:monospace">${esc(l.orderShow)} ${delBtn}</td>
    <td>${esc(l.saleDate ? fmtDateDDMMYY(l.saleDate):"")}</td>
    <td>${esc(l.channel)}</td>
    <td>${esc(l.cust)}</td>
    <td style="font-family:monospace">${esc(l.sku)}</td>
    <td style="text-align:right">${l.qty||""}</td>
    <td style="text-align:right">${l.price?num(l.price).toLocaleString(undefined,{minimumFractionDigits:2}):""}</td>
    <td style="text-align:right">${l.ship?num(l.ship).toLocaleString(undefined,{minimumFractionDigits:2}):""}</td>
    <td style="text-align:right">${l.discount?num(l.discount).toLocaleString(undefined,{minimumFractionDigits:2}):""}</td>
    <td style="font-family:monospace;font-size:12px">${esc(l.shipSku||"")}</td>
    <td style="font-size:11px;color:var(--ink-3)">${esc(l.shipEnter||"")}</td>
    <td style="text-align:right">${l.shipAmount?num(l.shipAmount).toLocaleString(undefined,{minimumFractionDigits:2}):""}</td>
    <td style="font-size:11px;color:var(--ink-3)">${esc(l.shop)}</td>
    <td style="font-size:11px">${notes.join(" · ")}</td>
  </tr>`;
}

/* ลบ/คืนค่า ออเดอร์ */
function bsDeleteOrder(orderNo){
  if(!confirm(`ลบออเดอร์ ${orderNo} ออกจากผลลัพธ์? (กดบันทึกลง Supabase แล้วจะไม่ขึ้นออเดอร์นี้)`)) return;
  const d = bsGet();
  d.opts.deletedOrders.add(orderNo);
  d.result = bsBuildResult();
  renderTool();
}
function bsRestoreDeleted(){
  const d = bsGet();
  d.opts.deletedOrders.clear();
  d.result = bsBuildResult();
  renderTool();
}
function bsToggleFilter(key){
  const d = bsGet();
  if(!d.opts.problemFilter) d.opts.problemFilter = new Set();
  if(d.opts.problemFilter.has(key)) d.opts.problemFilter.delete(key);
  else d.opts.problemFilter.add(key);
  renderTool();
}
function bsClearFilter(){
  const d = bsGet();
  if(d.opts.problemFilter) d.opts.problemFilter.clear();
  renderTool();
}

function bsUnknownShopsHTML(shops, items){
  // build map: shop → { orderNos:Set, platforms:Set, rowNums:[], sampleRows:[] }
  const info = {};
  if(items && items.length){
    items.forEach((it, idx) => {
      if(!shops.includes(it.shop)) return;
      const k = it.shop;
      if(!info[k]) info[k] = { orderNos:new Set(), platforms:new Set(), rowNums:[], samples:[] };
      info[k].orderNos.add(it.orderNo);
      if(it.platform) info[k].platforms.add(it.platform);
      info[k].rowNums.push(idx + 2);   // +2: header row + 1-based
      if(info[k].samples.length < 3){
        info[k].samples.push({ orderNo: it.orderNo, sku: it.sku, row: idx + 2, platform: it.platform });
      }
    });
  }
  return `
    <div class="note" style="background:#fef3c7;color:#92400e;padding:12px 14px;border-radius:8px;margin-bottom:10px">
      <div style="font-weight:700;margin-bottom:4px">⚠️ เจอร้าน ${shops.length} ร้าน ที่ยังไม่รู้ว่าเป็นแบรนด์ไหน</div>
      <div style="font-size:12px;color:#78350f;margin-bottom:10px">เลือกแบรนด์ + ช่องทางให้ก่อนแล้วกดบันทึก · ตัวอย่างออเดอร์ช่วยให้รู้ว่าคือร้านไหน</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
        ${shops.map(s=>{
          const inf = info[s] || { orderNos:new Set(), platforms:new Set(), rowNums:[], samples:[] };
          const orderCount = inf.orderNos.size;
          const platforms = Array.from(inf.platforms).join(", ") || "—";
          const minRow = inf.rowNums.length ? Math.min(...inf.rowNums) : null;
          const maxRow = inf.rowNums.length ? Math.max(...inf.rowNums) : null;
          const rowRange = minRow ? (minRow===maxRow ? `แถว ${minRow}` : `แถว ${minRow}–${maxRow}`) : "";
          return `
          <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 12px">

/* ---------- Force text type on long-ID columns ----------
   Excel เปลี่ยน "584420620051055642" → 5.84E+17 + ตัดท้ายเป็น 0000
   เพราะ Number มี precision แค่ ~15 หลัก
   แก้: set ws cell.t='s' (string) บังคับ */
function forceTextCells(ws, textColIndices){
  if(!ws['!ref']) return;
  const range = XLSX.utils.decode_range(ws['!ref']);
  for(let R=1; R<=range.e.r; R++){            // ข้าม header (row 0)
    for(const C of textColIndices){
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      if(ws[addr] && ws[addr].v!=null && ws[addr].v!==""){
        ws[addr].t = 's';
        ws[addr].v = String(ws[addr].v);
        delete ws[addr].w;                    // clear cached display string
        delete ws[addr].z;                    // clear number format
      }
    }
  }
}

/* ---------- Export ---------- */
function bsExport(fmt){
  const d = bsGet(); if(!d.result) return;
  const lines = d.opts.hideCancelled ? d.result.lines.filter(l=>!l.cancelled) : d.result.lines;
  const aoa = [BS_HEAD.concat(["ร้าน","หมายเหตุ"])].concat(lines.map(l=>{
    const notes=[];
    if(l.cancelled) notes.push("ยกเลิก");
    if(l.duplicate) notes.push("ซ้ำประวัติ");
    if(l.unknownShop) notes.push("ร้านไม่รู้แบรนด์");
    if(l.newSku) notes.push("SKU ใหม่");
    return [l.seq, l.ivShow, l.orderShow, l.saleDate?fmtDateDDMMYY(l.saleDate):"",
            l.channel, l.cust, l.sku, l.qty||"",
            l.price||"", l.ship||"", l.discount||"",
            l.shipSku||"", l.shipEnter||"", l.shipAmount||"",
            l.shop, notes.join(" · ")];
  }));
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // 1=เลข IV, 2=เลขคำสั่งซื้อ, 6=SKU, 11=ผังค่าส่ง, 12=Enter ค่าส่ง — บังคับ text กัน Excel
  forceTextCells(ws, [1, 2, 6, 11, 12]);
  const base = `BigSeller_${COMPANIES.find(c=>c.id===state.company).name}_${stamp()}`;
  if(fmt==="csv"){
    download("﻿"+XLSX.utils.sheet_to_csv(ws), base+".csv", "text/csv;charset=utf-8");
  } else {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "เทมเพลตคีย์ IV");
    XLSX.writeFile(wb, base+".xlsx");
  }
}

/* ============================================================
   EXPRESS MATCH — อัป CSV "รายงานขายแบบเห็นออเดอร์" → อัปเดต IV ใน Supabase
   ============================================================ */
state.em = state.em || {};
function emGet(){
  if(!state.em[state.company]) state.em[state.company] = { file:null, rows:null, result:null };
  return state.em[state.company];
}

async function emHandleFile(file){
  try{
    if(!/\.csv$/i.test(file.name)){ alert("ต้องเป็นไฟล์ CSV (รายงานขายแบบเห็นออเดอร์ จาก Express)"); return; }
    const buf = await file.arrayBuffer();
    const u = new Uint8Array(buf);
    let text;
    try{ text = new TextDecoder("utf-8",{fatal:true}).decode(u); }
    catch(_){ try{ text = new TextDecoder("windows-874").decode(u); }
              catch(__){ text = new TextDecoder("tis-620").decode(u); } }
    const rows = parseExpressSales(text);
    const d = emGet();
    d.file = file.name;
    d.rows = rows;
    d.result = await emMatch(rows);
    renderTool();
  }catch(err){ alert("อ่านไฟล์ไม่สำเร็จ: "+err.message); }
}

async function emMatch(rows){
  const company = state.company;
  // กรอง: เอาเฉพาะแถวที่มี IV และมี ref (เลขออเดอร์)
  const withRef = rows.filter(r => r.iv && r.ref);
  const noRef = rows.filter(r => r.iv && !r.ref);

  // ดึง orders ในบริษัทนี้มาเทียบ
  const refList = Array.from(new Set(withRef.map(r=>r.ref)));
  if(refList.length===0) return { rows, matched:[], noOrder:[], noRef, updated:0 };

  // ดึงทีละ chunk 500 (in filter)
  const orderMap = {};
  for(let i=0;i<refList.length;i+=500){
    const slice = refList.slice(i, i+500);
    const { data, error } = await sb.from("orders")
      .select("id,order_no,iv_no,cust_code,company,sale_date")
      .eq("company", company).in("order_no", slice);
    if(error){ throw error; }
    (data||[]).forEach(o => orderMap[o.order_no] = o);
  }

  const matched = [], noOrder = [];
  for(const r of withRef){
    const o = orderMap[r.ref];
    if(o){
      matched.push({ ...r, order:o, alreadyIv:o.iv_no, willOverwrite:!!(o.iv_no && o.iv_no!==r.iv) });
    } else {
      noOrder.push(r);
    }
  }
  return { rows, matched, noOrder, noRef, updated:0 };
}

async function emApply(){
  const d = emGet();
  if(!d.result) return;
  if(!AUTH.can("upload_express")){ alert("คุณไม่มีสิทธิ์แมพ IV"); return; }
  const company = state.company;
  const matched = d.result.matched;
  if(!matched.length){ alert("ไม่มีรายการให้แมพ"); return; }

  const btn = document.getElementById("emApplyBtn");
  if(btn){ btn.disabled = true; btn.textContent = "กำลังบันทึก..."; }
  try{
    let n = 0;
    // ทำเป็น chunk 200 update (ใช้ upsert ก็ได้ เพราะรู้ id แล้ว)
    const today = new Date().toISOString().slice(0,10);
    for(let i=0;i<matched.length;i+=200){
      const slice = matched.slice(i, i+200);
      const payload = slice.map(m => ({
        id: m.order.id,
        order_no: m.order.order_no,
        company,
        iv_no: m.iv,
        cust_code: m.custCode || m.order.cust_code || "",
        key_date: today,
        status: "keyed",
        updated_at: new Date().toISOString()
      }));
      const { error } = await sb.from("orders").upsert(payload);
      if(error) throw error;
      n += slice.length;
    }
    d.result.updated = n;
    alert(`แมพ IV สำเร็จ ${n} ใบ`);
    renderTool();
  }catch(err){
    alert("บันทึกไม่สำเร็จ: " + (err.message||err));
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = "💾 บันทึกการแมพลง Supabase"; }
  }
}

  }
}

/* ============================================================
   DASHBOARD — ภาพรวมจาก Supabase
   ============================================================ */
state.dash = state.dash || {};
async function dashLoad(){
  const company = state.company;
  // ดึง orders ทั้งหมดของบริษัทนี้ (paginate 1000)
  let all = [], from = 0, sz = 1000;
  while(true){
    const { data, error } = await sb.from("orders")
      .select("order_no,sale_date,iv_no,key_date,cust_code,status,platform,brand,shop_name")
      .eq("company", company)
      .order("sale_date",{ascending:false})
      .range(from, from+sz-1);
    if(error) throw error;
    if(!data || !data.length) break;
    all = all.concat(data);
    if(data.length < sz) break;
    from += sz;
  }
  return all;
}

async function renderToolDashboard(){
  const t = TOOLS.find(x=>x.id===state.tool);
  const company = state.company;
  document.getElementById("main").innerHTML = `
    <div class="page-head">
      <h1>${t.ic} ${t.name} <span class="badge">${COMPANIES.find(c=>c.id===company).name}</span></h1>
      <div class="sub">${t.long}</div>
    </div>
    <div class="card"><div class="empty">⏳ กำลังโหลดข้อมูลจาก Supabase...</div></div>
  `;
  let rows;
  try{ rows = await dashLoad(); }
  catch(err){
    document.getElementById("main").innerHTML += `<div class="card"><div style="color:#dc2626">โหลดข้อมูลไม่สำเร็จ: ${esc(err.message||err)}</div></div>`;
    return;
  }
  state.dash[company] = rows;

  const total = rows.length;
  const cancelled = rows.filter(r=>r.status==="cancelled").length;
  const keyed = rows.filter(r=>r.iv_no).length;
  const pending = rows.filter(r=>!r.iv_no && r.status!=="cancelled").length;

  // วันที่ขายล่าสุด / คีย์ล่าสุด
  const saleDates = rows.map(r=>r.sale_date).filter(Boolean).sort();
  const keyDates = rows.filter(r=>r.key_date).map(r=>r.key_date).sort();
  const latestSale = saleDates.length ? saleDates[saleDates.length-1] : "-";
  const oldestSaleNotKeyed = rows.filter(r=>!r.iv_no && r.status!=="cancelled" && r.sale_date)
    .map(r=>r.sale_date).sort()[0] || "-";
  const latestKey = keyDates.length ? keyDates[keyDates.length-1] : "-";

  // กลุ่มตามวันขาย (รายวัน 14 วันล่าสุด)
  const dailyMap = {};
  for(const r of rows){
    if(!r.sale_date) continue;
    const k = r.sale_date;
    if(!dailyMap[k]) dailyMap[k] = { date:k, total:0, keyed:0, cancelled:0 };
    dailyMap[k].total++;
    if(r.iv_no) dailyMap[k].keyed++;
    if(r.status==="cancelled") dailyMap[k].cancelled++;
  }
  const daily = Object.values(dailyMap).sort((a,b)=>a.date<b.date?1:-1).slice(0,14);

  // group by ช่องทาง (ที่ยังไม่คีย์)
  const pendingByPlatform = {};
  for(const r of rows){
    if(r.iv_no || r.status==="cancelled") continue;
    const k = r.platform || r.shop_name || "-";
    pendingByPlatform[k] = (pendingByPlatform[k]||0)+1;
  }

  document.getElementById("main").innerHTML = `

      <h1>${t.ic} ${t.name} <span class="badge">${COMPANIES.find(c=>c.id===company).name}</span></h1>
      <div class="sub">${t.long}</div>
