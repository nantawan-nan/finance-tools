/* router: staff (daily LINE) หรือ executive (30d) */
async function renderToolCashflowForecast(){
  const d = cffGet();
  if(d.viewMode === "staff") return renderToolCashflowStaff();
  return renderToolCashflowExec();
}

/* ============================
   STAFF VIEW — daily LINE-ready report
   filter pills = วันชำระเงิน (unique due dates) · KPI 5 · Bank cards (โลโก้จริง) · Pivot
   ============================ */
/* ★ สิ้นเดือนนี้ (ISO) — ใช้เป็นเพดานของ default view */
function cffStaffEOM(dt){ const t=new Date(dt.todayISO); return cffISO(new Date(t.getFullYear(), t.getMonth()+1, 0)); }
/* ★ กรอง payments ตามโหมด — default (ยังไม่เลือก) ตัดที่ "สิ้นเดือนนี้" ไม่รวมเดือนถัดไป (กันยอดเพี้ยน/นับซ้ำ recurring) */
function cffStaffApplyFilter(payments, d, dt){
  if(d.staffMode === "day" && d.staffDate) return payments.filter(p => p.due_date === d.staffDate);
  if(d.staffMode === "range" && (d.staffFrom || d.staffTo)){
    const from = d.staffFrom || "0000-01-01";
    const to   = d.staffTo   || "9999-12-31";
    return payments.filter(p => p.due_date >= from && p.due_date <= to);
  }
  const eom = cffStaffEOM(dt);
  return payments.filter(p => p.due_date <= eom);   // default → ถึงสิ้นเดือนนี้
}
/* ★ คำนวณค่าสำหรับรายงานสะอาด (ใช้ร่วม: หน้าจอ + snapshot export) */
function cffStaffComputeReport(d, dt){
  const payments = cffStaffPayments(dt, d);
  let filtered = cffStaffApplyFilter(payments, d, dt);
  const totalDue = filtered.reduce((s,p) => s + p.amount, 0);
  const openingCash = dt.balances.reduce((s,b) => s + Number(b.amount||0) - Number(b.hold||0), 0);
  const netCash = openingCash - totalDue;
  const byCat = {};
  for(const p of filtered){
    if(!byCat[p.category]) byCat[p.category] = { total:0, items:[] };
    byCat[p.category].total += p.amount;
    byCat[p.category].items.push(p);
  }
  for(const c of Object.values(byCat)) c.items.sort(cffItemCmp);
  const cats = Object.entries(byCat).sort((a,b) => b[1].total - a[1].total);
  const { due: bankDue, cat: bankCat } = cffBankDistribute(filtered, dt.balances);
  const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString("th-TH",{day:"2-digit",month:"short"}) : "";
  const periodLabel = d.staffMode === "day" ? fmtDate(d.staffDate)
                    : d.staffMode === "range" ? `${d.staffFrom?fmtDate(d.staffFrom):'?'}–${d.staffTo?fmtDate(d.staffTo):'?'}`
                    : "ทั้งหมด";
  return { payments, filtered, totalDue, openingCash, netCash, cats, bankDue, bankCat, periodLabel };
}

/* ★ HTML รายงานสะอาด (เลย์เอาต์เดียวกับ snapshot ที่ส่งให้ LINE) — ใช้ทั้งบนจอ + export
   opts.interactive=true (หน้าจอ): กลุ่มค่าใช้จ่ายย่อ/ขยายได้ · false (export LINE): กางครบเสมอ */
function cffStaffReportInner(co, dt, R, opts){
  opts = opts || {};
  const interactive = !!opts.interactive;
  const catOpen = opts.catOpen || {};
  const venOpen = opts.venOpen || {};
  const groupLevel = opts.groupLevel || "vendor";   // cat | vendor | doc (สำหรับไฮไลต์ปุ่มระดับการดู)
  const isOpen = (cat) => !interactive ? true : (catOpen[cat] !== false);   // ประเภท default = ขยาย
  const isVenOpen = (cat,ven) => !interactive ? true : (venOpen[cat+"|"+ven] === true);  // เวนเดอร์ default = ย่อ
  const { cats, bankDue, bankCat, openingCash, totalDue, netCash, periodLabel } = R;
  const todayStr = new Date().toLocaleDateString("th-TH",{day:"2-digit",month:"long",year:"numeric"});
  const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString("th-TH",{day:"2-digit",month:"short"}) : "";
  const nf = (n) => Number(n||0).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
  const paren = (n) => Number(n||0) < 0 ? '('+nf(Math.abs(n))+')' : nf(n);
  return `
    <!-- header gradient strip -->
    <div style="background:linear-gradient(135deg,${co.gradient[0]},${co.gradient[1]});padding:18px 22px;color:#fff;display:flex;align-items:center;gap:14px">
      <img src="${esc(co.logo||'')}" onerror="this.style.display='none'" style="height:54px;width:54px;object-fit:contain;background:#fff;border-radius:10px;padding:6px;flex-shrink:0">
      <div style="flex:1">
        <div style="font-size:11px;font-weight:700;opacity:.85;letter-spacing:.6px;text-transform:uppercase">${esc(co.brand||co.name)}</div>
        <div style="font-size:19px;font-weight:800;letter-spacing:-.3px;margin-top:2px">ประมาณการรายรับ-รายจ่าย</div>
        <div style="font-size:12.5px;opacity:.9;margin-top:2px">${esc(co.fullName||co.name)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10.5px;opacity:.8;letter-spacing:.4px">รอบจ่าย</div>
        <div style="font-size:15px;font-weight:800;margin-top:1px">${esc(periodLabel)}</div>
        <div style="font-size:10.5px;opacity:.7;margin-top:2px">${esc(todayStr)}</div>
      </div>
    </div>

    <!-- bank pivot — เงินคงเหลือใช้ได้ / ค่าใช้จ่ายถึงกำหนด -->
    <div style="padding:16px 22px">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="background:#f8fafc">
            <th style="text-align:left;padding:9px 12px;border-bottom:2px solid var(--brand);color:var(--brand-dark)">ธนาคาร</th>
            ${dt.balances.map(b => `<th style="text-align:right;padding:9px 12px;border-bottom:2px solid var(--brand);color:var(--brand-dark);font-weight:700"><div style="font-size:11px">${esc(b.bank_code)} #${esc(b.account_no)}</div>${b.nickname?`<div style="font-size:10px;color:var(--ink-3);font-weight:500">${esc(b.nickname)}</div>`:''}</th>`).join("")}
            <th style="text-align:right;padding:9px 12px;border-bottom:2px solid var(--brand);background:rgba(var(--brand-rgb),.1);color:var(--brand-dark)">รวม</th>
          </tr>
        </thead>
        <tbody>
          <tr style="background:rgba(20,184,166,.08)">
            <td style="padding:8px 12px;font-weight:700">เงินคงเหลือใช้ได้</td>
            ${dt.balances.map(b => `<td style="padding:8px 12px;text-align:right;font-weight:700">${nf(Number(b.amount||0)-Number(b.hold||0))}</td>`).join("")}
            <td style="padding:8px 12px;text-align:right;font-weight:800;background:rgba(var(--brand-rgb),.08)">${nf(openingCash)}</td>
          </tr>
          <tr style="background:rgba(245,158,11,.10)">
            <td style="padding:8px 12px;font-weight:700">ค่าใช้จ่ายถึงกำหนดชำระ</td>
            ${dt.balances.map(b => { const v = bankDue[b.bank_account_id]||0; return `<td style="padding:8px 12px;text-align:right">${v>0?nf(v):'-'}</td>`; }).join("")}
            <td style="padding:8px 12px;text-align:right;font-weight:800;background:rgba(var(--brand-rgb),.08)">${nf(totalDue)}</td>
          </tr>
          ${cats.map(([cat,info]) => `<tr>
            <td style="padding:7px 12px 7px 24px;color:var(--ink-2);font-size:12.5px">${esc(cat)}</td>
            ${dt.balances.map(b => { const v = (bankCat[b.bank_account_id]||{})[cat]||0; return `<td style="padding:7px 12px;text-align:right;color:var(--ink-2);font-size:12.5px">${v>0?nf(v):'-'}</td>`; }).join("")}
            <td style="padding:7px 12px;text-align:right;color:var(--out-ink);font-weight:700">${nf(info.total)}</td>
          </tr>`).join("")}
          <tr style="background:rgba(var(--brand-rgb),.10);border-top:2px solid var(--brand)">
            <td style="padding:10px 12px;font-weight:800;color:var(--brand-dark)">เงินคงเหลือสุทธิ</td>
            ${dt.balances.map(b => {
              const v = (Number(b.amount||0)-Number(b.hold||0)) - (bankDue[b.bank_account_id]||0);
              return `<td style="padding:10px 12px;text-align:right;font-weight:800;color:${v<0?'var(--out-ink)':'var(--brand-dark)'}">${paren(v)}</td>`;
            }).join("")}
            <td style="padding:10px 12px;text-align:right;font-weight:800;color:${netCash<0?'var(--out-ink)':'var(--brand-dark)'};background:rgba(var(--brand-rgb),.15)">${paren(netCash)}</td>
          </tr>
        </tbody>
      </table>

      <!-- detail pivot per cat → item -->
      ${cats.length > 0 ? `
      <div style="margin-top:18px">
        <div style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
          <div style="font-size:13px;font-weight:700;color:var(--brand-dark);display:flex;align-items:center;gap:6px">รายละเอียดประเภทรายจ่าย</div>
          ${interactive ? `<div style="display:inline-flex;align-items:center;gap:7px"><span style="font-size:11px;color:var(--ink-3);font-weight:600">ดูแบบ:</span><div class="cf-chips" style="font-size:11px">
            <button class="${groupLevel==='cat'?'active':''}" onclick="cffStaffSetGroupLevel('cat')">ตามประเภท</button>
            <button class="${groupLevel==='vendor'?'active':''}" onclick="cffStaffSetGroupLevel('vendor')">ตามผู้จำหน่าย</button>
            <button class="${groupLevel==='doc'?'active':''}" onclick="cffStaffSetGroupLevel('doc')">ตามเอกสาร</button>
          </div></div>` : ''}
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:11.5px">
          <thead><tr style="background:#f8fafc">
            <th style="text-align:left;padding:7px 10px;border-bottom:1px solid #cbd5e1;color:#475569">ชื่อเจ้าหนี้ / คำอธิบายรายการ</th>
            <th style="text-align:left;padding:7px 10px;border-bottom:1px solid #cbd5e1;color:#475569">ครบกำหนด</th>
            <th style="text-align:right;padding:7px 10px;border-bottom:1px solid #cbd5e1;color:#475569">จำนวน (บาท)</th>
          </tr></thead>
          <tbody>
            ${cats.map(([cat,info]) => {
              const open = isOpen(cat);
              const catHead = `<tr style="background:var(--brand)${interactive?';cursor:pointer':''}" ${interactive?`onclick="cffToggleCat(${JSON.stringify(cat).replace(/"/g,'&quot;')})"`:''}><td style="padding:9px 12px;font-weight:800;color:#fff;font-size:13px" colspan="2">${interactive?`<span style="display:inline-block;width:15px;color:#fff;font-size:11px">${open?'▾':'▸'}</span>`:''}${esc(cat)} <span style="font-weight:700;color:#fff;background:rgba(255,255,255,.22);border-radius:999px;padding:0 8px;font-size:10.5px;margin-left:5px">${info.items.length}</span></td><td style="padding:9px 12px;text-align:right;font-weight:800;color:#fff;font-size:13px">${nf(info.total)}</td></tr>`;
              if(!open) return catHead;
              // ★ ชั้นที่ 2: กลุ่มตามเวนเดอร์ (default ย่อ — เห็นแค่ชื่อ+ยอดรวม)
              const venMap = {};
              for(const p of info.items){ const v=p.vendor||"—"; (venMap[v] = venMap[v] || {total:0, items:[]}); venMap[v].total += p.amount; venMap[v].items.push(p); }
              const vendors = Object.entries(venMap).sort((a,b)=> b[1].total - a[1].total);
              // คำอธิบายย่อยต่อรายการ: "คำอธิบาย (เด่น)  ·  เลขเอกสาร (จาง)" — ตัดส่วนซ้ำชื่อเวนเดอร์ + Express
              const subLine = (p, ven) => {
                const doc = cffDocCode(p);
                const desc = cffCleanDesc((p.remark && p.remark.trim()) ? p.remark : (p.internalNote||""));
                const showDesc = desc && desc !== ven && ven.indexOf(desc) < 0;
                const docTag = `<span style="color:#94a3b8">${esc(doc)}</span>`;
                return showDesc ? `<span style="color:#475569">${esc(desc)}</span> <span style="color:#cbd5e1">·</span> ${docTag}` : docTag;
              };
              const venRows = vendors.map(([ven,vinfo]) => {
                const vOpen = isVenOpen(cat, ven);   // กาง = ระดับ "ตามเอกสาร" → ค่อยโชว์คำอธิบาย
                // ★ เวนเดอร์รายการเดียว → 1 บรรทัด (ชื่อ + ยอด) · คำอธิบายโผล่เฉพาะตอนกาง (ตามเอกสาร)
                if(vinfo.items.length === 1){
                  const p = vinfo.items[0]; const sub = vOpen ? subLine(p, ven) : "";
                  return `<tr style="border-top:1px solid #eef2f7"><td style="padding:7px 10px 7px 22px"><div style="font-weight:600;color:#334155">${esc(ven)}</div>${sub?`<div style="font-size:10.5px;color:#64748b;margin-top:2px;line-height:1.4">${sub}</div>`:''}</td><td style="padding:7px 10px;color:#475569;font-size:11px;white-space:nowrap">${esc(fmtDate(p.original_due))}</td><td style="padding:7px 10px;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600;color:#334155">${nf(p.amount)}</td></tr>`;
                }
                // ★ เวนเดอร์หลายรายการ → หัวเวนเดอร์ (ชื่อ + จำนวน + ยอดรวม) · กางถึงเห็นรายการเอกสาร
                const venHead = `<tr style="${interactive?'cursor:pointer;':''}background:rgba(var(--brand-rgb),.11);border-top:1px solid #e6ecf5" ${interactive?`onclick="cffToggleVendor(${JSON.stringify(cat).replace(/"/g,'&quot;')},${JSON.stringify(ven).replace(/"/g,'&quot;')})"`:''}><td style="padding:7px 10px 7px 18px;border-left:4px solid rgba(var(--brand-rgb),.45);color:var(--brand-dark)" colspan="2">${interactive?`<span style="display:inline-block;width:13px;color:var(--brand);font-size:9px">${vOpen?'▾':'▸'}</span>`:''}<span style="font-weight:700">${esc(ven)}</span> <span style="font-weight:600;color:#fff;background:var(--brand);border-radius:999px;padding:0 7px;font-size:10px;margin-left:4px">${vinfo.items.length}</span></td><td style="padding:7px 10px;text-align:right;font-weight:700;color:var(--brand-dark)">${nf(vinfo.total)}</td></tr>`;
                const items = vOpen ? vinfo.items.map(p => {
                  const sub = subLine(p, ven) || esc(cffDocCode(p));
                  return `<tr><td style="padding:5px 10px 5px 38px;color:#475569;font-size:11px">${sub}</td><td style="padding:5px 10px;color:#475569;font-size:11px;white-space:nowrap">${esc(fmtDate(p.original_due))}</td><td style="padding:5px 10px;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap">${nf(p.amount)}</td></tr>`;
                }).join("") : "";
                return venHead + items;
              }).join("");
              return catHead + venRows;
            }).join("")}
            <tr style="border-top:2px solid var(--brand)"><td style="padding:8px 10px;font-weight:800" colspan="2">รวมทั้งสิ้น</td><td style="padding:8px 10px;text-align:right;font-weight:800;color:var(--out-ink)">${nf(totalDue)}</td></tr>
          </tbody>
        </table>
      </div>
      ` : '<div style="margin-top:18px;padding:24px;text-align:center;color:var(--ink-3);font-size:12.5px">ไม่มีรายการในช่วงนี้</div>'}
    </div>`;
}

async function renderToolCashflowStaff(){
  const t = TOOLS.find(x=>x.id==="cashflow");
  const co = COMPANIES.find(c=>c.id===state.company);
  const main = document.getElementById("main");
  const d = cffGet();
  cffInjectStaffCSS();

  // ★ UI-only re-render (toggle/filter) → ใช้ data เดิม ไม่โชว์ skeleton + ไม่โหลดใหม่ (กันจอกระพริบ)
  const uiOnly = d._uiOnly && d.data;
  d._uiOnly = false;
  if(!uiOnly){
    main.innerHTML = `
      <div class="page-head"><h1>${esc(t.name)} <span class="badge">${esc(co.name)}</span></h1><div class="sub">กำลังโหลด...</div></div>
      <div class="card"><div class="empty">กำลังโหลด...</div></div>`;
    try{ await cffLoad(); }catch(e){
      main.innerHTML += `<div class="card"><div style="color:var(--out-ink)">โหลดไม่สำเร็จ: ${esc(fopErr(e))}</div></div>`;
      return;
    }
  }
  const dt = d.data;
  if(!dt){ return; }

  // ★ ค่าใช้จ่ายถึงกำหนดชำระ = AP ที่ จนท. กรอก planned_payment_date + ค่าใช้จ่ายประจำ (ผูกตามวันจ่าย)
  const todayISO = dt.todayISO;
  const payments = cffStaffPayments(dt, d);

  // unique dates สำหรับ chip filter — จำกัดไม่เกินสิ้นเดือนนี้ (default ไม่โชว์เดือนถัดไป)
  const eomISO = cffStaffEOM(dt);
  const upcomingDates = Array.from(new Set(payments.filter(p => p.due_date <= eomISO).map(p => p.due_date))).sort();

  // apply filter ตาม staffMode (default = ถึงสิ้นเดือนนี้)
  const filtered = cffStaffApplyFilter(payments, d, dt);
  const totalDue = filtered.reduce((s,p) => s + p.amount, 0);

  // opening cash = ยอดเงินคงเหลือใช้ได้ทั้งหมด
  const openingCash = dt.balances.reduce((s,b) => s + Number(b.amount||0) - Number(b.hold||0), 0);
  const forecastIn = 0;   // Phase 2.1
  const netCash = openingCash + forecastIn - totalDue;

  // per-bank distribution — ถ้า payment ไม่ระบุ bank → กระจายเป็น default (ใช้บัญชีแรกที่มียอดมากสุด)
  const bankMap = {};
  for(const b of dt.balances){
    bankMap[b.bank_account_id] = {
      bank_code: b.bank_code, account_no: b.account_no, nickname: b.nickname,
      amount: Number(b.amount||0), hold: Number(b.hold||0),
      avail: Number(b.amount||0) - Number(b.hold||0),
      due: 0
    };
  }
  // ★ กระจายค่าใช้จ่ายไปตามบัญชีที่ผูกไว้ (pay_from_account_id / recurring.bank_account_id) — ไม่ผูก → บัญชี default (เลขลงท้าย 4889)
  const sortedBanks = Object.values(bankMap).sort((a,b)=> b.amount - a.amount);
  const { due: bankDue, cat: bankCat } = cffBankDistribute(filtered, dt.balances);
  for(const id in bankMap) bankMap[id].due = bankDue[id] || 0;
  const negCount = Object.values(bankMap).filter(b => (b.avail - b.due) < 0).length;
  const negBanks = Object.values(bankMap).filter(b => (b.avail - b.due) < 0).map(b => `${b.bank_code} ${b.account_no}`).join(", ");

  // group payments by category
  const byCat = {};
  for(const p of filtered){
    if(!byCat[p.category]) byCat[p.category] = { total: 0, items: [] };
    byCat[p.category].total += p.amount;
    byCat[p.category].items.push(p);
  }
  for(const c of Object.values(byCat)) c.items.sort(cffItemCmp);  // ★ ผู้ขายเดียวกันอยู่ติดกัน
  const cats = Object.entries(byCat).sort((a,b) => b[1].total - a[1].total);

  const fmtDate = (iso) => new Date(iso).toLocaleDateString("th-TH", { day:"2-digit", month:"short" });
  const fmt = (n) => Math.abs(Number(n||0)).toLocaleString("th-TH", { minimumFractionDigits:2, maximumFractionDigits:2 });
  const fmtParen = (n) => Number(n||0) < 0 ? "(" + fmt(n) + ")" : fmt(n);

  // ★ pill สีตามวันครบกำหนด (เทียบวันนี้): เลยกำหนด=แดง · ใกล้กำหนด(≤3วัน)/วันนี้=อำพัน · ตามกำหนด=เทา
  const dueMeta = (iso) => {
    if(!iso) return { color:"#64748B", bg:"#F1F5F9", label:"ตามกำหนด" };
    if(iso < todayISO)  return { color:"#DC2626", bg:"#FEE2E2", label:"เลยกำหนด" };
    if(iso === todayISO) return { color:"#D97706", bg:"#FEF3C7", label:"รอบวันนี้" };
    const dd = Math.round((new Date(iso) - new Date(todayISO))/86400000);
    if(dd <= 3) return { color:"#D97706", bg:"#FEF3C7", label:"ใกล้กำหนด" };
    return { color:"#64748B", bg:"#F1F5F9", label:"ตามกำหนด" };
  };
  // ไอคอน Lucide ต่อหมวด
  const catIcon = (name) => {
    const n = name || "";
    if(/ประจำ/.test(n)) return "repeat";
    if(/การค้า|จัดซื้อ|เจ้าหนี้/.test(n)) return "truck";
    if(/ดำเนินงาน|operating/i.test(n)) return "briefcase";
    if(/เงินเดือน|payroll|พนักงาน/.test(n)) return "users";
    if(/ภาษี|สรรพากร/.test(n)) return "receipt";
    if(/กู้|สินเชื่อ|ดอกเบี้ย/.test(n)) return "landmark";
    return "folder";
  };

  // ★ ไฮไลต์: เลยกำหนด · รอบจ่ายหนักสุด · สภาพคล่องสุทธิ
  const overdueItems = filtered.filter(p => p.original_due && p.original_due < todayISO);
  const overdueTotal = overdueItems.reduce((s,p) => s + p.amount, 0);
  const byDay = {};
  filtered.forEach(p => { byDay[p.due_date] = (byDay[p.due_date]||0) + p.amount; });
  let heavyDate = "", heavyAmt = -1;
  Object.entries(byDay).forEach(([k,v]) => { if(v > heavyAmt){ heavyAmt = v; heavyDate = k; } });
  const netStatusLabel = netCash >= 0 ? "เพียงพอจ่ายได้ครบทุกรอบ" : "เงินไม่เพียงพอ ต้องเตรียมเพิ่ม";

  // ★ รอบการจ่าย — group ตามวันครบกำหนด, ยอดคงเหลือยกไปวิ่งจากเงินต้นงวด
  const roundGroups = {};
  filtered.forEach(p => { (roundGroups[p.due_date] = roundGroups[p.due_date] || []).push(p); });
  let runBal = openingCash;
  const rounds = Object.keys(roundGroups).sort().map(k => {
    const items = roundGroups[k].slice().sort(cffItemCmp);
    const paid = items.reduce((s,x) => s + x.amount, 0);
    runBal -= paid;
    return { date:k, paid, balance:runBal, items, count:items.length, dm:dueMeta(k), heavy:(k===heavyDate) };
  });
  const headB = sortedBanks[1] || sortedBanks[0] || null;   // บัญชีดำเนินงานหลัก (สำหรับหัวการ์ด)
  const tlOpen = d.bankTlOpen !== false;                    // timeline เปิดเป็นค่าเริ่มต้น

  const periodLabel = d.staffMode === "day" ? fmtDate(d.staffDate)
                    : d.staffMode === "range" ? `${d.staffFrom?fmtDate(d.staffFrom):'?'} → ${d.staffTo?fmtDate(d.staffTo):'?'}`
                    : (upcomingDates[0] ? `ทั้งหมด · ${fmtDate(upcomingDates[0])}–${fmtDate(upcomingDates[upcomingDates.length-1])}` : 'ทั้งหมด');
  // ★ ป้ายงวดสำหรับรายงานสะอาด (เหมือน snapshot เป๊ะ — "ทั้งหมด" ไม่มีช่วงวันต่อท้าย)
  const reportPeriodLabel = d.staffMode === "day" ? fmtDate(d.staffDate)
                    : d.staffMode === "range" ? `${d.staffFrom?fmtDate(d.staffFrom):'?'}–${d.staffTo?fmtDate(d.staffTo):'?'}`
                    : "ทั้งหมด";
  const detailOpen = d.staffDetailOpen === true;   // ★ ปกติซ่อนของวิเคราะห์ทั้งหมด — กดปุ่มถึงโชว์

function dt0(n){ return fopFmt(n); }
function fopFmtCompact(n){
  if(!n) return "0";
  const v = Math.abs(n);
  if(v >= 1e6) return (n/1e6).toFixed(1)+"M";
  if(v >= 1e3) return (n/1e3).toFixed(0)+"K";
  return n.toFixed(0);
}

/* drill-down modal */
function cffDrill(kind, arg){
  const d = cffGet();
  const R = cffCompute();
  if(!R) return;
  let title = "", rows = [];
  if(kind === "opening"){
    title = "เงินสดปัจจุบัน — แยกตามบัญชี";
    rows = d.data.balances.map(b => ({ left: `${b.bank_code} ${b.account_no}`, mid: b.nickname||"", right: fopFmt(Number(b.amount)-Number(b.hold||0)) }));
  } else if(kind === "payments" || kind === "ending"){
    title = "รายการจ่ายในช่วง (รวม " + fopFmt(R.totalOut) + ")";
    const arr = [];
    for(const k of R.days) for(const p of R.buckets[k].payments) arr.push({ left: fopDate(p.due_date), mid: `${p.vendor} · ${p.category}`, right: fopFmt(p.amount) });
    rows = arr.sort((a,b)=> b.right.length - a.right.length);
  } else if(kind === "receipts"){
    title = "รายการรับในช่วง";
    const arr = [];
    for(const k of R.days) for(const r of R.buckets[k].receipts) arr.push({ left: fopDate(k), mid: r.source||"manual", right: fopFmt(r.amount) });
    rows = arr;
  } else if(kind === "lowest"){
    title = `Lowest Cash · ${fopDate(arg)} · ${fopFmt(R.lowestBal)}`;
    const idx = R.days.indexOf(arg);
    if(idx >= 0){
      for(const p of R.buckets[arg].payments) rows.push({ left:"จ่าย", mid:`${p.vendor} · ${p.category}`, right: fopFmt(p.amount) });
      for(const r of R.buckets[arg].receipts) rows.push({ left:"รับ", mid: r.source||"manual", right: fopFmt(r.amount) });
    }
  } else if(kind === "overdue"){
    title = "AP เกินกำหนด";
    const today = d.data.todayISO;
    for(const ap of d.data.aps){
      if(ap.due_date < today){
        rows.push({ left: fopDate(ap.due_date), mid: `${(ap.vendors&&ap.vendors.name)||ap.vendor_name_raw||"—"} · ${ap.invoice_no}`, right: fopFmt(ap.amount_outstanding) });
      }
    }
  } else if(kind === "payByCat"){
    title = "Payment Breakdown — " + arg;
    for(const k of R.days) for(const p of R.buckets[k].payments){
      if(p.category === arg) rows.push({ left: fopDate(p.due_date), mid: `${p.vendor} · ${p.ref||""}`, right: fopFmt(p.amount) });
    }
  } else if(kind === "day"){
    title = "รายการวันที่ " + fopDate(arg);
    const b = R.buckets[arg];
    if(b){
      for(const p of b.payments) rows.push({ left:"จ่าย", mid:`${p.vendor} · ${p.category}`, right: fopFmt(p.amount) });
      for(const r of b.receipts) rows.push({ left:"รับ", mid: r.source||"manual", right: fopFmt(r.amount) });
    }
  }
  const m = document.createElement("div");
  m.id = "fopModal";
  m.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";
  m.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:24px;max-width:760px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0;font-size:15px">${esc(title)}</h3>
        <button onclick="document.getElementById('fopModal').remove()" class="btn ghost btn sm">ปิด</button>
      </div>
      <div style="overflow:auto;flex:1">
        ${rows.length === 0 ? `<div class="empty">ไม่มีรายการ</div>` : `
        <table style="font-size:12.5px;width:100%">
          <thead><tr><th>วันที่/ประเภท</th><th>รายละเอียด</th><th style="text-align:right">ยอด</th></tr></thead>
          <tbody>${rows.map(r => `<tr><td>${esc(r.left)}</td><td>${esc(r.mid)}</td><td style="text-align:right;font-weight:700">${r.right}</td></tr>`).join("")}</tbody>
        </table>`}
      </div>
    </div>`;
  document.body.appendChild(m);
  m.onclick = e=>{ if(e.target===m) m.remove(); };
}

/* ============================================================
   BANK RECONCILIATION — Phase 1
   Express XML ↔ Bank Statement (SCB XLSX BusinessNet / BBL XLS iBanking)
   - Strict same-date matching (no tolerance)
   - Exact match = วันที่ตรง + ยอดตรง + ref ตรง (SCB Note ↔ Express เลขที่)
   - Suggested match = วันที่ตรง + ยอดตรง (no ref — BBL)
   ============================================================ */

function brecGet(){
  if(!state.brec) state.brec = {};
  const co = state.company;
  if(!state.brec[co]) state.brec[co] = {
    accounts:[], accountId:null,
    period:{ mode:"month", month: new Date().toISOString().slice(0,7), from:null, to:null },
    express:[], bank:[], matches:[],
    tab:"pending", sel:{ ex:new Set(), bk:new Set() },
    busy:false, lastImport:null,
    mp: { withdrawals:[], orders:[], mismatchOrders:[], lastImportId:null, expanded:new Set(), uploadOpen:false, files:{shopee:[],sales:[],receipt:[],cheque:[]}, parsing:false }
  };
  if(!state.brec[co].mp) state.brec[co].mp = { withdrawals:[], orders:[], mismatchOrders:[], lastImportId:null, expanded:new Set(), uploadOpen:false, files:{shopee:[],sales:[],receipt:[],cheque:[]}, parsing:false };
  if(!state.brec[co].stmFilter) state.brec[co].stmFilter = { dir:"all", q:"" };
  // migration: legacy state → ensure sales slot exists
  if(!state.brec[co].mp.files) state.brec[co].mp.files = { shopee:[], sales:[], receipt:[], cheque:[] };
  if(!Array.isArray(state.brec[co].mp.files.shopee)) state.brec[co].mp.files.shopee = [];
  if(!Array.isArray(state.brec[co].mp.files.sales))   state.brec[co].mp.files.sales = [];
  if(!Array.isArray(state.brec[co].mp.files.receipt)) state.brec[co].mp.files.receipt = [];
  if(!Array.isArray(state.brec[co].mp.files.cheque))  state.brec[co].mp.files.cheque = [];
  if(!state.brec[co].mp.selected) state.brec[co].mp.selected = new Set();
  if(!state.brec[co].mp.filterChannel) state.brec[co].mp.filterChannel = "all";
  if(!state.brec[co].mp.filterAccount) state.brec[co].mp.filterAccount = "all";
  return state.brec[co];
}
function brecCanWrite(){ return !!(AUTH.role && ["admin","finance_mgr","accountant","treasury"].includes(AUTH.role)); }

/* parse date in many forms → ISO YYYY-MM-DD (local, no TZ drift) */
function brecISODate(v){
  if(!v && v!==0) return null;
  if(v instanceof Date) return v.getFullYear()+"-"+String(v.getMonth()+1).padStart(2,"0")+"-"+String(v.getDate()).padStart(2,"0");
  if(typeof v === "number"){
    // Excel serial date
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,"0")+"-"+String(d.getUTCDate()).padStart(2,"0");
  }
  const s = String(v).trim();
  // ISO already
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  // dd/mm/yyyy or dd/mm/yy
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){
    let y = parseInt(m[3],10);
    if(y < 100) y += 2500;        // 2-digit assumed BE
    if(y >= 2400) y -= 543;        // BE → CE
    return `${y}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  }
  return null;
}
function brecNum(v){
  if(v===null||v===undefined||v==="") return 0;
  if(typeof v === "number") return v;
  const n = Number(String(v).replace(/[,\s฿]/g,""));
  return isNaN(n) ? 0 : n;
}
function brecHash(s){
  // simple djb2 hash → hex (for dup-file detection)
  let h = 5381;
  for(let i=0;i<s.length;i++) h = ((h<<5) + h + s.charCodeAt(i)) | 0;
  return (h>>>0).toString(16);
}
/* Normalize ref → {prefix, num} so we can compare:
   Express "QPPS26060401" (Q+PS+YYMM+DD+SS) ↔ Statement "PS2606040001" (PS+YYMM+DD+SSSS)
   - strip leading "Q", strip non-alphanumeric, also strip " - description" tail */
function brecRefKey(s){
  if(!s) return null;
  // keep only the leading "CODE+digits" part — drop description after " - " or space
  let head = String(s).split(/[\s\-]/)[0];
  head = head.toUpperCase().replace(/[^A-Z0-9]/g,"");
  if(!head) return null;
  head = head.replace(/^Q(?=[A-Z])/, ""); // QPPS → PPS; QPS → PS
  // collapse double-letter PPS to single PS (Express QPS uses double-P after stripping Q)
  head = head.replace(/^P+(?=S)/, "P");
  return head;
}
/* compare two refs — accept exact, or one ends/starts with the other,
   or "PREFIX+YYMMDD+SEQ" alignment with leading-zero-stripped seq */
function brecRefMatch(a, b){
  if(!a || !b) return false;
  if(a === b) return true;
  if(a.endsWith(b) || b.endsWith(a)) return true;
  // PREFIX + YYMMDD + SEQ pattern
  const re = /^([A-Z]+)(\d{6})(\d+)$/;
  const ma = a.match(re), mb = b.match(re);
  if(ma && mb && ma[1] === mb[1] && ma[2] === mb[2]){
    return parseInt(ma[3],10) === parseInt(mb[3],10);
  }
  return false;
}
/* tolerant amount equality */
function brecAmtEq(a,b){ return Math.abs((Number(a)||0)-(Number(b)||0)) < 0.005; }
/* signed amount of a row */
function brecSignedAmt(r){ return (Number(r.deposit)||0) - (Number(r.withdrawal)||0); }
function brecExtractAccountNo(s){
  // "S/A #BBL 865-0-98040-5 (สาขา...)" → "8650980405"
  // "S/A #SCB 136-2-684889 (สาขา...)" → "1362684889"
  if(!s) return null;
  const m = String(s).match(/(\d[\d\-]{6,})/);
  if(!m) return null;
  return m[1].replace(/\D/g,"");
}
function brecExtractBankCode(s){
  // "S/A #BBL 865..." → "BBL" · "SBC#136..." → "SCB" (variant สะกด)
  const m = String(s||"").match(/#?\s*(BBL|SCB|SBC|KBANK|KTB|BAY|TMB|TTB|GSB|UOB|CIMB)\b/i);
  if(!m) return null;
  const code = m[1].toUpperCase();
  return code === "SBC" ? "SCB" : code;
}

/* ---------- PARSERS ---------- */

/* Express SpreadsheetML XML — งบกระทบยอด รายการเคลื่อนไหวบัญชีธนาคาร
   columns: วันที่ | MNE | เลขที่ | ยอดถอน | ยอดฝาก | ยอดคงเหลือ | สถานะเช็ค | หมายเหตุ */
function brecParseExpressXml(xmlText){
  const NS = "urn:schemas-microsoft-com:office:spreadsheet";
  const dom = new DOMParser().parseFromString(xmlText,"text/xml");
  if(dom.querySelector("parsererror")) throw new Error("Express XML parse error");
  const rows = Array.from(dom.getElementsByTagNameNS(NS,"Row"));

  function getCells(row){
    const cells = {}; let idx = 0;
    for(const c of row.children){
      if(c.localName !== "Cell") continue;
      const ix = c.getAttributeNS(NS,"Index");
      if(ix) idx = parseInt(ix,10); else idx++;
      const data = c.getElementsByTagNameNS(NS,"Data")[0];
      if(data) cells[idx] = { v:data.textContent, t:data.getAttributeNS(NS,"Type") };
    }
    return cells;
  }

  // header info — หาเลขบัญชี + งวด ใน ~12 แถวแรก (รองรับหลาย format)
  //   "S/A #SCB 136-..." · "เงินฝาก...SBC#136-270928-1" · label "สมุดบัญชีเลขที่" + เลขล้วน
  let acctText = "", periodFrom = null, periodTo = null, acctDigits = "";
  for(let i=0;i<Math.min(rows.length,12);i++){
    const cs = getCells(rows[i]);
    const vals = Object.values(cs).map(c => String(c.v||""));
    const joined = vals.join(" ");
    if(!acctText && (/S\/A\s*#/.test(joined) || /(SBC|SCB|BBL|KBANK|KTB|BAY|TMB|TTB|GSB|UOB|CIMB)\s*#/i.test(joined) || /เงินฝาก/.test(joined)))
      acctText = joined;
    // label "สมุดบัญชีเลขที่/เลขที่บัญชี" → เลขล้วน 9-15 หลักในแถวนั้น = เลขบัญชี
    if(!acctDigits && /สมุดบัญชีเลขที่|เลขที่บัญชี/.test(joined)){
      for(const v of vals){ const dd = v.replace(/\D/g,""); if(dd.length>=9 && dd.length<=15){ acctDigits = dd; break; } }
    }
    for(const k in cs){ if(cs[k].t === "DateTime" && !periodFrom) periodFrom = cs[k].v.slice(0,10); }
  }
  const accountNo = brecExtractAccountNo(acctText) || acctDigits || null;
  const bankCode = brecExtractBankCode(acctText) || (/SBC|เงินฝาก/.test(acctText) ? "SCB" : null);

  // find header row (วันที่/MNE/เลขที่)
  const COL = {};
  let headerRow = -1;
  for(let i=0;i<rows.length;i++){
    const cs = getCells(rows[i]);
    const labels = Object.entries(cs).map(([i,c])=>[parseInt(i,10), String(c.v||"").trim()]);
    if(labels.some(([_,v]) => v==="MNE") && labels.some(([_,v]) => v==="ยอดถอน")){
      for(const [k,v] of labels){
        if(v==="วันที่") COL.date = k;
        else if(v==="MNE") COL.mne = k;
        else if(v==="เลขที่") COL.doc = k;
        else if(v==="ยอดถอน") COL.withdraw = k;
        else if(v==="ยอดฝาก") COL.deposit = k;
        else if(v==="ยอดคงเหลือ") COL.balance = k;
        else if(v==="สถานะเช็ค") COL.cheque = k;
        else if(v==="หมายเหตุ") COL.remark = k;
      }
      headerRow = i; break;
    }
  }
  if(headerRow < 0) throw new Error("ไม่พบ header (วันที่/MNE/เลขที่/ยอดถอน/ยอดฝาก) ใน Express XML");

  const out = [];
  for(let i=headerRow+1;i<rows.length;i++){
    const cs = getCells(rows[i]);
    const cDate = cs[COL.date];
    if(!cDate) continue;
    let txnDate = null;
    if(cDate.t === "DateTime") txnDate = cDate.v.slice(0,10);
    else txnDate = brecISODate(cDate.v);
    if(!txnDate) continue;
    if(!periodFrom || txnDate < periodFrom) periodFrom = txnDate;
    if(!periodTo || txnDate > periodTo) periodTo = txnDate;
    out.push({
      txn_date: txnDate,
      mne: String((cs[COL.mne]||{}).v||"").trim(),
      doc_no: String((cs[COL.doc]||{}).v||"").trim(),
      withdrawal: brecNum((cs[COL.withdraw]||{}).v),
      deposit:    brecNum((cs[COL.deposit]||{}).v),
      balance:    brecNum((cs[COL.balance]||{}).v),
      cheque_status: String((cs[COL.cheque]||{}).v||"").trim(),
      remark:     String((cs[COL.remark]||{}).v||"").trim(),
      raw_row: i+1
    });
  }
  return { source:"express", accountNo, bankCode, periodFrom, periodTo, rows: out };
}

/* SCB BusinessNet HISTSTMTAN_*.XLSX — sheet RPT_01009_XLSX
   16 cols: Account Number | Account Name | Account Type | Currency | Branch
            | Date | Time | Tr Code | Tr Description | Channel | Cheque No.
            | Withdrawal | Deposit | Outstanding Balance | Description | Note */
function brecParseScbXlsx(workbook){
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:"", raw:true });
  if(!rows.length) throw new Error("SCB statement ว่าง");
  // find header row by content
  let hr = -1;
  for(let i=0;i<Math.min(rows.length,8);i++){
    const r = rows[i].map(x=>String(x||"").trim());
    if(r.includes("Date") && r.includes("Withdrawal") && r.includes("Deposit")){ hr = i; break; }
  }
  if(hr < 0) throw new Error("ไม่พบ header SCB statement (ต้องมี Date/Withdrawal/Deposit)");
  const head = rows[hr].map(x=>String(x||"").trim());
  const idx = (name)=> head.indexOf(name);
  const cAcct=idx("Account Number"), cDate=idx("Date"), cTime=idx("Time"),
        cCode=idx("Tr Code"), cDesc=idx("Tr Description"), cChan=idx("Channel"),
        cChq=idx("Cheque No."), cW=idx("Withdrawal"), cD=idx("Deposit"),
        cBal=idx("Outstanding Balance"), cDescription=idx("Description"), cNote=idx("Note");

  let accountNo = null, periodFrom = null, periodTo = null;
  const out = [];
  for(let i=hr+1;i<rows.length;i++){
    const r = rows[i];
    if(!r || !r[cDate]) continue;
    const txnDate = brecISODate(r[cDate]);
    if(!txnDate) continue;
    accountNo = accountNo || String(r[cAcct]||"").replace(/\D/g,"") || null;
    if(!periodFrom || txnDate < periodFrom) periodFrom = txnDate;
    if(!periodTo || txnDate > periodTo) periodTo = txnDate;
    out.push({
      txn_date: txnDate,
      value_date: null,
      tr_code: String(r[cCode]||"").trim(),
      tr_desc: String(r[cDesc]||"").trim(),
      channel: String(r[cChan]||"").trim(),
      cheque_no: String(r[cChq]||"").trim(),
      withdrawal: brecNum(r[cW]),
      deposit:    brecNum(r[cD]),
      balance:    brecNum(r[cBal]),
      description: String(r[cDescription]||"").trim(),
      ref_note:   String(r[cNote]||"").trim() || null,
      raw_row: i+1
    });
  }
  return { source:"scb_stmt", accountNo, bankCode:"SCB", periodFrom, periodTo, rows: out };
}

/* BBL iBanking TransactionsReport_*.xls — header at row 16 (~)
   9 cols: Transaction Date And Time | Value Date | Description | Cheque No.
          | Debit | Credit | Ledger Balance | Channel | Branch */
function brecParseBblXls(workbook){
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:"", raw:true });
  if(!rows.length) throw new Error("BBL statement ว่าง");

  // find account no in first ~15 rows ("Account Number" + value next to it)
  let accountNo = null;
  for(let i=0;i<Math.min(rows.length,15);i++){
    const r = rows[i] || [];
    for(let j=0;j<r.length;j++){
      if(String(r[j]||"").trim() === "Account Number"){
        // value typically in next non-empty cell
        for(let k=j+1;k<r.length;k++){
          const v = String(r[k]||"").trim();
          if(v){ accountNo = v.replace(/\D/g,""); break; }
        }
      }
    }
    if(accountNo) break;
  }

  // find header row containing "Debit" + "Credit"
  let hr = -1;
  for(let i=0;i<Math.min(rows.length,25);i++){
    const r = (rows[i]||[]).map(x=>String(x||"").trim());
    if(r.includes("Debit") && r.includes("Credit") && (r.includes("Description")||r.includes("Description "))){ hr = i; break; }
  }
  if(hr < 0) throw new Error("ไม่พบ header BBL statement (ต้องมี Debit/Credit/Description)");
  const head = rows[hr].map(x=>String(x||"").trim());
  const idx = (name)=> head.indexOf(name);
  const cDate=idx("Transaction Date And Time"), cVal=idx("Value Date"),
        cDesc=idx("Description"), cChq=idx("Cheque No."),
        cD=idx("Debit"), cC=idx("Credit"), cBal=idx("Ledger Balance"),
        cChan=idx("Channel"), cBr=idx("Branch");

  let periodFrom = null, periodTo = null;
  const out = [];
  for(let i=hr+1;i<rows.length;i++){
    const r = rows[i];
    if(!r || !r[cDate]) continue;
    // date+time → ISO date (just take the date part)
    const txnDate = brecISODate(r[cDate]) || brecISODate(r[cVal]);
    if(!txnDate) continue;
    if(!periodFrom || txnDate < periodFrom) periodFrom = txnDate;
    if(!periodTo || txnDate > periodTo) periodTo = txnDate;
    out.push({
      txn_date: txnDate,
      value_date: brecISODate(r[cVal]),
      tr_code: null,
      tr_desc: String(r[cDesc]||"").trim(),
      channel: String(r[cChan]||"").trim(),
      cheque_no: String(r[cChq]||"").trim(),
      withdrawal: brecNum(r[cD]),
      deposit:    brecNum(r[cC]),
      balance:    brecNum(r[cBal]),
      description: String(r[cDesc]||"").trim(),
      ref_note: null,
      raw_row: i+1
    });
  }
  return { source:"bbl_stmt", accountNo, bankCode:"BBL", periodFrom, periodTo, rows: out };
}

/* auto-pick parser based on workbook signature */
function brecParseStatement(workbook){
  const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(firstSheet, { header:1, defval:"", raw:true });
  for(let i=0;i<Math.min(rows.length,25);i++){
    const joined = (rows[i]||[]).map(x=>String(x||"")).join("|");
    if(/Tr Code|Outstanding Balance/.test(joined)) return brecParseScbXlsx(workbook);
    if(/Debit\|Credit|Transaction Date And Time/.test(joined)) return brecParseBblXls(workbook);
  }
  // Fallback heuristic
  const hdrJoin = (rows[16]||[]).join("|");
  if(/Debit|Credit|Ledger/.test(hdrJoin)) return brecParseBblXls(workbook);
  return brecParseScbXlsx(workbook);
}

/* ---------- MATCHING ENGINE ---------- */
/* Returns array of {express_id, bank_id, status, confidence, match_reason}
   Strict same-date rule — วันต่าง = ไม่ match
   Tier 1: ref ตรง + วันตรง + ยอดตรง → confidence="exact"
   Tier 2: วันตรง + ยอดตรง (ไม่มี ref check) → confidence="suggested" */
/* ลายเซ็นแถว — กันแถวซ้ำตอน re-upload งวดที่ทับกัน (เก็บแค่แถวใหม่จริง) */
function brecRowSig(r, source){
  const n = v => (Number(v)||0).toFixed(2);
  const bal = (r.balance==null || r.balance==="") ? "" : n(r.balance);
  const base = `${r.txn_date||""}|${n(r.withdrawal)}|${n(r.deposit)}|${bal}`;
  return source === "express"
    ? base + "|" + String(r.doc_no||"").trim()
    : base + "|" + String(r.cheque_no||"").trim() + "|" + String(r.ref_note||"").trim();
}
function brecAutoMatch(exRows, bkRows, existing){
  const used = new Set();
  for(const m of existing||[]){
    if(m.express_row_id) used.add("e:"+m.express_row_id);
    if(m.bank_row_id) used.add("b:"+m.bank_row_id);
  }
  const out = [];

  // Tier 1: ref + date + amount
  for(const ex of exRows){
    if(used.has("e:"+ex.id)) continue;
    const exRef = brecRefKey(ex.doc_no);
    if(!exRef) continue;
    const exAmt = brecSignedAmt(ex);
    for(const bk of bkRows){
      if(used.has("b:"+bk.id)) continue;
      const bkRef = brecRefKey(bk.ref_note);
      if(!bkRef) continue;
      if(!brecRefMatch(exRef, bkRef)) continue;
      if(ex.txn_date !== bk.txn_date) continue;
      if(!brecAmtEq(exAmt, brecSignedAmt(bk))) continue;
      out.push({ express_row_id:ex.id, bank_row_id:bk.id, status:"suggested", confidence:"exact",
                 match_reason:"ref+date+amount", txn_date:ex.txn_date, amount:exAmt });
      used.add("e:"+ex.id); used.add("b:"+bk.id);
      break;
    }
  }

  // Tier 2: date + amount (no ref)
  for(const ex of exRows){
    if(used.has("e:"+ex.id)) continue;
    const exAmt = brecSignedAmt(ex);
    if(!exAmt) continue;
    for(const bk of bkRows){
      if(used.has("b:"+bk.id)) continue;
      if(ex.txn_date !== bk.txn_date) continue;
      if(!brecAmtEq(exAmt, brecSignedAmt(bk))) continue;
      out.push({ express_row_id:ex.id, bank_row_id:bk.id, status:"suggested", confidence:"suggested",
                 match_reason:"date+amount", txn_date:ex.txn_date, amount:exAmt });
      used.add("e:"+ex.id); used.add("b:"+bk.id);
      break;
    }
  }
  return out;
}

/* ---------- DATA LAYER ---------- */
async function brecLoadAccounts(co){
  const { data, error } = await sb.from("bank_accounts")
    .select("id,company_id,bank_code,account_no,nickname,is_active")
    .eq("company_id", co)
    .is("deleted_at", null)
    .order("display_order",{ascending:true})
    .order("bank_code",{ascending:true});
  if(error) throw error;
  return data || [];
}
async function brecEnsureAccount(co, bankCode, accountNo){
  // Normalize accountNo: strip non-digits
  const norm = String(accountNo||"").replace(/\D/g,"");
  if(!norm || !bankCode) return null;
  // ★ ดึง "ทุก" บัญชี รวมที่ soft-delete แล้ว (unique constraint ไม่สนใจ deleted_at)
  const { data } = await sb.from("bank_accounts").select("id,account_no,bank_code,deleted_at")
    .eq("company_id", co);
  const matches = (data||[]).filter(a =>
    String(a.bank_code||"").toUpperCase() === bankCode.toUpperCase()
    && String(a.account_no||"").replace(/\D/g,"") === norm);
  // ★ เลือกบัญชีที่ยัง active ก่อนเสมอ (กันปลุกบัญชีที่รวม/ลบไปแล้วกลับมาเป็นซ้ำ)
  const active = matches.find(a => !a.deleted_at);
  if(active) return active.id;
  if(matches.length){
    const a = matches[0];   // ไม่มี active → กู้คืนตัวที่ลบไว้
    await sb.from("bank_accounts").update({ deleted_at:null, deleted_by:null, is_active:true }).eq("id", a.id);
    return a.id;
  }
  // create ใหม่จริง ๆ
  const { data:ins, error } = await sb.from("bank_accounts").insert({
    company_id: co, bank_code: bankCode.toUpperCase(),
    account_no: norm, nickname: `${bankCode} ${norm}`,
    is_active: true
  }).select("id").single();
  if(error){
    // ★ fallback: ถ้าชน unique (เลขมีอยู่แล้วแต่ raw account_no ต่างจาก norm) → ดึงตัวเดิมมา + กู้คืน
    if(String(error.message||error.code||"").match(/duplicate|unique|23505/i)){
      const { data:all2 } = await sb.from("bank_accounts").select("id,account_no,bank_code,deleted_at").eq("company_id", co);
      for(const a of (all2||[])){
        if(String(a.bank_code||"").toUpperCase() === bankCode.toUpperCase()
           && String(a.account_no||"").replace(/\D/g,"") === norm){
          if(a.deleted_at) await sb.from("bank_accounts").update({ deleted_at:null, deleted_by:null, is_active:true }).eq("id", a.id);
          return a.id;
        }
      }
    }
    throw error;
  }
  return ins.id;
}
async function brecLoadRows(co, acctIds, from, to){
  const ids = Array.isArray(acctIds) ? acctIds : [acctIds];
  if(!ids.length || !ids[0]) return { express:[], bank:[] };
  const [exRes, bkRes] = await Promise.all([
    sb.from("brec_express_rows").select("*")
      .eq("company_id", co).in("bank_account_id", ids)
      .is("deleted_at", null)
      .gte("txn_date", from).lte("txn_date", to)
      .order("txn_date",{ascending:true}).order("raw_row",{ascending:true}),
    sb.from("brec_bank_rows").select("*")
      .eq("company_id", co).in("bank_account_id", ids)
      .is("deleted_at", null)
      .gte("txn_date", from).lte("txn_date", to)
      .order("txn_date",{ascending:true}).order("raw_row",{ascending:true})
  ]);
  if(exRes.error) throw exRes.error;
  if(bkRes.error) throw bkRes.error;
  return { express: exRes.data||[], bank: bkRes.data||[] };
}
async function brecLoadMatches(co, acctIds, from, to){
  const ids = Array.isArray(acctIds) ? acctIds : [acctIds];
  if(!ids.length || !ids[0]) return [];
  const { data, error } = await sb.from("brec_matches").select("*")
    .eq("company_id", co).in("bank_account_id", ids)
    .is("deleted_at", null)
    .gte("txn_date", from).lte("txn_date", to);
  if(error) throw error;
  return data || [];
}
/* คืน id ของบัญชีทั้งหมด (รวมที่ลบไปแล้ว) ที่ "เลข normalize เดียวกัน"
   กับ acctId ที่เลือก — กัน bank rows กำพร้าใต้ account ที่ถูกลบ */
async function brecSiblingAccountIds(d, co, acctId){
  const sel = d.accounts.find(a=>a.id===acctId);
  if(!sel) return [acctId];
  const norm = String(sel.account_no||"").replace(/\D/g,"");
  const code = String(sel.bank_code||"").toUpperCase();
  // ดึงทุกบัญชีของ company รวมที่ soft-delete
  const { data:all } = await sb.from("bank_accounts").select("id,account_no,bank_code").eq("company_id", co);
  const ids = (all||[]).filter(a =>
    String(a.bank_code||"").toUpperCase()===code &&
    String(a.account_no||"").replace(/\D/g,"")===norm
  ).map(a=>a.id);
  return ids.length ? ids : [acctId];
}
function brecComputePeriod(d){
  if(d.period.mode === "month"){
    const ym = d.period.month || new Date().toISOString().slice(0,7);
    const [y,m] = ym.split("-").map(Number);
    const from = `${y}-${String(m).padStart(2,"0")}-01`;
    const last = new Date(y, m, 0).getDate();
    const to = `${y}-${String(m).padStart(2,"0")}-${String(last).padStart(2,"0")}`;
    return { from, to };
  }
  return { from: d.period.from || "1900-01-01", to: d.period.to || "2099-12-31" };
}
async function brecLoad(){
  const d = brecGet();
  d.busy = true;
  try{
    const co = await fopCompanyId();
    if(!co) throw new Error("หา company_id ไม่เจอ");
    d.companyId = co;
    d.accounts = await brecLoadAccounts(co);
    if(!d.accountId && d.accounts.length) d.accountId = d.accounts[0].id;
    if(d.accountId){
      const { from, to } = brecComputePeriod(d);
      const ids = await brecSiblingAccountIds(d, co, d.accountId);  // รวมบัญชีเลขเดียวกันที่แตก record (รวมที่ลบแล้ว)
      const [rows, matches] = await Promise.all([
        brecLoadRows(co, ids, from, to),
        brecLoadMatches(co, ids, from, to)
      ]);
      d.express = rows.express; d.bank = rows.bank; d.matches = matches;
    } else { d.express=[]; d.bank=[]; d.matches=[]; }
  } finally { d.busy = false; }
}

/* ---------- FILE UPLOAD ---------- */
async function brecPickFile(accept){
  return new Promise(res=>{
    const i = document.createElement("input"); i.type="file"; i.accept=accept;
    i.onchange = ()=> res(i.files[0]||null); i.click();
  });
}
async function brecUpload(kind){
  if(!brecCanWrite()){ alert("คุณไม่มีสิทธิ์ upload"); return; }
  const accept = kind==="express" ? ".xml" : ".xlsx,.xls";
  const file = await brecPickFile(accept);
  if(!file) return;
  const d = brecGet();
  const co = d.companyId || await fopCompanyId();
  if(!co){ alert("หา company_id ไม่เจอ"); return; }
  d.companyId = co;
  d.busy = true; brecRefresh();
  try{
    let parsed;
    if(kind === "express"){
      const text = await file.text();
      parsed = brecParseExpressXml(text);
    } else {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type:"array", cellDates:false });
      parsed = brecParseStatement(wb);
    }
    if(!parsed.rows.length) throw new Error("ไม่พบรายการในไฟล์");
    if(!parsed.accountNo) throw new Error("ไม่พบเลขบัญชีในไฟล์ — ตรวจสอบรูปแบบไฟล์");
    const acctId = await brecEnsureAccount(co, parsed.bankCode, parsed.accountNo);
    if(!acctId) throw new Error("สร้าง bank account ไม่สำเร็จ");
    // ★ Dedup ระดับแถว — อัป STM/Express ซ้ำงวดที่ทับกันได้ ระบบเก็บแค่ "แถวใหม่"
    //   → match/กระทบยอดที่ทำไว้ก่อนหน้ายังอยู่ครบ ไม่ต้องจับคู่ใหม่
    const rowTable = parsed.source === "express" ? "brec_express_rows" : "brec_bank_rows";
    const sigCols = parsed.source === "express"
      ? "txn_date,withdrawal,deposit,balance,doc_no"
      : "txn_date,withdrawal,deposit,balance,cheque_no,ref_note";
    const { data:existRows } = await sb.from(rowTable).select(sigCols)
      .eq("bank_account_id", acctId).is("deleted_at", null).limit(100000);
    const existSig = new Set((existRows||[]).map(r => brecRowSig(r, parsed.source)));
    const newRows = parsed.rows.filter(r => !existSig.has(brecRowSig(r, parsed.source)));
    const dupCount = parsed.rows.length - newRows.length;

    if(newRows.length === 0){
      alert(`ทุกแถว (${parsed.rows.length}) มีอยู่ในระบบแล้ว — ไม่มีรายการใหม่\n\nการจับคู่/กระทบยอดที่ทำไว้ก่อนหน้ายังอยู่ครบ ✓`);
      d.busy=false; brecRefresh(); return;
    }

    // Preview confirm — บอกชัดว่ามีใหม่กี่แถว ข้ามซ้ำกี่แถว
    const ok = confirm(
      `บัญชี: ${parsed.bankCode} ${parsed.accountNo}\n`+
      `งวด: ${parsed.periodFrom} → ${parsed.periodTo}\n\n`+
      `พบในไฟล์ ${parsed.rows.length} รายการ\n`+
      `• ใหม่ (จะนำเข้า): ${newRows.length}\n`+
      `• ซ้ำของเดิม (ข้าม): ${dupCount}\n\n`+
      `นำเข้าเฉพาะรายการใหม่ใช่ไหม? — รายการ/การจับคู่เดิมไม่ถูกแตะ`
    );
    if(!ok){ d.busy=false; brecRefresh(); return; }

    // import record — hash ใส่ timestamp ให้ unique เสมอ (dedup ทำที่ระดับแถวแล้ว)
    const hash = brecHash(file.name + "|" + file.size + "|" + parsed.rows.length + "|" + parsed.periodFrom + "|" + parsed.periodTo + "|" + Date.now());
    const { data:imp, error:ie } = await sb.from("brec_imports").insert({
      company_id: co, bank_account_id: acctId, source: parsed.source,
      filename: file.name, file_hash: hash,
      period_from: parsed.periodFrom, period_to: parsed.periodTo,
      row_count: newRows.length, status:"imported"
    }).select("id").single();
    if(ie) throw ie;
    const importId = imp.id;
    // chunk insert เฉพาะแถวใหม่
    const CHUNK = 500;
    for(let i=0;i<newRows.length;i+=CHUNK){
      const slice = newRows.slice(i,i+CHUNK).map(r => ({
        company_id: co, bank_account_id: acctId, import_id: importId, ...r
      }));
      const { error:re } = await sb.from(rowTable).insert(slice);
      if(re) throw re;
    }
    d.accountId = acctId;
    d.lastImport = imp.id;
    await brecLoad();
    // auto-run match หลัง upload — ผู้ใช้ไม่ต้องกดปุ่มเอง
    const proposed = brecAutoMatch(d.express, d.bank, d.matches);
    let matchedMsg = "";
    if(proposed.length){
      const inserts = proposed.map(p => ({ ...p, company_id: co, bank_account_id: acctId }));
      const { error:me } = await sb.from("brec_matches").insert(inserts);
      if(!me){
        matchedMsg = `\nจับคู่อัตโนมัติ ${proposed.length} คู่ — ดูในแท็บ "รอยืนยัน"`;
        d.tab = "pending";
        await brecLoad();
      }
    }
    brecRefresh();
    alert(`นำเข้ารายการใหม่ ${newRows.length} รายการ${dupCount?` (ข้ามซ้ำ ${dupCount})`:''}${matchedMsg}`);
  } catch(e){
    alert("Upload ล้มเหลว: "+(e.message||e));
    d.busy=false; brecRefresh();
  }
}

/* ล้างแถวซ้ำที่เกิดจากอัป STM/Express หลายครั้ง (ก่อนมี dedup ระดับแถว)
   — เก็บไว้ 1 แถวต่อลายเซ็น · ถ้าแถวไหนถูกจับคู่ไว้แล้วจะเก็บอันนั้นไว้เสมอ (ไม่ทำให้ match พัง) */
async function brecDedupExisting(){
  if(!brecCanWrite()){ alert("ไม่มีสิทธิ์"); return; }
  const d = brecGet();
  const co = d.companyId || await fopCompanyId();
  if(!co){ alert("หา company_id ไม่เจอ"); return; }
  if(!d.accountId){ alert("เลือกบัญชีก่อน"); return; }
  if(!confirm("ล้างแถวซ้ำของบัญชีนี้?\n\nเก็บไว้ 1 แถวต่อรายการ — แถวที่จับคู่/กระทบยอดไว้แล้วจะถูกเก็บไว้เสมอ")) return;
  d.busy = true; brecRefresh();
  try{
    const ids = await brecSiblingAccountIds(d, co, d.accountId);
    // โหลดทุกแถว (ไม่กรองงวด) + matches เพื่อรู้ว่าแถวไหนถูกจับคู่
    const [exRes, bkRes, mRes] = await Promise.all([
      sb.from("brec_express_rows").select("id,txn_date,withdrawal,deposit,balance,doc_no,raw_row,created_at").eq("company_id",co).in("bank_account_id",ids).is("deleted_at",null).limit(100000),
      sb.from("brec_bank_rows").select("id,txn_date,withdrawal,deposit,balance,cheque_no,ref_note,raw_row,created_at").eq("company_id",co).in("bank_account_id",ids).is("deleted_at",null).limit(100000),
      sb.from("brec_matches").select("express_row_id,bank_row_id").eq("company_id",co).in("bank_account_id",ids).is("deleted_at",null).limit(100000)
    ]);
    if(exRes.error) throw exRes.error;
    if(bkRes.error) throw bkRes.error;
    const matched = new Set();
    (mRes.data||[]).forEach(m=>{ if(m.express_row_id) matched.add("e:"+m.express_row_id); if(m.bank_row_id) matched.add("b:"+m.bank_row_id); });

    // หา id แถวที่ต้องลบ (เก็บแถว matched ไว้ก่อน, ที่เหลือเก็บอันแรกตาม raw_row/created_at)
    function findDupes(rows, source, mkey){
      const groups = new Map();
      for(const r of rows){
        const sig = brecRowSig(r, source);
        if(!groups.has(sig)) groups.set(sig, []);
        groups.get(sig).push(r);
      }
      const toDelete = [];
      for(const g of groups.values()){
        if(g.length < 2) continue;
        const isM = r => matched.has(mkey+":"+r.id);
        const hasMatched = g.some(isM);
        // ลบเฉพาะแถวที่ "ไม่ถูกจับคู่" — ถ้ามีแถว matched อยู่ ลบ unmatched ทั้งหมด
        // ถ้าไม่มี matched เลย เก็บอันแรก (เรียงตาม raw_row→created_at) ลบที่เหลือ
        const unmatched = g.filter(r=>!isM(r)).sort((a,b)=>(a.raw_row??1e9)-(b.raw_row??1e9) || String(a.created_at).localeCompare(String(b.created_at)));
        const start = hasMatched ? 0 : 1; // ไม่มี matched → เก็บอันแรกไว้
        for(let i=start;i<unmatched.length;i++) toDelete.push(unmatched[i].id);
      }
      return toDelete;
    }
    const exDel = findDupes(exRes.data||[], "express", "e");
    const bkDel = findDupes(bkRes.data||[], "bank", "b");
    if(!exDel.length && !bkDel.length){
      alert("ไม่พบแถวซ้ำ ✓");
      d.busy=false; brecRefresh(); return;
    }
    const ts = new Date().toISOString();
    const CH = 200;
    for(let i=0;i<exDel.length;i+=CH){ const {error}=await sb.from("brec_express_rows").update({deleted_at:ts}).in("id",exDel.slice(i,i+CH)); if(error) throw error; }
    for(let i=0;i<bkDel.length;i+=CH){ const {error}=await sb.from("brec_bank_rows").update({deleted_at:ts}).in("id",bkDel.slice(i,i+CH)); if(error) throw error; }
    await brecLoad(); brecRefresh();
    alert(`ล้างแถวซ้ำแล้ว ✓\n• Express: ${exDel.length} แถว\n• Bank: ${bkDel.length} แถว\n\nแถวที่จับคู่ไว้ยังอยู่ครบ`);
  }catch(e){
    alert("ล้างแถวซ้ำล้มเหลว: "+(e.message||e));
    d.busy=false; brecRefresh();
  }
}

/* รวมบัญชีซ้ำ (เลขเดียวกัน ต่างแค่รูปแบบขีด) → ย้ายรายการ/ยอด/การจับคู่ไปบัญชีหลัก แล้วซ่อนตัวซ้ำ */
function brecPickCanonical(g){
  // เก็บตัวที่ account_no มีขีด (อ่านง่าย) ก่อน ถ้าไม่มีก็เก็บตัวเก่าสุด
  const dashed = g.find(a => /-/.test(String(a.account_no||"")));
  if(dashed) return dashed;
  return g.slice().sort((a,b)=>String(a.created_at||"").localeCompare(String(b.created_at||"")))[0];
}
async function brecMergeDupAccounts(){
  if(!brecCanWrite()){ alert("ไม่มีสิทธิ์"); return; }
  const d = brecGet();
  const co = d.companyId || await fopCompanyId();
  if(!co){ alert("หา company_id ไม่เจอ"); return; }
  const { data:accts, error } = await sb.from("bank_accounts")
    .select("id,bank_code,account_no,created_at").eq("company_id",co).is("deleted_at",null);
  if(error){ alert("โหลดบัญชีไม่สำเร็จ: "+(error.message||error)); return; }
  const norm = s => String(s||"").replace(/\D/g,"");
  const groups = {};
  (accts||[]).forEach(a => { const k = String(a.bank_code||"").toUpperCase()+"|"+norm(a.account_no); (groups[k]=groups[k]||[]).push(a); });
  const dupGroups = Object.values(groups).filter(g => g.length>1);
  if(!dupGroups.length){ alert("ไม่พบบัญชีซ้ำ ✓"); return; }
  const summary = dupGroups.map(g => {
    const keep = brecPickCanonical(g);
    const drop = g.filter(a=>a.id!==keep.id).map(a=>a.account_no);
    return `• ${cffBankName(keep.bank_code)} ${keep.account_no}\n   เก็บ: ${keep.account_no} · รวม: ${drop.join(", ")}`;
  }).join("\n");
  if(!confirm("พบบัญชีซ้ำ — รวมเป็นบัญชีเดียว?\n\n"+summary+"\n\nย้ายรายการ/ยอด/การจับคู่ไปบัญชีหลัก แล้วซ่อนบัญชีซ้ำ")) return;
  d.busy=true; brecRefresh();
  try{
    let merged=0;
    const ts = new Date().toISOString();
    for(const g of dupGroups){
      const keep = brecPickCanonical(g);
      for(const a of g){
        if(a.id===keep.id) continue;
        // ย้าย child rows ทุกตารางไปบัญชีหลัก (best effort — บางตารางอาจไม่มี/ชน constraint ก็ข้าม)
        for(const tbl of ["brec_imports","brec_express_rows","brec_bank_rows","brec_matches","bank_balances","brec_mp_imports","brec_mp_withdrawals"]){
          await sb.from(tbl).update({ bank_account_id: keep.id }).eq("bank_account_id", a.id);
        }
        await sb.from("bank_accounts").update({ deleted_at: ts }).eq("id", a.id);
        merged++;
      }
    }
    if(d.accountId && !(accts||[]).some(a=>a.id===d.accountId && !dupGroups.flat().some(x=>x.id===a.id))){
      // ถ้าบัญชีที่เลือกอยู่ถูกรวม → สลับไปบัญชีหลักของกลุ่มแรก
      const firstKeep = brecPickCanonical(dupGroups[0]);
      if(dupGroups.flat().some(x=>x.id===d.accountId)) d.accountId = firstKeep.id;
    }
    await brecLoad(); brecRefresh();
    alert(`รวมบัญชีซ้ำแล้ว ✓ (รวม ${merged} บัญชีซ้ำ)\n\nถ้ายังเห็นแถวซ้ำหลังรวม กดปุ่ม "ล้างแถวซ้ำ" อีกครั้ง`);
  }catch(e){ alert("รวมไม่สำเร็จ: "+(e.message||e)); d.busy=false; brecRefresh(); }
}

/* ---------- ACTIONS ---------- */
async function brecRunAutoMatch(){
  if(!brecCanWrite()){ alert("ไม่มีสิทธิ์"); return; }
  const d = brecGet();
  const co = d.companyId || await fopCompanyId();
  if(!co){ alert("หา company_id ไม่เจอ"); return; }
  d.companyId = co;
  if(!d.accountId){ alert("เลือกบัญชีก่อน"); return; }
  d.busy = true; brecRefresh();
  try{
    const proposed = brecAutoMatch(d.express, d.bank, d.matches);
    if(!proposed.length){ alert("ไม่พบรายการใหม่ที่จับคู่ได้"); d.busy=false; brecRefresh(); return; }
    const inserts = proposed.map(p => ({ ...p, company_id: co, bank_account_id: d.accountId }));

  } catch(e){
    alert("จับคู่ล้มเหลว: "+(e.message||e));

}

}

/* ---------- BUCKETS ---------- */
function brecBuildBuckets(d){
  const exById = new Map(d.express.map(r=>[r.id,r]));
  const bkById = new Map(d.bank.map(r=>[r.id,r]));
  const usedEx = new Set(), usedBk = new Set();
  const pending = [], confirmed = [];
  for(const m of d.matches){
    const ex = exById.get(m.express_row_id);
    const bk = bkById.get(m.bank_row_id);
    if(ex) usedEx.add(ex.id);
    if(bk) usedBk.add(bk.id);
    const pair = { m, ex, bk };
    if(m.status === "confirmed") confirmed.push(pair);
    else pending.push(pair);
  }
  const exOnly = d.express.filter(r=>!usedEx.has(r.id));
  const bkOnly = d.bank.filter(r=>!usedBk.has(r.id));
  return { pending, confirmed, exOnly, bkOnly, matched: [...pending, ...confirmed] };
}

/* ---------- STM (bank statement) stats + filter ---------- */
function brecStmStats(d){
  const rows = d.bank || [];
  let inN=0, inSum=0, outN=0, outSum=0;
  for(const r of rows){
    const dep = Number(r.deposit)||0, wd = Number(r.withdrawal)||0;
    if(dep>0){ inN++; inSum+=dep; }
    if(wd>0){ outN++; outSum+=wd; }
  }
  // ยอดยกมา = balance ของแถวแรก − (เงินเข้าแถวแรก − เงินออกแถวแรก)
  let opening = null;
  const sorted = rows.filter(r=>r.balance!=null).slice()
    .sort((a,b)=> (a.txn_date||"").localeCompare(b.txn_date||"") || (a.raw_row||0)-(b.raw_row||0));
  if(sorted.length){
    const f = sorted[0];
    opening = +(Number(f.balance||0) - (Number(f.deposit)||0) + (Number(f.withdrawal)||0)).toFixed(2);
  }
  return { inN, inSum:+inSum.toFixed(2), outN, outSum:+outSum.toFixed(2), opening, total: rows.length };
}
/* ใช้ filter dir + q กับ bank rows */
function brecStmFilterRows(d, rows){
  const f = d.stmFilter || { dir:"all", q:"" };
  const q = (f.q||"").trim().toLowerCase();
  return rows.filter(r => {
    if(f.dir === "in" && !(Number(r.deposit)>0)) return false;
    if(f.dir === "out" && !(Number(r.withdrawal)>0)) return false;
    if(q){
      const text = `${r.description||""} ${r.tr_desc||""} ${r.ref_note||""} ${r.cheque_no||""}`.toLowerCase();
      if(!text.includes(q)) return false;
    }
    return true;
  });
}
function brecSetStmFilter(kind, val){
  const d = brecGet();
  if(kind==="dir") d.stmFilter.dir = val;
  else if(kind==="q") d.stmFilter.q = val;
  // q ใช้ restore focus กัน input หลุด
  if(kind==="q"){
    const caret = (document.getElementById("brecStmQ")||{}).selectionStart;

    requestAnimationFrame(()=>{ const n=document.getElementById("brecStmQ"); if(n){ n.focus(); if(caret!=null) try{n.setSelectionRange(caret,caret);}catch(e){} } });
  } else renderToolBankRec();
}

async function renderToolBankRec(){
  const t = TOOLS.find(x=>x.id==="bankrec");
  const co = COMPANIES.find(c=>c.id===state.company);
  const main = document.getElementById("main");
  const d = brecGet();
  brecInjectCSS();

  if(!d.accounts.length && !d.busy){
    // initial load
    main.innerHTML = `<div class="page-head"><h1>${esc(t.name)} <span class="badge">${esc(co.name)}</span></h1><div class="sub">กำลังโหลด...</div></div>`;
    try{ await brecLoad(); }catch(e){
      main.innerHTML = `<div class="page-head"><h1>${esc(t.name)}</h1></div><div class="card"><div style="color:var(--bad,#dc2626)">โหลดไม่สำเร็จ: ${esc(e.message||e)}</div></div>`;
      return;
    }
  }

  const buckets = brecBuildBuckets(d);
  const sumEx = d.express.reduce((s,r)=>s + brecSignedAmt(r), 0);
  const sumBk = d.bank.reduce((s,r)=>s + brecSignedAmt(r), 0);
