/* กราฟ Waterfall "เงินสดเดินทางอย่างไร" — ต้นงวด → ดำเนินงาน → ลงทุน → จัดหาเงิน → ปลายงวด
   แท่งกิจกรรมลอย (บวก=เขียว/ลบ=แดง) · แท่งยอดรวมเต็ม (น้ำเงิน) · คลิกแท่งกิจกรรมดูรายการ */
function edCashWaterfall(A, acts){
  const opening = A.opening, closing = A.closing;
  const op = acts[0].net, inv = acts[1].net, fin = acts[2].net;
  let run = opening;
  const steps = [{ label:"ต้นงวด", kind:"total", val:opening, bottom:Math.min(0,opening), top:Math.max(0,opening) }];
  const flow = (label, key, delta) => { const b=Math.min(run,run+delta), t=Math.max(run,run+delta); steps.push({label,key,kind:"flow",delta,bottom:b,top:t}); run+=delta; };
  flow("ดำเนินงาน","operating",op); flow("ลงทุน","investing",inv); flow("จัดหาเงิน","financing",fin);
  steps.push({ label:"ปลายงวด", kind:"total", val:closing, bottom:Math.min(0,closing), top:Math.max(0,closing) });

  const H = 230;
  const hi = Math.max(...steps.map(s=>s.top), 0);
  const lo = Math.min(...steps.map(s=>s.bottom), 0);
  const span = (hi - lo) || 1;
  const y = v => (v - lo) / span * H;                 // ค่า → พิกัดจากล่าง

  const bars = steps.map(s => {
    const barH = Math.max(3, y(s.top) - y(s.bottom));
    const off  = y(s.bottom);
    let grad, valColor, valTxt;
    if(s.kind==="total"){
      grad = "linear-gradient(180deg,#4f8af7,#2563eb)"; valColor = "#1e3a8a";
      valTxt = "฿" + edFmtCompact(s.val);
    } else {
      const pos = s.delta >= 0;
      grad = pos ? "linear-gradient(180deg,#34d399,#10b981)" : "linear-gradient(180deg,#f87171,#ef4444)";
      valColor = pos ? "#0d9488" : "#dc2626";
      valTxt = (pos?"+":"−") + "฿" + edFmtCompact(Math.abs(s.delta));
    }
    const clickable = s.kind==="flow";
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center">
      <div style="position:relative;width:100%;height:${H}px">
        <div ${clickable?`onclick="edDrillActivity('${s.key}')"`:""} style="position:absolute;left:16%;right:16%;bottom:${off}px;height:${barH}px;background:${grad};border-radius:6px;${clickable?"cursor:pointer":""};box-shadow:0 4px 10px rgba(31,42,68,.12)" ${clickable?`onmouseover="this.style.filter='brightness(1.06)'" onmouseout="this.style.filter='none'"`:""}>
          <span style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:12.5px;font-weight:700;white-space:nowrap;color:${valColor}">${valTxt}</span>
        </div>
      </div>
      <div style="margin-top:9px;font-size:12.5px;color:#64748b;font-weight:600;text-align:center">${s.label}${clickable?'<span style="display:block;font-size:10px;color:#a3b3bb;font-weight:500">กดดู ›</span>':''}</div>
    </div>`;
  }).join("");

  return `<div class="card" style="margin-bottom:0">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <h3 style="font-size:18px">💧 เงินสดเดินทางอย่างไร <span style="font-weight:400;color:#94a3b8;font-size:13px">Cash Flow Waterfall</span></h3>
      <span style="font-size:11.5px;color:#94a3b8;white-space:nowrap;margin-top:5px">กดแท่งกิจกรรมเพื่อดูรายการ</span>
    </div>
    <div style="display:flex;align-items:flex-end;gap:8px;margin-top:28px;padding:0 4px">${bars}</div>
  </div>`;
}
function edTopList(byCat, dir){
  // หักลบรับ-จ่ายในหมวดเดียวกันก่อน (net) → หมวด net บวก = รายรับ · net ลบ = รายจ่าย
  // กันยอดรับเล็กๆ ในหมวดจ่าย (เช่น refund) ไปโผล่ฝั่งรายรับ
  const arr = Object.entries(byCat).map(([k,v])=>{
    const net = (v.in||0) - (v.out||0);
    return {k, net, v:Math.abs(net)};
  }).filter(x => dir==="in" ? x.net > 0.005 : x.net < -0.005)
    .sort((a,b)=>b.v-a.v).slice(0,10);
  const total = arr.reduce((s,x)=>s+x.v,0);
  const color = dir==="in" ? ED_COLORS.in : ED_COLORS.out;
  const title = dir==="in" ? "หมวดรายรับ" : "หมวดรายจ่าย";
  const titleEn = dir==="in" ? "Receipts" : "Payments";
  const titleHtml = `<div style="font-weight:700;font-size:15px;color:${color};margin-bottom:9px">${title} <span style="font-weight:400;color:#94a3b8;font-size:12px">${titleEn}</span></div>`;
  if(!arr.length) return `<div>${titleHtml}<div class="empty" style="padding:14px">ไม่มีข้อมูล</div></div>`;
  return `<div>
    ${titleHtml}
    ${arr.map(x => {
      const pct = total ? (x.v/total*100).toFixed(1) : 0;
      return `<div style="margin-bottom:9px;cursor:pointer" onclick="edDrillCat(${JSON.stringify(x.k).replace(/"/g,'&quot;')},'${dir}')">
        <div style="display:flex;justify-content:space-between;gap:10px;font-size:13.5px;margin-bottom:3px"><span style="color:var(--ink-2)">${esc(x.k)}</span><span style="color:${color};font-weight:700;white-space:nowrap">${edFmt(x.v)}</span></div>
        <div style="height:7px;background:#e2e8f0;border-radius:999px;overflow:hidden"><div style="height:100%;background:${color};width:${pct}%"></div></div>
      </div>`;
    }).join("")}
  </div>`;
}

/* ---------- KPI ทางการเงิน (Summary tab — ต่อจาก Top 5) ---------- */
function edRenderFinKpis(A, data, monthFilter){
  const months = data.months || [];
  const nMonths = Math.max(1, edScopeMonthKeys(data, monthFilter).length);
  const op = A.byAct.operating || { in:0, out:0 };
  const opNet = op.in - op.out;

  // หา cost ของหมวด เงินเดือน/ค่าจ้าง + โฆษณา/อินฟลู (regex บนชื่อหมวด)
  let empCost = 0, adCost = 0;
  for(const [k, v] of Object.entries(A.byCat || {})){
    if(/เงินเดือน|ค่าจ้าง|พนักงาน|salary|wage/i.test(k)) empCost += v.out;
    if(/โฆษณา|อินฟลู|ads?\b|advert|influencer/i.test(k)) adCost += v.out;
  }

  // ratios
  const cashMargin = A.totalIn > 0 ? (A.net / A.totalIn * 100) : null;
  const opRatio    = op.in > 0 ? (opNet / op.in * 100) : null;
  const burn       = A.totalOut / nMonths;
  const avgIn      = A.totalIn / nMonths;
  const opExRatio  = op.in > 0 ? (op.out / op.in * 100) : null;
  const empRatio   = op.in > 0 ? (empCost / op.in * 100) : null;
  const adRatio    = op.in > 0 ? (adCost  / op.in * 100) : null;

  // period label — แบบในภาพ "ตลอดปี 2568"
  let periodLabel = "ตลอดทั้งช่วง";
  if(monthFilter && monthFilter.startsWith("year:")){
    periodLabel = "ตลอดปี " + (Number(monthFilter.slice(5)) + 543);
  } else if(monthFilter !== "all"){
    periodLabel = "เดือน " + monthFilter;
  } else if(months.length){
    const yrs = [...new Set(months.map(m => m.key.slice(0,4)))];
    if(yrs.length === 1) periodLabel = "ตลอดปี " + (parseInt(yrs[0]) + 543);
    else periodLabel = "ตลอด " + months.length + " เดือน · " + (parseInt(yrs[0])+543) + "–" + (parseInt(yrs[yrs.length-1])+543);
  }

  // helpers
  const fmtPct = (v) => v == null ? "—" : (v >= 0 ? "" : "") + v.toFixed(1) + "%";
  const fmtCompactM = (n) => {
    const a = Math.abs(n);
    if(a >= 1e6) return ((n/1e6).toFixed(2)) + " ล้าน";
    if(a >= 1e3) return ((n/1e3).toFixed(1)) + " K";
    return n.toFixed(0);
  };
  const goodColor = ED_COLORS.in;     // teal/ฟ้า — ดี
  const badColor  = "#dc2626";        // แดง — แย่/ติดลบ/จ่าย (ตรงกับ negative=red ทั้งระบบ)
  const neuColor  = "#0f172a";

  // benchmark eval: pass {value, good, ok, dir} dir='hi' = ยิ่งสูงยิ่งดี, 'lo' = ยิ่งต่ำยิ่งดี
  const evalBench = (v, good, ok, dir) => {
    if(v == null) return neuColor;
    if(dir === "hi"){
      if(v >= good) return goodColor;
      if(v >= ok)   return "#f59e0b";
      return badColor;
    } else {
      if(v <= ok)   return goodColor;
      if(v <= good) return "#f59e0b";
      return badColor;
    }
  };

  // ป้ายชื่อ ไทย + อังกฤษ
  const lbl = (th, en) => `${th} <span style="font-weight:400;color:#94a3b8;font-size:11.5px">${en}</span>`;

  // single KPI card — คลิกได้ → drill modal
  const card = (kpiKey, label, value, color, sub, bench, ref) => `
    <div onclick="edDrillFinKpi('${kpiKey}')" style="background:rgba(255,255,255,.85);backdrop-filter:blur(6px);border:1px solid #c3dafe;border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:.15s" onmouseover="this.style.borderColor='${ED_COLORS.brand}';this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 12px rgba(0,0,0,.06)'" onmouseout="this.style.borderColor='#c3dafe';this.style.transform='none';this.style.boxShadow='none'">
      <div style="font-size:13px;font-weight:700;color:#475569">${label}</div>
      <div style="font-size:30px;font-weight:800;color:${color};letter-spacing:-.4px;margin-top:3px">${value}</div>
      ${sub?`<div style="font-size:12.5px;color:#64748b">${sub}</div>`:""}
      ${bench?`<div style="margin-top:7px;padding:5px 9px;background:rgba(99,102,241,.07);border:1px solid #e0e7ff;border-radius:6px;font-size:12px;color:#475569;align-self:flex-start;display:flex;align-items:center;gap:9px;flex-wrap:wrap"><span>เกณฑ์มาตรฐาน: ${bench}</span>${ref?`<a href="${ref}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" title="เปิดหน้ามาตรฐานต้นทาง (Investopedia) ในแท็บใหม่" style="display:inline-flex;align-items:center;gap:4px;padding:4px 11px;background:#4f46e5;color:#fff;font-weight:700;font-size:11.5px;border-radius:999px;text-decoration:none;white-space:nowrap;cursor:pointer">↗ ดูที่มา</a>`:''}</div>`:""}
    </div>`;

  return `
    <div class="card" style="margin-top:14px">
      <h3 style="font-size:18px">📊 KPI ทางการเงิน <span style="font-weight:400;color:#94a3b8;font-size:13.5px">Financial KPIs</span></h3>
      <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px">
        ${card("totalIn",  lbl("รายรับรวม","Total Receipts"), fmtCompactM(A.totalIn), goodColor, periodLabel, "")}
        ${card("totalOut", lbl("รายจ่ายรวม","Total Payments"), fmtCompactM(A.totalOut), badColor, periodLabel, "")}
        ${card("net",      lbl("กระแสเงินสดสุทธิ","Net Cash Flow"), fmtCompactM(A.net), A.net>=0?goodColor:badColor, "รับ - จ่าย", "")}

        ${card("cashMargin", lbl("อัตรากำไรเงินสด","Cash Margin"),
          fmtPct(cashMargin),
          evalBench(cashMargin, 10, 5, "hi"),
          "Net / Total Income",
          "ไม่ต่ำกว่า 5% (ดี) / ไม่ต่ำกว่า 10% (ยอดเยี่ยม)",
          "https://www.investopedia.com/terms/n/net_margin.asp")}

        ${card("opRatio", lbl("อัตราส่วนเงินสดดำเนินงาน","Operating Cash Flow Ratio"),
          fmtPct(opRatio),
          evalBench(opRatio, 100, 50, "hi"),
          "Op Net / Op Income",
          "ไม่ต่ำกว่า 50% (ดี) / ไม่ต่ำกว่า 100% (แข็งแกร่ง)",
          "https://www.investopedia.com/terms/o/operatingcashflowratio.asp")}

        ${card("burn", lbl("อัตราใช้เงินสด/เดือน","Cash Burn Rate"),
          fmtCompactM(burn) + "/เดือน",
          burn <= avgIn ? goodColor : badColor,
          "ค่าใช้จ่ายดำเนินงานเฉลี่ย",
          "ควรต่ำกว่ายอดรายรับ/เดือน",
          "https://www.investopedia.com/terms/b/burnrate.asp")}

        ${card("opExRatio", lbl("ค่าใช้จ่ายต่อยอดขาย","Op Expense Ratio"),
          fmtPct(opExRatio),
          evalBench(opExRatio, 100, 80, "lo"),
          "Op Expense / Op Income",
          "ไม่เกิน 80%",
          "https://www.investopedia.com/terms/o/operatingratio.asp")}

        ${card("empRatio", lbl("สัดส่วนค่าใช้จ่ายพนักงาน","Payroll Ratio"),
          fmtPct(empRatio),
          evalBench(empRatio, 50, 30, "lo"),
          "เงินเดือน / รายรับดำเนินงาน",
          "ไม่เกิน 30%")}

        ${card("adRatio", lbl("สัดส่วนค่าโฆษณาต่อยอดขาย","Ad Spend Ratio"),
          fmtPct(adRatio),
          evalBench(adRatio, 30, 20, "lo"),
          "ค่าโฆษณา / รายรับดำเนินงาน",
          "ไม่เกิน 20%")}
      </div>
      <div style="margin-top:13px;padding-top:11px;border-top:1px dashed #e2e8f0;font-size:11px;color:#94a3b8;line-height:1.65">
        <b style="color:#64748b">ที่มาของเกณฑ์มาตรฐาน:</b> ค่าอ้างอิงเป็น “rule of thumb” ทั่วไปจากการวิเคราะห์อัตราส่วนทางการเงิน (financial ratio analysis) ซึ่งแตกต่างกันตามอุตสาหกรรม — ใช้เป็นแนวเทียบเบื้องต้น ไม่ใช่เกณฑ์ตายตัว:
        <br>• <b>อัตรากำไรเงินสด / Net Margin</b> ≥ 5–10% — เกณฑ์อัตรากำไรสุทธิทั่วไป
        &nbsp;•&nbsp; <b>Operating Cash Flow Ratio</b> ≥ 1.0 (100%) = กระแสเงินสดจากการดำเนินงานครอบคลุมภาระระยะสั้น
        &nbsp;•&nbsp; <b>Cash Burn</b> ควรต่ำกว่ารายรับเฉลี่ยต่อเดือน

/* ---------- Drill: KPI ทางการเงิน — แสดงสูตร + ตัวตั้ง/ตัวหาร + รายการที่มา ---------- */
function edDrillFinKpi(kpiKey){
  const d = edState();
  const A = edAgg(d.data, d.monthFilter, true);  // ★ exclude transfers
  const months = d.data.months || [];
  const nMonths = Math.max(1, edScopeMonthKeys(d.data, d.monthFilter).length);
  const op = A.byAct.operating || { in:0, out:0 };
  const opNet = op.in - op.out;

  // categorize emp/ad
  const empCats = [], adCats = [];
  let empCost = 0, adCost = 0;
  for(const [k, v] of Object.entries(A.byCat || {})){
    if(/เงินเดือน|ค่าจ้าง|พนักงาน|salary|wage/i.test(k)) { empCost += v.out; empCats.push({ k, v }); }
    if(/โฆษณา|อินฟลู|ads?\b|advert|influencer/i.test(k)) { adCost  += v.out; adCats.push ({ k, v }); }
  }
  empCats.sort((a,b) => b.v.out - a.v.out);
  adCats .sort((a,b) => b.v.out - a.v.out);

  // monthly breakdown (for burn rate) — ตาม scope ที่เลือก
  const monthlyOut = edScopeMonthKeys(d.data, d.monthFilter).map(mk => ({
    month: mk,
    out: edTxsInScope(d.data, mk, true).reduce((s,t) => s + t.out, 0)  // ★ exclude transfers
  }));

  // 3 อันแรก = single value → route ไปที่ existing drill
  if(kpiKey === "totalIn")  return edDrillSummary("in");
  if(kpiKey === "totalOut") return edDrillSummary("out");
  if(kpiKey === "net")      return edDrillSummary("net");

  // SPECS ของ 6 ratio
  const SPECS = {
    cashMargin: {
      title: "อัตรากำไรเงินสด · Cash Margin",
      formula: "กระแสเงินสดสุทธิ ÷ รายรับรวม × 100",
      numLabel: "ตัวตั้ง: กระแสเงินสดสุทธิ (Net)",
      numValue: A.net,
      denLabel: "ตัวหาร: รายรับรวม (Total Income)",
      denValue: A.totalIn,
      result: A.totalIn > 0 ? (A.net / A.totalIn * 100) : null,
      bench: "≥5% (ดี) / ≥10% (ยอดเยี่ยม)",
      desc: "ทุก 100 บาทของรายรับ เหลือเป็นเงินสดสุทธิกี่บาท — ยิ่งสูงยิ่งดี",
      extra: ""
    },
    opRatio: {
      title: "Operating Cash Flow Ratio · OCF",
      formula: "(Op Income − Op Expense) ÷ Op Income × 100",
      numLabel: "ตัวตั้ง: ดำเนินงานสุทธิ (Op Net)",
      numValue: opNet,
      denLabel: "ตัวหาร: รายรับดำเนินงาน (Op Income)",
      denValue: op.in,
      result: op.in > 0 ? (opNet / op.in * 100) : null,
      bench: "≥50% (ดี) / ≥100% (แข็งแกร่ง)",
      desc: "เฉพาะกิจกรรมดำเนินงาน (Operating) — ไม่รวม ลงทุน / จัดหาเงิน",
      extra: `<div style="margin-top:8px;font-size:11.5px;color:#475569">รายละเอียด: Op Income ${edFmt(op.in)} − Op Expense ${edFmt(op.out)} = <b>${edFmt(opNet)}</b></div>`
    },
    burn: {
      title: "Cash Burn Rate · อัตราเผาเงิน",
      formula: "รายจ่ายรวม ÷ จำนวนเดือน",
      numLabel: "ตัวตั้ง: รายจ่ายรวม (Total Expense)",
      numValue: A.totalOut,
      denLabel: "ตัวหาร: จำนวนเดือนในช่วง",
      denValue: nMonths,
      result: A.totalOut / nMonths,
      bench: "ควรต่ำกว่ายอดรายรับ/เดือน (" + edFmt(A.totalIn / nMonths) + ")",
      desc: "ค่าใช้จ่ายเฉลี่ยต่อเดือน — ใช้วัดว่าเงินสดจะอยู่ได้กี่เดือน",
      isAvg: true,
      extra: `<div style="margin-top:10px"><div style="font-size:11.5px;font-weight:700;color:#475569;margin-bottom:4px">รายจ่ายแยกตามเดือน:</div><table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="background:#f8fafc"><th style="text-align:left;padding:5px 8px;color:#475569;font-weight:600">เดือน</th><th style="text-align:right;padding:5px 8px;color:#475569;font-weight:600">รายจ่าย</th></tr></thead>
        <tbody>${monthlyOut.map(m => `<tr><td style="padding:5px 8px;border-top:1px solid #e2e8f0">${esc(m.month)}</td><td style="padding:5px 8px;text-align:right;border-top:1px solid #e2e8f0;color:${ED_COLORS.out};font-weight:600">${edFmt(m.out)}</td></tr>`).join("")}
        <tr style="background:#f1f5f9;font-weight:700"><td style="padding:6px 8px">รวม / เฉลี่ย</td><td style="padding:6px 8px;text-align:right">${edFmt(A.totalOut)} / <b>${edFmt(A.totalOut/nMonths)}</b></td></tr></tbody>
      </table></div>`
    },
    opExRatio: {
      title: "ค่าใช้จ่ายต่อยอดขาย · OpEx Ratio",
      formula: "Op Expense ÷ Op Income × 100",
      numLabel: "ตัวตั้ง: รายจ่ายดำเนินงาน (Op Expense)",
      numValue: op.out,
      denLabel: "ตัวหาร: รายรับดำเนินงาน (Op Income)",
      denValue: op.in,
      result: op.in > 0 ? (op.out / op.in * 100) : null,
      bench: "≤80% (จัดการต้นทุนได้ดี)",
      desc: "ทุก 100 บาทของรายรับ มีต้นทุนดำเนินงานกี่บาท — ยิ่งต่ำยิ่งดี",
      extra: ""
    },
    empRatio: {
      title: "สัดส่วนค่าใช้จ่ายพนักงาน · Staff Cost",
      formula: "ค่าใช้จ่ายพนักงาน ÷ Op Income × 100",
      numLabel: "ตัวตั้ง: ค่าใช้จ่ายพนักงาน (จากหมวด)",
      numValue: empCost,
      denLabel: "ตัวหาร: รายรับดำเนินงาน (Op Income)",
      denValue: op.in,
      result: op.in > 0 ? (empCost / op.in * 100) : null,
      bench: "≤30%",
      desc: "หมวดที่ match regex: 'เงินเดือน', 'ค่าจ้าง', 'พนักงาน', 'salary', 'wage'",
      extra: empCats.length ? `<div style="margin-top:10px"><div style="font-size:11.5px;font-weight:700;color:#475569;margin-bottom:4px">หมวดที่นับเป็น 'ค่าใช้จ่ายพนักงาน' (${empCats.length} หมวด):</div><table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="background:#f8fafc"><th style="text-align:left;padding:5px 8px;color:#475569;font-weight:600">หมวด</th><th style="text-align:right;padding:5px 8px;color:#475569;font-weight:600">จำนวน</th><th style="text-align:right;padding:5px 8px;color:#475569;font-weight:600">ยอดจ่าย</th></tr></thead>
        <tbody>${empCats.map(c => `<tr style="cursor:pointer" onclick="edDrillCat(${JSON.stringify(c.k).replace(/"/g,'&quot;')},'out');event.stopPropagation()"><td style="padding:5px 8px;border-top:1px solid #e2e8f0">${esc(c.k)}</td><td style="padding:5px 8px;text-align:right;border-top:1px solid #e2e8f0;color:#64748b">${c.v.count}</td><td style="padding:5px 8px;text-align:right;border-top:1px solid #e2e8f0;color:${ED_COLORS.out};font-weight:600">${edFmt(c.v.out)}</td></tr>`).join("")}
        <tr style="background:#f1f5f9;font-weight:700"><td style="padding:6px 8px" colspan="2">รวม</td><td style="padding:6px 8px;text-align:right">${edFmt(empCost)}</td></tr></tbody>
      </table></div>` : '<div style="margin-top:10px;padding:12px;background:#f8fafc;border-radius:6px;font-size:12px;color:#64748b;text-align:center">ไม่พบหมวด \'เงินเดือน/ค่าจ้าง/พนักงาน\' ในช่วงนี้</div>'
    },
    adRatio: {
      title: "สัดส่วนค่าโฆษณาต่อยอดขาย · Ad Ratio",
      formula: "ค่าโฆษณา ÷ Op Income × 100",
      numLabel: "ตัวตั้ง: ค่าโฆษณา (จากหมวด)",
      numValue: adCost,
      denLabel: "ตัวหาร: รายรับดำเนินงาน (Op Income)",
      denValue: op.in,
      result: op.in > 0 ? (adCost / op.in * 100) : null,
      bench: "≤20%",
      desc: "หมวดที่ match regex: 'โฆษณา', 'อินฟลูเอนเซอร์', 'ads', 'advertis', 'influencer'",
      extra: adCats.length ? `<div style="margin-top:10px"><div style="font-size:11.5px;font-weight:700;color:#475569;margin-bottom:4px">หมวดที่นับเป็น 'ค่าโฆษณา' (${adCats.length} หมวด):</div><table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="background:#f8fafc"><th style="text-align:left;padding:5px 8px;color:#475569;font-weight:600">หมวด</th><th style="text-align:right;padding:5px 8px;color:#475569;font-weight:600">จำนวน</th><th style="text-align:right;padding:5px 8px;color:#475569;font-weight:600">ยอดจ่าย</th></tr></thead>
        <tbody>${adCats.map(c => `<tr style="cursor:pointer" onclick="edDrillCat(${JSON.stringify(c.k).replace(/"/g,'&quot;')},'out');event.stopPropagation()"><td style="padding:5px 8px;border-top:1px solid #e2e8f0">${esc(c.k)}</td><td style="padding:5px 8px;text-align:right;border-top:1px solid #e2e8f0;color:#64748b">${c.v.count}</td><td style="padding:5px 8px;text-align:right;border-top:1px solid #e2e8f0;color:${ED_COLORS.out};font-weight:600">${edFmt(c.v.out)}</td></tr>`).join("")}
        <tr style="background:#f1f5f9;font-weight:700"><td style="padding:6px 8px" colspan="2">รวม</td><td style="padding:6px 8px;text-align:right">${edFmt(adCost)}</td></tr></tbody>
      </table></div>` : '<div style="margin-top:10px;padding:12px;background:#f8fafc;border-radius:6px;font-size:12px;color:#64748b;text-align:center">ไม่พบหมวด \'โฆษณา/อินฟลู\' ในช่วงนี้</div>'
    }
  };

  const s = SPECS[kpiKey];
  if(!s) return;

  const fmtVal = (v, isAvg) => {
    if(typeof v === "number" && !isAvg && Math.abs(v) >= 100) return edFmt(v);
    if(typeof v === "number") return v.toLocaleString("th-TH",{maximumFractionDigits:2});
    return v;
  };
  const passColor = s.result == null ? "#0f172a" : (s.result >= 0 ? ED_COLORS.in : ED_COLORS.out);

  // Modal
  const m = document.createElement("div");
  m.id = "edDrillModal";
  m.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:1100;display:flex;align-items:flex-start;justify-content:center;padding:30px 20px;overflow:auto";

        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:${ED_COLORS.brand};text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">KPI · ที่มาของตัวเลข</div>
          <div style="font-size:17px;font-weight:800;color:#0f172a">${esc(s.title)}</div>
          <div style="font-size:12px;color:#64748b;margin-top:3px">${esc(s.desc)}</div>
        </div>
        <button onclick="document.getElementById('edDrillModal').remove()" style="background:transparent;border:1px solid #cbd5e1;border-radius:6px;padding:5px 10px;cursor:pointer;color:#475569;font-size:12px">✕ ปิด</button>
      </div>

      <!-- สูตร -->
      <div style="background:linear-gradient(135deg,#eef2ff,#e0e7ff);border-radius:10px;padding:14px 16px;margin-bottom:12px">
        <div style="font-size:10.5px;font-weight:700;color:#4338ca;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">📐 สูตร</div>
        <div style="font-size:14px;font-weight:600;color:#1e1b4b">${esc(s.formula)}</div>
      </div>

      <!-- ตัวเลข -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:10px;margin-bottom:14px">
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px">
          <div style="font-size:10.5px;color:#64748b;font-weight:600">${esc(s.numLabel)}</div>
          <div style="font-size:18px;font-weight:800;color:${s.numValue<0?ED_COLORS.out:'#0f172a'};margin-top:3px">${fmtVal(s.numValue)}</div>
        </div>
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px">
          <div style="font-size:10.5px;color:#64748b;font-weight:600">${esc(s.denLabel)}</div>
          <div style="font-size:18px;font-weight:800;color:#0f172a;margin-top:3px">${fmtVal(s.denValue)}</div>
        </div>
        <div style="background:${passColor};color:#fff;border-radius:10px;padding:12px">
          <div style="font-size:10.5px;font-weight:700;opacity:.9">= ผลลัพธ์</div>
          <div style="font-size:22px;font-weight:800;margin-top:3px;letter-spacing:-.3px">${s.result==null?"—":(s.isAvg?edFmt(s.result):s.result.toFixed(2)+"%")}</div>
          <div style="font-size:10.5px;opacity:.85;margin-top:2px">เกณฑ์: ${esc(s.bench)}</div>
        </div>
      </div>

      ${s.extra || ""}
    </div>`;
  document.body.appendChild(m);
  m.onclick = e => { if(e.target === m) m.remove(); };
}

/* ---------- Tab 2: Activity ---------- */
function edRenderActivity(){
  const d = edState();
  const data = d.data;
  const months = data.months.map(m=>m.key);
  // per month per activity (net)
  // สีพาสเทลตามธีมบริษัท — โทนเดียวกับ Summary (เข้า=in, ออก=out, accent ที่ 3=ส้มพาสเทล)
  const actCol = { financing:ED_COLORS.in, operating:ED_COLORS.out, investing:"#8B5CF6" };
  const series = ["fin","op","inv"].map((k)=>{
    const lbls = { op:"ดำเนินงาน", inv:"ลงทุน", fin:"จัดหาเงิน" };
    return {
      label: lbls[k],
      backgroundColor: actCol[({op:"operating",inv:"investing",fin:"financing"})[k]],
      borderRadius: 4,
      data: months.map(m=>{
        const txs = edTxsInScope(data, m, true);  // ★ exclude transfers
        const aKey = ({op:"operating",inv:"investing",fin:"financing"})[k];
        return txs.reduce((s,t)=> s + (t.activityKey===aKey ? (t.in - t.out) : 0), 0);
      })
    };
  });

  const totalNetByAct = {};
  const _actScopeTxs = edTxsInScope(data, d.monthFilter, true);  // ★ exclude transfers
  for(const k of ["operating","investing","financing","other"]){
    const tx = _actScopeTxs.filter(t=>t.activityKey===k);
    totalNetByAct[k] = tx.reduce((s,t)=>s+t.in-t.out,0);
  }

  // ★ การ์ดสรุปแบบเดียวกับ Executive Summary — sign-based (ลบ=แดง, บวก=เขียว) + icon + แถบสัดส่วน
  const actsMeta = {
    operating:{ th:"ดำเนินงาน", en:"Operating", desc:"เงินสดจาก/ใช้ในการดำเนินงาน",
      icon:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="CLR" stroke-width="1.8"/><path d="M19.4 13a7.5 7.5 0 0 0 .1-2l1.7-1.3-1.8-3.1-2 .8a7.6 7.6 0 0 0-1.7-1l-.3-2.1H9.6l-.3 2.1c-.6.2-1.2.6-1.7 1l-2-.8L3.8 9.7 5.5 11a7.5 7.5 0 0 0 0 2l-1.7 1.3 1.8 3.1 2-.8c.5.4 1.1.8 1.7 1l.3 2.1h4.8l.3-2.1c.6-.2 1.2-.6 1.7-1l2 .8 1.8-3.1L19.4 13Z" stroke="CLR" stroke-width="1.4" stroke-linejoin="round"/></svg>` },
    investing:{ th:"ลงทุน", en:"Investing", desc:"ซื้อสินทรัพย์ / เงินลงทุน",
      icon:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 20V9M10 20V5M16 20v-8M22 20V3" stroke="CLR" stroke-width="2" stroke-linecap="round"/></svg>` },
    financing:{ th:"จัดหาเงิน", en:"Financing", desc:"เงินกู้ / เพิ่มทุน รับเข้า",
      icon:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 21h18M5 21V10M9 21V10M15 21V10M19 21V10M12 3 3.5 8h17L12 3Z" stroke="CLR" stroke-width="1.7" stroke-linejoin="round"/></svg>` }
  };
  const sumAbs = ["operating","investing","financing"].reduce((s,k)=>s+Math.abs(totalNetByAct[k]),0) || 1;
  const actCard2 = (k) => {
    const v = totalNetByAct[k], m = actsMeta[k];
    const neg = v < 0;
    const accent = neg ? "#dc2626" : "#0E9A88";
    const softBg = neg ? "#FEE2E2" : "#E8FBF5";
    const barGrad = neg ? "linear-gradient(180deg,#F87171,#DC2626)" : "linear-gradient(180deg,#2BD0B8,#0FA08C)";
    const prop = Math.round(Math.abs(v)/sumAbs*100);
    return `<div onclick="edDrillActivity('${k}')" style="background:#fff;border:1px solid #E3ECF7;border-radius:18px;padding:20px 22px;box-shadow:0 8px 22px rgba(31,42,68,.05);position:relative;overflow:hidden;cursor:pointer;transition:.15s" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 12px 26px rgba(31,42,68,.1)'" onmouseout="this.style.transform='none';this.style.boxShadow='0 8px 22px rgba(31,42,68,.05)'">
      <div style="position:absolute;left:0;top:0;bottom:0;width:5px;background:${accent}"></div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:11px">
          <div style="width:42px;height:42px;border-radius:12px;background:${softBg};display:flex;align-items:center;justify-content:center">${m.icon.replace(/CLR/g,accent)}</div>
          <div><div style="font-size:18px;font-weight:700;color:#1F2A44;white-space:nowrap">${m.th}</div><div style="font-size:13.5px;color:#9AA8BF">${m.en}</div></div>
        </div>
        <span style="background:${softBg};color:${accent};font-size:13px;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap">${neg?"จ่ายสุทธิ":"รับสุทธิ"}</span>
      </div>
      <div style="font-size:35px;font-weight:700;letter-spacing:-.6px;color:${accent};margin-top:14px">${edFmt(v)}</div>
      <div style="margin-top:14px;height:11px;background:#EEF2F7;border-radius:7px;box-shadow:inset 0 1px 2px rgba(31,42,68,.1);overflow:hidden">
        <div class="ed-grow" style="position:relative;overflow:hidden;width:${prop}%;height:100%;border-radius:7px;background:${barGrad}"><div class="ed-shim"></div></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:13px;color:#9AA8BF"><span>${m.desc}</span><span>สัดส่วน ${prop}%</span></div>
    </div>`;
  };

  document.getElementById("edContent").innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:18px">
      ${["operating","investing","financing"].map(actCard2).join("")}
    </div>
    <div class="card">
      <h3 style="font-size:18px">กระแสเงินสดสุทธิรายเดือน <span style="font-weight:400;color:#94a3b8;font-size:13.5px">Monthly Net Cash Flow · แยกตามกิจกรรม</span></h3>
      <div style="font-size:12.5px;color:#94a3b8;margin-top:-4px;margin-bottom:10px">บนเส้นศูนย์ = เงินเข้า · ใต้เส้นศูนย์ = เงินออก</div>
      <div style="position:relative;height:360px"><canvas id="edActivityChart"></canvas></div>
    </div>
  `;

  edMakeChart("edActivityChart", {
    type:"bar",
    data:{ labels:months, datasets:series },
    options:{
      responsive:true, maintainAspectRatio:false,
      scales:{ x:{ stacked:true }, y:{ stacked:true, ticks:{ callback:v=>edFmtCompact(v) } } },
      plugins:{ legend:{position:"bottom"}, tooltip:{ callbacks:{ label:c=>c.dataset.label+": "+edFmt(c.parsed.y) } } },
      onClick:(e,els)=>{
        if(els && els.length){
          const m = months[els[0].index];
          edSetMonth(m); edSetTab("explorer");
        }
      }
    }
  });
}

/* ---------- Tab 3: Category ---------- */
function edRenderCategory(){
  const d = edState();
  const A = edAgg(d.data, d.monthFilter, true);  // ★ exclude transfers
  const cats = Object.entries(A.byCat).map(([k,v])=>({ k, ...v, abs:Math.abs(v.net) })).sort((a,b)=>b.abs-a.abs);

  // Top 5 รับ / จ่าย (+ รวมที่เหลือเป็น "อื่นๆ") สำหรับโดนัทชาร์ต
  const buildTop = (dir) => {
    const arr = Object.entries(A.byCat).map(([k,v])=>({k, v:v[dir]})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
    const top = arr.slice(0,5);
    const restArr = arr.slice(5);
    const rest = restArr.reduce((s,x)=>s+x.v,0);
    const labels = top.map(x=>x.k.length>34?x.k.slice(0,32)+"…":x.k);
    const data   = top.map(x=>x.v);
    const keys   = top.map(x=>x.k);
    if(rest>0){ labels.push(`อื่นๆ (${restArr.length} หมวด)`); data.push(rest); keys.push(null); }
    return { labels, data, keys, total: arr.reduce((s,x)=>s+x.v,0) };
  };
  const inT = buildTop("in"), outT = buildTop("out");

  document.getElementById("edContent").innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">

        <thead><tr><th>#</th><th>หมวด</th><th style="text-align:right">รายการ</th><th style="text-align:right;color:var(--ok)">รับ</th><th style="text-align:right;color:var(--bad)">จ่าย</th><th style="text-align:right">สุทธิ</th></tr></thead>
        <tbody>${cats.map((c,i)=>`<tr style="cursor:pointer" onclick="edDrillCat(${JSON.stringify(c.k).replace(/"/g,'&quot;')},'all')">
          <td>${i+1}</td><td>${esc(c.k)}</td>

          <td style="text-align:right;color:var(--bad)">${c.out>0?edFmt(c.out):"—"}</td>
          <td style="text-align:right;font-weight:700;color:${c.net>=0?ED_COLORS.in:"#dc2626"}">${edFmt(c.net)}</td>
        </tr>`).join("")}</tbody>
      </table></div>
    </div>
  `;

  const inPalette  = ["#12B5A0","#2BD0B8","#5EBEC4","#6E9BE8","#4F8AF7","#9AA8BF"];   // เขียว/ฟ้า = รับ
  const outPalette = ["#dc2626","#F2748A","#F2A968","#F0A02E","#E87CA6","#9AA8BF"];   // แดง/ส้ม = จ่าย
  const mkPie = (id, T, palette, dir) => {
    if(!T.data.length) return;
    edMakeChart(id, {
      type:"doughnut",
      data:{ labels:T.labels, datasets:[{ data:T.data, backgroundColor:T.labels.map((_,i)=>palette[i%palette.length]), borderColor:"#fff", borderWidth:2, hoverOffset:6 }] },

function edExportTxs(fmt){
  const d = edState();
  const A = edAgg(d.data, d.monthFilter);
  const rows = [["วันที่","MNE","เลขที่","ธนาคาร","เลขบัญชี","ฝ่าย","หมวด","กิจกรรม","รับ","จ่าย","คงเหลือ","สถานะ","หมายเหตุ"]];
  for(const t of A.txs){
    rows.push([t.dateISO, t.mne, t.ref, t.bank, t.accountNo, t.accountNick, t.category, t.activity, t.in, t.out, t.balance, t.status, t.note]);
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const base = "CashFlow_"+(d.data.company||"").slice(0,20).replace(/\s+/g,"_")+"_"+stamp();
  if(fmt==="csv"){
    const csv = XLSX.utils.sheet_to_csv(ws);
    download("﻿"+csv, base+".csv", "text/csv;charset=utf-8");
  } else {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Transactions");
    XLSX.writeFile(wb, base+".xlsx");
  }
}

function edRenderStmt(){
  const d = edState();
  // โชว์คอลัมน์ตาม scope ที่เลือก (ทุกปี=ทุกเดือน · เลือกปี=เฉพาะปีนั้น · เลือกเดือน=เดือนเดียว)
  const months = edScopeMonthKeys(d.data, d.monthFilter);
  const filterAcct = d.stmtAcct;
  const C = edStmtPalette();  // ★ สีตามบริษัท

  // build per category × month grid (filtered by account if not "all")
  const cats = {};   // catKey → { in:[m], out:[m] }
  for(const t of d.data.transactions){
    if(filterAcct!=="all" && t.accountKey!==filterAcct) continue;
    if(edIsTransfer(t)) continue;  // ★ ตัด "เงินโอนระหว่างบัญชี" ออก (ทำให้ยอดรับ/จ่ายเกินจริง)
    const k = t.category + "|" + t.activityKey;
    if(!cats[k]){
      cats[k] = { cat:t.category, act:t.activityKey, in:Array(months.length).fill(0), out:Array(months.length).fill(0) };
    }
    const mi = months.indexOf(t.month);
    if(mi>=0){
      cats[k].in[mi]  += t.in;
      cats[k].out[mi] += t.out;
    }
  }
  // group by activity
  const groups = { operating:[], investing:[], financing:[], other:[] };
  for(const k in cats){
    groups[cats[k].act].push(cats[k]);
  }

  // opening/closing per month (across selected scope)
  const openings = months.map(m => {
    let o = 0;
    const mObj = d.data.months.find(x=>x.key===m);
    if(!mObj) return 0;
    for(const a of mObj.accounts){
      if(filterAcct==="all" || a.accountKey===filterAcct) o += a.opening;
    }
    return o;
  });
  const closings = months.map(m => {
    let c = 0;
    const mObj = d.data.months.find(x=>x.key===m);
    if(!mObj) return 0;
    for(const a of mObj.accounts){
      if(filterAcct==="all" || a.accountKey===filterAcct) c += (a.closing || a.computed);
    }
    return c;
  });

  const acctOpts = Object.entries(d.data.accounts).map(([k,v])=>`<option value="${esc(k)}" ${filterAcct===k?'selected':''}>${esc(v.bank)} ${esc(v.no)}</option>`).join("");

  let html = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px" data-pdf-hide="1">
        <h3 style="margin:0">งบกระแสเงินสด — รายเดือน <span style="font-size:11px;font-weight:500;color:var(--ink-3)">· คลิกชื่อหมวด = คลี่รายการ · คลิกตัวเลข = ดูป๊อปอัพ</span></h3>
        <select onchange="edStmtAcct(this.value)" style="padding:6px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px">
          <option value="all" ${filterAcct==="all"?"selected":""}>รวมทุกบัญชี</option>${acctOpts}
        </select>
      </div>
      <div data-pdf-only="1" style="display:none;margin-bottom:10px">
        <h3 style="margin:0;color:${C.actText}">งบกระแสเงินสด — รายเดือน${filterAcct!=="all"?` · ${esc((d.data.accounts[filterAcct]&&d.data.accounts[filterAcct].bank)||'')} ${esc((d.data.accounts[filterAcct]&&d.data.accounts[filterAcct].no)||'')}`:" · รวมทุกบัญชี"}</h3>
      </div>
      <div class="table-wrap" style="max-height:600px"><table>
        <thead><tr><th>หมวด</th>${months.map(m=>`<th style="text-align:right">${esc(m)}</th>`).join("")}<th style="text-align:right;background:${C.openTotalBg}">รวม</th></tr></thead>
        <tbody>
          <tr style="background:${C.openBg};font-weight:700;cursor:pointer" title="คลิกดูยอดเปิดต้นงวดต่อบัญชี" onclick="edDrillOpenClose('opening')"><td>เงินสดต้นงวด</td>
            ${openings.map((v,i)=>`<td style="text-align:right" onclick="event.stopPropagation();edDrillOpenCloseMonth('opening','${months[i]}')">${edFmt(v)}</td>`).join("")}
            <td style="text-align:right;background:${C.openTotalBg}">${edFmt(openings[0])}</td></tr>
  `;
  const actLabels = { operating:"กระแสเงินสดจากกิจกรรมดำเนินงาน", investing:"กระแสเงินสดจากกิจกรรมลงทุน", financing:"กระแสเงินสดจากกิจกรรมจัดหาเงิน", other:"อื่น ๆ" };
  const actShort  = { operating:"กิจกรรมดำเนินงาน", investing:"กิจกรรมลงทุน", financing:"กิจกรรมจัดหาเงิน", other:"อื่น ๆ" };
  const sumArr = a => a.reduce((s,v)=>s+v,0);
  const ncols = months.length + 2;
  // helper: build clickable cell with onclick filter
  const dq = s => JSON.stringify(s == null ? null : s).replace(/"/g,'&quot;');

  const STMT_RED = "#dc2626";                                   // ★ สีแดงสำหรับยอดติดลบ
  const stmtClr = v => (Number(v) < -0.005 ? STMT_RED : ED_COLORS.in);  // ★ ติดลบ=แดง · ไม่ติดลบ=สี in (ฟ้าพาสเทล/teal)
  const catNet  = c => c.in.map((v,i)=> v - c.out[i]);          // ★ net รับ-จ่าย ต่อเดือน (หัก refund กลบกันในหมวด)
  const nonZero = arr => arr.some(v => Math.abs(v) > 0.005);
  // ★ จัดประเภทหมวด → 'in'/'out' ตาม "ชื่อหมวด" (กันหมวดรายจ่ายที่มี refund บวก ไปโผล่ฝั่งรายรับ) · ชื่อไม่ชัด → ดู net รวม
  const stmtSide = c => {
    const n = c.cat || "";
    if(/^\s*(รายรับ|รายได้|เงินสดรับ|เงินรับ)/.test(n)) return "in";
    if(/^\s*(รายจ่าย|ค่าใช้จ่าย|เงินสดจ่าย|เงินจ่าย)/.test(n)) return "out";
    return sumArr(catNet(c)) >= 0 ? "in" : "out";
  };

  for(const act of ["operating","investing","financing","other"]){
    if(!groups[act].length) continue;
    // หัวกิจกรรม
    html += `<tr style="background:${C.actBg}"><td colspan="${ncols}" style="font-weight:800;color:${C.actText};padding:9px 12px;font-size:13.5px">${actLabels[act]}</td></tr>`;

    // ==== เงินสดรับ (หมวดประเภทรับ — แสดง net รับ-จ่าย) ====
    const inCats = groups[act].filter(c => stmtSide(c)==="in" && nonZero(catNet(c)))
      .sort((a,b) => sumArr(catNet(b)) - sumArr(catNet(a)));
    const inSub = Array(months.length).fill(0);
    if(inCats.length){
      html += `<tr style="background:${C.inBg}"><td colspan="${ncols}" style="font-weight:700;color:${C.inText};padding:6px 12px;font-size:12.5px">เงินสดรับจาก${actShort[act]}</td></tr>`;
      for(const c of inCats){
        const net = catNet(c);
        net.forEach((v,i) => inSub[i] += v);
        const total = sumArr(net);
        html += `<tr><td class="stmt-cat" style="padding-left:16px;color:#0f172a;cursor:pointer" onclick="edStmtToggle(this,${dq(c.cat)},'${act}',null)" title="คลิกเพื่อคลี่รายการ"><span class="stmt-caret" style="display:inline-block;width:12px;color:var(--ink-3);font-size:10px">▶</span> ${esc(c.cat)}</td>` +
          net.map((v,i)=>`<td onclick="edDrillStmt(${dq(c.cat)},'${act}','${months[i]}',null)" style="text-align:right;cursor:pointer;color:${Math.abs(v)>0.005?stmtClr(v):"var(--ink-3)"}" title="คลิกดูรายการ">${Math.abs(v)>0.005?edFmt(v):"—"}</td>`).join("") +
          `<td onclick="edDrillStmt(${dq(c.cat)},'${act}','all',null)" style="text-align:right;background:${C.inRowTotalBg};font-weight:700;cursor:pointer;color:${stmtClr(total)}" title="คลิกดูรายการรวมทั้งปี">${edFmt(total)}</td></tr>`;
      }
      html += `<tr style="background:${C.inSubBg};font-weight:700"><td style="padding-left:18px;color:${C.inText}">รวมเงินสดรับ</td>` +
        inSub.map((v,i)=>`<td onclick="edDrillStmt(null,'${act}','${months[i]}','in')" style="text-align:right;cursor:pointer;color:${stmtClr(v)}" title="คลิกดูที่มา">${edFmt(v)}</td>`).join("") +
        `<td onclick="edDrillStmt(null,'${act}','all','in')" style="text-align:right;background:${C.inTotalBg};cursor:pointer;color:${stmtClr(sumArr(inSub))}" title="คลิกดูที่มา">${edFmt(sumArr(inSub))}</td></tr>`;
    }

    // ==== เงินสดจ่าย (หมวดประเภทจ่าย — net รับ-จ่าย, ปกติติดลบ; refund หักกลบในฝั่งนี้ ไม่ขึ้นรายรับ) ====
    const outCats = groups[act].filter(c => stmtSide(c)==="out" && nonZero(catNet(c)))
      .sort((a,b) => sumArr(catNet(a)) - sumArr(catNet(b)));   // ติดลบมากสุดก่อน
    const outSub = Array(months.length).fill(0);
    if(outCats.length){
      html += `<tr style="background:${C.outBg}"><td colspan="${ncols}" style="font-weight:700;color:${C.outText};padding:6px 12px;font-size:12.5px">เงินสดจ่ายจาก${actShort[act]}</td></tr>`;
      for(const c of outCats){
        const net = catNet(c);
        net.forEach((v,i) => outSub[i] += v);
        const total = sumArr(net);
        html += `<tr><td class="stmt-cat" style="padding-left:16px;color:#0f172a;cursor:pointer" onclick="edStmtToggle(this,${dq(c.cat)},'${act}',null)" title="คลิกเพื่อคลี่รายการ"><span class="stmt-caret" style="display:inline-block;width:12px;color:var(--ink-3);font-size:10px">▶</span> ${esc(c.cat)}</td>` +
          net.map((v,i)=>`<td onclick="edDrillStmt(${dq(c.cat)},'${act}','${months[i]}',null)" style="text-align:right;cursor:pointer;color:${Math.abs(v)>0.005?stmtClr(v):"var(--ink-3)"}" title="คลิกดูรายการ">${Math.abs(v)>0.005?edFmt(v):"—"}</td>`).join("") +
          `<td onclick="edDrillStmt(${dq(c.cat)},'${act}','all',null)" style="text-align:right;background:${C.outRowTotalBg};font-weight:700;cursor:pointer;color:${stmtClr(total)}" title="คลิกดูรายการรวมทั้งปี">${edFmt(total)}</td></tr>`;
      }
      html += `<tr style="background:${C.outSubBg};font-weight:700"><td style="padding-left:18px;color:${C.outText}">รวมเงินสดจ่าย</td>` +
        outSub.map((v,i)=>`<td onclick="edDrillStmt(null,'${act}','${months[i]}','out')" style="text-align:right;cursor:pointer;color:${stmtClr(v)}" title="คลิกดูที่มา">${edFmt(v)}</td>`).join("") +
        `<td onclick="edDrillStmt(null,'${act}','all','out')" style="text-align:right;background:${C.outTotalBg};cursor:pointer;color:${stmtClr(sumArr(outSub))}" title="คลิกดูที่มา">${edFmt(sumArr(outSub))}</td></tr>`;
    }

    // ==== สุทธิของกิจกรรม ====
    const netByMonth = inSub.map((v,i) => v + outSub[i]);
    const netTotal = sumArr(netByMonth);
    html += `<tr style="background:${C.netBg};font-weight:800;border-top:2px solid ${C.netTotalBg}"><td style="color:${C.netAccent}">กระแสเงินสดสุทธิจาก${actShort[act]}</td>` +
      netByMonth.map((v,i)=>`<td onclick="edDrillStmt(null,'${act}','${months[i]}',null)" style="text-align:right;cursor:pointer;color:${stmtClr(v)}" title="คลิกดูที่มา">${edFmt(v)}</td>`).join("") +
      `<td onclick="edDrillStmt(null,'${act}','all',null)" style="text-align:right;background:${C.netTotalBg};cursor:pointer;color:${stmtClr(netTotal)}" title="คลิกดูที่มา">${edFmt(netTotal)}</td></tr>`;
  }
  // net change row
  const netChange = months.map((m,i)=> closings[i]-openings[i]);
  const totalNet = netChange.reduce((s,v)=>s+v,0);
  html += `
    <tr style="background:${C.netBg};font-weight:800;border-top:2px solid ${C.netTotalBg}"><td style="color:${C.netAccent}">เปลี่ยนแปลงเงินสดสุทธิ</td>` +
      netChange.map((v,i)=>`<td onclick="edDrillStmt(null,null,'${months[i]}',null)" style="text-align:right;cursor:pointer;color:${stmtClr(v)}" title="คลิกดูที่มา">${edFmt(v)}</td>`).join("") +
      `<td onclick="edDrillStmt(null,null,'all',null)" style="text-align:right;background:${C.netTotalBg};cursor:pointer;color:${stmtClr(totalNet)}" title="คลิกดูที่มา">${edFmt(totalNet)}</td></tr>
    <tr style="background:${C.openBg};font-weight:700;cursor:pointer" title="คลิกดูยอดปิดงวดต่อบัญชี" onclick="edDrillOpenClose('closing')"><td>เงินสดปลายงวด</td>` +
      closings.map((v,i)=>`<td style="text-align:right" onclick="event.stopPropagation();edDrillOpenCloseMonth('closing','${months[i]}')">${edFmt(v)}</td>`).join("") +
      `<td style="text-align:right;background:${C.openCloseBg}">${edFmt(closings[closings.length-1])}</td></tr>
  </tbody></table></div>
  </div>`;

  document.getElementById("edContent").innerHTML = html;
}

/* คลี่/พับรายการของหมวด inline (แบบ Excel) — เรียกจากการคลิก "ชื่อหมวด" ในงบกระแสเงินสด
   (คลิกที่ตัวเลขเดือนยังเปิด popup เหมือนเดิมผ่าน edDrillStmt) */
function edStmtToggle(tdEl, catName, actKey, dir){
  const tr = tdEl.closest("tr");
  const caret = tdEl.querySelector(".stmt-caret");
  const next = tr.nextElementSibling;
  if(next && next.classList.contains("stmt-detail")){   // เปิดอยู่ → พับ
    next.remove();
    if(caret) caret.textContent = "▶";
    return;
  }
  const d = edState();
  let txs = d.data.transactions.filter(t => !edIsTransfer(t));   // ★ ตัดโอนระหว่างบัญชี
  if(catName) txs = txs.filter(t => t.category === catName);
  if(actKey)  txs = txs.filter(t => t.activityKey === actKey);
  if(d.stmtAcct && d.stmtAcct !== "all") txs = txs.filter(t => t.accountKey === d.stmtAcct);
  if(dir === "in")  txs = txs.filter(t => t.in  > 0);
  if(dir === "out") txs = txs.filter(t => t.out > 0);
  txs.sort((a,b) => a.date - b.date);

  const colspan = tr.children.length;
  const head = dir === "in" ? ED_COLORS.in : ED_COLORS.out;
  const body = txs.length ? txs.map(t=>`<tr style="border-top:1px solid #eef2f7">
      <td style="padding:5px 10px;white-space:nowrap">${t.dateISO}</td>
      <td style="padding:5px 10px"><code style="font-size:11px">${esc(t.ref)}</code></td>
      <td style="padding:5px 10px"><b>${esc(t.bank)}</b> ${esc((t.accountNo||'').slice(-5))}</td>
      <td style="padding:5px 10px;text-align:right;color:${ED_COLORS.in}">${t.in>0?edFmt(t.in):"—"}</td>
      <td style="padding:5px 10px;text-align:right;color:${ED_COLORS.out}">${t.out>0?edFmt(t.out):"—"}</td>
      <td style="padding:5px 10px;color:var(--ink-2);white-space:normal">${esc(t.note)}</td>
    </tr>`).join("") : `<tr><td colspan="6" style="padding:10px;color:var(--ink-3)">ไม่มีรายการ</td></tr>`;

  const detail = document.createElement("tr");
  detail.className = "stmt-detail";
  detail.innerHTML = `<td colspan="${colspan}" style="padding:0;background:#fbfdff;border-left:3px solid ${head}">
    <div style="padding:4px 10px 10px 30px;overflow:auto">
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="color:var(--ink-3)">
          <th style="padding:4px 10px;font-weight:600;text-align:left">วันที่</th>
          <th style="padding:4px 10px;font-weight:600;text-align:left">เลขที่</th>
          <th style="padding:4px 10px;font-weight:600;text-align:left">บัญชี</th>
          <th style="padding:4px 10px;font-weight:600;text-align:right">รับ</th>
          <th style="padding:4px 10px;font-weight:600;text-align:right">จ่าย</th>
          <th style="padding:4px 10px;font-weight:600;text-align:left">หมายเหตุ</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div></td>`;
  tr.after(detail);
  if(caret) caret.textContent = "▼";
}

/* ---------- Drill modals ---------- */
/* generic drill: filter ตาม cat/act/month/dir แล้วแสดง modal รายการต้นทาง */
function edDrillStmt(catName, actKey, monthKey, dir){
  const d = edState();
  let txs = d.data.transactions.filter(t => !edIsTransfer(t));  // ★ exclude transfers (drill จาก Statement)
  if(catName) txs = txs.filter(t => t.category === catName);
  if(actKey)  txs = txs.filter(t => t.activityKey === actKey);
  if(monthKey && monthKey !== "all") txs = txs.filter(t => t.month === monthKey);
  if(d.stmtAcct && d.stmtAcct !== "all") txs = txs.filter(t => t.accountKey === d.stmtAcct);
  if(dir === "in")  txs = txs.filter(t => t.in > 0);
  if(dir === "out") txs = txs.filter(t => t.out > 0);
  const parts = [];
  if(catName) parts.push(catName);
  else if(actKey) parts.push(edActivityLabel(actKey));
  if(dir === "in")  parts.push("เงินสดรับ");
  else if(dir === "out") parts.push("เงินสดจ่าย");
  else if(actKey || catName) parts.push("สุทธิ");
  parts.push(monthKey && monthKey !== "all" ? edThaiMonth(monthKey) : "รวมทุกเดือน");
  edShowDrillModal(parts.join(" · "), txs);
}

/* Summary KPI drill — รับรวม / จ่ายรวม / สุทธิ */
function edDrillSummary(kind){
  const d = edState();
  const A = edAgg(d.data, d.monthFilter, true);  // ★ exclude transfers (drill จาก Summary)
  let txs = A.txs;
  let title = "รายการทั้งหมด";
  if(kind === "in"){  txs = txs.filter(t => t.in  > 0); title = "เงินสดรับรวม"; }
  if(kind === "out"){ txs = txs.filter(t => t.out > 0); title = "เงินสดจ่ายรวม"; }
  if(kind === "net") title = "กระแสเงินสดสุทธิ";
  const period = edScopeLabel(d.monthFilter);
  edShowDrillModal(title + " · " + period, txs);
}

/* Activity sub-KPI drill — รับ/จ่ายของกิจกรรมหนึ่งๆ */
function edDrillActivityIO(actKey, dir){
  const d = edState();
  const A = edAgg(d.data, d.monthFilter, true);  // ★ exclude transfers
  let txs = A.txs.filter(t => t.activityKey === actKey);
  if(dir === "in")  txs = txs.filter(t => t.in  > 0);
  if(dir === "out") txs = txs.filter(t => t.out > 0);
  const label = edActivityLabel(actKey);
  const dirL  = dir === "in" ? "รับ" : dir === "out" ? "จ่าย" : "สุทธิ";
  const period = edScopeLabel(d.monthFilter);
  edShowDrillModal(`${label} · ${dirL} · ${period}`, txs);
}

/* drill ยอดเปิด/ปิด ของเดือนเฉพาะ (เรียกจาก Statement cell) */
function edDrillOpenCloseMonth(kind, monthKey){
  const d = edState();
  const saved = d.monthFilter;
  d.monthFilter = monthKey;
  edDrillOpenClose(kind);
  d.monthFilter = saved;
}

/* opening/closing breakdown by account */
function edDrillOpenClose(kind){
  const d = edState();
  const data = d.data;
  const filterAcct = d.stmtAcct || "all";
  const monthFilter = d.monthFilter;
  const rows = [];
  let total = 0;

  // เปิด = เดือนแรกที่บัญชีปรากฏใน scope · ปิด = เดือนสุดท้าย (รองรับ ทุกปี/ทั้งปี/เดือนเดียว)
  const scope = edScopeMonthKeys(data, monthFilter);
  for(const k in data.accounts){
    if(filterAcct !== "all" && k !== filterAcct) continue;
    const a = data.accounts[k];
    let v = null;
    if(kind === "opening"){
      for(const mk of scope){ if(a.months[mk]){ v = a.months[mk].opening; break; } }
    } else {
      for(let i = scope.length - 1; i >= 0; i--){ const mk = scope[i]; if(a.months[mk]){ v = a.months[mk].closing; break; } }
    }
    if(v == null) continue;
    rows.push({ bank:a.bank, no:a.no, nick:a.nick, value:v });
    total += v;
  }

  const title = (kind === "opening" ? "เงินสดต้นงวด" : "เงินสดปลายงวด")
    + " · " + edScopeLabel(monthFilter);

  const wrap = document.createElement("div");
  wrap.id = "edDrillModal";
  wrap.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";
  wrap.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:24px;max-width:700px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0;font-size:16px">${esc(title)} <span style="color:var(--ink-3);font-size:13px;font-weight:500">— ${rows.length} บัญชี · รวม ${edFmt(total)}</span></h3>
        <button onclick="document.getElementById('edDrillModal').remove()" style="padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:13px;cursor:pointer">ปิด</button>
      </div>
      <table style="font-size:13px;width:100%">
        <thead><tr><th style="text-align:left;padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--line)">ธนาคาร</th><th style="text-align:left;padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--line)">เลขบัญชี</th><th style="text-align:left;padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--line)">ฝ่าย</th><th style="text-align:right;padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--line)">ยอด</th></tr></thead>
        <tbody>${rows.map(r=>`<tr><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9"><b>${esc(r.bank)}</b></td><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9"><code style="font-size:12px">${esc(r.no)}</code></td><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9;color:var(--ink-3);font-size:12px">${esc(r.nick||"—")}</td><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9;text-align:right;font-weight:700">${edFmt(r.value)}</td></tr>`).join("")}</tbody>
      </table>
    </div>`;
  document.body.appendChild(wrap);
  wrap.onclick = (e) => { if(e.target === wrap) wrap.remove(); };
}

function edDrillCat(cat, dir){
  const d = edState();
  const A = edAgg(d.data, d.monthFilter, true);  // ★ exclude transfers
  let txs = A.txs.filter(t=>t.category===cat);
  if(dir==="in")  txs = txs.filter(t=>t.in>0);
  if(dir==="out") txs = txs.filter(t=>t.out>0);
  edShowDrillModal("หมวด: "+cat, txs);
}
function edDrillActivity(actKey){
  const d = edState();
  const A = edAgg(d.data, d.monthFilter, true);  // ★ exclude transfers
  const txs = A.txs.filter(t=>t.activityKey===actKey);
  edShowDrillModal("กิจกรรม: "+edActivityLabel(actKey), txs);
}
function edDrillAcct(key){
  const d = edState();
  const A = edAgg(d.data, d.monthFilter);
  const txs = A.txs.filter(t=>t.accountKey===key);
  edShowDrillModal("บัญชี: "+key, txs);
}
function edShowDrillModal(title, txs){
  const wrap = document.createElement("div");
  wrap.id = "edDrillModal";
  wrap.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";
  const totalIn = txs.reduce((s,t)=>s+t.in,0);
  const totalOut = txs.reduce((s,t)=>s+t.out,0);
  wrap.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:24px;max-width:1000px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0;font-size:16px">${esc(title)} <span style="color:var(--ink-3);font-size:13px;font-weight:500">— ${txs.length} รายการ · รับ ${edFmt(totalIn)} · จ่าย ${edFmt(totalOut)}</span></h3>
        <button onclick="document.getElementById('edDrillModal').remove()" style="padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:13px;cursor:pointer">ปิด</button>
      </div>
      <div style="overflow:auto;flex:1"><table style="font-size:12px;width:100%">
        <thead><tr><th>วันที่</th><th>เลขที่</th><th>บัญชี</th><th style="text-align:right">รับ</th><th style="text-align:right">จ่าย</th><th>หมายเหตุ</th></tr></thead>
        <tbody>${txs.map(t=>`<tr>
          <td>${t.dateISO}</td><td><code style="font-size:11px">${esc(t.ref)}</code></td>
          <td><b>${esc(t.bank)}</b> ${esc(t.accountNo.slice(-5))}</td>
          <td style="text-align:right;color:var(--ok)">${t.in>0?edFmt(t.in):"—"}</td>
          <td style="text-align:right;color:var(--bad)">${t.out>0?edFmt(t.out):"—"}</td>
          <td style="color:var(--ink-2)">${esc(t.note)}</td>
        </tr>`).join("")}</tbody>
      </table></div>
    </div>`;
  document.body.appendChild(wrap);
  wrap.onclick = (e)=>{ if(e.target===wrap) wrap.remove(); };
}

const FOP_ROLES_WRITE = ["admin","finance_mgr","accountant","treasury"];
function fopFmt(n){
  if(n==null || isNaN(n)) return "—";
  const v = Number(n);
  const s = Math.abs(v).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
  return v < 0 ? "(" + s + ")" : s;
}
function fopDate(s){
  if(!s) return "—";
  const d = new Date(s);
  if(isNaN(d)) return s;
  return d.toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"numeric"});
}
async function fopCompanyId(){
  const code = state.company === "mbark" ? "MBARC" : "BENYA";
  const { data, error } = await sb.from("companies").select("id").eq("code", code).limit(1);
  if(error || !data || !data.length) return null;
  return data[0].id;
}
function fopCanWrite(){
  return AUTH.role && (AUTH.role==="admin" || FOP_ROLES_WRITE.includes(AUTH.role));
}
function fopErr(err){
  return (err && (err.message || err.error_description || JSON.stringify(err))) || "เกิดข้อผิดพลาด";
}

state.bb = state.bb || {};
function bbGet(){
  if(!state.bb[state.company]) state.bb[state.company] = { accounts:null, balances:null, busy:false, selDate:null };
  return state.bb[state.company];
}
/* local-date helpers (กัน timezone shift) */
function bbDateObj(iso){ const [y,m,dd]=String(iso).split("-").map(Number); return new Date(y, m-1, dd); }
function bbAddDays(iso, n){ const [y,m,dd]=String(iso).split("-").map(Number); return cffISO(new Date(y, m-1, dd+n)); }
function bbSetText(id, txt){ const el=document.getElementById(id); if(el) el.textContent=txt; }
function bbFmtDelta(n){ n=Number(n||0); if(!n) return "0.00"; return (n<0?"▼ ":"▲ ")+fopFmt(Math.abs(n)); }
function bbChipLabel(iso, today, tom){
  if(iso===today) return "วันนี้";
  if(iso===tom)   return "พรุ่งนี้";
  const dt=bbDateObj(iso);
  return `${dt.toLocaleDateString("th-TH",{weekday:"short"})} ${dt.toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit"})}`;
}
async function bbLoad(){
  const d = bbGet();
  d.busy = true;
  const cid = await fopCompanyId();
  if(!cid){ d.busy=false; d.err="หา company_id ไม่เจอ"; return; }
  d.companyId = cid;
  const todayISO = cffISO(new Date());
  d.todayISO = todayISO;
  d.tomorrowISO = bbAddDays(todayISO, 1);
  if(!d.selDate) d.selDate = todayISO;
  const sel = d.selDate;
  const prevISO = bbAddDays(sel, -1);
  // ครอบคลุมทั้ง chip (วันนี้-6 .. พรุ่งนี้) และวันที่เลือก
  const anchorMin = sel < todayISO ? sel : todayISO;
  const rangeStart = bbAddDays(anchorMin, -7);
  const rangeEnd   = sel > d.tomorrowISO ? sel : d.tomorrowISO;

  const [accRes, prevRes, rangeRes, histRes] = await Promise.all([
    sb.from("bank_accounts").select("*").eq("company_id", cid).is("deleted_at", null).order("display_order").order("bank_code"),
    sb.rpc("fn_balance_as_of", { p_company: cid, p_as_of: prevISO }),
    sb.from("bank_balances").select("bank_account_id,balance_date,amount,hold_amount,note,created_at")
      .eq("company_id", cid).is("deleted_at", null)
      .gte("balance_date", rangeStart).lte("balance_date", rangeEnd)
      .order("created_at",{ascending:true}),
    sb.from("bank_balances").select("*,bank_accounts(bank_code,account_no,nickname)")
      .eq("company_id", cid).is("deleted_at", null)
      .order("balance_date",{ascending:false}).order("created_at",{ascending:false}).limit(100)
  ]);
  d.accounts = accRes.data || [];
  // ยอดเมื่อวาน + HOLD ล่าสุด (baseline / carry-forward)
  d.prev = {};
  for(const r of (prevRes.data||[])) d.prev[r.bank_account_id] = { amount:Number(r.amount||0), hold:Number(r.hold||0) };
  // ยอดล่าสุดต่อบัญชีต่อวัน (created_at asc → ค่าหลังทับค่าก่อน = ล่าสุด) + ยอดรวมต่อวันสำหรับ chip
  const perDayAcct = {};
  for(const r of (rangeRes.data||[])) perDayAcct[`${r.balance_date}|${r.bank_account_id}`] = { amount:Number(r.amount||0), hold:Number(r.hold_amount||0), note:r.note };
  d.current = {};
  for(const a of d.accounts){ const k=`${sel}|${a.id}`; if(perDayAcct[k]) d.current[a.id]=perDayAcct[k]; }
  d.dayTotals = {};
  for(const key in perDayAcct){ const date=key.split("|")[0]; d.dayTotals[date]=(d.dayTotals[date]||0)+perDayAcct[key].amount; }
  d.balances = histRes.data || [];
  d.busy = false;
}

async function bbSaveAccount(){
  const err = document.getElementById("bbaErr");
  const btn = document.getElementById("bbaBtn");
  const bank = document.getElementById("bbaBank").value.trim();
  const no   = document.getElementById("bbaNo").value.trim();
  if(!bank || !no){ err.textContent="ต้องเลือกธนาคาร + เลขบัญชี"; err.style.display=""; return; }
  btn.disabled=true; btn.textContent="กำลังบันทึก...";
  try{
    const cid = await fopCompanyId();
    const { error } = await sb.from("bank_accounts").insert({
      company_id: cid, bank_code: bank, account_no: no,
      nickname: document.getElementById("bbaNick").value.trim() || null,
      account_type: document.getElementById("bbaType").value,
      created_by: AUTH.user ? AUTH.user.id : null
    });
    if(error) throw error;
    document.getElementById("fopModal").remove();
    state.bb[state.company] = null;   // force reload
    renderToolBankBalance();
  }catch(e){
    btn.disabled=false; btn.textContent="บันทึก";
    err.textContent=fopErr(e); err.style.display="";
  }
}

/* ใช้ค่าเมื่อวาน (carry-forward) */
function bbCopyPrev(id){
  const d=bbGet(); const p=d.prev[id]||{amount:0,hold:0};
  const a=document.getElementById("bb-amt-"+id), h=document.getElementById("bb-hold-"+id);
  if(a) a.value = Number(p.amount)>0 ? p.amount : "";
  if(h) h.value = Number(p.hold)>0 ? p.hold : "";
  bbRecalc();
}
function bbCopyAllPrev(){ const d=bbGet(); for(const a of (d.accounts||[])) bbCopyPrev(a.id); }
/* คำนวณสด: Δ / ใช้ได้จริง / รวม / เตือน > 100k */
function bbRecalc(){
  const d=bbGet(); let totA=0, totH=0, totD=0;
  for(const a of (d.accounts||[])){
    const amtEl=document.getElementById("bb-amt-"+a.id); if(!amtEl) continue;
    const holdEl=document.getElementById("bb-hold-"+a.id);
    const amt=parseFloat(amtEl.value); const hold=parseFloat(holdEl?holdEl.value:0)||0;
    const prev=d.prev[a.id]||{amount:0,hold:0};
    const hasAmt=!isNaN(amt);
    const delta = hasAmt ? amt-prev.amount : 0;
    const avail = (hasAmt?amt:0)-hold;
    const dEl=document.getElementById("bb-delta-"+a.id);
    const avEl=document.getElementById("bb-avail-"+a.id);
    if(dEl){ dEl.textContent = hasAmt? bbFmtDelta(delta):"—"; dEl.style.color = delta<0?"var(--out-ink)":delta>0?"var(--in-ink)":"var(--ink-3)"; }
    if(avEl){ avEl.textContent = hasAmt? fopFmt(avail):"—"; avEl.style.color = avail<0?"var(--out-ink)":"var(--in-ink)"; }
    const rowEl=document.getElementById("bb-row-"+a.id);
    if(rowEl) rowEl.style.background = (hasAmt && Math.abs(delta)>100000) ? "var(--warn-soft)" : "";
    if(hasAmt){ totA+=amt; totH+=hold; totD+=delta; }
  }
  bbSetText("bb-tot-amt", fopFmt(totA));
  bbSetText("bb-tot-hold", fopFmt(totH));
  bbSetText("bb-tot-avail", fopFmt(totA-totH));
  bbSetText("bb-tot-delta", bbFmtDelta(totD));
  bbSetText("bb-kpi-amt", fopFmt(totA));
  bbSetText("bb-kpi-hold", fopFmt(totH));
  bbSetText("bb-kpi-avail", fopFmt(totA-totH));
}
/* บันทึกทั้งตาราง */
async function bbSaveGrid(){
  const d=bbGet();
  if(!d.accounts || !d.accounts.length){ alert("ยังไม่มีบัญชี"); return; }
  const sel=d.selDate;
  const isForecast = sel > d.todayISO;
  const note=(document.getElementById("bbGridNote")?document.getElementById("bbGridNote").value.trim():"");
  const cid=await fopCompanyId();
  const rows=[];
  for(const a of d.accounts){
    const amtEl=document.getElementById("bb-amt-"+a.id); if(!amtEl) continue;
    const amt=parseFloat(amtEl.value);
    const hold=parseFloat(document.getElementById("bb-hold-"+a.id).value)||0;
    if(isNaN(amt) || amt<0) continue;
    rows.push({ company_id:cid, bank_account_id:a.id, balance_date:sel,
                amount:amt, hold_amount:hold, source: isForecast?"forecast":"manual",
                note: note||null, created_by: AUTH.user?AUTH.user.id:null });
  }
  if(!rows.length){ alert("ยังไม่มียอดที่จะบันทึก — กรอกอย่างน้อย 1 บัญชี"); return; }
  const btn=document.getElementById("bbSaveBtn");
  if(btn){ btn.disabled=true; btn.textContent="กำลังบันทึก..."; }
  try{
    const { error } = await sb.from("bank_balances").insert(rows);
    if(error) throw error;
    renderToolBankBalance();   // คง selDate ไว้ (ไม่ null state)
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent="บันทึกทั้งหมด"; }
    alert("บันทึกไม่สำเร็จ: "+fopErr(e));
  }
}

/* import bank balance จาก Excel sheet "Bank_balance" */
function bbParseAcctHeader(s){
  // "SCB # 136-268488-9" or "SCB #417-0771640" or "BBL # 865-0-980405"
  s = String(s||"").trim();
  const m = s.match(/^([A-Z]+)\s*#\s*([\d\-\s]+)$/i);
  if(!m) return null;
  const bank = m[1].toUpperCase();
  const no = m[2].replace(/\s/g,"");
  return { bank_code: bank, account_no: no };
}
async function bbImportExcel(file){
  if(!file) return;
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:"array", cellDates:true });
    const sheetName = wb.SheetNames.find(n => /bank.?balance/i.test(n)) || "Bank_balance";
    if(!wb.Sheets[sheetName]){ alert("ไม่พบ sheet 'Bank_balance' ในไฟล์"); return; }
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header:1, defval:"", blankrows:false });
    if(rows.length < 3){ alert("ข้อมูลใน sheet ว่าง"); return; }

    // r0 = header (วันที่, เลขที่บัญชี,...)
    // r1 = account labels (col B,C,D... = "SCB # ...")
    // r2+ = data
    const accountCols = [];   // [{col, bank_code, account_no}]
    for(let c = 1; c < rows[1].length; c++){
      const label = rows[1][c];
      if(!label || /^รวม$|^หมายเหต/.test(String(label).trim())) continue;
      const parsed = bbParseAcctHeader(label);
      if(parsed) accountCols.push({ col:c, ...parsed, raw: label });
    }
    if(!accountCols.length){ alert("parse ชื่อบัญชีไม่ได้ — ต้องเป็น 'SCB # xxx-xxx-x'"); return; }

    // parse data rows
    const balances = [];   // {col index in accountCols, date, amount, note}
    for(let r = 2; r < rows.length; r++){
      const dRaw = rows[r][0];
      if(!dRaw) continue;
      let dateISO = null;
      if(dRaw instanceof Date) dateISO = dRaw.toISOString().slice(0,10);
      else if(typeof dRaw === "string"){
        const m = dRaw.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if(m) dateISO = `${m[1]}-${m[2]}-${m[3]}`;
      }
      if(!dateISO) continue;
      const note = String(rows[r][rows[r].length - 1] || "").trim();   // last col often = หมายเหตุ
      for(const ac of accountCols){
        const v = rows[r][ac.col];
        const amt = Number(v);
        if(!isNaN(amt) && amt > 0){
          balances.push({ accountIdx: accountCols.indexOf(ac), date: dateISO, amount: amt, note: /รอถอน|หมาย/i.test(note) ? note : null });
        }
      }
    }
    if(!balances.length){ alert("ไม่พบยอดเงินที่ valid"); return; }

    // confirm
    const summary = accountCols.map(a => {
      const cnt = balances.filter(b => b.accountIdx === accountCols.indexOf(a)).length;
      return `  ${a.bank_code} ${a.account_no} — ${cnt} วัน`;
    }).join("\n");
    if(!confirm(`พบ ${accountCols.length} บัญชี · ${balances.length} แถวยอด:\n\n${summary}\n\nนำเข้า?`)) return;

    const cid = await fopCompanyId();
    // 1) resolve bank_accounts ผ่าน brecEnsureAccount (match ด้วยเลข normalize → ใช้บัญชีเดิม ไม่สร้างซ้ำ)
    const acctIdMap = {};
    for(const a of accountCols){
      const id = await brecEnsureAccount(cid, a.bank_code, a.account_no);
      if(!id){ alert("สร้างบัญชีไม่สำเร็จ: " + a.bank_code + " " + a.account_no); return; }
      acctIdMap[a.bank_code + "·" + a.account_no] = id;
    }

    // 2) insert balances (skip if duplicate date+account+amount)
    const balRows = [];
    for(const b of balances){
      const a = accountCols[b.accountIdx];
      const key = a.bank_code + "·" + a.account_no;
      const bankId = acctIdMap[key];
      if(!bankId) continue;
      balRows.push({
        company_id: cid, bank_account_id: bankId,
        balance_date: b.date, amount: b.amount, hold_amount: 0,
        source: "excel_import", note: b.note || null,
        created_by: AUTH.user ? AUTH.user.id : null
      });
    }
    const { error: bErr } = await sb.from("bank_balances").insert(balRows);
    if(bErr){ alert("บันทึก balances ไม่สำเร็จ: " + fopErr(bErr)); return; }

    alert(`สำเร็จ — ${accountCols.length} บัญชี + ${balRows.length} รายการยอด`);
    state.bb[state.company] = null;
    renderToolBankBalance();
  }catch(e){ alert("Import error: " + fopErr(e)); }
}

   MODULE: AP OUTSTANDING (CSV upload + list)
   ---------------------------------------------------------------- */
state.apo = state.apo || {};
function apoGet(){
  if(!state.apo[state.company]) state.apo[state.company] = {
    invoices:null, vendors:null, busy:false,
    filter:{ search:"", colFilters:{}, planned:"all", overdueOnly:false },
    sort:{ key:"due_date", desc:false },
    openCol:null
  };
  const d = state.apo[state.company];
  // backward-compat: เก่ามี vendors/categories/ages/statuses arrays → ย้ายเข้า colFilters
  const f = d.filter;
  if(!f.colFilters) f.colFilters = {};
  const map = { vendors:"_vendor", categories:"category", ages:"age_bucket", statuses:"status" };
  for(const old in map){
    if(Array.isArray(f[old]) && f[old].length){ f.colFilters[map[old]] = f[old].slice(); }
    delete f[old];
  }
  // ทำให้ colFilters[k] เป็น Array<string> เสมอ
  for(const k in f.colFilters){
    const v = f.colFilters[k];
    if(!Array.isArray(v)) f.colFilters[k] = (v == null || v === "") ? [] : [String(v)];
    if(f.colFilters[k].length === 0) delete f.colFilters[k];
  }
  return d;
}
/* search ใช้ debounce + partial re-render → ไม่กระพริบ ไม่เสีย focus */
let _apoSearchTimer = null;
function apoSetSearch(v){
  apoGet().filter.search = v;
  if(_apoSearchTimer) clearTimeout(_apoSearchTimer);
  _apoSearchTimer = setTimeout(apoApplyChanges, 80);
}
function apoSetFilter(k, v){ apoGet().filter[k] = v; apoApplyChanges(); }
function apoSetSort(k){
  const s = apoGet().sort;
  if(s.key === k) s.desc = !s.desc;
  else { s.key = k; s.desc = false; }
  apoApplyChanges();
}
function apoToggleColVal(col, val){
  const f = apoGet().filter;
  if(!Array.isArray(f.colFilters[col])) f.colFilters[col] = [];
  const i = f.colFilters[col].indexOf(val);
  if(i >= 0) f.colFilters[col].splice(i, 1);
  else f.colFilters[col].push(val);
  if(f.colFilters[col].length === 0) delete f.colFilters[col];
  apoGet().openCol = col;
  apoApplyChanges();
}
function apoSelectAllCol(col, allValues){
  const f = apoGet().filter;
  const curr = f.colFilters[col] || [];
  if(curr.length === allValues.length) delete f.colFilters[col];
  else f.colFilters[col] = allValues.slice();
  apoGet().openCol = col;
  apoApplyChanges();
}
function apoClearCol(col){
  const f = apoGet().filter;
  delete f.colFilters[col];
  apoGet().openCol = col;
  apoApplyChanges();
}
function apoOpenCol(col){ apoGet().openCol = col; }
function apoCloseCol(){
  apoGet().openCol = null;
  document.querySelectorAll('details.col-fdd[open]').forEach(d => d.removeAttribute('open'));
}
/* sync state.openCol กับ <details open> ผ่าน ontoggle */
function apoOnToggleCol(col, isOpen){
  const d = apoGet();
  if(isOpen) d.openCol = col;
  else if(d.openCol === col) d.openCol = null;
}
function apoClearFilter(){
  const d = apoGet();
  d.filter = { search:"", colFilters:{}, planned:"all", overdueOnly:false };
  d.openCol = null;
  // ล้าง search input ใน DOM ด้วย
  const inp = document.getElementById('apoSearch');
  if(inp) inp.value = "";
  apoApplyChanges();
}
/* คุมการ show/hide ของ option list ใน col-filter (ไม่ต้อง re-render) */
function apoFilterColOpts(col, q){
  const list = document.querySelector('[data-col-opts="' + col + '"]');
  if(!list) return;
  q = (q||"").toLowerCase();
  list.querySelectorAll('[data-opt-label]').forEach(it => {
    it.style.display = it.getAttribute('data-opt-label').toLowerCase().includes(q) ? '' : 'none';
  });
}
/* click-outside ปิด popup */
function apoSetupClickOutside(){
  if(window._apoClickOutsideInstalled) return;
  window._apoClickOutsideInstalled = true;
  document.addEventListener('click', e => {
    document.querySelectorAll('details.col-fdd[open]').forEach(dd => {
      if(!dd.contains(e.target)){
        dd.removeAttribute('open');
        const d = state.apo && state.apo[state.company];
        if(d) d.openCol = null;
      }
    });
  });
}

async function apoSaveNote(id){
  const err = document.getElementById("apoNoteErr");
  const btn = document.getElementById("apoNoteBtn");
  const val = document.getElementById("apoNoteInput").value;
  btn.disabled=true; btn.textContent="กำลังบันทึก...";
  try{
    const { error } = await sb.from("ap_invoices")
      .update({ internal_note: val || null, updated_by: AUTH.user?AUTH.user.id:null })
      .eq("id", id);
    if(error) throw error;
    const d = apoGet();
    const row = (d.invoices||[]).find(r => r.id === id);
    if(row) row.internal_note = val || null;

    renderToolApOutstanding();
  }catch(e){
    btn.disabled=false; btn.textContent="บันทึก";
    err.textContent=fopErr(e); err.style.display="";
  }
}

/* ── บัญชีตัดจ่าย (ใช้ร่วม AP + ค่าใช้จ่ายประจำ) ──────────────── */
/* label สั้น ๆ ของบัญชี: [ชื่อเล่น ·] ธนาคาร เลขบัญชี */
function fopAccLabel(a){
  if(!a) return "—";
  const name = cffBankName(a.bank_code);
  const no = String(a.account_no||"").trim();
  return (a.nickname ? a.nickname + " · " : "") + name + " " + no;
}
/* default = บัญชีที่เลขลงท้าย 4889 (digits-only) ไม่งั้นใช้บัญชีแรก */
function fopDefaultAccId(accounts){
  if(!accounts || !accounts.length) return null;
  const m = accounts.find(a => String(a.account_no||"").replace(/\D/g,"").endsWith("4889"));
  return (m || accounts[0]).id;
}
/* <option> list ของบัญชีทั้งหมด — selectedId ตรงไหน selected ตรงนั้น */
function fopAccOptions(accounts, selectedId){
  return (accounts||[]).map(a =>
    `<option value="${a.id}" ${String(selectedId)===String(a.id)?'selected':''}>${esc(fopAccLabel(a))}</option>`
  ).join("");
}

  const d = apoGet();
  const cid = await fopCompanyId();
