/* ============================================================
   BANK RECONCILIATION — PHASE 2 (Marketplace Withdrawal Recon)
   Shopee balance + Express รับชำระ + Express เช็ครับ
   - Group orders ตาม withdrawal event ของ Shopee wallet
   - Generate BQ (YYMMDD + seq) จาก max ที่มีใน "เช็ครับ"
   - Validate Express AR gross ↔ Shopee net (per-order mismatch detect)
   - Output CSV 9 cols + Excel รายการ mismatch
   helper prefix: bmp*
   ============================================================ */

/* ------- shop name → company + bank routing ------- */
const BMP_SHOP_ROUTING = {
  // shop_name (lowercase) → { companyId, bankCode, accountNo, depositCode, channel, channelLabel, descSuffix }
  // depositCode = รหัสบัญชีฝากใน AutoKey ของ Express (01/02/S1)
  "mommam_official": { companyId:"mbark", bankCode:"SCB", accountNo:"1362709281", depositCode:"S1", channel:"shopee", channelLabel:"Shopee mommam", descSuffix:"Shopee mommam" },
  "benya_official":  { companyId:"benya", bankCode:"SCB", accountNo:"4170771640", depositCode:"01", channel:"shopee", channelLabel:"Shopee Qi care",  descSuffix:"Shopee Qi care" },
  "betra_brand":     { companyId:"benya", bankCode:"BBL", accountNo:"8650980405", depositCode:"02", channel:"shopee", channelLabel:"Shopee Betra",    descSuffix:"Shopee Betra" }
};

function bmpRouting(shopName){
  const k = String(shopName||"").trim().toLowerCase();
  if(BMP_SHOP_ROUTING[k]) return BMP_SHOP_ROUTING[k];
  // fallback — generic shopee, no routing
  return { companyId:null, bankCode:null, accountNo:null, channel:"shopee", channelLabel:`Shopee ${shopName}`, descSuffix:`Shopee ${shopName}` };
}

/* ------- TIS-620 / windows-874 CSV parsing ------- */
function bmpDecodeCp874(buf){
  return new TextDecoder("windows-874").decode(buf);
}
/* auto-detect CSV type by content — กัน user วางไฟล์ผิด slot */
function bmpDetectCsvType(text){
  const head = String(text||"").slice(0, 4000);
  if(/รายงานเช็ครับ|วันที่นำฝาก[\s\S]{0,200}เลขที่เช็ค[\s\S]{0,200}ใบนำฝาก/.test(head)) return "cheque";
  if(/รายงานการรับชำระหนี้|เลขที่ใบเสร็จ[\s\S]{0,200}ยอดตามใบกำกับ/.test(head)) return "receipt";
  if(/วิเคราะห์ยอดขาย|แยกตามเขตการขาย/.test(head)) return "sales";
  return "unknown";
}
function bmpParseCsvText(text){
  // simple CSV parser supporting quoted fields with "" escape + NBSP normalization
  text = text.replace(/ /g," "); // NBSP → space
  const rows = []; let row = []; let cur = ""; let inQuote = false;
  for(let i=0;i<text.length;i++){
    const ch = text[i];
    if(inQuote){
      if(ch === '"'){
        if(text[i+1] === '"'){ cur += '"'; i++; }
        else inQuote = false;
      } else cur += ch;
    } else {
      if(ch === '"') inQuote = true;
      else if(ch === ','){ row.push(cur); cur = ""; }
      else if(ch === '\n'){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else if(ch === '\r'){ /* skip */ }
      else cur += ch;
    }
  }
  if(cur.length || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

/* ------- Thai BE date dd/mm/yyyy(BE) → ISO YYYY-MM-DD (CE) ------- */
function bmpThaiDate(s){
  if(!s) return null;
  const m = String(s).trim().match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(!m) return null;
  let y = parseInt(m[3],10);
  if(y < 100) y += 2500;
  if(y >= 2400) y -= 543;
  return `${y}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
}

/* ============================================================
   PARSER 1 — Shopee Balance Transaction Report (.xlsx)
   - Header row ~18 (วันที่/ประเภทการทำธุรกรรม/...)
   - Shop name in row 6
   - Period in rows 7-8
   ============================================================ */
function bmpParseShopeeBalance(workbook){
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:"", raw:true });
  let shopName = null, periodFrom = null, periodTo = null;
  // scan first 15 rows for header info
  for(let i=0;i<Math.min(rows.length,16);i++){
    const a = String((rows[i]||[])[0]||"").trim();
    const b = (rows[i]||[])[1];
    if(/ชื่อผู้ใช้ของผู้ขาย/.test(a)) shopName = String(b||"").trim();
    else if(a === "จาก") periodFrom = bmpIsoFromAny(b);
    else if(a === "ไปยัง") periodTo = bmpIsoFromAny(b);
  }
  // find header row containing "วันที่" + "ประเภทการทำธุรกรรม"
  let hr = -1;
  for(let i=0;i<Math.min(rows.length,30);i++){
    const r = (rows[i]||[]).map(x=>String(x||"").trim());
    if(r[0]==="วันที่" && r.some(x=>x==="ประเภทการทำธุรกรรม")){ hr = i; break; }
  }
  if(hr < 0) throw new Error("ไม่พบ header Shopee balance (วันที่ / ประเภทการทำธุรกรรม)");
  const head = rows[hr].map(x=>String(x||"").trim());
  const idx = (n)=> head.indexOf(n);
  const cDt=idx("วันที่"), cType=idx("ประเภทการทำธุรกรรม"), cDesc=idx("คำอธิบาย"),
        cOid=idx("รหัสคำสั่งซื้อ"), cFlow=idx("รูปแบบธุรกรรม"), cAmt=idx("จำนวนเงิน"),
        cStatus=idx("สถานะ"), cBal=idx("ยอดเงินหลังทำธุรกรรมเสร็จสิ้น");

  const txns = [];
  for(let i=hr+1;i<rows.length;i++){
    const r = rows[i]; if(!r) continue;
    const dtRaw = r[cDt]; if(!dtRaw) continue;
    const txType = String(r[cType]||"").trim();
    if(!txType) continue;
    const dt = String(dtRaw).trim();
    // dt is like "2026-06-20 20:38:33"
    const dateOnly = dt.slice(0,10);
    const amount = Number(r[cAmt])||0;
    txns.push({
      datetime: dt,
      txn_date: dateOnly,
      type: txType,
      desc: String(r[cDesc]||"").trim(),
      order_id: String(r[cOid]||"").trim().replace(/^[#-]+/,""),
      flow: String(r[cFlow]||"").trim(),
      amount: amount,
      status: String(r[cStatus]||"").trim(),
      balance_after: Number(r[cBal])||0,
      raw_row: i+1
    });
  }
  // sort ascending by datetime (Shopee report is descending)
  txns.sort((a,b)=> a.datetime.localeCompare(b.datetime));
  return { shopName, periodFrom, periodTo, txns };
}
function bmpIsoFromAny(v){
  if(!v) return null;
  if(v instanceof Date){
    return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,"0")}-${String(v.getDate()).padStart(2,"0")}`;
  }
  const s = String(v).trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  return bmpThaiDate(s);
}

/* ============================================================
   PARSER 2 — Express รับชำระหนี้ CSV (cp874)
   ใช้เพื่อดึง gross ของแต่ละ SP cheque + RE receipt no
   ============================================================ */
function bmpParseArReceipt(text){
  const rows = bmpParseCsvText(text);
  let hr = -1, head = null;
  for(let i=0;i<Math.min(rows.length,15);i++){
    const r = (rows[i]||[]).map(x=>String(x||"").trim());
    if(r.includes("เลขที่ใบเสร็จ") && r.includes("ยอดตามใบกำกับ")){ hr = i; head = r; break; }
  }
  if(hr < 0) throw new Error("ไม่พบ header รับชำระหนี้ (เลขที่ใบเสร็จ + ยอดตามใบกำกับ)");

  // โครงสร้างแต่ละ block: RE row + cheque rows (SP/SI/TI/TT/LZ) + IV rows (IV...)
  // ★ build map: IV doc_no → { cheque_no, amount, channel, receipt_no }
  const cheques = [];
  const ivToCheque = new Map();
  let curReceipt = null;

  function flushReceipt(){
    if(!curReceipt) return;
    const r = curReceipt;
    if(r.ivs.length && r.cheques.length){
      if(r.cheques.length === 1){
        for(const iv of r.ivs){
          ivToCheque.set(iv.doc_no, {
            cheque_no: r.cheques[0].cheque_no, amount: r.cheques[0].amount,
            channel: r.cheques[0].channel, receipt_no: r.receipt_no
          });
        }
      } else if(r.cheques.length === r.ivs.length){
        for(let i=0;i<r.ivs.length;i++){
          ivToCheque.set(r.ivs[i].doc_no, {
            cheque_no: r.cheques[i].cheque_no, amount: r.cheques[i].amount,
            channel: r.cheques[i].channel, receipt_no: r.receipt_no
          });
        }
      } else {
        const used = new Set();
        for(const iv of r.ivs){
          let mi = -1;
          for(let k=0;k<r.cheques.length;k++){
            if(used.has(k)) continue;
            if(Math.abs(r.cheques[k].amount - iv.amount) < 0.005){ mi = k; break; }
          }
          if(mi >= 0){
            used.add(mi);
            ivToCheque.set(iv.doc_no, {
              cheque_no: r.cheques[mi].cheque_no, amount: r.cheques[mi].amount,
              channel: r.cheques[mi].channel, receipt_no: r.receipt_no
            });
          }
        }
      }
    }
    curReceipt = null;
  }

  for(let i=hr+1;i<rows.length;i++){
    const row = rows[i] || [];
    let reFound = null;
    for(const cell of row){
      const v = String(cell||"").trim();
      if(/^RE\d{10}$/.test(v)){ reFound = v; break; }
    }
    if(reFound){
      flushReceipt();
      curReceipt = { receipt_no: reFound, ivs:[], cheques:[] };
      continue;
    }
    if(!curReceipt) continue;
    for(let j=0;j<row.length;j++){
      const v = String(row[j]||"").trim();
      if(/^IV\d{10}$/.test(v)){
        let amt = 0;
        for(let k=j+1;k<row.length;k++){
          const vv = String(row[k]||"").trim();
          if(!vv) continue;
          if(/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(vv)) continue;
          const n = Number(vv.replace(/,/g,""));
          if(!isNaN(n) && n > 0){ amt = n; break; }
        }
        curReceipt.ivs.push({ doc_no: v, amount: amt });
        break;
      }
    }
    for(let j=0;j<row.length;j++){
      const v = String(row[j]||"").trim();
      const m = v.match(/^([A-Z]{2,4}\d{8,12})$/);
      // exclude document prefixes (IV/RE/BQ/TXRE/CN/SR) — เหลือเช็คทุก prefix (SP/SB/SI/TT/TI/TB/TQ/LZ/LD/LI/FB)
      if(m && !/^(?:IV|RE|BQ|TXRE|CN|SR)\d/.test(m[1])){
        const chq = m[1];
        let amt = 0, chan = "";
        for(let k=j+1;k<row.length;k++){
          const vv = String(row[k]||"").trim();
          if(!vv) continue;
          if(/^Shopee|TikTok|Lazada/i.test(vv)){ chan = vv; continue; }
          if(/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(vv)) continue;
          const n = Number(vv.replace(/,/g,""));
          if(!isNaN(n) && n > 0){ amt = n; break; }
        }
        curReceipt.cheques.push({ cheque_no: chq, amount: amt, channel: chan });
        cheques.push({ cheque_no: chq, order_id: chq.replace(/^[A-Z]+/,""), amount: amt,
                       receipt_no: curReceipt.receipt_no, channel: chan });
        break;
      }
    }
  }
  flushReceipt();
  return { cheques, ivToCheque };
}

/* ============================================================
   PARSER 2.5 — Express รายงานขาย 723-5 (cp874)
   หา IV + amount + "อ้างอิง" (Shopee Order ID) + ระบุ channel
   จาก customer header section (Shopee Betra / Shopee Qi Care / Lazada Qi care / etc.)
   ============================================================ */
function bmpParseSalesReport(text){
  const rows = bmpParseCsvText(text);
  const ivs = [];
  let curCustomer = null, curChannel = null;
  const custRe = /^\s*(ลูกค้า.+?)\s*\/(.+?)$/;
  // Token-based parser — รองรับแถวที่ ส่วนลด/มัดจำ/มูลค่า/VAT ว่างบ้าง
  // โครงสร้าง: doc_no, doc_date, V_flag, [discount?], [deposit?], [goods?], [vat?], total, due_date, status, ref"
  // ใช้ scan ย้อนกลับหา due_date pattern + ดึง total = numeric ตัวสุดท้ายก่อน due_date
  function parseIvRow(line){
    const trimmed = line.trim();
    const voided = /^\*/.test(trimmed);
    const t = trimmed.replace(/^\*\s*/, "").split(/\s+/);
    if(t.length < 6) return null;
    if(!/^(?:IV|SR|CN)\d{10}$/.test(t[0])) return null;
    if(!/^\d{2}\/\d{2}\/\d{2}$/.test(t[1])) return null;
    const last = t.length - 1;
    // หา due_date ตำแหน่งสุดท้าย dd/mm/yy ใน row
    let dueIdx = -1;
    for(let i=last; i>=2; i--){
      if(/^\d{2}\/\d{2}\/\d{2}$/.test(t[i])){ dueIdx = i; break; }
    }
    if(dueIdx < 0) return null;
    // ref = token แรกหลัง dueIdx ที่ลงท้ายด้วย " (CSV escape artifact)
    // กรณีรายงานมีคอลัมน์สถิติ (ยอดขาย/ต้นทุน/กำไร/%) ตามหลัง ref ก็ใช้ได้
    let refIdx = -1;
    for(let i=dueIdx+1; i<=last; i++){
      if(/"$/.test(t[i] || "")){ refIdx = i; break; }
    }
    // fallback: ถ้าไม่เจอ " ใช้ token แรกหลัง flag (dueIdx+2)
    if(refIdx < 0) refIdx = dueIdx + 2;
    const ref = String(t[refIdx]||"").replace(/"+$/,"").trim();
    if(!ref) return null;
    // total = numeric ตัวสุดท้ายก่อน due_date
    let total = 0;
    for(let i=dueIdx-1; i>=2; i--){
      const v = String(t[i]||"").replace(/,/g,"");
      if(/^-?\d+\.?\d*$/.test(v)){ total = Number(v); break; }
    }
    return {
      doc_type: t[0].slice(0,2),
      doc_no: t[0],
      doc_date_be: t[1],
      doc_date: bmpThaiDate(t[1]),
      total,
      due_date: bmpThaiDate(t[dueIdx]),
      ref_order_id: ref,
      voided
    };
  }
  for(const row of rows){
    if(!row || !row.length) continue;
    const line = row[0] || ""; if(!line) continue;
    const trimmed = line.trim();
    if(!trimmed || /^-+$/.test(trimmed)) continue;
    if(/^รวม/.test(trimmed)) continue;
    const cm = trimmed.match(custRe);
    if(cm && !/^\*?\s*(IV|SR|CN)\d{10}/.test(trimmed)){
      curCustomer = cm[1].replace(/\s+/g," ").trim();
      curChannel = cm[2].replace(/\s+/g," ").trim();
      continue;
    }
    const iv = parseIvRow(line);
    if(iv){ iv.customer = curCustomer; iv.channel = curChannel; ivs.push(iv); }
  }
  return { ivs };
}

/* ============================================================
   PARSER 3 — Express เช็ครับ เรียงตามวันที่นำฝาก CSV (cp874)
   ใช้เพื่อ:
   - รู้ BQ ที่ใช้แล้ว (กัน gen ซ้ำ)
   - หา deposit date ของเช็ค SP ที่ deposit แล้ว
   - หา bank account ปลายทาง (จาก "S/A #..." header)
   ============================================================ */
function bmpParseChequeReport(text){
  const rows = bmpParseCsvText(text);
  let hr = -1, head = null;
  for(let i=0;i<Math.min(rows.length,15);i++){
    const r = (rows[i]||[]).map(x=>String(x||"").trim());
    if(r.includes("วันที่นำฝาก") && r.includes("เลขที่เช็ค") && r.includes("ใบนำฝาก#")){ hr = i; head = r; break; }
  }
  if(hr < 0) throw new Error("ไม่พบ header เช็ครับ (วันที่นำฝาก + เลขที่เช็ค + ใบนำฝาก#)");
  const idx = (n)=> head.indexOf(n);
  const cDep=idx("วันที่นำฝาก"), cChqDate=idx("วันที่เช็ค"), cBank=idx("ธ."),
        cChq=idx("เลขที่เช็ค"), cBQ=idx("ใบนำฝาก#"), cAmt=idx("จำนวนเงิน"), cFrom=idx("รับจาก");

  const deposits = []; // each entry = one cheque under a deposit slip
  let curBankAccount = null; // raw header value "S/A #SCB 417-077164-0"
  for(let i=hr+1;i<rows.length;i++){
    const r = rows[i]; if(!r) continue;
    // detect "นำฝากเข้าบัญชี :" row → update curBankAccount
    const j = r.findIndex(c => String(c||"").trim() === "นำฝากเข้าบัญชี :");
    if(j >= 0){
      // value is in subsequent cells
      const parts = r.slice(j+1).map(x=>String(x||"").trim()).filter(Boolean);
      curBankAccount = parts.join(" ");
      continue;
    }
    const chq = String(r[cChq]||"").trim();
    if(!/^(?:SP|TT|LZ)\w+/.test(chq)) continue;
    const bq = String(r[cBQ]||"").trim();
    const amt = Number(String(r[cAmt]||"").replace(/,/g,""))||0;
    deposits.push({
      cheque_no: chq,
      order_id: chq.replace(/^(SP|TT|LZ)/,""),
      bq: bq,
      deposit_date: bmpThaiDate(r[cDep]),
      cheque_date: bmpThaiDate(r[cChqDate]),
      bank: String(r[cBank]||"").trim(),
      amount: amt,
      from: String(r[cFrom]||"").trim(),
      bank_account_raw: curBankAccount
    });
  }
  return { deposits };
}

/* ============================================================
   GROUPING + VALIDATION
   - sort txns asc by datetime
   - buffer orders + adjustments until เจอ "การถอนเงิน"
   - close group, create withdrawal
   ============================================================ */
function bmpGroupWithdrawals(parsed, arData, chqData, salesData, shopName, sharedSeqByDay){
  const txns = parsed.txns;

  // ---- index 1: Shopee Order ID → IV (จาก sales report) ----
  // นี่คือ bridge ที่ขาดอยู่ — เชื่อม Shopee Order กับระบบ Express
  const ivByOrderRef = new Map();
  for(const iv of (salesData?.ivs || [])){
    if(iv.voided) continue;
    if(!iv.ref_order_id) continue;
    ivByOrderRef.set(iv.ref_order_id, iv);
  }

  // ---- index 2: IV doc_no → cheque (จาก รับชำระ) ----
  // รับชำระ structure: cheques.receipt_no = RE → but we want IV link
  // Actually old parser only captured cheques w/ SP prefix — ไม่ link กับ IV ตรงๆ
  // เปลี่ยน strategy: คงไว้ที่ cheque info จาก SP cheque list, ใช้สำหรับ existing BQ
  const arBySp = new Map();
  for(const c of (arData.cheques||[])) arBySp.set(c.cheque_no, c);

  // ---- index 3: SP cheque → deposit info (จาก เช็ครับ) ----
  const chqBySp = new Map();
  for(const d of (chqData.deposits||[])) chqBySp.set(d.cheque_no, d);

  // build maxSeq per YYMMDD from existing BQ
  // ★ ใช้ sharedSeqByDay (ส่งเข้ามาจากภายนอก) ถ้าหลาย shop process ในงวดเดียวกัน
  // จะได้ไม่ได้ BQ ซ้ำกันข้าม shop
  const seqByDay = sharedSeqByDay || new Map();
  if(!sharedSeqByDay){
    for(const dep of (chqData.deposits||[])){
      const m = String(dep.bq||"").match(/^(\d{6})(\d{1,4})$/);
      if(m){
        const day = m[1], seq = parseInt(m[2],10);
        if(!seqByDay.has(day) || seqByDay.get(day) < seq) seqByDay.set(day, seq);
      }
    }
  }
  function nextBq(isoDate){
    // isoDate "2026-06-04" → "260604"
    const [y,m,d] = isoDate.split("-");
    const key = y.slice(2) + m + d;
    const next = (seqByDay.get(key)||0) + 1;
    seqByDay.set(key, next);
    return key + String(next).padStart(4,"0");
  }

  const routing = bmpRouting(shopName);
  const withdrawals = [];
  // ★ FIFO wallet model — Shopee เป็นกระเป๋าสะสม การถอนไม่ผูก order ชุดเดียว
  // queue เก็บ order+adjustment ที่ยังไม่ถูก assign · ถอนแต่ละครั้งดึง FIFO จนใกล้ยอดถอนสุด
  const queue = [];
  for(const tx of txns){
    if(tx.type === "การถอนเงิน"){
      const wdAmount = Math.abs(tx.amount);
      // FIFO pull: ดึงจากหน้า queue สะสมจน "ใกล้ยอดถอนสุด"
      const assigned = [];
      let acc = 0;
      while(queue.length){
        const front = queue[0];
        const amt = front.amount; // order = +net, adjustment = ส่วนใหญ่ติดลบ
        // ถ้าเป็น order แล้วบวกเข้าไปจะเกินยอดถอน → ใส่ต่อเฉพาะถ้าทำให้ "ใกล้ขึ้น"
        if(front.type === "รายรับจากคำสั่งซื้อ" && (acc + amt) > wdAmount){
          if(Math.abs((acc + amt) - wdAmount) < Math.abs(acc - wdAmount)){
            acc += amt; assigned.push(queue.shift());
          }
          break;
        }
        acc += amt; assigned.push(queue.shift());
      }
      const orders = assigned.filter(t => t.type === "รายรับจากคำสั่งซื้อ");
      const adjustments = assigned.filter(t => t.type === "รายการปรับปรุง");
      const sumNet = orders.reduce((s,o)=> s + o.amount, 0);
      const adjAmount = adjustments.reduce((s,a)=> s + a.amount, 0);
      const bq = nextBq(tx.txn_date);

      const orderRows = orders.map(o => {
        // ★ chain: Shopee Order → IV (sales) → SP cheque (รับชำระ)
        const iv = ivByOrderRef.get(o.order_id);
        const chq = iv ? (arData.ivToCheque ? arData.ivToCheque.get(iv.doc_no) : null) : null;
        // "มูลค่าเช็ค EXPRESS" = ยอดเช็ค SP (หักส่วนลด/commission แล้ว)
        const gross = chq ? Number(chq.amount) : (iv ? Number(iv.total) : 0);
        const net = o.amount;
        const feeDiff = gross ? +(gross - net).toFixed(2) : 0;
        // "เลขที่เช็ค" = SP/SI/TI prefix จาก รับชำระ (ไม่ใช่ IV)
        const chequeNo = chq ? chq.cheque_no
                             : (iv ? ("PENDING-" + iv.doc_no) : ("UNKNOWN-" + o.order_id));
        let mismatch = false; let reason = "";
        if(!iv){ mismatch = true; reason = "ไม่พบใน รายงานขาย — ยังไม่ออก IV"; }
        else if(iv.voided){ mismatch = true; reason = "IV ถูก void"; }
        else if(!chq){ mismatch = true; reason = "ยังไม่ได้ออกใบเสร็จ (ไม่มีเช็คใน รับชำระ)"; }
        else if(Math.abs(chq.amount - net) > 0.05){
          mismatch = true; reason = "ยอดเช็ค " + chq.amount.toFixed(2) + " ≠ Shopee net " + net.toFixed(2);
        }
        return {
          channel: routing.channel,
          order_id: o.order_id,
          cheque_no: chequeNo,
          txn_datetime: o.datetime,
          txn_type: "order",
          express_gross: gross,
          shopee_net: net,
          fee_diff: feeDiff,
          receipt_no: chq ? chq.receipt_no : (iv ? iv.doc_no : null),
          has_receipt: !!iv,
          has_cheque_deposit: !!chq,
          existing_bq: null,
          mismatch_flag: mismatch,
          mismatch_reason: reason
        };
      });

      const adjRows = adjustments.map(a => ({
        channel: routing.channel,
        order_id: a.order_id || "-",
        cheque_no: a.order_id ? ("SP"+a.order_id) : null,
        txn_datetime: a.datetime,
        txn_type: "adjustment",
        express_gross: 0,
        shopee_net: a.amount,
        fee_diff: 0,
        receipt_no: null,
        has_receipt: false,
        has_cheque_deposit: false,
        existing_bq: null,
        mismatch_flag: false,
        mismatch_reason: "",
        desc: a.desc
      }));

      const sumGross = orderRows.reduce((s,o)=> s + (o.express_gross||0), 0);
      // ค่าธรรมเนียม/ส่วนต่าง = ยอดเช็คที่คีย์ (gross) − ยอดเข้าแบงค์จริง
      // (FIFO เกือบลงตัว — เศษเป็น carry เล็กน้อยที่ยกไปงวดถัดไป)
      const carryDiff = +(sumGross + adjAmount - wdAmount).toFixed(2);
      const mismatchCount = orderRows.filter(o=>o.mismatch_flag).length;
      // เตือนถ้ายอด assign ต่ำกว่ายอดถอนมาก (มียอดยกมาจากก่อนงวด — orders ไม่ครบ)
      const shortfall = (sumGross + adjAmount) < (wdAmount - 1);

      withdrawals.push({
        channel: routing.channel,
        shop_name: shopName,
        bank_code: routing.bankCode,
        bank_account_no: routing.accountNo,
        deposit_code: routing.depositCode || "",
        company_id_slug: routing.companyId,
        withdraw_datetime: tx.datetime,
        withdraw_date: tx.txn_date,
        withdraw_amount: wdAmount,
        bq_number: bq,
        description: `รับเงินจากการขาย ${routing.descSuffix}`,
        order_count: orderRows.length,
        sum_gross: +sumGross.toFixed(2),
        sum_net: +sumNet.toFixed(2),
        total_fee: carryDiff,
        adjustment_amount: +adjAmount.toFixed(2),
        carry_shortfall: shortfall,
        mismatch_count: mismatchCount,
        orders: orderRows,
        adjustments: adjRows
      });
    } else if(tx.type === "รายรับจากคำสั่งซื้อ" || tx.type === "รายการปรับปรุง"){
      queue.push(tx);
    }
  }
  return withdrawals;
}

/* ============================================================
   UPLOAD MODAL + FLOW
   ============================================================ */
async function bmpOpenUpload(){
  const d = brecGet();
  d.mp.uploadOpen = true;
  renderToolBankRec();
  bmpRenderUploadModal();
  // โหลดข้อมูล Express cache (ครั้งก่อนอัปไว้) → ครั้งนี้อัปแค่ Shopee พอ
  try{
    const co = d.companyId || await fopCompanyId();
    if(co){
      const { data } = await sb.from("brec_mp_express_cache")
        .select("sales_files,ar_files,cheque_files,updated_at").eq("company_id", co).maybeSingle();
      d.mp.expressCache = data || null;
      bmpRenderUploadModal();
    }
  }catch(e){ console.warn("express cache load", e); }
}
/* โหลด parsed Express จาก cache → คืน {salesData, arData, chqData} หรือ null */
async function bmpLoadExpressFromCache(co){
  const { data, error } = await sb.from("brec_mp_express_cache")
    .select("sales_json,ar_json,cheque_json").eq("company_id", co).maybeSingle();
  if(error || !data) return null;
  const salesData = data.sales_json || { ivs:[] };
  const arRaw = data.ar_json || { cheques:[], ivToCheque:[] };
  const arData = { cheques: arRaw.cheques||[], ivToCheque: new Map(arRaw.ivToCheque||[]) };
  const chqData = data.cheque_json || { deposits:[] };
  return { salesData, arData, chqData };
}
function bmpCloseUpload(){
  const d = brecGet();
  d.mp.uploadOpen = false;
  d.mp.files = { shopee:[], sales:[], receipt:[], cheque:[] };
  const m = document.getElementById("bmpUploadModal"); if(m) m.remove();
  renderToolBankRec();
}
function bmpRenderUploadModal(){
  const old = document.getElementById("bmpUploadModal"); if(old) old.remove();
  const d = brecGet();
  const f = d.mp.files;
  const cache = d.mp.expressCache;
  const hasCache = !!cache;
  // มี Express ครบ (อัปใหม่ครบ 3) หรือ มี cache อยู่แล้ว
  const expressOk = (f.sales.length && f.receipt.length && f.cheque.length) || hasCache;

function bmpFilesPicked(kind, fileList){
  const d = brecGet();
  if(!Array.isArray(d.mp.files[kind])) d.mp.files[kind] = [];
  // dedupe by name+size
  const existing = new Set(d.mp.files[kind].map(f=>f.name+"|"+f.size));
  for(const f of fileList){
    const k = f.name+"|"+f.size;
    if(!existing.has(k)){ d.mp.files[kind].push(f); existing.add(k); }
  }
  bmpRenderUploadModal();
}
function bmpFileRemove(kind, i){
  const d = brecGet();
  d.mp.files[kind].splice(i,1);
  bmpRenderUploadModal();
}

/* ============================================================
   ORDER LEDGER — Phase A
   ป้อน orders จากรายงานขาย 723-5 · 1 order = 1 IV · dedup by iv_no
   ============================================================ */
function ordChannelGroup(channel, customer){
  const s = `${channel||""} ${customer||""}`.toLowerCase();
  if(/shopee|\bsp\b|\bsh\b/.test(s)) return "shopee";
  if(/tiktok|\btt\b|\btk\b/.test(s)) return "tiktok";
  if(/lazada|\blz\b/.test(s)) return "lazada";
  if(/line|facebook|\bfb\b|\big\b|หน้าร้าน|dealer|\bdr\b/.test(s)) return "offline";
  return "other";
}
/* ===== Phase A: parser รายงานขายหลังบ้าน 4 ช่องทาง (item-level → group เป็นออเดอร์) ===== */
const ORD_CH = {
  shopee:    { sig:["หมายเลขคำสั่งซื้อ","สถานะการสั่งซื้อ"], order:"หมายเลขคำสั่งซื้อ", status:"สถานะการสั่งซื้อ", date:"วันที่ทำการสั่งซื้อ", product:"ชื่อสินค้า", qty:"จำนวน", ret:"จำนวนที่ส่งคืน", net:"ราคาขายสุทธิ", ship:"ค่าจัดส่งที่ชำระโดยผู้ซื้อ", disc:"โค้ดส่วนลดชำระโดยผู้ขาย", cancelKw:"ยกเลิก", group:"shopee" },
  tiktok:    { sig:["Order ID","Order Status"], order:"Order ID", status:"Order Status", date:"Created Time", product:"Product Name", qty:"Quantity", ret:"Sku Quantity of return", net:"SKU Subtotal After Discount", ship:"Shipping Fee After Discount", disc:"SKU Seller Discount", cancelKw:"ยกเลิก|Cancel", group:"tiktok" },
  lazada:    { sig:["orderNumber","sellerSku"], order:"orderNumber", status:"status", date:"createTime", product:"itemName", qty:null, ret:null, net:"paidPrice", ship:"shippingFee", disc:"sellerDiscountTotal", refund:"refundAmount", cancelKw:"cancel", group:"lazada" },
  bigseller: { sig:["หมายเลขคำสั่งซื้อ","ร้านค้า BigSeller"], order:"หมายเลขคำสั่งซื้อ", status:"สถานะคำสั่งซื้อ", platform:"แพลตฟอร์ม", date:"เวลาสั่งซื้อ", product:"ชื่อสินค้า", qty:"จำนวน", net:"รวมค่าสินค้า", ship:"ค่าจัดส่ง", disc:"ส่วนลดผู้ขาย", cancelKw:"ยกเลิก", group:"bigseller" }
};
function ordDetectChannel(headers){
  const H = headers.map(h=>String(h||"").trim());
  for(const [ch,cfg] of Object.entries(ORD_CH)){
    if(cfg.sig.every(s => H.includes(s))) return ch;
  }
  return null;
}
function ordNum(v){ if(v==null||v==="")return 0; const n=Number(String(v).replace(/[,%\s]/g,"")); return isNaN(n)?0:n; }
function ordISO(v){ if(!v) return null; const s=String(v).trim(); let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return `${m[1]}-${m[2]}-${m[3]}`; return bmpThaiDate(s); }
/* parse 1 ไฟล์รายงานขาย → คืน { channel, orders:[...] } */
function ordParseSalesFile(rows){
  if(!rows.length) return null;
  const headers = rows[0].map(x=>String(x||"").trim());
  const ch = ordDetectChannel(headers);
  if(!ch) return null;
  const cfg = ORD_CH[ch];
  const idx = (name)=> name ? headers.indexOf(name) : -1;
  const ci = { order:idx(cfg.order), status:idx(cfg.status), date:idx(cfg.date), product:idx(cfg.product),
    qty:idx(cfg.qty), ret:idx(cfg.ret), net:idx(cfg.net), ship:idx(cfg.ship), disc:idx(cfg.disc),
    refund:idx(cfg.refund), platform:idx(cfg.platform) };
  const groups = new Map();
  for(let r=1;r<rows.length;r++){
    const row = rows[r]; if(!row) continue;
    const oid = String(row[ci.order]||"").trim(); if(!oid) continue;
    // BigSeller: เอาเฉพาะ platform ที่ไม่ใช่ shopee/tiktok/lazada
    if(ch==="bigseller" && ci.platform>=0){
      const pf = String(row[ci.platform]||"").toLowerCase();
      if(/shopee|tiktok|lazada/.test(pf)) continue;
    }
    if(!groups.has(oid)) groups.set(oid, { order_id:oid, items:[], status:"", date:null, products:new Set(), qty:0, ret:0, net:0, ship:0, disc:0, refund:0, platform:"" });
    const g = groups.get(oid);
    if(ci.status>=0 && !g.status) g.status = String(row[ci.status]||"").trim();
    if(ci.date>=0 && !g.date) g.date = ordISO(row[ci.date]);
    if(ci.product>=0){ const p=String(row[ci.product]||"").trim(); if(p) g.products.add(p); }
    g.qty += ci.qty>=0 ? ordNum(row[ci.qty]) : 1;
    if(ci.ret>=0) g.ret += ordNum(row[ci.ret]);
    g.net += ci.net>=0 ? ordNum(row[ci.net]) : 0;
    if(ci.ship>=0) g.ship = Math.max(g.ship, ordNum(row[ci.ship]));  // order-level (ซ้ำทุกแถว)
    if(ci.disc>=0) g.disc += ordNum(row[ci.disc]);
    if(ci.refund>=0) g.refund += ordNum(row[ci.refund]);
    if(ci.platform>=0 && !g.platform) g.platform = String(row[ci.platform]||"").trim();
  }
  const cancelRe = new RegExp(cfg.cancelKw, "i");
  const orders = [...groups.values()].map(g => {
    const cancelled = cancelRe.test(g.status);
    const returned = g.ret > 0 || /คืน|return|refund/i.test(g.status);
    const prodArr = [...g.products];
    return {
      order_id: g.order_id,
      channel_group: cfg.group,
      channel: cfg.group + (g.platform?(" · "+g.platform):""),
      order_date: g.date,
      status: cancelled ? "cancelled" : "active",
      sale_status_raw: g.status,
      products: prodArr.slice(0,5).join(" | ") + (prodArr.length>5?` (+${prodArr.length-5})`:""),
      item_count: g.qty,
      order_total: +g.net.toFixed(2),
      shipping_fee: +g.ship.toFixed(2),
      seller_discount: +g.disc.toFixed(2),
      returned_qty: g.ret,
      is_returned: returned
    };
  });
  return { channel: ch, orders };
}
/* upsert ออเดอร์จากช่องทาง (dedup by order_id) → คืน {added, updated, total} */
async function ordIngestChannelOrders(co, parsed, srcLabel){
  const orders = parsed.orders || [];
  if(!orders.length) return { added:0, updated:0, total:0 };
  const { data:existing } = await sb.from("order_ledger").select("id,order_id,status,iv_no")
    .eq("company_id", co).is("deleted_at", null);
  const byOid = new Map((existing||[]).filter(o=>o.order_id).map(o=>[o.order_id, o]));
  const inserts = [], updates = [];
  const seen = new Set();
  const now = new Date().toISOString();
  for(const o of orders){
    if(seen.has(o.order_id)) continue; seen.add(o.order_id);
    const ex = byOid.get(o.order_id);
    const rec = {
      company_id: co, order_id: o.order_id, channel: o.channel, channel_group: o.channel_group,
      status: o.status, order_date: o.order_date, sale_status_raw: o.sale_status_raw,
      products: o.products, item_count: o.item_count, order_total: o.order_total,
      shipping_fee: o.shipping_fee, seller_discount: o.seller_discount,
      returned_qty: o.returned_qty, is_returned: o.is_returned,
      order_src: srcLabel, order_ingested_at: now
    };
    if(!ex) inserts.push(rec);
    else updates.push({ id: ex.id, status:o.status, sale_status_raw:o.sale_status_raw, is_returned:o.is_returned, returned_qty:o.returned_qty, order_total:o.order_total });
  }
  const CH=400; let insErr=null, savedN=0;
  for(let i=0;i<inserts.length;i+=CH){
    const {error}=await sb.from("order_ledger").insert(inserts.slice(i,i+CH));
    if(error){ console.warn("ord ins",error); insErr=error; break; }
    savedN += inserts.slice(i,i+CH).length;
  }
  for(const u of updates){ await sb.from("order_ledger").update({ status:u.status, sale_status_raw:u.sale_status_raw, is_returned:u.is_returned, returned_qty:u.returned_qty }).eq("id", u.id); }
  return { added: savedN, updated: updates.length, total: orders.length, error: insErr };
}

/* 723-5: "จับ IV ใส่ออเดอร์" — match by order_id (ref) → tag iv_no/iv_date/ยอด
   ออเดอร์ที่ยังไม่มีในระบบ (ยังไม่อัปรายงานช่องทาง) → สร้าง fallback กันตกหล่น
   คืน {tagged, created, total} */
async function ordIngestFromSales(co, salesData, srcLabel){
  const ivs = (salesData?.ivs || []).filter(iv => iv.doc_type === "IV" && iv.doc_no && iv.ref_order_id);
  if(!ivs.length) return { tagged:0, created:0, total:0 };
  const { data:existing } = await sb.from("order_ledger").select("id,order_id,iv_no,status")
    .eq("company_id", co).is("deleted_at", null);
  const byOid = new Map((existing||[]).filter(o=>o.order_id).map(o=>[o.order_id, o]));
  const ivTaken = new Set((existing||[]).filter(o=>o.iv_no).map(o=>o.iv_no));
  const inserts = []; const ivUpd = [];
  const seen = new Set();
  for(const iv of ivs){
    if(seen.has(iv.ref_order_id)) continue; seen.add(iv.ref_order_id);
    const newStatus = iv.voided ? "cancelled" : "active";
    const ex = byOid.get(iv.ref_order_id);
    if(ex){
      // tag IV ใส่ออเดอร์ที่มีอยู่ (ถ้ายังไม่มี iv หรือ iv เปลี่ยน)
      if(ex.iv_no !== iv.doc_no || (iv.voided && ex.status!=="cancelled")){
        ivUpd.push({ id:ex.id, iv_no:iv.doc_no, iv_date:iv.doc_date||null, sale_amount:Number(iv.total)||0,
                     status: iv.voided ? "cancelled" : ex.status, sale_keyed_at:new Date().toISOString(), sale_src:srcLabel });
      }
    } else if(!ivTaken.has(iv.doc_no)){
      // ออเดอร์ยังไม่มี (ยังไม่อัปรายงานช่องทาง) → สร้าง fallback
      inserts.push({
        company_id: co, order_id: iv.ref_order_id, iv_no: iv.doc_no,
        channel: iv.channel || null, channel_group: ordChannelGroup(iv.channel, iv.customer),
        customer: iv.customer || null, status: newStatus,
        order_date: iv.doc_date || null, iv_date: iv.doc_date || null,
        sale_amount: Number(iv.total)||0, order_total: Number(iv.total)||0,
        sale_keyed_at: new Date().toISOString(), sale_src: (srcLabel||"723-5")+" (fallback)"
      });
    }
  }
  const CH=400;
  for(let i=0;i<inserts.length;i+=CH){ const {error}=await sb.from("order_ledger").insert(inserts.slice(i,i+CH)); if(error){console.warn("ord ins",error);break;} }
  for(const u of ivUpd){ await sb.from("order_ledger").update({ iv_no:u.iv_no, iv_date:u.iv_date, sale_amount:u.sale_amount, status:u.status, sale_keyed_at:u.sale_keyed_at, sale_src:u.sale_src }).eq("id", u.id); }
  return { tagged: ivUpd.length, created: inserts.length, total: ivs.length };
}

/* ===== Phase B: แท็กรับชำระ (RE/SP/net) ใส่ออเดอร์ ผ่าน iv_no ===== */
async function ordTagReceipts(co, arData){
  const m = arData && arData.ivToCheque;
  if(!m || !m.size) return 0;
  const { data:orders } = await sb.from("order_ledger").select("id,iv_no,re_no")
    .eq("company_id", co).is("deleted_at", null).not("iv_no","is",null);
  let n=0; const now=new Date().toISOString();
  for(const o of (orders||[])){
    const chq = m.get(o.iv_no);
    if(chq && (!o.re_no || o.re_no!==chq.receipt_no)){
      const fee = (Number(o.sale_amount)||0) ? +(Number(o.sale_amount) - Number(chq.amount)).toFixed(2) : null;
      await sb.from("order_ledger").update({ re_no:chq.receipt_no, cheque_no:chq.cheque_no,
        receipt_net:Number(chq.amount)||0, receipt_gross:Number(o.sale_amount)||null,
        receipt_fee:fee, received_at:now }).eq("id", o.id);
      n++;
    }
  }
  return n;
}
/* ===== Phase C: แท็กฝากเช็ค (BQ) + เงินเข้าแบงค์ จาก withdrawal ผ่าน order_id ===== */
async function ordTagBankFromWithdrawals(co, withdrawals){
  const byOid = new Map();
  for(const wd of (withdrawals||[])){
    for(const o of (wd.orders||[])){ if(o.order_id) byOid.set(o.order_id, { bq:wd.bq_number, date:wd.withdraw_date, bankAcct:wd.bank_account_no }); }
  }
  if(!byOid.size) return 0;
  const { data:orders } = await sb.from("order_ledger").select("id,order_id,bq_no")
    .eq("company_id", co).is("deleted_at", null).not("order_id","is",null);
  let n=0;
  for(const o of (orders||[])){
    const info = byOid.get(o.order_id);
    if(info && !o.bq_no){
      await sb.from("order_ledger").update({ bq_no:info.bq, deposit_date:info.date,
        bank_in_date:info.date, bank_matched:true }).eq("id", o.id);
      n++;
    }
  }
  return n;
}

/* ============================================================
   หน้า "ทะเบียนคำสั่งซื้อ" (Order Ledger) — Phase A-D
   ============================================================ */
function ordGet(){
  if(!state.ord) state.ord = {};
  const co = state.company;
  if(!state.ord[co]) state.ord[co] = { rows:[], busy:false, q:"", fCh:"all", fIv:"all", loaded:false, expanded:new Set() };
  if(!state.ord[co].expanded) state.ord[co].expanded = new Set();
  return state.ord[co];
}
async function ordUploadFiles(){
  if(!brecCanWrite()){ alert("ไม่มีสิทธิ์"); return; }
  const co = await fopCompanyId(); if(!co){ alert("หา company_id ไม่เจอ"); return; }
  const files = await new Promise(res=>{ const i=document.createElement("input"); i.type="file"; i.accept=".xlsx,.xls,.csv"; i.multiple=true; i.onchange=()=>res([...i.files]); i.click(); });
  if(!files||!files.length) return;
  const d = ordGet(); d.busy=true; renderToolOrders();
  try{
    let totAdd=0, totUpd=0, perCh={}, firstErr=null;
    for(const file of files){
      let rows;
      if(/\.csv$/i.test(file.name)){
        const text = new TextDecoder("utf-8").decode(await file.arrayBuffer());
        rows = bmpParseCsvText(text);
      } else {
        const wb = XLSX.read(await file.arrayBuffer(), { type:"array", cellDates:false });
        rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header:1, defval:"", raw:false });
      }
      const parsed = ordParseSalesFile(rows);
      if(!parsed){ console.warn("unknown format", file.name); perCh[file.name]="ไม่รู้จักฟอร์แมต"; continue; }
      const r = await ordIngestChannelOrders(co, parsed, file.name);
      totAdd+=r.added; totUpd+=r.updated;
      perCh[parsed.channel]=(perCh[parsed.channel]||0)+r.total;
      if(r.error){ firstErr = firstErr || r.error; }
    }
    await ordLoad();
    if(firstErr){
      alert("⚠️ บันทึกไม่สำเร็จ — DB error:\n\n"+(firstErr.message||firstErr.details||firstErr.hint||JSON.stringify(firstErr))+"\n\n(code: "+(firstErr.code||"-")+")");
    } else {
      alert(`อัปสำเร็จ\nบันทึกใหม่ ${totAdd} · อัปเดต ${totUpd} ออเดอร์\n\nต่อช่องทาง: ${Object.entries(perCh).map(([k,v])=>k+"="+v).join(" · ")}`);
    }

async function bmpRunUpload(){
  const d = brecGet();
  // ★ guard double-click — ถ้ามีการอัปอยู่ อย่าให้รันซ้ำ
  if(d.mp.parsing){ console.warn("bmpRunUpload: already in progress, ignored"); return; }
  const f = d.mp.files;
  const hasExpressFiles = !!(f.sales.length || f.receipt.length || f.cheque.length);
  if(!f.shopee.length){ alert("เลือกไฟล์ Shopee Balance ก่อน"); return; }
  const co = d.companyId || await fopCompanyId();
  if(!co){ alert("หา company_id ไม่เจอ"); return; }
  // ถ้าไม่อัป Express ใหม่ → ต้องมี cache เดิม
  if(!hasExpressFiles && !d.mp.expressCache){ alert("ยังไม่มี Express เก็บไว้ — อัป Express 3 ไฟล์ครั้งแรกก่อน"); return; }
  d.companyId = co; d.mp.parsing = true; bmpRenderUploadModal();
  try{
    // ----- parse Shopee files แยกตาม shop_name (รองรับหลาย shop ในรอบเดียว) -----
    const shopeeByName = new Map(); // shopName → { shopName, txns, periodFrom, periodTo, files:[] }
    for(const sf of f.shopee){
      const buf = await sf.arrayBuffer();
      const wb = XLSX.read(buf, { type:"array", cellDates:false });
      const sd = bmpParseShopeeBalance(wb);
      const sn = sd.shopName || "(unknown)";
      if(!shopeeByName.has(sn)) shopeeByName.set(sn, { shopName:sn, txns:[], periodFrom:null, periodTo:null, files:[] });
      const g = shopeeByName.get(sn);
      g.txns = g.txns.concat(sd.txns);
      g.files.push(sf.name);
      if(sd.periodFrom && (!g.periodFrom || sd.periodFrom < g.periodFrom)) g.periodFrom = sd.periodFrom;
      if(sd.periodTo && (!g.periodTo || sd.periodTo > g.periodTo)) g.periodTo = sd.periodTo;
    }
    // dedupe + sort per shop
    for(const g of shopeeByName.values()){
      const seen = new Set();
      g.txns = g.txns.filter(t => {
        const k = `${t.datetime}|${t.type}|${t.amount}|${t.order_id}|${t.desc.slice(0,20)}`;
        if(seen.has(k)) return false; seen.add(k); return true;
      });
      g.txns.sort((a,b)=> a.datetime.localeCompare(b.datetime));
    }

    // ===== Express: ถ้าอัปไฟล์ใหม่ → parse + save cache · ถ้าไม่ → ใช้ cache =====
    let salesData, arData, chqData, expressFromCache = false;
    if(hasExpressFiles){
      // ----- รวม CSV ทั้งหมด (sales+receipt+cheque) auto-route ตาม content -----
      const allCsvFiles = [...f.sales, ...f.receipt, ...f.cheque];
      const csvByType = { receipt:[], cheque:[], sales:[], unknown:[] };
      for(const cf of allCsvFiles){
        const text = bmpDecodeCp874(await cf.arrayBuffer());
        const t = bmpDetectCsvType(text);
        csvByType[t].push({ file: cf, text });
      }
      if(csvByType.unknown.length){
        const names = csvByType.unknown.map(x=>x.file.name).join(", ");
        throw new Error(`ไฟล์ CSV ไม่รู้จัก: ${names} — ต้องเป็น รับชำระ / เช็ครับ / รายงานขาย 723-5`);
      }
      if(!csvByType.cheque.length) throw new Error('ขาดไฟล์ "รายงานเช็ครับ เรียงตามวันที่นำฝาก"');
      if(!csvByType.receipt.length) throw new Error('ขาดไฟล์ "รายงานการรับชำระหนี้"');
      if(!csvByType.sales.length) throw new Error('ขาดไฟล์ "รายงานขาย 723-5"');

      // parse sales
      let mergedIvs = [];
      for(const item of csvByType.sales){ mergedIvs = mergedIvs.concat(bmpParseSalesReport(item.text).ivs); }
      const ivSeen = new Set();
      mergedIvs = mergedIvs.filter(iv => { if(ivSeen.has(iv.doc_no)) return false; ivSeen.add(iv.doc_no); return true; });
      salesData = { ivs: mergedIvs };
      // parse receipt
      let mergedCheques = []; const mergedIvToCheque = new Map();
      for(const item of csvByType.receipt){
        const rd = bmpParseArReceipt(item.text);
        mergedCheques = mergedCheques.concat(rd.cheques);
        if(rd.ivToCheque){ for(const [iv, chq] of rd.ivToCheque.entries()){ if(!mergedIvToCheque.has(iv)) mergedIvToCheque.set(iv, chq); } }
      }
      const arSeen = new Set();
      mergedCheques = mergedCheques.filter(c => { if(!c.cheque_no || arSeen.has(c.cheque_no)) return false; arSeen.add(c.cheque_no); return true; });
      arData = { cheques: mergedCheques, ivToCheque: mergedIvToCheque };
      // parse cheque report
      let mergedDeposits = [];
      for(const item of csvByType.cheque){ mergedDeposits = mergedDeposits.concat(bmpParseChequeReport(item.text).deposits); }
      const chSeen = new Set();
      mergedDeposits = mergedDeposits.filter(d2 => { const k = `${d2.cheque_no}|${d2.bq}`; if(chSeen.has(k)) return false; chSeen.add(k); return true; });
      chqData = { deposits: mergedDeposits };
      // ★ save cache
      await sb.from("brec_mp_express_cache").upsert({
        company_id: co,
        sales_json: salesData,
        ar_json: { cheques: arData.cheques, ivToCheque: [...arData.ivToCheque] },
        cheque_json: chqData,
        sales_files: f.sales.map(x=>x.name).join("; "),
        ar_files: f.receipt.map(x=>x.name).join("; "),
        cheque_files: f.cheque.map(x=>x.name).join("; "),
        updated_at: new Date().toISOString()
      }, { onConflict:"company_id" });
    } else {
      // ใช้ Express จาก cache
      const cached = await bmpLoadExpressFromCache(co);
      if(!cached) throw new Error("ไม่พบ Express cache — อัป Express 3 ไฟล์ครั้งแรกก่อน");
      salesData = cached.salesData; arData = cached.arData; chqData = cached.chqData;
      expressFromCache = true;
    }

    // ★ Phase A: จับ IV ใส่ออเดอร์ จากรายงานขาย 723-5
    let ordResult = { tagged:0, created:0, total:0 };
    try{ ordResult = await ordIngestFromSales(co, salesData, "รายงานขาย 723-5 (ผ่าน Marketplace)"); }
    catch(e){ console.warn("ord ingest", e); }
    // ★ Phase B: แท็กรับชำระ (RE/SP/net/fee) ใส่ออเดอร์ ผ่าน iv_no
    let ordTagRe = 0;
    try{ ordTagRe = await ordTagReceipts(co, arData); }catch(e){ console.warn("ord tag re", e); }
    const allWdForTag = [];   // เก็บ withdrawal ทุก shop ไว้ tag เงินเข้าแบงค์ (Phase C)

    // ----- ★ ตรวจ period coverage: sales report ต้องครอบ Shopee balance -----
    const salesDates = (salesData.ivs||[]).map(iv => iv.doc_date).filter(Boolean).sort();
    const salesMin = salesDates[0] || null;
    const salesMax = salesDates[salesDates.length-1] || null;
    let shopMin = null, shopMax = null;
    for(const g of shopeeByName.values()){
      if(g.periodFrom && (!shopMin || g.periodFrom < shopMin)) shopMin = g.periodFrom;
      if(g.periodTo && (!shopMax || g.periodTo > shopMax)) shopMax = g.periodTo;
    }
    if(salesMin && salesMax && shopMin && shopMax){
      const tooEarly = salesMin > shopMin;
      const tooLate  = salesMax < shopMax;
      if(tooEarly || tooLate){
        const fmtTh = (s) => { if(!s) return "?"; const [y,m,d]=s.split("-"); return `${d}/${m}/${y}`; };
        const issues = [];
        if(tooEarly) issues.push(`sales เริ่ม ${fmtTh(salesMin)} แต่ Shopee เริ่ม ${fmtTh(shopMin)} — ขาดช่วงต้น`);
        if(tooLate)  issues.push(`sales ถึง ${fmtTh(salesMax)} แต่ Shopee ถึง ${fmtTh(shopMax)} — ขาดช่วงปลาย`);
        const msg = `⚠️ รายงานขาย 723-5 ครอบ Shopee ไม่ครบ:\n\n• ${issues.join("\n• ")}\n\n` +
                    `→ Order Shopee ที่อยู่นอกช่วง sales จะถูก flag "ไม่ตรง" ทั้งหมด\n\n` +
                    `แนะนำ: ยกเลิก → ไปดึงรายงาน 723-5 ใหม่ให้ครอบ ${fmtTh(shopMin)} ถึง ${fmtTh(shopMax)}\n\n` +
                    `กด OK เพื่อดำเนินการต่อ (จะ mismatch เยอะ) / Cancel เพื่อยกเลิก`;
        if(!confirm(msg)){ d.mp.parsing=false; bmpRenderUploadModal(); return; }
      }
    }

    // ----- ตรวจ routing ทุก shop ก่อน → company ต้องตรง -----
    const shopsToProcess = [];
    const skipped = [];
    for(const [shopName, shopData] of shopeeByName.entries()){
      const routing = bmpRouting(shopName);
      if(!routing.companyId){ skipped.push(`${shopName} (routing ไม่รู้จัก)`); continue; }
      if(routing.companyId !== state.company){ skipped.push(`${shopName} (อยู่ ${routing.companyId} ไม่ใช่ ${state.company})`); continue; }
      shopsToProcess.push({ shopName, shopData, routing });
    }
    if(!shopsToProcess.length){
      alert(`ไม่มี shop ที่ตรงบริษัท ${state.company}\nข้าม: ${skipped.join(", ") || "(ทั้งหมด)"}`);
      d.mp.parsing=false; bmpRenderUploadModal(); return;
    }

    // shared seqByDay สำหรับ gen BQ — กันชน BQ ข้าม shop ใน company เดียวกัน
    // รวม seq จาก 2 แหล่ง: เช็ครับ CSV + brec_mp_withdrawals ในของเรา (กัน re-upload สร้าง BQ ซ้ำ)
    const sharedSeq = new Map();
    for(const dep of (chqData.deposits||[])){
      const m = String(dep.bq||"").match(/^(\d{6})(\d{1,4})$/);
      if(m){
        const day = m[1], seq = parseInt(m[2],10);
        if(!sharedSeq.has(day) || sharedSeq.get(day) < seq) sharedSeq.set(day, seq);
      }
    }
    // ดึง BQ ของเรา (ที่ gen ไปแล้ว) — กัน collision เวลา re-upload ก่อน user คีย์เข้า Express
    const { data:ourWds } = await sb.from("brec_mp_withdrawals")
      .select("bq_number").eq("company_id", co).is("deleted_at", null);
    for(const w of (ourWds||[])){
      const m = String(w.bq_number||"").match(/^(\d{6})(\d{1,4})$/);
      if(m){
        const day = m[1], seq = parseInt(m[2],10);
        if(!sharedSeq.has(day) || sharedSeq.get(day) < seq) sharedSeq.set(day, seq);
      }
    }

    // file_hash รวม
    const hashSrc = [
      ...f.shopee.map(x => x.name+"|"+x.size),
      ...f.receipt.map(x => x.name+"|"+x.size),
      ...f.cheque.map(x => x.name+"|"+x.size)
    ].join("||");
    const hash = brecHash(hashSrc);
    const { data:dup } = await sb.from("brec_mp_imports").select("id,created_at")
      .eq("company_id", co).eq("file_hash", hash).is("deleted_at", null);
    if(dup && dup.length){
      const cont = confirm(`ไฟล์ชุดนี้เคยอัปเมื่อ ${new Date(dup[0].created_at).toLocaleString("th-TH")}\n\nดำเนินการต่อจะนำเข้าซ้ำ — ใช่ไหม?`);
      if(!cont){ d.mp.parsing=false; bmpRenderUploadModal(); return; }
    }
    const fnameJoin = arr => arr.map(x=>x.name).join("; ");

    // ★ load existing withdrawals → dedup โดย (withdraw_datetime + bank_account_id)
    // กัน user upload ซ้ำสร้าง withdrawal เดียวกัน BQ ซ้ำหลายครั้ง
    const { data:existingWds2 } = await sb.from("brec_mp_withdrawals")
      .select("withdraw_datetime,bank_account_id,bq_number,withdraw_amount")
      .eq("company_id", co).is("deleted_at", null);
    const existingKey = new Set((existingWds2||[]).map(w => `${w.withdraw_datetime}|${w.bank_account_id}|${w.withdraw_amount}`));

    // process ทุก shop ในรอบเดียว (BQ counter shared)
    const perShopSummary = [];
    let grandTotalWd = 0, grandTotalOrd = 0, grandTotalMis = 0, grandTotalSkip = 0;
    for(const { shopName, shopData, routing } of shopsToProcess){
      const acctId = (routing.bankCode && routing.accountNo)
        ? await brecEnsureAccount(co, routing.bankCode, routing.accountNo) : null;
      const allWithdrawals = bmpGroupWithdrawals(shopData, arData, chqData, salesData, shopName, sharedSeq);
      // ★ dedup: ข้าม withdrawal ที่ DB มีอยู่แล้ว (key = datetime + bank_account_id + amount)
      const withdrawals = [];
      let shopSkipped = 0;
      for(const wd of allWithdrawals){
        const k = `${wd.withdraw_datetime}|${acctId}|${wd.withdraw_amount}`;
        if(existingKey.has(k)){ shopSkipped++; continue; }
        existingKey.add(k);
        withdrawals.push(wd);
      }
      grandTotalSkip += shopSkipped;
      if(!withdrawals.length){
        perShopSummary.push(`${shopName}: ไม่มี withdrawal ใหม่${shopSkipped?` (มี ${shopSkipped} ที่มีอยู่แล้ว)`:''}`);
        continue;
      }
      const totalOrders = withdrawals.reduce((s,w)=> s + w.orders.length, 0);
      const totalMismatch = withdrawals.reduce((s,w)=> s + w.mismatch_count, 0);
      allWdForTag.push(...withdrawals);   // เก็บไว้ tag เงินเข้าแบงค์ (Phase C)
      const { data:imp, error:ie } = await sb.from("brec_mp_imports").insert({
        company_id: co, bank_account_id: acctId,
        channel: routing.channel, shop_name: shopName,
        shopee_filename: shopData.files.join("; "),
        receipt_filename: expressFromCache ? "(ใช้ Express cache)" : (fnameJoin(f.receipt) + " | sales: " + fnameJoin(f.sales)),
        cheque_filename: fnameJoin(f.cheque),
        file_hash: shopsToProcess.length > 1 ? null : hash,
        period_from: shopData.periodFrom, period_to: shopData.periodTo,
        withdrawal_count: withdrawals.length, order_count: totalOrders, mismatch_count: totalMismatch
      }).select("id").single();
      if(ie) throw ie;
      const importId = imp.id;
      for(const wd of withdrawals){
        const { data:wdRow, error:we } = await sb.from("brec_mp_withdrawals").insert({
          company_id: co, bank_account_id: acctId, import_id: importId,
          channel: wd.channel, shop_name: wd.shop_name,
          withdraw_datetime: wd.withdraw_datetime, withdraw_date: wd.withdraw_date,
          withdraw_amount: wd.withdraw_amount, bq_number: wd.bq_number,
          description: wd.description, order_count: wd.order_count,
          sum_gross: wd.sum_gross, sum_net: wd.sum_net,
          total_fee: wd.total_fee, adjustment_amount: wd.adjustment_amount,
          mismatch_count: wd.mismatch_count
        }).select("id").single();
        if(we) throw we;
        const wdId = wdRow.id;
        const orderInserts = [...wd.orders, ...wd.adjustments].map(o => ({
          company_id: co, withdrawal_id: wdId, channel: o.channel,
          order_id: o.order_id, cheque_no: o.cheque_no,
          txn_datetime: o.txn_datetime, txn_type: o.txn_type,
          express_gross: o.express_gross, shopee_net: o.shopee_net, fee_diff: o.fee_diff,
          receipt_no: o.receipt_no, has_receipt: o.has_receipt,
          has_cheque_deposit: o.has_cheque_deposit, existing_bq: o.existing_bq,
          mismatch_flag: o.mismatch_flag, mismatch_reason: o.mismatch_reason,
          note: o.desc || null
        }));
        const CHUNK = 200;
        for(let i=0;i<orderInserts.length;i+=CHUNK){
          const { error:oe } = await sb.from("brec_mp_orders").insert(orderInserts.slice(i,i+CHUNK));
          if(oe) throw oe;
        }
      }
      d.mp.lastImportId = importId;
      perShopSummary.push(`${shopName}: ${withdrawals.length} withdrawal · ${totalOrders} order${totalMismatch?` · ไม่ตรง ${totalMismatch}`:''}`);
      grandTotalWd += withdrawals.length; grandTotalOrd += totalOrders; grandTotalMis += totalMismatch;
    }

    // ★ Phase C: แท็กเงินเข้าแบงค์ (BQ/วันเงินเข้า) ใส่ออเดอร์ จาก withdrawal ทุก shop
    let ordTagBank = 0;
    try{ ordTagBank = await ordTagBankFromWithdrawals(co, allWdForTag); }catch(e){ console.warn("ord tag bank", e); }

    d.tab = "mp";
    await bmpLoadFromDb();
    d.mp.parsing = false;   // ★ reset flag ก่อนปิด modal กัน state ค้าง
    bmpCloseUpload();
    let msg = `อัปสำเร็จ\n${perShopSummary.join("\n")}\n\nรวม: ${grandTotalWd} withdrawal · ${grandTotalOrd} order · ไม่ตรง ${grandTotalMis}`;
    if(grandTotalSkip) msg += `\n\n⏭ ข้าม ${grandTotalSkip} withdrawal ที่มีอยู่ใน DB แล้ว (ดูจาก datetime+ยอด+บัญชี)`;
    if(skipped.length) msg += `\n\nข้าม: ${skipped.join(", ")}`;
    msg += `\n\n📒 ทะเบียนคำสั่งซื้อ — จับ IV: ${ordResult.tagged} · แท็กรับชำระ: ${ordTagRe} · แท็กเงินเข้าแบงค์: ${ordTagBank}`;
    alert(msg);
  } catch(e){
    alert("อัปไม่สำเร็จ: " + (e.message||e));
    d.mp.parsing = false; bmpRenderUploadModal();
  }
}

/* ------- LOAD from DB (latest import per company) ------- */
async function bmpLoadFromDb(){
  const d = brecGet();
  const co = d.companyId || await fopCompanyId();
  if(!co) return;
  d.companyId = co;
  // load all mp withdrawals + orders for the period (use brec period)
  const { from, to } = brecComputePeriod(d);
  const { data:wds, error:we } = await sb.from("brec_mp_withdrawals").select("*")
    .eq("company_id", co).is("deleted_at", null)
    .gte("withdraw_date", from).lte("withdraw_date", to)
    .order("withdraw_datetime",{ascending:true});
  if(we){ console.warn("mp wds load fail", we); return; }
  const wdIds = (wds||[]).map(w=>w.id);
  let orders = [];
  if(wdIds.length){
    const { data:os } = await sb.from("brec_mp_orders").select("*")
      .in("withdrawal_id", wdIds).is("deleted_at", null);
    orders = os || [];
  }
  d.mp.withdrawals = wds || [];
  d.mp.orders = orders;
  d.mp.mismatchOrders = orders.filter(o => o.mismatch_flag && !o.resolved);

  // ★ โหลด bank deposit rows "ทั้งบริษัท" (ไม่ผูก account_id) → match กับ STM
  // เพราะ withdrawal กับ statement อาจอยู่คนละ account record (เลขบัญชี normalize ต่างกัน)
  const { data:bankRows } = await sb.from("brec_bank_rows")
    .select("id,bank_account_id,txn_date,deposit,description,ref_note")
    .eq("company_id", co)
    .is("deleted_at", null)
    .gt("deposit", 0)
    .order("txn_date",{ascending:true});
  d.mp.bankRows = bankRows || [];
}

/* match 1 withdrawal กับ bank statement (deposit ตรงวัน+ยอด ทั้งบริษัท) */
function bmpMatchBank(d, wd){
  const rows = d.mp.bankRows || [];
  if(!rows.length) return { found:false, hasStmt:false };
  const amt = Number(wd.withdraw_amount||0);
  // วันตรงเป๊ะ + ยอดตรง
  let hit = rows.find(r => r.txn_date === wd.withdraw_date && Math.abs(Number(r.deposit)-amt) < 0.5);
  if(hit) return { found:true, exact:true, row:hit, hasStmt:true };
  // ยอดตรง วันต่าง — เผื่อ value date / timing
  hit = rows.find(r => Math.abs(Number(r.deposit)-amt) < 0.5);
  if(hit) return { found:true, exact:false, row:hit, hasStmt:true };
  return { found:false, hasStmt:true };
}

function bmpSetFilter(kind, val){
  const d = brecGet();
  if(kind==="channel") d.mp.filterChannel = val;
  else if(kind==="account") d.mp.filterAccount = val;
  renderToolBankRec();
}
/* ออก withdrawal ที่ผ่าน filter ปัจจุบัน */
function bmpFilteredWds(d){
  const fc = d.mp.filterChannel || "all";
  const fa = d.mp.filterAccount || "all";
  return (d.mp.withdrawals||[]).filter(w => {
    if(fc !== "all" && (w.channel||"") !== fc) return false;
    if(fa !== "all" && (w.bank_account_id||"") !== fa) return false;
    return true;
  });
}

/* ------- effective mismatch (mismatch ที่ยังไม่ถูก resolved) ------- */
function bmpEffMismatch(orders){
  return (orders||[]).filter(o => o.mismatch_flag && !o.resolved).length;
}

/* ------- ติ๊ก "แก้แล้ว" ต่อ order ------- */
async function bmpResolveOrder(orderId, checked){
  if(!brecCanWrite()){ alert("ไม่มีสิทธิ์"); return; }
  const d = brecGet();
  // optimistic update local
  const o = (d.mp.orders||[]).find(x=>x.id===orderId);
  if(o) o.resolved = checked;
  renderToolBankRec();
  const patch = checked
    ? { resolved:true, resolved_at: new Date().toISOString() }
    : { resolved:false, resolved_at: null };
  const { error } = await sb.from("brec_mp_orders").update(patch).eq("id", orderId);
  if(error){ alert("บันทึกไม่สำเร็จ: "+(error.message||error)); if(o) o.resolved=!checked; renderToolBankRec(); return; }
  d.mp.mismatchOrders = (d.mp.orders||[]).filter(x => x.mismatch_flag && !x.resolved);
  renderToolBankRec();
}

/* ------- แก้เลขที่เช็ค / ยอด gross ต่อ order (สำหรับ order ที่ไม่ตรง) ------- */
async function bmpEditOrderField(orderId, field, value){
  if(!brecCanWrite()){ alert("ไม่มีสิทธิ์"); return; }
  const d = brecGet();
  const o = (d.mp.orders||[]).find(x=>x.id===orderId);
  if(!o) return;
  let patch = {};
  if(field === "cheque_no"){
    o.cheque_no = String(value||"").trim();
    patch.cheque_no = o.cheque_no;
  } else if(field === "express_gross"){
    const g = Number(String(value||"").replace(/,/g,"")) || 0;
    o.express_gross = g;
    o.fee_diff = +(g - Number(o.shopee_net||0)).toFixed(2);
    patch.express_gross = g;
    patch.fee_diff = o.fee_diff;
  }
  const { error } = await sb.from("brec_mp_orders").update(patch).eq("id", orderId);
  if(error){ alert("บันทึกไม่สำเร็จ: "+(error.message||error)); }
  renderToolBankRec();
}

/* ------- EXPORT main CSV (9 cols) ------- */
function bmpExportCsv(){
  const d = brecGet();
  if(!d.mp.withdrawals.length){ alert("ไม่มีข้อมูลให้ export"); return; }
  const co = COMPANIES.find(c=>c.id===state.company);
  const ordersByWd = new Map();
  for(const o of d.mp.orders){
    if(!ordersByWd.has(o.withdrawal_id)) ordersByWd.set(o.withdrawal_id, []);
    ordersByWd.get(o.withdrawal_id).push(o);
  }
  const lines = [
    ["No","เลขที่ BQ","วันที่เงินเข้าบัญชี (DD/MM/YY)","เงินเข้าบัญชี","เลขที่เช็ค","มูลค่าเช็ค EXPRESS","เงินที่ออกสุทธิของออเดอร์","ผลต่าง","ค่าธรรมเนียมรวม","คำอธิบายรายการ"]
  ];
  // ถ้าเลือก withdrawal ไว้ → export เฉพาะที่เลือก · ไม่เลือก → export ทั้งหมด (ตาม filter)
  const selectedIds = d.mp.selected;
  const useSelection = selectedIds.size > 0;
  const exportWds = bmpFilteredWds(d).filter(w => !useSelection || selectedIds.has(w.id));
  if(!exportWds.length){ alert("ไม่มี withdrawal ให้ export (ตรวจ filter / การเลือก)"); return; }
  let no = 0;
  for(const wd of exportWds){
    const allOrds = ordersByWd.get(wd.id)||[];
    // เรียงเลขที่เช็คน้อย→มาก ในแต่ละวันที่เงินเข้า
    const list = allOrds.filter(o=>o.txn_type==="order")
      .slice().sort((a,b)=> String(a.cheque_no||"").localeCompare(String(b.cheque_no||""), undefined, {numeric:true}));
    // skip ทั้ง withdrawal ถ้ายังมี mismatch ที่ไม่ได้ติ๊ก "แก้แล้ว" (กันคีย์ผิด)
    if(bmpEffMismatch(allOrds) > 0) continue;
    const dt = bmpFmtThaiShort(wd.withdraw_date);
    // คำนวณ depositCode สด ๆ จาก shop_name (เผื่อ schema ยังไม่ persist deposit_code)
    const routing = bmpRouting(wd.shop_name);
    const depCode = routing.depositCode || "";
    // recompute ค่าธรรมเนียมที่บันทึก = |ยอดเช็ค+adj−แบงค์| − |adj| · เลขบวกเสมอ (Express คีย์บวก=หัก)
    const adjSum = allOrds.filter(o=>o.txn_type==="adjustment").reduce((s,o)=> s + Number(o.shopee_net||0), 0);
    const gapTotal = list.reduce((s,o)=> s + Number(o.express_gross||0), 0) + adjSum - Number(wd.withdraw_amount||0);
    const feeTotal = Math.abs(gapTotal) - Math.abs(adjSum);
    list.forEach((o, idx) => {
      no++;
      const isFirst = idx === 0;
      lines.push([
        no,
        isFirst ? wd.bq_number : "",
        isFirst ? dt : "",
        isFirst ? depCode : "",
        o.cheque_no || "",
        Number(o.express_gross||0).toFixed(2),
        Number(o.shopee_net||0).toFixed(2),
        Number(o.fee_diff||0).toFixed(2),
        isFirst ? feeTotal.toFixed(2) : "",
        isFirst ? (wd.description||"") : ""
      ]);
    });
  }
  // CSV with BOM for Excel Thai
  const csv = "﻿" + lines.map(r => r.map(v => {
    const s = String(v==null?"":v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(",")).join("\r\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const p = brecComputePeriod(d);
  a.href = url; a.download = `BQ_${co.code}_${p.from}_${p.to}.csv`; a.click();
  URL.revokeObjectURL(url);
}

/* ------- helpers for UI ------- */
function bmpFmtThaiShort(iso){
  if(!iso) return "";
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y.slice(2)}`;
}
function bmpFmtMoney(n){
  return Number(n||0).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
}

    ordersByWd.get(o.withdrawal_id).push(o);
  }
  // ----- filter bar (ช่องทาง + บัญชี) -----
  const allChannels = [...new Set(wds.map(w=>w.channel).filter(Boolean))];
  const acctIds = [...new Set(wds.map(w=>w.bank_account_id).filter(Boolean))];
  const acctLabel = (id) => { const a=d.accounts.find(x=>x.id===id); return a? (a.bank_code+" "+a.account_no) : id; };
  const fc = d.mp.filterChannel||"all", fa = d.mp.filterAccount||"all";
  const filtered = bmpFilteredWds(d);

  const totalNet = filtered.reduce((s,w)=> s + Number(w.withdraw_amount||0), 0);
  const totalFee = filtered.reduce((s,w)=> s + Number(w.total_fee||0), 0);
  // ★ ใช้ effective mismatch (ไม่นับตัวที่ติ๊ก "แก้แล้ว")
  const totalMismatch = filtered.reduce((s,w)=> s + bmpEffMismatch(ordersByWd.get(w.id)||[]), 0);
  const exportable = filtered.filter(w => bmpEffMismatch(ordersByWd.get(w.id)||[]) === 0).length;
  const filteredIds = filtered.map(w=>w.id);
  const selCount = filteredIds.filter(i=>d.mp.selected.has(i)).length;
  // STM match stats
  const stmStats = filtered.reduce((a,w)=>{ const m=bmpMatchBank(d,w); if(!m.hasStmt)a.nostmt++; else if(m.found)a.ok++; else a.miss++; return a; }, {ok:0,miss:0,nostmt:0});

  const cards = filtered.map(wd => {
    const ords = ordersByWd.get(wd.id) || [];
    const orderRows = ords.filter(o => o.txn_type === "order")
      .slice().sort((a,b)=> String(a.cheque_no||"").localeCompare(String(b.cheque_no||""), undefined, {numeric:true}));
    const adjRows = ords.filter(o => o.txn_type === "adjustment");
    const isExpanded = d.mp.expanded.has(wd.id);
    const effMis = bmpEffMismatch(ords);
    const hasMismatch = effMis > 0;
    const dateThai = bmpFmtThaiShort(wd.withdraw_date);
    const routing = bmpRouting(wd.shop_name);
    const depCode = routing.depositCode || "—";
    // account label — lookup จาก d.accounts, fallback ไป routing
    const acctRec = d.accounts.find(a=>a.id===wd.bank_account_id);
    const accountLabel = acctRec ? (acctRec.bank_code+" "+acctRec.account_no)
      : (routing.bankCode ? (routing.bankCode+" "+routing.accountNo) : "—");
    // ส่วนต่าง (ค่าธรรมเนียมที่คีย์หัก) = sum_gross + adj − ยอดเข้าแบงค์ (recompute สด ๆ เผื่อแก้)
    const liveGross = orderRows.reduce((s,o)=> s + Number(o.express_gross||0), 0);
    const liveAdj = adjRows.reduce((s,o)=> s + Number(o.shopee_net||0), 0);
    const liveGap = +(liveGross + liveAdj - Number(wd.withdraw_amount||0)).toFixed(2);
    // ★ ค่าธรรมเนียมที่บันทึกใน Express = บวกเสมอ + หักลบยอดปรับปรุงในกระเป๋า
    //   เช่น gap 130, ปรับปรุง 73 → บันทึก 57 (Express คีย์เลขบวก = หักออก)
    const liveFee = +(Math.abs(liveGap) - Math.abs(liveAdj)).toFixed(2);
    // shortfall: order ในงวด assign ไม่ครบยอดถอน (มียอดยกมาจากก่อนงวด)
    const isShortfall = (liveGross + liveAdj) < (Number(wd.withdraw_amount||0) - 1);

    const isSel = d.mp.selected.has(wd.id);
    const bm = bmpMatchBank(d, wd);
    const stmBadge = !bm.hasStmt
      ? `<span class="bmp-stm none" title="ยังไม่ได้อัป Statement ของบัญชีนี้">STM —</span>`
      : bm.found
        ? `<span class="bmp-stm ok" title="พบเงินเข้าตรงใน Statement: ${esc(bm.row.txn_date)} ${bmpFmtMoney(bm.row.deposit)}">✓ ตรง STM${bm.exact?'':' (วันต่าง)'}</span>`
        : `<span class="bmp-stm bad" title="ไม่พบเงินเข้ายอดนี้ใน Statement">⚠️ ไม่พบใน STM</span>`;
    return `<div class="bmp-card ${hasMismatch?'warn':''} ${isSel?'sel':''}">
      <div class="bmp-head" onclick="bmpToggleExpand('${wd.id}')">
        <div class="bmp-h1">
          <input type="checkbox" ${isSel?'checked':''} onclick="event.stopPropagation();bmpToggleSelectWd('${wd.id}')" style="width:16px;height:16px;accent-color:var(--brand);cursor:pointer" title="เลือก export">
          <span class="bmp-chip">🛒 ${esc(wd.channel)}</span>
          ${stmBadge}
          <span class="bmp-shop">${esc(wd.shop_name||"")}</span>
          ${isShortfall ? `<span class="bmp-warn" style="background:#fef3c7;color:#92400e">⚠️ ยอดยกมาจากก่อนงวด</span>` : ''}
          ${hasMismatch ? `<span class="bmp-warn">⚠️ ไม่ตรง ${effMis}</span>` : `<span class="bmp-ok">✓ ตรงครบ${(wd.mismatch_count||0)>0?' (แก้แล้ว)':''}</span>`}
        </div>
        <div class="bmp-h2">
          <div><span class="lbl">วันที่ถอน</span><span class="val">${dateThai}</span></div>
          <div><span class="lbl">เลขที่ BQ</span><span class="val mono">${esc(wd.bq_number||"-")}</span></div>
          <div><span class="lbl">บัญชี (รหัส ${esc(depCode)})</span><span class="val">${esc(accountLabel)}</span></div>
          <div><span class="lbl">ออเดอร์</span><span class="val">${wd.order_count}${adjRows.length?` + adj ${adjRows.length}`:''}</span></div>
        </div>
        ${(() => {
          const bankActual = bm.found ? Number(bm.row.deposit) : null;
          const remain = Number(wd.withdraw_amount||0);   // ยอดเข้าแบงค์จริงตามรายงานถอน
          const stmOk = bankActual!=null && Math.abs(remain - bankActual) < 0.5;
          return `<div class="bmp-recon">
            <div class="bx"><span class="k">รวมเช็ค (Express)</span><span class="v">${bmpFmtMoney(liveGross)}</span></div>
            ${Math.abs(liveAdj)>0.005?`<div class="op">+</div><div class="bx"><span class="k">ปรับปรุงในกระเป๋า</span><span class="v">${bmpFmtMoney(liveAdj)}</span></div>`:''}
            <div class="op">−</div>
            <div class="bx fee"><span class="k">หัก ค่าธรรมเนียม <small>(บันทึก 1 ยอด, เลขบวก)</small></span><span class="v">${bmpFmtMoney(liveFee)}</span></div>
            <div class="op">=</div>
            <div class="bx res"><span class="k">คงเหลือเข้าแบงค์</span><span class="v">${bmpFmtMoney(remain)}</span></div>
            <div class="op">${stmOk?'✓':(bankActual!=null?'✗':'·')}</div>
            <div class="bx ${stmOk?'good':(bankActual!=null?'no':'')}"><span class="k">เงินเข้าแบงค์จริง (STM)</span><span class="v">${bankActual!=null?bmpFmtMoney(bankActual):'— ไม่มี STM —'}</span></div>
          </div>
          ${isShortfall?`<div class="bmp-warnline">⚠️ order ในงวด assign ไม่ครบยอดถอน (มียอดยกมาจากก่อนงวด) — อัปไฟล์ Shopee ย้อนหลังเพิ่มเพื่อให้ครบ · ค่าธรรมเนียมที่โชว์ยังไม่ถูกต้อง</div>`:''}
          ${(bankActual!=null && !stmOk)?`<div class="bmp-warnline">⚠️ ยอดถอน ${bmpFmtMoney(remain)} ≠ เงินเข้าแบงค์จริง ${bmpFmtMoney(bankActual)} — ต่าง ${bmpFmtMoney(remain-bankActual)}</div>`:''}`;
        })()}
        <div class="bmp-toggle"><i data-lucide="${isExpanded?'chevron-up':'chevron-down'}"></i> ${isExpanded?'ซ่อน':'ขยาย'}ดูออเดอร์ (${orderRows.length}${adjRows.length?` + adj ${adjRows.length}`:''})</div>
      </div>
      ${isExpanded ? `<div class="bmp-body">
        <table class="bmp-tbl">
          <thead><tr>
            <th>#</th><th>รหัสคำสั่งซื้อ Shopee</th><th>IV / อ้างอิง</th><th>เลขที่เช็ค</th><th class="r">gross EXPRESS</th><th class="r">net Shopee</th><th class="r">ผลต่าง</th><th>สถานะ</th><th style="text-align:center">แก้แล้ว</th>
          </tr></thead>
          <tbody>
            ${orderRows.map((o,i) => {
              const isMis = o.mismatch_flag;
              const isResolved = !!o.resolved;
              const rowCls = isMis && !isResolved ? "mis" : (isMis && isResolved ? "fixed" : "");
              const chqCell = isMis
                ? `<input value="${esc(o.cheque_no||"")}" onclick="event.stopPropagation()" onchange="bmpEditOrderField('${o.id}','cheque_no',this.value)" class="bmp-edit mono" placeholder="เลขที่เช็ค" title="แก้เลขที่เช็คจริงจาก Express">`
                : `<span class="mono">${esc(o.cheque_no||"")}</span>`;
              const grossCell = isMis
                ? `<input value="${Number(o.express_gross||0).toFixed(2)}" onclick="event.stopPropagation()" onchange="bmpEditOrderField('${o.id}','express_gross',this.value)" class="bmp-edit num" title="แก้ยอดเช็คจริง">`
                : bmpFmtMoney(o.express_gross);
              const ivRef = o.receipt_no || (o.cheque_no && o.cheque_no.startsWith("PENDING-") ? o.cheque_no.replace("PENDING-","") : "");
              return `<tr class="${rowCls}">
              <td>${i+1}</td>
              <td class="mono" style="font-size:11px">${esc(o.order_id||"")}</td>
              <td class="mono" style="font-size:11px;color:var(--ink-2,#475569)">${esc(ivRef)}</td>
              <td>${chqCell}</td>
              <td class="r money">${grossCell}</td>
              <td class="r money">${bmpFmtMoney(o.shopee_net)}</td>
              <td class="r money">${bmpFmtMoney(o.fee_diff)}</td>
              <td>${isMis?(isResolved?`<span style="font-size:11px;color:#16a34a;font-weight:600">✓ แก้ไขแล้ว</span>`:`<span class="bmp-misflag">⚠️ ${esc(o.mismatch_reason)}</span>`):(o.existing_bq?`<span style="font-size:11px;color:#475569">deposit แล้ว → BQ ${esc(o.existing_bq)}</span>`:`<span style="color:#16a34a">✓</span>`)}</td>
              <td style="text-align:center">${isMis?`<input type="checkbox" ${isResolved?'checked':''} onclick="event.stopPropagation()" onchange="bmpResolveOrder('${o.id}', this.checked)" style="width:16px;height:16px;accent-color:#16a34a;cursor:pointer" title="ติ๊กถ้าแก้ไขใน Express แล้ว — จะนับ withdrawal นี้พร้อม export">`:''}</td>
            </tr>`;
            }).join("")}
            ${adjRows.map(a => `<tr class="adj">
              <td>·</td>
              <td colspan="5">📌 ${esc(a.note||"adjustment")}</td>
              <td class="r money">${bmpFmtMoney(a.shopee_net)}</td>
              <td colspan="2"><span style="color:#64748b">ปรับปรุง</span></td>
            </tr>`).join("")}
          </tbody>
        </table>
        ${effMis>0?`<div style="margin-top:6px;font-size:11.5px;color:#92400e;background:#fef3c7;border-radius:6px;padding:6px 10px">💡 ติ๊ก "แก้แล้ว" ที่ออเดอร์ที่จัดการใน Express เรียบร้อยแล้ว — เมื่อครบทุกตัว withdrawal นี้จะพร้อม export โดยไม่ต้องดึงรายงานใหม่</div>`:''}
        <div style="margin-top:8px;display:flex;justify-content:flex-end;gap:6px">
          <button class="brec-btn warn" onclick="bmpDeleteWithdrawal('${wd.id}')"><i data-lucide="trash-2"></i> ลบ withdrawal นี้</button>
        </div>
      </div>` : ''}
    </div>`;
  }).join("");

  // filter chips: channel + account
  const chanChips = allChannels.length > 1 ? `
    <div class="bmp-filt">
      <span class="fl">ช่องทาง:</span>
      <button class="${fc==='all'?'on':''}" onclick="bmpSetFilter('channel','all')">ทั้งหมด</button>
      ${allChannels.map(c=>`<button class="${fc===c?'on':''}" onclick="bmpSetFilter('channel','${c}')">🛒 ${esc(c)}</button>`).join("")}
    </div>` : "";
  const acctChips = acctIds.length > 1 ? `
    <div class="bmp-filt">
      <span class="fl">บัญชีเงินเข้า:</span>
      <button class="${fa==='all'?'on':''}" onclick="bmpSetFilter('account','all')">ทั้งหมด</button>
      ${acctIds.map(id=>`<button class="${fa===id?'on':''}" onclick="bmpSetFilter('account','${id}')">${esc(acctLabel(id))}</button>`).join("")}
    </div>` : "";
  const allSelected = filteredIds.length>0 && filteredIds.every(i=>d.mp.selected.has(i));

  return `
    <div class="bmp-sum">
      <div class="bmp-sc"><div class="l">Withdrawal</div><div class="v">${filtered.length}</div></div>
      <div class="bmp-sc"><div class="l">รวม net เข้าแบงค์</div><div class="v">${bmpFmtMoney(totalNet)}</div></div>
      <div class="bmp-sc"><div class="l">รวมหัก ค่าธรรมเนียม</div><div class="v">${bmpFmtMoney(totalFee)}</div></div>
      <div class="bmp-sc ${totalMismatch?'warn':'ok'}"><div class="l">${totalMismatch?'⚠️ ออเดอร์ไม่ตรง':'✓ ผ่านการตรวจ'}</div><div class="v">${totalMismatch||"0"}</div></div>
      <div class="bmp-sc ${stmStats.miss?'warn':'ok'}"><div class="l">ตรงกับ STM</div><div class="v">${stmStats.ok}/${filtered.length}</div><div class="s" style="font-size:11px;color:var(--ink-3,#94a3b8)">${stmStats.nostmt?`ยังไม่อัป STM ${stmStats.nostmt}`:(stmStats.miss?`ไม่พบ ${stmStats.miss}`:'ครบ')}</div></div>
    </div>
    ${stmStats.nostmt>0?`<div style="font-size:12px;color:#1e40af;background:#dbeafe;border-radius:8px;padding:8px 12px;margin-bottom:10px">💡 บาง withdrawal ยังไม่มี Statement ของบัญชีนั้น — อัป Statement ผ่านปุ่ม "Statement" บน toolbar (เลือกบัญชี+งวดให้ตรง) แล้วระบบจะจับยอด withdrawal กับ STM ให้อัตโนมัติ</div>`:''}
    ${(chanChips||acctChips)?`<div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px">${chanChips}${acctChips}</div>`:''}
    <div style="display:flex;gap:8px;margin:0 0 12px;flex-wrap:wrap;align-items:center">
      <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;cursor:pointer">
        <input type="checkbox" ${allSelected?'checked':''} onclick="bmpSelectAllWd()" style="width:15px;height:15px;accent-color:var(--brand)"> เลือกทั้งหมด
      </label>
      <span style="font-size:12.5px;color:var(--ink-2,#475569)">เลือก ${selCount}/${filtered.length}</span>
      <div style="flex:1"></div>
      <button class="brec-btn primary" onclick="bmpExportCsv()"><i data-lucide="download"></i> ⬇ Export CSV ${selCount?`(${selCount} ที่เลือก)`:'(ทั้งหมด)'}</button>
      <button class="brec-btn" onclick="bmpExportMismatchXlsx()" ${totalMismatch?'':'disabled'}><i data-lucide="file-warning"></i> ⬇ รายงานไม่ตรง (Excel)</button>
      <button class="brec-btn warn" onclick="bmpPurgePeriod()"><i data-lucide="trash-2"></i> ลบทั้งหมดในงวด</button>
    </div>
    <div class="bmp-cards">${cards}</div>
  `;
}

  .bmp-tbl th{font-size:10.5px;color:var(--ink-2,#475569);text-transform:uppercase;letter-spacing:.3px;font-weight:700;background:#f8fafc}
  .bmp-tbl td.r,.bmp-tbl th.r{text-align:right}
  .bmp-tbl td.mono{font-family:"IBM Plex Sans",monospace;font-size:11.5px}
  .bmp-tbl td.money{font-feature-settings:'tnum'}
  .bmp-tbl tr.mis{background:#fef2f2}

  .bmp-tbl tr.fixed{background:#f0fdf4}
  .bmp-tbl tr.fixed td{color:#166534}
  .bmp-edit{border:1px solid #fca5a5;border-radius:5px;padding:3px 6px;font-size:12px;font-family:inherit;background:#fff;width:130px}
  .bmp-edit.num{width:90px;text-align:right;font-feature-settings:'tnum'}

  .bmp-edit:focus{outline:2px solid #fecaca;border-color:#dc2626}

  .bmp-tbl tr.fixed .bmp-edit:focus{outline:2px solid #bbf7d0;border-color:#16a34a}
  .bmp-tbl tr.adj{background:#f8fafc;font-style:italic}

  .brec-btn.warn{background:#fee2e2;color:#991b1b;border-color:#fecaca}
  .brec-btn.warn:hover{background:#fecaca}

  document.head.appendChild(s);
}

/* hook: inject CSS + auto load mp data when bankrec opens */
const _origBrecInjectCSS = brecInjectCSS;
brecInjectCSS = function(){ _origBrecInjectCSS(); bmpInjectCSS(); };

const _origBrecLoad = brecLoad;
brecLoad = async function(){
  await _origBrecLoad();
  try{ await bmpLoadFromDb(); }catch(e){ console.warn("bmp load fail", e); }
};


/* ---------- init ---------- */
renderApp();
sb.auth.onAuthStateChange((evt)=>{ if(evt==="SIGNED_IN" || evt==="SIGNED_OUT") renderApp(); });
</script>
