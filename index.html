        <div class="stat"><div class="n" style="color:#16a34a">${keyed.toLocaleString()}</div><div class="l">คีย์ IV แล้ว</div></div>
        <div class="stat"><div class="n" style="color:#d97706">${pending.toLocaleString()}</div><div class="l">ยังไม่คีย์</div></div>
        <div class="stat"><div class="n" style="color:#94a3b8">${cancelled.toLocaleString()}</div><div class="l">ยกเลิก</div></div>
      </div>
      <div class="pill-stat" style="margin-top:8px">
        <div class="stat"><div class="n" style="font-size:18px">${esc(latestSale)}</div><div class="l">ออเดอร์ล่าสุด</div></div>
        <div class="stat"><div class="n" style="font-size:18px">${esc(latestKey)}</div><div class="l">คีย์ IV ล่าสุด</div></div>
        <div class="stat"><div class="n" style="font-size:18px;color:#dc2626">${esc(oldestSaleNotKeyed)}</div><div class="l">ออเดอร์เก่าสุดที่ยังไม่คีย์</div></div>
      </div>
      <button class="btn ghost" style="margin-top:10px;font-size:12px" onclick="renderToolDashboard()">🔄 รีเฟรช</button>
    </div>

    ${total===0 ? `<div class="card"><div class="empty">ยังไม่มีข้อมูลใน Supabase — อัป BigSeller ที่หน้า "จัดฟอร์แมต Big Seller" แล้วกด "บันทึกลง Supabase"</div></div>` : `
    <div class="card">
      <h3>📅 รายวัน (14 วันล่าสุด)</h3>
      <div class="table-wrap"><table>
        <thead><tr><th>วันที่ขาย</th><th>ทั้งหมด</th><th>คีย์ IV แล้ว</th><th>ยังไม่คีย์</th><th>%</th></tr></thead>
        <tbody>${daily.map(d=>{
          const left = d.total - d.keyed - d.cancelled;
          const pct = d.total ? Math.round(d.keyed*100/d.total) : 0;
          return `<tr>
            <td>${esc(d.date)}</td>
            <td>${d.total}</td>
            <td style="color:#16a34a">${d.keyed}</td>
            <td style="color:${left>0?'#d97706':'#94a3b8'}">${left}</td>
            <td>${pct}%</td>
          </tr>`;
        }).join("")}</tbody>
      </table></div>
    </div>

    ${pending>0 ? `
    <div class="card">
      <h3>📌 ออเดอร์ค้างคีย์ ตามช่องทาง</h3>
      <div class="pill-stat">
        ${Object.keys(pendingByPlatform).sort().map(k=>`
          <div class="stat"><div class="n">${pendingByPlatform[k]}</div><div class="l">${esc(k)}</div></div>
        `).join("")}
      </div>
    </div>` : ""}
    `}
  `;
}

  let orders = [], from = 0, sz = 1000;
  while(true){

    orders = orders.concat(data);
    if(data.length < sz) break;
    from += sz;
  }
  d.orders = orders;
  // ดึง items ของออเดอร์ที่ status='pending' พอเพราะตัวอื่นไม่ต้องคีย์
  const orderNos = orders.filter(o=>o.status==="pending").map(o=>o.order_no);
  d.items = [];
  for(let i=0;i<orderNos.length;i+=500){
    const slice = orderNos.slice(i, i+500);
    const { data, error } = await sb.from("order_items").select("*")
      .eq("company", company).in("order_no", slice);
    if(error) throw error;
    d.items = d.items.concat(data||[]);
  }
}

function exkFiltered(){
  const d = exkGet();
  if(!d.orders) return [];
  const f = d.filters;
  return d.orders.filter(o => {
    if(f.status==="pending" && o.iv_no) return false;
    if(f.status==="pending" && o.status==="cancelled") return false;
    if(f.status==="keyed" && !o.iv_no) return false;
    if(f.from && o.sale_date && o.sale_date < f.from) return false;
    if(f.to && o.sale_date && o.sale_date > f.to) return false;
    if(f.platforms.length && !f.platforms.includes(o.platform||"")) return false;
    if(f.brands.length && !f.brands.includes(o.brand||"")) return false;
    return true;
  });
}

function exkSelectAll(on){

async function exkResetCache(){

function exkExport(){
  const d = exkGet();
  const rows = exkFiltered().filter(r => d.selected[r.order_no]);
  if(!rows.length){ alert("ยังไม่ได้เลือกออเดอร์"); return; }
  // จัดเรียงตามวันที่ขายก่อน เพื่อให้ IV รันตามลำดับ
  rows.sort((a,b)=> (a.sale_date||"").localeCompare(b.sale_date||"") || a.order_no.localeCompare(b.order_no));

  // เตรียม items ของออเดอร์ที่เลือก
  const itemsBy = {};
  (d.items||[]).forEach(it => {
    if(!itemsBy[it.order_no]) itemsBy[it.order_no]=[];
    itemsBy[it.order_no].push(it);
  });

  // IV seed
  const seed = bsParseIvSeed(d.lastIv);
  let nextRun = seed ? seed.running+1 : null;

  const aoa = [BS_HEAD.concat(["ร้าน","หมายเหตุ"])];
  let seq = 0;
  const company = state.company;
  const shipSkuCode = BS_SHIP_SKU[company] || "";
  for(const o of rows){
    const its = itemsBy[o.order_no] || [];
    if(!its.length) continue;
    const ivNo = seed ? bsFormatIv(seed.yy, seed.mm, nextRun++) : (o.iv_no || "");
    // FB/OD → FACE (กรณีออเดอร์ที่ฝ่ายขายไม่ได้แก้ตอนอัป)
    const isManual = /^(FB|OD)/i.test(o.order_no);
    const cust = isManual ? "FACE" : (o.cust_code || "");
    // หา orderShip ก่อน (เพื่อใส่ 3 cols ใหม่ที่บรรทัดสุดท้ายเฉพาะที่มีค่าส่ง)
    const orderShip = its.reduce((mx,x)=>Math.max(mx, x.ship||0), 0);
    const orderDiscount = its.reduce((mx,x)=>Math.max(mx, x.discount||0), 0);
    its.forEach((it, idx) => {
      seq++;
      const isFirst = idx===0, isLast = idx===its.length-1;
      const hasShip = isLast && orderShip > 0;
      aoa.push([
        seq,
        isFirst ? ivNo : "",
        isFirst ? o.order_no : "",
        o.sale_date || "",
        o.platform || "",
        cust,
        it.sku || "",
        it.qty || 0,
        it.price || 0,
        isLast ? orderShip : 0,
        isFirst ? orderDiscount : 0,
        hasShip ? shipSkuCode : "",
        hasShip ? "{Enter}"   : "",
        hasShip ? orderShip   : "",
        o.shop_name || "",
        isManual ? "Manual → FACE" : ""
      ]);
    });
  }

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  forceTextCells(ws, [1, 2, 6, 11, 12]);
  const base = `AutoKey_${COMPANIES.find(c=>c.id===state.company).name}_${stamp()}`;
  download("﻿"+XLSX.utils.sheet_to_csv(ws), base+".csv", "text/csv;charset=utf-8");
}

async function homeLoadStats(){
  try{
    const co = await fopCompanyId(); if(!co) return;
    const todayISO = new Date().toISOString().slice(0,10);

      sb.from("order_ledger").select("iv_no,re_no,status,order_total,bank_in_date,order_date").eq("company_id",co).is("deleted_at",null).limit(20000),
      sb.from("ap_invoices").select("amount_outstanding").eq("company_id",co).is("deleted_at",null),
      sb.rpc("fn_balance_as_of",{ p_company:co, p_as_of: todayISO })
    ]);
    const orders = ordRes.data||[];
    const active = orders.filter(o=>o.status!=="cancelled");
    const withIv = active.filter(o=>o.iv_no);
    const rePending = withIv.filter(o=>!o.re_no);
    const apSum = (apRes.data||[]).reduce((s,r)=>s+Number(r.amount_outstanding||0),0);
    const cash = (balRes.data||[]).reduce((s,r)=>s+Number(r.amount||0),0);
    const saleSum = active.reduce((s,o)=>s+Number(o.order_total||0),0);
    state.home.stats = {
      ivPct: active.length? Math.round(withIv.length/active.length*100):0,
      ivKeyed: withIv.length, ordTotal: active.length, cancelled: orders.length-active.length,
      rePending: rePending.length, bankIn: active.filter(o=>o.bank_in_date).length,
      apSum, cash, saleSum, _loaded:true
    };
  }catch(e){ console.warn("home stats", e); }
}

state.ar = state.ar || {};
function arGet(){
  const co = state.company;
  if(!state.ar[co]) state.ar[co] = { tab:"real", orders:null, receipts:null };
  return state.ar[co];
}

function arFmt(n){ return (n||0).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function arDaysSince(dateStr){ if(!dateStr) return 999; return Math.floor((Date.now()-new Date(dateStr).getTime())/86400000); }
function arAgingLabel(days){
  if(days<=30)  return "0–30 วัน";
  if(days<=60)  return "31–60 วัน";
  if(days<=90)  return "61–90 วัน";
  return ">90 วัน";
}
function arAgingColor(days){
  if(days<=30)  return "var(--ok)";
  if(days<=60)  return "var(--warn)";
  return "var(--bad)";
}

  while(true){
    const { data, error } = await sb.from("orders")
      .select("id,order_no,iv_no,sale_date,status,net_amount,platform,shop_name,brand,cust_code,company_id")
      .eq("company", co).range(from, from+999);
    if(error) throw error;
    if(!data||!data.length) break;
    orders = orders.concat(data);
    if(data.length < 1000) break;
    from += 1000;
  }
  d.orders = orders;
  d.companyId = companyId;

  // 2) ar_receipts — RLS กรองให้อยู่แล้ว แต่ filter company_id ซ้ำเพื่อ multi-company safety
  let receipts = [], from2 = 0;
  while(true){
    let q = sb.from("ar_receipts")
      .select("id,order_no,iv_no,received_date,received_amount,bank_account,note");
    if(companyId) q = q.eq("company_id", companyId);
    const { data, error } = await q.range(from2, from2+999);
    if(error) throw error;
    if(!data||!data.length) break;
    receipts = receipts.concat(data);
    if(data.length < 1000) break;
    from2 += 1000;
  }
  d.receipts = receipts;
}

function arBuildRows(orders, receipts){
  // sum receipts per order_no
  const recByOrder = {};
  for(const r of receipts){
    recByOrder[r.order_no] = (recByOrder[r.order_no]||0) + (r.received_amount||0);
  }
  return orders
    .filter(o => o.status !== "cancelled")
    .map(o => {
      const amt     = o.net_amount || 0;
      const recv    = recByOrder[o.order_no] || 0;
      const out     = Math.max(0, amt - recv);
      const days    = arDaysSince(o.sale_date);
      return { ...o, amt, recv, out, days };
    });
}

  const outstanding = rowsIv.filter(r=>r.out>0);

    const lbl = arAgingLabel(r.days);

  if(!outstanding.length) return `<div class="empty">🎉 ไม่มี AR บัญชีค้างชำระ</div>`;
  const colors = {"0–30 วัน":"var(--ok)","31–60 วัน":"var(--warn)","61–90 วัน":"var(--bad)",">90 วัน":"#7f1d1d"};
  let html = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">`;

    <thead><tr>

      <th style="text-align:right">ยอด IV</th><th style="text-align:right">รับแล้ว</th>

      <tr>
        <td><span class="badge" style="background:#dcfce7;color:#166534">${esc(r.iv_no)}</span></td>
        <td><code style="font-size:12px">${esc(r.order_no)}</code></td>
        <td>${esc(r.sale_date||'—')}</td>

        <td style="text-align:right;font-weight:700;color:${arAgingColor(r.days)}">${arFmt(r.out)}</td>

      </tr>`).join("")}
    </tbody>
  </table></div>`;
  return html;
}

async function arSaveReceipt(info){
  const date  = document.getElementById("arRDate").value;
  const amt   = parseFloat(document.getElementById("arRAmt").value);
  const bank  = document.getElementById("arRBank").value.trim();
  const note  = document.getElementById("arRNote").value.trim();
  const errEl = document.getElementById("arRErr");
  if(!date){ errEl.textContent="กรุณาระบุวันที่"; errEl.style.display=""; return; }
  if(!amt || amt<=0){ errEl.textContent="กรุณาระบุจำนวนเงิน > 0"; errEl.style.display=""; return; }
  errEl.style.display="none";
  const btn = document.getElementById("arRSaveBtn");
  btn.disabled=true; btn.textContent="กำลังบันทึก...";
  try{
    const d = arGet();
    const o = d.orders.find(x=>x.order_no===info.order_no);
    const companyId = (o && o.company_id) || d.companyId;
    if(!companyId) throw new Error("ไม่พบ company_id — ลอง refresh ใหม่");
    const id = `ar|${state.company}|${info.order_no}|${date}|${Date.now()}`;
    const { error } = await sb.from("ar_receipts").insert({
      id, company_id: companyId,
      order_no: info.order_no,
      iv_no:    info.iv_no || null,
      received_date: date,
      received_amount: amt,
      bank_account: bank || null,
      note: note || null,
      created_by: AUTH.user ? AUTH.user.id : null
    });
    if(error) throw error;
    document.getElementById("arReceiptModal").remove();
    await arLoad();
    renderToolAr();
  }catch(err){
    btn.disabled=false; btn.textContent="✅ บันทึก";
    errEl.textContent="บันทึกไม่สำเร็จ: "+(err.message||err);
    errEl.style.display="";
  }
}

/* ============================================================
   USER MANAGEMENT — admin only
   ใช้ service_role key ที่ user paste ครั้งเดียวต่อ session
   (เก็บใน sessionStorage — ไม่ขึ้น cloud, ปิด tab = หาย)
   ============================================================ */
state.users = state.users || { list:null, companies:null, access:null, srKey:null, busy:false };

function usrSrKey(){
  return state.users.srKey || sessionStorage.getItem("ft-sr-key") || "";
}
function usrSrSet(k){
  state.users.srKey = k;
  if(k) sessionStorage.setItem("ft-sr-key", k);
  else  sessionStorage.removeItem("ft-sr-key");
}
function usrSb(){
  // client ใหม่ที่ใช้ service_role (ข้าม RLS, เรียก admin APIs ได้)
  const k = usrSrKey();
  if(!k) return null;
  return window.supabase.createClient(SUPABASE_URL, k, { auth:{ persistSession:false } });
}

const ROLES = [
  { v:"admin",       l:"Admin",         d:"ทำได้ทุกอย่าง" },
  { v:"finance_mgr", l:"Finance Mgr",   d:"จัดการการเงิน อนุมัติ" },
  { v:"accountant",  l:"Accountant",    d:"คีย์ IV, รับเงิน, AR/AP" },
  { v:"treasury",    l:"Treasury",      d:"ธนาคาร, กระทบยอด" },
  { v:"sales_ops",   l:"Sales Ops",     d:"คีย์ออเดอร์, จัดการขาย" },
  { v:"approver",    l:"Approver",      d:"อนุมัติเอกสาร" },
  { v:"executive",   l:"Executive",     d:"ผู้บริหาร ดู KPI" },
  { v:"viewer",      l:"Viewer",        d:"ดูอย่างเดียว" },
];

async function usrLoadAll(){
  const sb2 = usrSb();
  if(!sb2) throw new Error("ต้องใส่ service_role key ก่อน");
  // 1) auth users (admin API)
  const url = SUPABASE_URL + "/auth/v1/admin/users?per_page=200";
  const res = await fetch(url, {
    headers: { apikey: usrSrKey(), Authorization: "Bearer " + usrSrKey() }
  });
  if(!res.ok){
    const txt = await res.text();
    throw new Error("โหลด users ไม่สำเร็จ: " + res.status + " " + txt.slice(0,200));
  }
  const j = await res.json();
  state.users.list = j.users || [];

  // 2) companies
  const { data: cos, error: e1 } = await sb2.from("companies").select("id,code,name").order("name");
  if(e1) throw e1;
  state.users.companies = cos || [];

  // 3) user_company_access
  const { data: acc, error: e2 } = await sb2.from("user_company_access")
    .select("id,user_id,company_id,role,is_active");
  if(e2) throw e2;
  state.users.access = acc || [];
}

function usrAccessByUser(uid){
  return (state.users.access||[]).filter(a => a.user_id === uid && a.is_active !== false);
}
function usrCoName(id){
  const c = (state.users.companies||[]).find(x => x.id === id);
  return c ? c.name : "—";
}

function usrGenPwd(){
  const c = "ABCDEFGHJKMNPQRSTUVWXYZ23456789abcdefghjkmnpqrstuvwxyz!@#$";
  let p = ""; for(let i=0;i<14;i++) p += c[Math.floor(Math.random()*c.length)];
  return p;
}

async function usrCreate(){
  const err = document.getElementById("uAddErr");
  const btn = document.getElementById("uAddBtn");
  const email = document.getElementById("uAddEmail").value.trim();
  const pwd   = document.getElementById("uAddPwd").value;
  const name  = document.getElementById("uAddName").value.trim();
  const role  = document.getElementById("uAddRole").value;
  if(!email || !pwd){
    err.textContent = "กรุณาระบุอีเมล + รหัสผ่าน";
    err.style.display = ""; return;
  }
  if(pwd.length < 8){
    err.textContent = "รหัสผ่านต้องอย่างน้อย 8 ตัว"; err.style.display = ""; return;
  }
  err.style.display = "none";
  btn.disabled = true; btn.textContent = "กำลังสร้าง...";

  try{
    // 1) Create auth user via admin API
    const res = await fetch(SUPABASE_URL + "/auth/v1/admin/users", {
      method: "POST",
      headers: {
        apikey: usrSrKey(),
        Authorization: "Bearer " + usrSrKey(),
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password: pwd,
        email_confirm: true,
        app_metadata: { role },
        user_metadata: name ? { display_name: name } : {}
      })
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error("สร้าง user ไม่สำเร็จ: " + res.status + " " + t.slice(0,300));
    }
    const j = await res.json();
    const newUserId = j.id || (j.user && j.user.id);

    // 2) Insert user_company_access for each ticked company
    const sb2 = usrSb();
    const cos = state.users.companies || [];
    const accessRows = [];
    for(const c of cos){
      const cb = document.getElementById("uAddCo-" + c.id);
      if(cb && cb.checked){
        const r = document.getElementById("uAddCoRole-" + c.id).value || role;
        accessRows.push({ user_id: newUserId, company_id: c.id, role: r, is_active: true });
      }
    }
    if(accessRows.length){
      const { error: e } = await sb2.from("user_company_access").insert(accessRows);
      if(e) throw new Error("user สร้างแล้ว แต่ assign บริษัทไม่ได้: " + e.message);
    }

    document.getElementById("usrModal").remove();
    alert("สร้าง user สำเร็จ\n\nEmail: " + email + "\nPassword: " + pwd + "\n\nก๊อปแจ้ง user แล้วให้เขา login เปลี่ยนรหัสเอง");
    renderToolUsers();
  }catch(e){
    btn.disabled = false; btn.textContent = "สร้าง user";
    err.textContent = e.message || String(e);
    err.style.display = "";
  }
}

async function usrUpdate(uid){
  const err = document.getElementById("uEdErr");
  const btn = document.getElementById("uEdBtn");
  const role = document.getElementById("uEdRole").value;
  const pwd  = document.getElementById("uEdPwd").value;
  err.style.display = "none";
  btn.disabled = true; btn.textContent = "กำลังบันทึก...";

  try{
    // 1) update app_metadata.role + (optional) password
    const body = { app_metadata: { role } };
    if(pwd){
      if(pwd.length < 8) throw new Error("รหัสผ่านต้องอย่างน้อย 8 ตัว");
      body.password = pwd;
    }
    const res = await fetch(SUPABASE_URL + "/auth/v1/admin/users/" + uid, {
      method: "PUT",
      headers: {
        apikey: usrSrKey(),
        Authorization: "Bearer " + usrSrKey(),
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error("update ไม่สำเร็จ: " + res.status + " " + t.slice(0,300));
    }

    // 2) sync user_company_access
    const sb2 = usrSb();
    const cos = state.users.companies || [];
    const accByCo = {};
    usrAccessByUser(uid).forEach(a => { accByCo[a.company_id] = a; });

    const toInsert = [], toDelete = [];
    for(const c of cos){
      const ck = document.getElementById("uEdCo-" + c.id).checked;
      const r  = document.getElementById("uEdCoRole-" + c.id).value;
      const ex = accByCo[c.id];
      if(ck && !ex){
        toInsert.push({ user_id: uid, company_id: c.id, role: r, is_active: true });
      } else if(ck && ex && ex.role !== r){
        const { error: eu } = await sb2.from("user_company_access").update({ role: r }).eq("id", ex.id);
        if(eu) throw eu;
      } else if(!ck && ex){
        toDelete.push(ex.id);
      }
    }
    if(toInsert.length){
      const { error: ei } = await sb2.from("user_company_access").insert(toInsert);
      if(ei) throw ei;
    }
    if(toDelete.length){
      const { error: ed } = await sb2.from("user_company_access").delete().in("id", toDelete);
      if(ed) throw ed;
    }

    document.getElementById("usrModal").remove();
    renderToolUsers();
  }catch(e){
    btn.disabled = false; btn.textContent = "บันทึก";
    err.textContent = e.message || String(e);
    err.style.display = "";
  }
}

/* ---------- Delete user ---------- */
async function usrConfirmDelete(uid, email){
  if(!confirm(`ลบ user "${email}" จริง?\n\nการลบนี้ลบจาก auth.users + ลบ user_company_access ทั้งหมดด้วย`)) return;
  try{
    const sb2 = usrSb();
    // ลบ user_company_access ก่อน (กัน FK)
    await sb2.from("user_company_access").delete().eq("user_id", uid);
    // ลบ auth user
    const res = await fetch(SUPABASE_URL + "/auth/v1/admin/users/" + uid, {
      method: "DELETE",
      headers: { apikey: usrSrKey(), Authorization: "Bearer " + usrSrKey() }
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error("ลบไม่สำเร็จ: " + res.status + " " + t.slice(0,300));
    }
    renderToolUsers();
  }catch(e){
    alert("ลบไม่สำเร็จ: " + (e.message||e));
  }
}

/* ============================================================
   EXECUTIVE CASH FLOW DASHBOARD — admin only
   อัปไฟล์ "รายละเอียดเงินรับ-เงินจ่าย" หลายบัญชี/หลายเดือน
   ============================================================ */
state.ed = state.ed || {};   // per-company container
function edState(){
  const co = state.company;
  if(!state.ed[co]){
    state.ed[co] = {
      file:null, data:null, tab:"summary", err:null, monthFilter:"all",
      explorer:{ q:"", acct:"all", act:"all", dir:"all", sort:"date", desc:true },
      stmtAcct:"all", savedAt:null
    };
    // restore จาก localStorage (per-company)
    try{
      const raw = localStorage.getItem("ft-ed-data-" + co);
      if(raw){
        const saved = JSON.parse(raw);
        if(saved && saved.data && saved.data.transactions){
          // hydrate Date objects (JSON สูญเสีย Date type)
          saved.data.transactions.forEach(t => { if(typeof t.date === "string") t.date = new Date(t.date); });
          if(saved.data.months){
            saved.data.months.forEach(m => (m.accounts||[]).forEach(a => (a.items||[]).forEach(it => {
              if(typeof it.date === "string") it.date = new Date(it.date);
            })));
          }
          if(typeof edMigrateAccounts === "function") edMigrateAccounts(saved.data);
          state.ed[co] = Object.assign(state.ed[co], saved);
        }
      }
    }catch(e){ console.warn("restore exec dashboard data ล้มเหลว:", e); }
  }
  return state.ed[co];
}

function edSave(){
  const co = state.company;
  const d = edState();
  try{
    if(!d.data){ localStorage.removeItem("ft-ed-data-" + co); return; }
    const toSave = {
      file: d.file,

}

/* normalize bank account number: strip dash/space → กัน duplicate (865-0-98040-5 vs 865-098040-5) */
function edNormAccNo(s){
  // เก็บเฉพาะตัวเลขล้วน — กัน duplicate จากขีด/ช่องว่างทุกชนิด
  // (รวมขีด non-breaking hyphen U+2011, en-dash U+2013, NBSP ฯลฯ ที่ \- ปกติตัดไม่ออก)
  const digits = String(s||"").replace(/\D/g,"");
  // fallback: ถ้าไม่มีตัวเลขเลย (เลขบัญชีแปลก ๆ) ใช้แบบเดิม (ตัด ws/dash/slash แล้ว lower)
  return digits || String(s||"").replace(/[\s\-\/]/g,"").toUpperCase();
}

/* canonical key ของบัญชี — bank (upper/trim) + เลขบัญชีตัวเลขล้วน */
function edAcctKey(bank, no){
  return String(bank||"").trim().toUpperCase() + "·" + edNormAccNo(no);
}

/* migrate loaded data: merge accounts ที่มี bank+normalizedNo เหมือนกัน
   ★ recompute key จาก bank+no โดยตรงทุกที่ (ไม่พึ่ง keyMap lookup) — กัน tx/เดือนที่ key เก่าไม่ตรง dict
     (เกิดได้จากการ rebuild หลายปี/ไฟล์คนละฟอร์แมต) ตกค้างเป็นบัญชีซ้ำในกราฟ */
function edMigrateAccounts(dataObj){
  if(!dataObj || !dataObj.accounts) return dataObj;
  const newAccounts = {};
  for(const oldKey in dataObj.accounts){
    const a = dataObj.accounts[oldKey];
    const newKey = edAcctKey(a.bank, a.no);
    if(!newAccounts[newKey]){
      newAccounts[newKey] = { ...a, no: a.no, months:{}, totalIn:0, totalOut:0, firstOpen:null, lastClose:null };
    }
    const acc = newAccounts[newKey];
    // merge months (เดือนคนละ key = union; เดือนซ้ำ key = บวก ซึ่งไม่ควรเกิดสำหรับบัญชีเดียวกัน)
    for(const m in (a.months||{})){
      if(!acc.months[m]) acc.months[m] = { opening:0, closing:0, in:0, out:0, ok:true };
      acc.months[m].opening += a.months[m].opening || 0;
      acc.months[m].closing += a.months[m].closing || 0;
      acc.months[m].in      += a.months[m].in || 0;
      acc.months[m].out     += a.months[m].out || 0;
    }
    acc.totalIn  += a.totalIn  || 0;
    acc.totalOut += a.totalOut || 0;
  }
  // firstOpen = opening เดือนแรกสุด, lastClose = closing เดือนล่าสุด
  // (★ ไม่บวกซ้อน — เดิม sum ทำให้ยอดปลายงวดในโดนัทเบิ้ลตอน merge ข้ามปี)
  for(const k in newAccounts){
    const acc = newAccounts[k];
    const mkeys = Object.keys(acc.months).sort();
    if(mkeys.length){
      acc.firstOpen = acc.months[mkeys[0]].opening;
      acc.lastClose = acc.months[mkeys[mkeys.length-1]].closing;
    }
  }
  dataObj.accounts = newAccounts;
  // recompute accountKey ทุกที่จาก bank+no โดยตรง
  if(Array.isArray(dataObj.transactions)){
    for(const t of dataObj.transactions) t.accountKey = edAcctKey(t.bank, t.accountNo);
  }
  if(Array.isArray(dataObj.months)){
    for(const m of dataObj.months){
      for(const a of (m.accounts||[])){
        const hb = a.header ? a.header.bank : a.bank;
        const hn = a.header ? a.header.no   : a.no;
        a.accountKey = edAcctKey(hb, hn);
        for(const it of (a.items||[])) it.accountKey = edAcctKey(it.bank, it.accountNo);
      }
    }
  }
  return dataObj;
}

async function edSyncFromCloud(){
  if(!AUTH.user) return;
  const co = state.company;
  try{
    const cid = await edCompanyId();
    if(!cid) return;
    const { data:rows, error } = await sb.from("exec_cashflow")
      .select("data, file_name, updated_at").eq("company_id", cid).limit(1);
    if(error){ console.warn("[ed] cloud fetch error:", error); return; }
    const local = edState();

    // CLOUD-FIRST: ถ้า server มีข้อมูล → ใช้ของ server เสมอ (single source of truth)
    if(rows && rows.length){
      const remote = rows[0];
      const dataObj = remote.data;
      if(dataObj && dataObj.transactions){
        dataObj.transactions.forEach(t => { if(typeof t.date === "string") t.date = new Date(t.date); });
        (dataObj.months||[]).forEach(m => (m.accounts||[]).forEach(a => (a.items||[]).forEach(it => {
          if(typeof it.date === "string") it.date = new Date(it.date);
        })));
      }
      edMigrateAccounts(dataObj);
      const changed = !local.savedAt || local.savedAt !== remote.updated_at;
      local.data = dataObj;
      local.file = remote.file_name;
      local.savedAt = remote.updated_at;
      try{ localStorage.setItem("ft-ed-data-"+co, JSON.stringify({
        file: local.file, data: local.data, tab: local.tab,
        monthFilter: local.monthFilter, explorer: local.explorer, stmtAcct: local.stmtAcct,
        savedAt: local.savedAt
      })); }catch(e){}
      if(changed && state.tool === "execdash" && state.company === co) renderToolExecDash();
    } else if(local.data){
      // CLOUD ว่าง แต่ local มี → push ขึ้น cloud (recovery กรณี first upload fail)
      console.log("[ed] cloud empty + local has data → pushing");
      edSaveCloud();
    }
  }catch(e){ console.warn("edSyncFromCloud:", e); }
}

const BANK_KEYS = ["BBL","SCB","KBANK","KTB","BAY","TTB","TMB","GSB","UOB","CIMB","KKP","TISCO","ICBC","LH","HSBC"];

function edFmt(n){
  if(n==null || isNaN(n)) return "—";
  const v = Number(n);
  const s = Math.abs(v).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
  return v < 0 ? "(" + s + ")" : s;
}
function edFmtCompact(n){
  if(!n) return "0";
  const v = Math.abs(n);
  if(v >= 1e6) return (n/1e6).toFixed(2) + "M";
  if(v >= 1e3) return (n/1e3).toFixed(1) + "K";
  return n.toFixed(0);
}
function edParseAcctHeader(s, accNoFromRow){
  // รองรับ 2 รูปแบบ:
  //  Benya: "S/A #BBL 865-0-98040-5 (ฝ่าย ออนไลน์)"
  //  M Bark: "เงินฝากออมทรัพย์-SBC#136-270928-1 (สัมมากร)" + บรรทัดถัดมามี "สมุดบัญชีเลขที่"
  s = String(s||"").trim();
  let bank = "—", no = "", nick = "";

  // bank: ลอง BANK_KEYS ก่อน + alias พิเศษ
  const BANK_ALIAS = { "SBC":"SCB", "KBNK":"KBANK", "TMB":"TTB" };
  const U = s.toUpperCase();
  for(const k of BANK_KEYS){
    if(U.includes(k)){ bank = k; break; }
  }
  if(bank === "—"){
    for(const a in BANK_ALIAS){
      if(U.includes(a)){ bank = BANK_ALIAS[a]; break; }
    }
  }

  // เลขบัญชี: ถ้ามี accNoFromRow (M Bark) ใช้เลย — ไม่งั้น parse จาก string
  if(accNoFromRow != null && String(accNoFromRow).trim()){
    no = String(accNoFromRow).trim();
    // format ถ้าเป็นเลขล้วน 9-10 หลัก → "XXX-XXXXXX-X"
    if(/^\d{9,12}$/.test(no)){
      no = no.slice(0,3) + "-" + no.slice(3, no.length-1) + "-" + no.slice(-1);
    }
  } else {
    // Benya: หาแบบ #BBL 865-0-98040-5
    let m = s.match(/#\s*[A-Z]+\s+([\d\-]+)/);
    if(!m) m = s.match(/#\s*([\d][\d\-]*\d)/);   // #136-270928-1 ติดกัน
    if(!m) m = s.match(/(\d[\d\-]{4,}\d)/);      // fallback: เลข+dash ที่ยาวพอ
    if(m) no = m[1];
  }

  const p = s.match(/\(([^)]+)\)/);
  if(p) nick = p[1].trim();
  return { bank, no, nick, raw:s };
}
function edActivityKey(s){
  s = String(s||"").trim();
  if(s.includes("ดำเนินงาน")) return "operating";
  if(s.includes("ลงทุน"))     return "investing";
  if(s.includes("จัดหา"))     return "financing";
  return "other";
}
function edActivityLabel(k){
  return ({operating:"ดำเนินงาน",investing:"ลงทุน",financing:"จัดหาเงิน",other:"อื่น ๆ"})[k] || k;
}
/* ตรวจว่า transaction เป็น "เงินโอนระหว่างบัญชี" (โอนภายในบริษัทเอง — ไม่ใช่รับ/จ่ายจริง) */
function edIsTransfer(t){
  const cat  = String((t && t.category) || "").trim();
  const note = String((t && t.note)     || "").trim().toLowerCase();
  if(/โอน.{0,8}ระหว่างบัญชี/.test(cat))   return true;
  if(/^(เงิน)?โอนระหว่าง/.test(cat))  return true;
  if(/^เงินโอนภายใน/.test(cat))       return true;
  if(/^เงินโอน$/.test(cat))            return true;
  if(/^transfer$/i.test(cat))          return true;
  if(/inter[\s-]?account/.test(cat.toLowerCase())) return true;
  // note hint: บางบริษัทไม่ตั้ง category — เช็คจาก note
  if(/โอน.{0,8}ระหว่างบัญชี/.test(note)) return true;
  return false;
}
/* helper: รายการเดือน (key "YYYY.MM") ที่อยู่ใน scope ที่เลือก — เรียงจากน้อย→มาก
   monthFilter: "all" (ทุกปี) | "year:2025" (ทั้งปี) | "q:2025:2" (ไตรมาส) | "2025.01" (เดือนเดียว) */
function edScopeMonthKeys(data, monthFilter){
  const keys = (data.months || []).map(m => m.key).sort();
  if(!monthFilter || monthFilter === "all") return keys;
  if(monthFilter.startsWith("year:")){
    const y = monthFilter.slice(5);
    return keys.filter(k => k.slice(0,4) === y);
  }
  if(monthFilter.startsWith("q:")){
    const [,y,q] = monthFilter.split(":"); const qn = Number(q);
    return keys.filter(k => k.slice(0,4) === y && Math.ceil(Number(k.slice(5,7))/3) === qn);
  }
  return keys.filter(k => k === monthFilter);
}
/* helper: ป้ายชื่อ scope ที่อ่านง่าย (ใช้ใน drill/หัวข้อ) */
function edScopeLabel(monthFilter){
  if(!monthFilter || monthFilter === "all") return "รวมทุกเดือน";
  if(monthFilter.startsWith("year:")) return "ปี " + (Number(monthFilter.slice(5)) + 543);
  if(monthFilter.startsWith("q:")){ const [,y,q] = monthFilter.split(":"); return "ไตรมาส " + q + "/" + (Number(y) + 543); }
  return edThaiMonth(monthFilter);
}
/* helper: ยอดเปิดต้น/ปิดปลายของ scope (รองรับ all/ปี/เดือน) — ต่อบัญชี: เปิด=เดือนแรกที่มีใน scope, ปิด=เดือนสุดท้าย */
function edOpenClose(data, monthFilter){
  const scope = edScopeMonthKeys(data, monthFilter);
  let opening = 0, closing = 0;
  if(!scope.length) return { opening, closing };
  for(const k in data.accounts){
    const acc = data.accounts[k];
    for(const mk of scope){ if(acc.months[mk]){ opening += acc.months[mk].opening || 0; break; } }
    for(let i = scope.length - 1; i >= 0; i--){ const mk = scope[i]; if(acc.months[mk]){ closing += acc.months[mk].closing || 0; break; } }
  }
  return { opening, closing };
}
/* helper: ดึง txs ตาม scope (month/year + optional exclude transfers) */
function edTxsInScope(data, monthFilter, excludeTransfers){
  let txs = data.transactions;
  if(monthFilter && monthFilter.startsWith("year:")){
    const y = monthFilter.slice(5);
    txs = txs.filter(t => String(t.month).slice(0,4) === y);
  } else if(monthFilter && monthFilter.startsWith("q:")){
    const [,y,q] = monthFilter.split(":"); const qn = Number(q);
    txs = txs.filter(t => String(t.month).slice(0,4) === y && Math.ceil(Number(String(t.month).slice(5,7))/3) === qn);
  } else if(monthFilter !== "all"){
    txs = txs.filter(t => t.month === monthFilter);
  }
  if(excludeTransfers) txs = txs.filter(t => !edIsTransfer(t));
  return txs;
}

/* ---------- Parser ---------- */
/* ตรวจฟอร์แมต BHG (แผ่นเดียวทั้งปี "YYYY" · header มี เงินรับ/เงินจ่าย · กิจกรรม col A) */
function edIsBHGFormat(book){
  return book.names.some(n=>{
    if(!/^\d{4}$/.test(n)) return false;
    const rows = book.sheets[n]||[];
    return rows.slice(0,14).some(r => {
      const cells=(r||[]).map(c=>String(c||""));
      return cells.some(c=>c.includes("เงินรับ")) && cells.some(c=>c.includes("เงินจ่าย"));
    });
  });
}
/* parser ฟอร์แมต BHG → คืน structure เดียวกับ edParse
   layout: A=กิจกรรม B=วันที่ C=เลขเอกสาร D=คู่ค้า E=รายละเอียด F=เงินรับ G=เงินจ่าย H=คงเหลือ I=หมวด
   · บัญชีขึ้นต้นแถว "SCB 437-1-758754" · "ยอดยกมา" (col E) → opening (col H) · ทั้งปีแผ่นเดียว group เป็นเดือน */
function edParseBHG(book){
  const result = { company:"", months:[], transactions:[], errors:[], accounts:{} };
  const bankRe = /^(SCB|BBL|KBANK|KTB|BAY|TTB|TMB|GSB|UOB|CIMB|KKP)\s+([\d\-\/]+)/i;
  const monthMap = {};
  const getMonth = (key) => {
    if(!monthMap[key]){ const [y,m]=key.split(".").map(Number); monthMap[key]={ key, year:y, month:m, accounts:[] }; result.months.push(monthMap[key]); }
    return monthMap[key];
  };
  for(const name of book.names){
    if(!/^\d{4}$/.test(name)) continue;
    const rows = book.sheets[name] || [];
    if(!rows.length) continue;
    if(!result.company){
      for(let r=0;r<Math.min(4,rows.length);r++) for(const v of (rows[r]||[])){ const s=String(v||"").trim(); if(s.startsWith("บริษัท")){ result.company=s; break; } }
    }
    // 1) เก็บ block ต่อบัญชี
    const blocks = []; let cur = null;
    for(let r=0;r<rows.length;r++){
      const row = rows[r] || [];
      const a = String(row[0]||"").trim();
      const mB = a.match(bankRe);
      if(mB){
        const bank = mB[1].toUpperCase(), no = mB[2].trim();
        cur = { bank, no, nick:no, accountKey: edAcctKey(bank, no), opening:0, byMonth:{} };
        blocks.push(cur); continue;
      }
      if(!cur) continue;
      const descCell = String(row[4]||"").trim();
      if(descCell.includes("ยกมา")){ cur.opening = Number(row[7])||0; continue; }
      const d = row[1];
      if(!(d instanceof Date)) continue;
      const inc = Number(row[5])||0, out = Number(row[6])||0;
      if(inc===0 && out===0) continue;
      const bal = (row[7]==null||row[7]==="") ? null : Number(row[7]);
      const dateISO = d.toISOString().slice(0,10);
      const mkey = dateISO.slice(0,7).replace("-",".");
      const party = String(row[3]||"").trim();
      const tx = {
        date:d, dateISO, mne:"", ref:String(row[2]||"").trim(),
        out, in:inc, balance:bal, status:"",
        note:(party?party+" — ":"")+descCell,
        category:String(row[8]||"").trim() || "ไม่ระบุหมวด",
        activity:a||"ไม่ระบุ", activityKey:edActivityKey(a),
        bank:cur.bank, accountNo:cur.no, accountNick:cur.nick, accountKey:cur.accountKey, month:mkey
      };
      result.transactions.push(tx);
      if(!cur.byMonth[mkey]) cur.byMonth[mkey] = { in:0, out:0, last:null, items:[] };
      const mm = cur.byMonth[mkey]; mm.in+=inc; mm.out+=out; mm.items.push(tx); if(bal!=null) mm.last=bal;
    }
    // 2) แต่ละบัญชี → กระจายเข้าเดือน (opening วิ่งต่อจากเดือนก่อน)
    for(const b of blocks){
      let running = b.opening;
      const accSum = result.accounts[b.accountKey] = result.accounts[b.accountKey] || { bank:b.bank, no:b.no, nick:b.nick, months:{}, totalIn:0, totalOut:0, firstOpen:b.opening, lastClose:null };
      for(const mkey of Object.keys(b.byMonth).sort()){
        const mm = b.byMonth[mkey];
        const opening = running;
        const computed = opening + mm.in - mm.out;
        const closing = (mm.last!=null) ? mm.last : computed;
        running = closing;
        const ok = Math.abs(computed - closing) < 0.02;
        getMonth(mkey).accounts.push({
          header:{bank:b.bank, no:b.no, nick:b.nick}, accountKey:b.accountKey,
          opening, closing, computed, totalIn:mm.in, totalOut:mm.out, items:mm.items, ok, diff:computed-closing
        });
        accSum.months[mkey] = { opening, closing, in:mm.in, out:mm.out, ok };
        accSum.totalIn += mm.in; accSum.totalOut += mm.out; accSum.lastClose = closing;
        if(!ok) result.errors.push({ month:mkey, account:b.accountKey, bank:b.bank, no:b.no, opening, in:mm.in, out:mm.out, expected:computed, got:closing, diff:computed-closing });
      }
    }
  }
  result.months.sort((a,b)=> a.key < b.key ? -1 : 1);
  result.transactions.sort((a,b)=> a.date - b.date);
  return result;
}
function edParse(book){
  if(edIsBHGFormat(book)) return edParseBHG(book);   // ★ ฟอร์แมต BHG (แผ่นเดียวทั้งปี)
  // book = { sheets:{name:rows[][]}, names }
  const result = {
    company:"",
    months:[],            // [{ key:"2026.01", year, month, accounts:[{header, opening, closing, computed, ok, items:[]}] }]
    transactions:[],      // flat: { date, dateISO, mne, ref, out, in, balance, status, note, category, activity, activityKey, bank, accountNo, accountNick, month, accountKey }
    errors:[],
    accounts:{},          // accountKey → { bank, no, nick, months:{m: {opening,closing,computed,ok}} }
  };

  for(const name of book.names){
    if(!/^\d{4}\.\d{2}$/.test(name)) continue;
    const [y,m] = name.split(".").map(Number);
    const rows = book.sheets[name] || [];
    if(!rows.length) continue;

    // capture company from r1
    if(!result.company){
      for(let r=0;r<Math.min(5,rows.length);r++){
        for(const v of (rows[r]||[])){
          const s = String(v||"").trim();
          if(s.startsWith("บริษัท")){ result.company = s; break; }
        }
        if(result.company) break;
      }
    }

    const monthObj = { key:name, year:y, month:m, accounts:[] };
    let curAcct = null;
    let pendingHeader = false;     // เห็น "S/A #..." แล้ว รอผ่าน 3 บรรทัด (date range, headers, ยอดยกมา)

    for(let r=0;r<rows.length;r++){
      const row = rows[r] || [];
      const cell0 = String(row[0]||"").trim();
      const cell3 = String(row[3]||"").trim();
      // detect new account row: col A == "รายการเคลื่อนไหวบัญชีธนาคาร" (เหมือนกันทุก format)
      // หรือ legacy: col D ขึ้นต้น S/A / SA # / #X
      const isAcctHeader =
        cell0 === "รายการเคลื่อนไหวบัญชีธนาคาร" ||
        cell3.toUpperCase().startsWith("S/A") ||
        cell3.toUpperCase().startsWith("SA #") ||
        /^#[A-Z]/.test(cell3);
      if(isAcctHeader){
        // M Bark format: บรรทัดถัดมา (col B) มี "สมุดบัญชีเลขที่" + col D = เลขบัญชี
        let accNoFromRow = null;
        const nextRow = rows[r+1];
        if(nextRow){
          const nc1 = String(nextRow[1]||"").trim();
          if(nc1.includes("สมุดบัญชีเลขที่") || nc1.includes("เลขที่บัญชี")){
            accNoFromRow = nextRow[3];
          }
        }
        const info = edParseAcctHeader(cell3, accNoFromRow);
        // ★ normalize account_no: ตัด dash/space ออก เพื่อกัน duplicate
        // (เช่น "865-0-98040-5" vs "865-098040-5" = บัญชีเดียวกัน)
        const accountKey = edAcctKey(info.bank, info.no);
        curAcct = {
          header: info,
          accountKey,
          opening: 0, closing: null, computed: 0,
          totalIn: 0, totalOut: 0,
          items: []
        };
        monthObj.accounts.push(curAcct);
        pendingHeader = true;
        continue;
      }
      if(!curAcct) continue;

      // ยอดยกมา row: column C === "ยอดยกมา" หรือมีคำว่า "ยกมา"
      const cell2 = String(row[2]||"").trim();
      if(cell2.includes("ยกมา")){
        curAcct.opening = Number(row[5]) || 0;
        curAcct.computed = curAcct.opening;
        pendingHeader = false;
        continue;
      }
      // skip header rows + footer
      if(cell0 === "วันที่" || cell0.includes("ผู้ตรวจ") || cell0.includes("วันที่_")) continue;
      if(pendingHeader) continue;

      // transaction row — must have a real date in col A
      const d = row[0];
      if(!(d instanceof Date)) continue;

      const out = Number(row[3]) || 0;
      const inc = Number(row[4]) || 0;
      const bal = (row[5] == null || row[5] === "") ? null : Number(row[5]);
      if(out === 0 && inc === 0) continue;

      const dateISO = d.toISOString().slice(0,10);
      const cat = String(row[8]||"").trim() || "ไม่ระบุหมวด";
      const actStr = String(row[9]||"").trim();
      const actKey = edActivityKey(actStr);

      const tx = {
        date: d, dateISO,
        mne: String(row[1]||"").trim(),
        ref: String(row[2]||"").trim(),
        out, in: inc, balance: bal,
        status: String(row[6]||"").trim(),
        note:   String(row[7]||"").trim(),
        category: cat,
        activity: actStr || "ไม่ระบุ",
        activityKey: actKey,
        bank: curAcct.header.bank,
        accountNo: curAcct.header.no,
        accountNick: curAcct.header.nick,
        accountKey: curAcct.accountKey,
        month: name
      };
      curAcct.items.push(tx);
      curAcct.totalIn  += inc;
      curAcct.totalOut += out;
      curAcct.computed += (inc - out);
      if(bal != null) curAcct.closing = bal;
      result.transactions.push(tx);
    }

    // reconcile each account in this month
    for(const a of monthObj.accounts){
      if(a.closing == null) a.closing = a.computed;
      const diff = Math.abs(a.computed - a.closing);
      a.ok = diff < 0.02;       // ทศนิยมยอม 0.02 บาท (rounding)
      a.diff = a.computed - a.closing;
      if(!a.ok){
        result.errors.push({
          month: name, account: a.accountKey, bank: a.header.bank, no: a.header.no,
          opening: a.opening, in: a.totalIn, out: a.totalOut,
          expected: a.opening + a.totalIn - a.totalOut,
          got: a.closing, diff: a.diff
        });
      }
      // accumulate per-account totals
      if(!result.accounts[a.accountKey]){
        result.accounts[a.accountKey] = {
          bank: a.header.bank, no: a.header.no, nick: a.header.nick,
          months:{}, totalIn:0, totalOut:0, firstOpen:null, lastClose:null
        };
      }
      const accSum = result.accounts[a.accountKey];
      accSum.months[name] = { opening:a.opening, closing:a.closing, in:a.totalIn, out:a.totalOut, ok:a.ok };
      accSum.totalIn  += a.totalIn;
      accSum.totalOut += a.totalOut;
      if(accSum.firstOpen == null) accSum.firstOpen = a.opening;
      accSum.lastClose = a.closing;
    }

    result.months.push(monthObj);
  }
  result.months.sort((a,b)=> a.key < b.key ? -1 : 1);
  result.transactions.sort((a,b)=> a.date - b.date);
  return result;
}

/* ---------- Aggregations ---------- */
function edAgg(data, monthFilter, excludeTransfers){
  // monthFilter: "all" หรือ "2026.01" — excludeTransfers=true จะตัด "เงินโอนระหว่างบัญชี" ออก
  const txs = edTxsInScope(data, monthFilter, !!excludeTransfers);

  const totalIn  = txs.reduce((s,t)=>s+t.in, 0);
  const totalOut = txs.reduce((s,t)=>s+t.out, 0);
  const net = totalIn - totalOut;

  // opening/closing for the period (รองรับ ทุกปี / ทั้งปี / เดือนเดียว)
  const oc = edOpenClose(data, monthFilter);
  let opening = oc.opening, closing = oc.closing;

  // by activity
  const byAct = { operating:{in:0,out:0}, investing:{in:0,out:0}, financing:{in:0,out:0}, other:{in:0,out:0} };
  for(const t of txs){
    byAct[t.activityKey].in  += t.in;
    byAct[t.activityKey].out += t.out;
  }

  // by category
  const byCat = {};
  for(const t of txs){
    const k = t.category;
    if(!byCat[k]) byCat[k] = { in:0, out:0, count:0, net:0 };
    byCat[k].in  += t.in;
    byCat[k].out += t.out;
    byCat[k].count++;
    byCat[k].net = byCat[k].in - byCat[k].out;
  }

  // by bank account
  const byAcct = {};
  for(const t of txs){
    const k = t.accountKey;
    if(!byAcct[k]) byAcct[k] = { bank:t.bank, no:t.accountNo, nick:t.accountNick, in:0, out:0, count:0, net:0 };
    byAcct[k].in  += t.in;
    byAcct[k].out += t.out;
    byAcct[k].count++;
    byAcct[k].net = byAcct[k].in - byAcct[k].out;
  }

  // by month timeline
  const byMonth = {};
  for(const t of txs){
    if(!byMonth[t.month]) byMonth[t.month] = { in:0, out:0, op:{in:0,out:0}, inv:{in:0,out:0}, fin:{in:0,out:0} };
    byMonth[t.month].in += t.in;
    byMonth[t.month].out += t.out;
    const ak = t.activityKey==="other" ? "op" : ({operating:"op",investing:"inv",financing:"fin"})[t.activityKey];
    if(byMonth[t.month][ak]){
      byMonth[t.month][ak].in  += t.in;
      byMonth[t.month][ak].out += t.out;
    }
  }

  return { txs, totalIn, totalOut, net, opening, closing, byAct, byCat, byAcct, byMonth };
}

/* plugin: % กลางชิ้นโดนัท */
const edDonutPctPlugin = {
  id:"edDonutPct",
  afterDatasetsDraw(chart){
    const ctx = chart.ctx;
    const ds = chart.data.datasets[0]; if(!ds) return;
    const meta = chart.getDatasetMeta(0);

    ctx.font = "700 12px 'IBM Plex Sans','IBM Plex Sans Thai',sans-serif";

      const pos = arc.tooltipPosition();
      ctx.fillStyle = "#fff";
      ctx.fillText(pct.toFixed(0)+"%", pos.x, pos.y);
    });
    ctx.restore();
  }
};

/* rebuild data structure จากชุดเดือน — ใช้ทั้ง merge และ ลบรายปี
   (rebuild transactions/accounts/errors ใหม่หมด → firstOpen/lastClose/ยอดรวมถูกต้องเสมอ) */
function edRebuildFromMonths(monthList, company){
  const months = monthList.slice().sort((a,b)=> a.key < b.key ? -1 : 1);

  // rebuild transactions จากเดือน (กัน tx ซ้ำเวลาเดือนถูกทับ)
  const transactions = [];
  for(const m of months) for(const a of m.accounts) for(const it of (a.items||[])) transactions.push(it);
  transactions.sort((a,b)=> a.date - b.date);

  // rebuild accounts summary จากเดือนที่เรียงแล้ว → firstOpen/lastClose ถูกต้องข้ามปี
  const accounts = {};
  for(const m of months){
    for(const a of m.accounts){
      if(!accounts[a.accountKey]){
        accounts[a.accountKey] = { bank:a.header.bank, no:a.header.no, nick:a.header.nick, months:{}, totalIn:0, totalOut:0, firstOpen:null, lastClose:null };
      }
      const s = accounts[a.accountKey];
      s.months[m.key] = { opening:a.opening, closing:(a.closing!=null?a.closing:a.computed), in:a.totalIn, out:a.totalOut, ok:a.ok };
      s.totalIn  += a.totalIn  || 0;
      s.totalOut += a.totalOut || 0;
      if(s.firstOpen == null) s.firstOpen = a.opening;
      s.lastClose = (a.closing!=null?a.closing:a.computed);
    }
  }

  // rebuild errors จากเดือนที่กระทบยอดไม่ผ่าน
  const errors = [];
  for(const m of months) for(const a of m.accounts){
    if(a.ok === false){
      errors.push({ month:m.key, account:a.accountKey, bank:a.header.bank, no:a.header.no,
        opening:a.opening, in:a.totalIn, out:a.totalOut,
        expected:a.opening + a.totalIn - a.totalOut, got:a.closing, diff:a.diff });
    }
  }

  return { company: company || "", months, transactions, accounts, errors };
}

/* รวมข้อมูลเก่า + ใหม่ เข้าด้วยกัน — เดือนเดียวกัน (key ซ้ำ) = ของใหม่ทับ, เดือน/ปีใหม่ = เพิ่มเข้าไป
   ใช้ตอนอัปไฟล์ปีอื่นเพิ่ม (เช่น มี 2026 อยู่แล้ว อัป 2025 เข้าไป โดย 2026 ยังอยู่ครบ) */
function edMergeData(base, add){
  if(!base || !base.months || !base.months.length) return add;
  // index เดือนตาม key — ของใหม่ทับของเก่าถ้า key ตรงกัน
  const monthMap = {};
  for(const m of base.months) monthMap[m.key] = m;
  for(const m of add.months)  monthMap[m.key] = m;
  return edRebuildFromMonths(Object.values(monthMap), base.company || add.company);
}

function edHandleFile(file){
  const d = edState();
  d.err = null;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, { type:"array", cellDates:true });
      const sheets = {}, names = wb.SheetNames.slice();
      names.forEach(n => { sheets[n] = XLSX.utils.sheet_to_json(wb.Sheets[n], { header:1, defval:"", blankrows:false }); });
      const nd = edParse({ sheets, names });
      if(!nd.months.length){
        d.err = "ไม่พบชีตในรูปแบบ YYYY.MM (เช่น 2026.01)";
        renderToolExecDash();
        return;
      }
      const hadData = d.data && d.data.months && d.data.months.length;
      if(hadData){
        // มีข้อมูลอยู่แล้ว → รวมเข้าด้วยกัน (เดือนซ้ำของใหม่ทับ, ปีใหม่เพิ่มเข้าไป)
        const newYears = [...new Set(nd.months.map(m=>m.key.slice(0,4)))];
        d.data = edMergeData(d.data, nd);
        const allYears = [...new Set(d.data.months.map(m=>m.key.slice(0,4)))].sort();
        d.file = file.name;
        d.mergeMsg = "เพิ่มข้อมูลปี " + newYears.map(y=>Number(y)+543).join(", ")
          + " แล้ว — ตอนนี้มีปี " + allYears.map(y=>Number(y)+543).join(", ") + " (รวม " + d.data.months.length + " เดือน)";
      } else {
        d.data = nd;
        d.file = file.name;
        d.mergeMsg = null;
      }
      edSave();         // เก็บลง localStorage
      edSaveCloud();    // เก็บขึ้น Supabase (shared ทุกอุปกรณ์)
      renderToolExecDash();
    }catch(err){
      d.err = "อ่านไฟล์ไม่สำเร็จ: " + (err.message||err);
      renderToolExecDash();
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ลบข้อมูลเฉพาะปี (y = "2025") — ปีอื่นยังอยู่ครบ · ใช้แก้กรณีอัปไฟล์ผิดบริษัท/ผิดปี */
function edDeleteYear(y){
  const d = edState();
  if(!d.data || !d.data.months) return;
  y = String(y);
  const coName = state.company === "mbark" ? "M Bark" : "Benya";
  const keep = d.data.months.filter(m => m.key.slice(0,4) !== y);
  const removed = d.data.months.length - keep.length;
  if(!removed){ alert("ไม่พบข้อมูลปี " + (Number(y)+543)); return; }
  if(!confirm("ลบข้อมูลปี " + (Number(y)+543) + " (" + y + ") ออกจาก " + coName + " ?\n\nลบ " + removed + " เดือน — ปีอื่นยังอยู่ครบ\nถ้าลบผิด อัปไฟล์ปีนั้นกลับเข้ามาใหม่ได้")) return;
  if(!keep.length){
    // ไม่เหลือเดือนเลย → ล้างทั้งหมด
    edReset();
    return;
  }
  d.data = edRebuildFromMonths(keep, d.data.company);
  if(d.monthFilter && d.monthFilter !== "all" && !edScopeMonthKeys(d.data, d.monthFilter).length){
    d.monthFilter = "all";
  }
  const yrsLeft = [...new Set(d.data.months.map(m=>m.key.slice(0,4)))].sort().map(yy=>Number(yy)+543).join(", ");
  d.mergeMsg = "ลบข้อมูลปี " + (Number(y)+543) + " แล้ว — เหลือปี " + yrsLeft + " (" + d.data.months.length + " เดือน)";
  edSave();
  edSaveCloud();
  renderToolExecDash();
}

/* ปุ่มเลือกช่วงเวลา — กดเลือกปี (หรือรวมทุกปี) แล้วกดเลือกไตรมาส (แทน dropdown เดิม) */
function edPeriodPicker(data, mf){
  const years = [...new Set((data.months||[]).map(m => m.key.slice(0,4)))].sort();
  if(!years.length) return "";
  const multi = years.length > 1;

  // ปีที่กำลังโฟกัส
  let actYear = null;
  if(mf && mf.startsWith("year:")) actYear = mf.slice(5);
  else if(mf && mf.startsWith("q:")) actYear = mf.split(":")[1];
  else if(mf && /^\d{4}\./.test(mf)) actYear = mf.slice(0,4);
  if(!multi) actYear = years[0];   // ปีเดียว → โฟกัสปีนั้นเสมอ (โชว์ไตรมาสได้เลย)

  const btn = (active, val, label, sub) => `<button onclick="edSetMonth('${val}')" style="padding:6px 13px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid ${active?'var(--brand)':'#c3dafe'};background:${active?'var(--brand)':'#fff'};color:${active?'#fff':'#0f172a'};transition:.12s;line-height:1.2;text-align:center">${label}${sub?`<span style="display:block;font-size:9.5px;font-weight:500;opacity:.82">${sub}</span>`:''}</button>`;

  // แถวปี
  let yearBtns = "";
  if(multi){
    yearBtns += btn(mf==='all', 'all', `รวม ${years.length} ปี`);
    yearBtns += years.map(y => btn(actYear===y, 'year:'+y, 'ปี '+(Number(y)+543))).join("");
  } else {
    yearBtns += btn(mf==='all', 'all', 'ทั้งปี '+(Number(years[0])+543));
  }

  // แถวไตรมาส (เมื่อเลือกปีแล้ว)
  let qRow = "";
  if(actYear){
    const moy = (data.months||[]).filter(m => m.key.slice(0,4)===actYear).map(m => Number(m.key.slice(5,7)));
    const wholeVal = multi ? 'year:'+actYear : 'all';
    const QS = [[1,'Q1','ม.ค.–มี.ค.'],[2,'Q2','เม.ย.–มิ.ย.'],[3,'Q3','ก.ค.–ก.ย.'],[4,'Q4','ต.ค.–ธ.ค.']];
    const has = q => moy.some(m => Math.ceil(m/3)===q);
    qRow = `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:7px">
      <span style="font-size:11.5px;color:var(--ink-3);font-weight:600">ไตรมาส ปี ${Number(actYear)+543}</span>
      ${btn(mf===wholeVal, wholeVal, 'ทั้งปี')}
      ${QS.filter(q => has(q[0])).map(q => btn(mf==='q:'+actYear+':'+q[0], 'q:'+actYear+':'+q[0], q[1], q[2])).join("")}
    </div>`;
  }

  return `<div style="display:flex;flex-direction:column;gap:0;align-items:flex-start">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11.5px;color:var(--ink-3);font-weight:600;margin-right:2px">ช่วงเวลา</span>
      ${yearBtns}
    </div>
    ${qRow}
  </div>`;
}

function edTogglePresent(){
  if(document.body.classList.contains("ed-present")) edExitPresent();
  else edEnterPresent();
}
function edEnterPresent(){
  edInjectPresentCSS();
  _edPresentSbWasHidden = document.body.classList.contains("sb-hidden");
  document.body.classList.add("ed-present", "sb-hidden");   // ซ่อน sidebar ให้ main เต็มจอ
  const root = document.documentElement;
  if(root.requestFullscreen) root.requestFullscreen().catch(()=>{});
  else if(root.webkitRequestFullscreen) root.webkitRequestFullscreen();
  _edPresentEl = null;
  _edPresentMove = (e)=>{
    const tgt = (e.target && e.target.closest)
      ? e.target.closest("tr, .card, canvas, h1, h2, h3, button, select")
      : null;
    if(tgt === _edPresentEl) return;
    if(_edPresentEl) _edPresentEl.classList.remove("ed-spot");
    _edPresentEl = tgt;
    if(tgt) tgt.classList.add("ed-spot");
  };
  document.addEventListener("mousemove", _edPresentMove, { passive:true });
  document.addEventListener("fullscreenchange", edOnFsChange);
  document.addEventListener("webkitfullscreenchange", edOnFsChange);
  document.addEventListener("keydown", edPresentKey);
  let bar = document.getElementById("edPresentBar");
  if(!bar){
    bar = document.createElement("div");
    bar.id = "edPresentBar";
    bar.innerHTML = `<button onclick="edExitPresent()">⤬ ออกจากโหมดนำเสนอ (Esc)</button>`;
    document.body.appendChild(bar);
  }
  bar.style.display = "block";
}
function edExitPresent(){
  document.body.classList.remove("ed-present");
  if(!_edPresentSbWasHidden) document.body.classList.remove("sb-hidden");
  if(_edPresentMove){ document.removeEventListener("mousemove", _edPresentMove); _edPresentMove = null; }
  if(_edPresentEl){ _edPresentEl.classList.remove("ed-spot"); _edPresentEl = null; }
  document.removeEventListener("fullscreenchange", edOnFsChange);
  document.removeEventListener("webkitfullscreenchange", edOnFsChange);
  document.removeEventListener("keydown", edPresentKey);
  const bar = document.getElementById("edPresentBar"); if(bar) bar.style.display = "none";
  const fs = document.fullscreenElement || document.webkitFullscreenElement;
  if(fs){
    if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
function edOnFsChange(){
  // กด Esc ออกจาก fullscreen เอง → ออกโหมดนำเสนอให้ด้วย
  const fs = document.fullscreenElement || document.webkitFullscreenElement;
  if(!fs && document.body.classList.contains("ed-present")) edExitPresent();
}
function edPresentKey(e){ if(e.key === "Escape") edExitPresent(); }

/* ---------- Print / PDF helpers ---------- */
const TH_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const TH_MON_SHORT = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
function edThaiMonth(key){
  // key = "2026.05" → "พฤษภาคม 2569"
  const [y,m] = key.split(".").map(Number);
  return TH_MONTHS[m-1] + " " + (y+543);
}
function edPeriodLabel(data, monthFilter){
  if(!data || !data.months.length) return "—";
  if(monthFilter && monthFilter.startsWith("year:")){
    return "ข้อมูลปี " + (Number(monthFilter.slice(5)) + 543);
  }
  if(monthFilter && monthFilter.startsWith("q:")){
    const [,y,q] = monthFilter.split(":"); return "ข้อมูลไตรมาส " + q + " ปี " + (Number(y) + 543);
  }
  if(monthFilter !== "all"){
    return "ข้อมูลของเดือน " + edThaiMonth(monthFilter);
  }
  const first = data.months[0].key;
  const last  = data.months[data.months.length-1].key;
  if(first === last) return "ข้อมูลของเดือน " + edThaiMonth(first);
  return "ข้อมูลของเดือน " + edThaiMonth(first).split(" ")[0] + "–" + edThaiMonth(last);
}
function edNowStr(){
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = TH_MONTHS[d.getMonth()];
  const yy = d.getFullYear() + 543;
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${dd} ${mm} ${yy} เวลา ${hh}:${mi} น.`;
}
/* PDF export ผ่าน html2canvas + jsPDF (รองรับฟอนต์ไทย + landscape A4) */
async function edExportPDF(){
  const co = COMPANIES.find(c=>c.id===state.company);
  const t  = TOOLS.find(x=>x.id==="execdash");
  const d  = edState();
  const tabs = [
    { id:"summary",  l:"Executive Summary" },
    { id:"category", l:"Category Analysis" },
    { id:"banks",    l:"Bank Accounts" },
    { id:"explorer", l:"Transaction Explorer" },
    { id:"stmt",     l:"งบกระแสเงินสด" },
  ];
  const curTab = tabs.find(x=>x.id===d.tab) || tabs[0];

  if(!window.html2canvas || !window.jspdf){
    alert("PDF library โหลดยังไม่เสร็จ — รอสักครู่แล้วลองใหม่"); return;
  }

  // overlay loading
  const ov = document.createElement("div");
  ov.id = "edPdfOv";
  ov.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:'IBM Plex Sans Thai',sans-serif";
  ov.innerHTML = `<div style="background:#fff;color:#0f172a;padding:24px 36px;border-radius:14px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="font-size:16px;font-weight:700;margin-bottom:8px">กำลังสร้าง PDF...</div>
    <div style="color:#64748b;font-size:13px">โปรดรอ — อาจใช้เวลา 5–10 วินาที</div>
  </div>`;
  document.body.appendChild(ov);

  // ใช้ DEEP CLONE strategy: clone #edContent ไปไว้ off-screen แล้ว modify
  // แทนการแก้ DOM จริง (กัน html2canvas อ่าน style เดิมที่ยัง cache)
  const original = document.getElementById("edContent");
  if(!original){ alert("ไม่พบ content"); return; }

  const captureWidth = 1280;   // กว้างพอดี A4 landscape (281mm)
  const SCALE = 3;             // ความละเอียดถ่ายภาพ — สูงขึ้น = ตัวหนังสือคมขึ้น (เดิม 2 → ฟุ้ง)
  const cloneWrap = document.createElement("div");
  cloneWrap.style.cssText =
    `position:absolute;left:-99999px;top:0;width:${captureWidth}px;background:#fff;` +
    `font-family:'IBM Plex Sans Thai','IBM Plex Sans',ui-sans-serif,sans-serif;color:#0f172a;` +
    `padding:24px;box-sizing:border-box;line-height:1.5`;
  const clone = original.cloneNode(true);
  clone.style.width = "100%";
  clone.style.maxWidth = "none";
  cloneWrap.appendChild(clone);
  document.body.appendChild(cloneWrap);

  // ★ 0) snapshot canvas (Chart.js) → แทนด้วย <img> ใน clone
  //    cloneNode ไม่ copy pixel data ของ canvas → clone canvas ว่าง
  //    ใช้ toDataURL ของต้นฉบับ + replace ใน clone
  const origCanvases  = Array.from(original.querySelectorAll("canvas"));
  const cloneCanvases = Array.from(clone.querySelectorAll("canvas"));
  for(let i = 0; i < Math.min(origCanvases.length, cloneCanvases.length); i++){
    const oc = origCanvases[i];
    const cc = cloneCanvases[i];
    if(!oc.width || !oc.height) continue;
    try{
      const dataUrl = oc.toDataURL("image/png");
      const ph = cc.parentElement;
      // ใช้ความสูง wrapper ของต้นฉบับ (มี style height:280px/300px/320px/380px)
      const phRect = ph ? ph.getBoundingClientRect() : { width:0, height:0 };
      const img = document.createElement("img");
      img.src = dataUrl;
      img.style.cssText = "display:block;width:100%;height:auto";   // คงสัดส่วนเดิม (html2canvas ไม่รองรับ object-fit → กราฟวงกลมเคยเพี้ยนเป็นวงรี)
      cc.parentNode.replaceChild(img, cc);
    }catch(e){ console.warn("[edExportPDF] snapshot canvas failed:", e); }
  }

  // 1) ลบ elements ที่ทำเครื่องหมาย data-pdf-hide ออกจาก clone
  clone.querySelectorAll("[data-pdf-hide='1']").forEach(el => el.remove());
  // 2) แสดง elements ที่ทำเครื่องหมาย data-pdf-only
  clone.querySelectorAll("[data-pdf-only='1']").forEach(el => { el.style.display = "block"; });
  // 3) ลบ select / input / button (กันโผล่ใน PDF)
  clone.querySelectorAll("select, input, button").forEach(el => el.remove());
  // 4) ปลด max-height + overflow บน table-wrap (ให้ capture เห็นครบ)
  clone.querySelectorAll(".table-wrap").forEach(el => {
    el.style.maxHeight = "none";
    el.style.overflow = "visible";
    el.style.overflowY = "visible";
  });

  try{
    await new Promise(r => setTimeout(r, 250));   // รอ layout settle ของ clone

    const cloneFullH = cloneWrap.scrollHeight;
    const effScale = Math.min(SCALE, 32000 / cloneFullH);   // กันแคนวาสสูงเกินลิมิต browser (~32767px) → "Invalid string length"
    const canvas = await window.html2canvas(cloneWrap, {
      scale: effScale,
      backgroundColor: "#ffffff",
      useCORS: true,
      logging: false,
      width: captureWidth,
      windowWidth: captureWidth,
      height: cloneFullH,
      windowHeight: cloneFullH
    });

    // หา thead bounding rect ใน clone — ตัด pixel range ออกจาก canvas เดียวกัน
    // (ดังนั้น width ของ thead จะตรงกับ width body 100%)
    let theadImg = null, theadHmm = 0;
    const cloneThead = clone.querySelector("table thead");
    if(cloneThead){
      const wrapRect  = cloneWrap.getBoundingClientRect();
      const theadRect = cloneThead.getBoundingClientRect();
      const sc = canvas.width / captureWidth;   // scale จริงของ canvas (หลัง clamp)
      const theadYPx = Math.max(0, Math.round((theadRect.top - wrapRect.top) * sc));
      const theadHPx = Math.round(theadRect.height * sc);
      if(theadHPx > 0 && theadYPx + theadHPx <= canvas.height){
        const tc = document.createElement("canvas");
        tc.width = canvas.width;
        tc.height = theadHPx;
        const ctx = tc.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, tc.width, tc.height);
        ctx.drawImage(canvas, 0, -theadYPx);
        theadImg = tc.toDataURL("image/jpeg", 0.92);
      }
    }

    // PDF setup — เลือกแนวตั้ง/แนวนอน + โหมดย่อ 1 หน้า
    const tabId = curTab.id;
    let orient, fitOne;
    if(tabId === "stmt"){ orient = "landscape"; fitOne = false; }           // งบกระแสเงินสด: ล็อคแนวนอน + slice หลายหน้า (ตารางสูง ใส่ 1 หน้า landscape แล้วเล็กเกิน)
    else if(tabId === "explorer"){ orient = "landscape"; fitOne = false; }  // ทรานแซกชัน: หลายหน้าแนวนอน (ข้อมูลเยอะ)
    else if(d.pdfOrient === "portrait"){ orient = "portrait"; fitOne = true; }
    else { orient = "landscape"; fitOne = false; }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: orient, unit:"mm", format:"a4" });
    const pageW = orient === "portrait" ? 210 : 297;
    const pageH = orient === "portrait" ? 297 : 210;
    const margin = 8;
    const headerH = 22;          // print header (logo + period)
    const footerH = 6;
    const imgW = pageW - 2*margin;
    const yStart = headerH + margin/2;
    const yEnd   = pageH - footerH - margin;

    if(theadImg){
      const _hImg = new Image(); _hImg.src = theadImg;
      await new Promise(r => { _hImg.onload = r; });
      theadHmm = (_hImg.naturalHeight * imgW) / _hImg.naturalWidth;
    }

    const logoData = await edLoadImg(co.logoIcon||co.logo);

    if(fitOne){
      // ★ ย่อทั้ง canvas ลงให้พอดี 1 หน้า — เริ่มจาก "เต็มกว้าง" แล้วถ้าสูงเกินค่อยลดทั้งคู่
      drawPdfHeader(pdf, co, t, curTab, d, logoData, pageW, headerH, margin);
      const availW = imgW, availH = yEnd - yStart;
      // คำนวณสเกลที่ทำให้ภาพพอดีหน้า (ไม่ล้น)
      const s = Math.min(availW / canvas.width, availH / canvas.height) * (canvas.width / canvas.width); // canvas px → mm
      const pxToMm = Math.min(availW / canvas.width, availH / canvas.height);
      const wMM = canvas.width  * pxToMm;
      const hMM = canvas.height * pxToMm;
      const x = margin + (availW - wMM) / 2;     // จัดกลางถ้ามีพื้นที่เหลือ (ปกติจะเต็มกว้าง)
      const y = yStart + (availH - hMM) / 2;     // จัดกลางถ้าสูงไม่เต็ม
      pdf.addImage(canvas.toDataURL("image/jpeg", 0.92), "JPEG", x, y, wMM, hMM);
      pdf.setFont("helvetica","normal"); pdf.setFontSize(8); pdf.setTextColor(150,150,150);
      pdf.text("หน้า 1 / 1", pageW - margin, pageH - 3, { align:"right" });
    } else {
    // เก็บ y-coordinates ของขอบล่างทุก element ที่ไม่ควรตัด — tr, card, h3
    // เพื่อ snap slice ไปที่ boundary นี้ ไม่ตัดกลางตัวหนังสือ
    const wrapTopY = cloneWrap.getBoundingClientRect().top;
    const rowBounds = [];
    clone.querySelectorAll("tr, .card, .ed-card, h3, .page-head").forEach(el => {
      const r = el.getBoundingClientRect();
      // ★ หัวข้อ (h3) ใช้ขอบ "บน" — ตัดหน้าก่อนหัวข้อ ไม่ทิ้งหัวข้อไว้ท้ายหน้าโดยตารางไปอยู่หน้าถัดไป (keep-with-next)
      const edge = (el.tagName === "H3") ? r.top : r.bottom;
      const yB = Math.round((edge - wrapTopY) * (canvas.width / captureWidth));
      if(yB > 0 && yB <= canvas.height) rowBounds.push(yB);
    });
    rowBounds.sort((a,b) => a - b);

    // วน slice — snap ที่ row boundary ใกล้ slicePxMax แต่ไม่เกิน
    let yPx = 0;
    const totalPx = canvas.height;
    const pdfPages = [];
    while(yPx < totalPx){
      const pageIdx = pdfPages.length;
      let avail = yEnd - yStart;
      const showThead = (pageIdx > 0 && theadImg);
      if(showThead) avail -= (theadHmm + 1);
      const slicePxMax = (avail * canvas.width) / imgW;

      let slicePx = Math.min(slicePxMax, totalPx - yPx);
      // snap: หา row boundary ระหว่าง yPx + slicePxMin .. yPx + slicePxMax → ใช้ค่าสูงสุด
      if(yPx + slicePx < totalPx){
        // อย่าให้ slice เล็กเกิน 60% ของ avail (ป้องกัน infinite loop ถ้า boundary น้อยมาก)
        const minSlice = slicePxMax * 0.6;
        const candidates = rowBounds.filter(b => b > yPx + minSlice && b <= yPx + slicePxMax);
        if(candidates.length){
          slicePx = candidates[candidates.length - 1] - yPx;
        }
      }
      if(slicePx < 1) slicePx = Math.min(slicePxMax, totalPx - yPx);   // safety

      pdfPages.push({ yPx, slicePx, showThead });
      yPx += slicePx;
    }

    // render ทุกหน้า
    for(let i=0; i<pdfPages.length; i++){
      if(i > 0) pdf.addPage();
      const pg = pdfPages[i];
      drawPdfHeader(pdf, co, t, curTab, d, logoData, pageW, headerH, margin);

      let yMM = yStart;
      if(pg.showThead && theadImg){
        pdf.addImage(theadImg, "JPEG", margin, yMM, imgW, theadHmm);
        yMM += theadHmm + 1;
      }

      // crop slice
      const sliceCanvas = document.createElement("canvas");
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = pg.slicePx;
      const ctx = sliceCanvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
      ctx.drawImage(canvas, 0, -pg.yPx);

      const sliceImgData = sliceCanvas.toDataURL("image/jpeg", 0.92);
      const sliceHmm = (pg.slicePx * imgW) / canvas.width;
      pdf.addImage(sliceImgData, "JPEG", margin, yMM, imgW, sliceHmm);

      // footer
      pdf.setFont("helvetica","normal");
      pdf.setFontSize(8);
      pdf.setTextColor(150,150,150);
      pdf.text(`หน้า ${i+1} / ${pdfPages.length}`, pageW - margin, pageH - 3, { align:"right" });
    }
    }

    const fname = `${co.name.replace(/\s+/g,"_")}_${curTab.l.replace(/\s+/g,"_")}_${stamp()}.pdf`;
    pdf.save(fname);
  }catch(err){
    console.error(err);
    alert("สร้าง PDF ไม่สำเร็จ: " + (err.message||err));
  }finally{
    // ลบ clone wrapper ทิ้ง
    if(cloneWrap.parentNode) cloneWrap.remove();
    const o = document.getElementById("edPdfOv");
    if(o) o.remove();
  }
}

/* ===== พิมพ์ทั้งรายงาน (6 หัวข้อ) เป็น PDF ไฟล์เดียว ===== */
function edPdfDims(){
  const pageW=297, pageH=210, margin=8, headerH=22, footerH=6;
  return { captureWidth:1280, SCALE:3, pageW, pageH, margin, headerH, footerH,
           imgW: pageW - 2*margin, yStart: headerH + margin/2, yEnd: pageH - footerH - margin };
}

/* เลขหน้า footer (เรียกตอนท้ายสุด เพราะต้องรู้จำนวนหน้ารวมก่อน) */
function edDrawPdfFooters(pdf, dims){
  const { pageW, pageH, margin } = dims;
  const n = pdf.getNumberOfPages();
  for(let i=1;i<=n;i++){
    pdf.setPage(i);
    pdf.setFont("helvetica","normal"); pdf.setFontSize(8); pdf.setTextColor(150,150,150);
    pdf.text(`หน้า ${i} / ${n}`, pageW - margin, pageH - 3, { align:"right" });
  }
}

/* แคป #edContent ปัจจุบัน → ต่อหน้าเข้า pdf ที่ส่งมา (ใช้ logic เดียวกับ edExportPDF: snapshot กราฟ, ตัด thead, snap หัวข้อ) */
async function edCaptureContentToPdf(pdf, opts){
  const { co, t, tab, d, logoData, dims, isFirstContent } = opts;
  const { captureWidth, SCALE, pageW, headerH, margin, imgW, yStart, yEnd } = dims;
  const original = document.getElementById("edContent");
  if(!original) return;

  const cloneWrap = document.createElement("div");
  cloneWrap.style.cssText =
    `position:absolute;left:-99999px;top:0;width:${captureWidth}px;background:#fff;` +
    `font-family:'IBM Plex Sans Thai','IBM Plex Sans',ui-sans-serif,sans-serif;color:#0f172a;` +
    `padding:24px;box-sizing:border-box;line-height:1.5`;
  const clone = original.cloneNode(true);
  clone.style.width = "100%"; clone.style.maxWidth = "none";
  cloneWrap.appendChild(clone);
  document.body.appendChild(cloneWrap);

  try{
    // snapshot canvas (Chart.js) → <img> คงสัดส่วน (height:auto กันวงรี)
    const origCanvases  = Array.from(original.querySelectorAll("canvas"));
    const cloneCanvases = Array.from(clone.querySelectorAll("canvas"));
    for(let i=0;i<Math.min(origCanvases.length,cloneCanvases.length);i++){
      const oc=origCanvases[i], cc=cloneCanvases[i];
      if(!oc.width||!oc.height) continue;
      try{
        const img=document.createElement("img");
        img.src=oc.toDataURL("image/png");
        img.style.cssText="display:block;width:100%;height:auto";
        cc.parentNode.replaceChild(img,cc);
      }catch(e){ console.warn("[edPdf] snapshot canvas failed:",e); }
    }
    clone.querySelectorAll("[data-pdf-hide='1']").forEach(el=>el.remove());
    clone.querySelectorAll("[data-pdf-only='1']").forEach(el=>{ el.style.display="block"; });
    clone.querySelectorAll("select, input, button").forEach(el=>el.remove());
    clone.querySelectorAll(".table-wrap").forEach(el=>{ el.style.maxHeight="none"; el.style.overflow="visible"; el.style.overflowY="visible"; });

    await new Promise(r=>setTimeout(r,200));
    const cloneFullH = cloneWrap.scrollHeight;
    const effScale = Math.min(SCALE, 32000 / cloneFullH);   // กันแคนวาสสูงเกินลิมิต browser → "Invalid string length"
    const canvas = await window.html2canvas(cloneWrap,{ scale:effScale, backgroundColor:"#ffffff", useCORS:true, logging:false,
      width:captureWidth, windowWidth:captureWidth, height:cloneFullH, windowHeight:cloneFullH });
    const pxScale = canvas.width / captureWidth;

    // thead → ทำซ้ำหัวตารางทุกหน้า
    let theadImg=null, theadHmm=0;
    const cloneThead=clone.querySelector("table thead");
    if(cloneThead){
      const wrapRect=cloneWrap.getBoundingClientRect();
      const theadRect=cloneThead.getBoundingClientRect();
      const theadYPx=Math.max(0,Math.round((theadRect.top-wrapRect.top)*pxScale));
      const theadHPx=Math.round(theadRect.height*pxScale);
      if(theadHPx>0 && theadYPx+theadHPx<=canvas.height){
        const tc=document.createElement("canvas"); tc.width=canvas.width; tc.height=theadHPx;
        const cx=tc.getContext("2d"); cx.fillStyle="#ffffff"; cx.fillRect(0,0,tc.width,tc.height);
        cx.drawImage(canvas,0,-theadYPx); theadImg=tc.toDataURL("image/jpeg",0.92);
      }
    }
    if(theadImg){
      const _h=new Image(); _h.src=theadImg; await new Promise(r=>{_h.onload=r;});
      theadHmm=(_h.naturalHeight*imgW)/_h.naturalWidth;
    }

    // row boundaries (h3 ใช้ขอบบน = keep-with-next)
    const wrapTopY=cloneWrap.getBoundingClientRect().top;
    const rowBounds=[];
    clone.querySelectorAll("tr, .card, .ed-card, h3, .page-head").forEach(el=>{
      const r=el.getBoundingClientRect();
      const edge=(el.tagName==="H3")?r.top:r.bottom;
      const yB=Math.round((edge-wrapTopY)*pxScale);
      if(yB>0 && yB<=canvas.height) rowBounds.push(yB);
    });
    rowBounds.sort((a,b)=>a-b);

    // slice
    let yPx=0; const totalPx=canvas.height; const pdfPages=[];
    while(yPx<totalPx){
      const pageIdx=pdfPages.length;
      let avail=yEnd-yStart;
      const showThead=(pageIdx>0 && theadImg);
      if(showThead) avail-=(theadHmm+1);
      const slicePxMax=(avail*canvas.width)/imgW;
      let slicePx=Math.min(slicePxMax,totalPx-yPx);
      if(yPx+slicePx<totalPx){
        const minSlice=slicePxMax*0.6;
        const cands=rowBounds.filter(b=>b>yPx+minSlice && b<=yPx+slicePxMax);
        if(cands.length) slicePx=cands[cands.length-1]-yPx;
      }
      if(slicePx<1) slicePx=Math.min(slicePxMax,totalPx-yPx);
      pdfPages.push({yPx,slicePx,showThead}); yPx+=slicePx;
    }

    for(let i=0;i<pdfPages.length;i++){
      if(!(isFirstContent && i===0)) pdf.addPage();
      const pg=pdfPages[i];
      drawPdfHeader(pdf, co, t, tab, d, logoData, pageW, headerH, margin);
      let yMM=yStart;
      if(pg.showThead && theadImg){ pdf.addImage(theadImg,"JPEG",margin,yMM,imgW,theadHmm); yMM+=theadHmm+1; }
      const slc=document.createElement("canvas"); slc.width=canvas.width; slc.height=pg.slicePx;
      const cx=slc.getContext("2d"); cx.fillStyle="#ffffff"; cx.fillRect(0,0,slc.width,slc.height); cx.drawImage(canvas,0,-pg.yPx);
      pdf.addImage(slc.toDataURL("image/jpeg",0.92),"JPEG",margin,yMM,imgW,(pg.slicePx*imgW)/canvas.width);
    }
  } finally {
    if(cloneWrap.parentNode) cloneWrap.remove();
  }
}

    edDrawPdfFooters(pdf, dims);
    pdf.save(`${co.name.replace(/\s+/g,"_")}_รายงานฉบับเต็ม_${stamp()}.pdf`);
  }catch(err){
    console.error(err);
    alert("สร้าง PDF ไม่สำเร็จ: " + (err.message||err));
  }finally{
    if(window.Chart && window.Chart.defaults) window.Chart.defaults.animation = prevAnim;
    d.tab = prevTab; edRenderDashboard();
    const o=document.getElementById("edPdfOv"); if(o) o.remove();
  }
}

/* draw custom PDF header — logo + company + tab + period + datetime */
function drawPdfHeader(pdf, co, tool, tab, d, logoData, pageW, headerH, margin){
  // top border accent line (gradient mimic: just a colored bar)
  pdf.setFillColor(79, 138, 247);   // ED brand
  pdf.rect(0, 0, pageW, 1.5, "F");

  // logo (ซ้าย) — คงสัดส่วน (ไอคอนไม่จัตุรัส → ห้ามบังคับ 18×18 ไม่งั้นยืดเพี้ยน)
  if(logoData){
    try{
      const maxW = 20, maxH = 18;
      let lw = maxW, lh = maxH;
      try{
        const p = pdf.getImageProperties(logoData);
        lw = maxW; lh = lw * p.height / p.width;
        if(lh > maxH){ lh = maxH; lw = lh * p.width / p.height; }
      }catch(_){ lw = 18; lh = 18; }
      pdf.addImage(logoData, "PNG", margin, 4 + (maxH - lh)/2, lw, lh);
    }catch(e){}
  }

  // company text — บรรทัดเดียวเด่นๆ
  const xText = logoData ? margin + 22 : margin;
  pdf.setFont("helvetica","bold");
  pdf.setFontSize(15);
  pdf.setTextColor(15, 23, 42);
  const enName = (co.fullName||co.name).split("·")[1] ? (co.fullName||co.name).split("·")[1].trim() : co.name;
  pdf.text(enName, xText, 13);

  // tab + period + datetime (ขวา) — ใช้ image canvas เพื่อรองรับไทย
  const rightImg = edRenderHeaderRight(tab.l, edPeriodLabel(d.data, d.monthFilter), edNowStr());
  if(rightImg){
    pdf.addImage(rightImg, "PNG", pageW - margin - 115, 2, 115, 20);
  }

  // bottom border ของ header
  pdf.setDrawColor(79, 138, 247);
  pdf.setLineWidth(0.5);
  pdf.line(margin, headerH, pageW - margin, headerH);
}

/* render Thai header right-side as image (because jsPDF doesn't have Thai font) */
function edRenderHeaderRight(tabName, periodLabel, dateStr){
  const w = 920, h = 160;        // aspect 5.75 — match PDF 115×20mm
  const cv = document.createElement("canvas");
  cv.width = w; cv.height = h;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, w, h);
  ctx.textAlign = "right";

  // tab name — ใหญ่สุด เด่นสุด
  ctx.font = "700 50px 'IBM Plex Sans Thai','IBM Plex Sans',sans-serif";
  ctx.fillStyle = "#1e40af";
  ctx.fillText(tabName, w - 10, 56);

  // period — รอง
  ctx.font = "600 36px 'IBM Plex Sans Thai','IBM Plex Sans',sans-serif";
  ctx.fillStyle = "#0f172a";
  ctx.fillText(periodLabel, w - 10, 108);

  // datetime — เล็ก
  ctx.font = "italic 22px 'IBM Plex Sans Thai',sans-serif";
  ctx.fillStyle = "#94a3b8";
  ctx.fillText("พิมพ์เมื่อ " + dateStr + "  ·  หน่วย: บาท", w - 10, 144);

  return cv.toDataURL("image/png");
}

/* load image as base64 for PDF embed */
function edLoadImg(src){
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      const cv = document.createElement("canvas");
      cv.width = img.naturalWidth || 256;
      cv.height = img.naturalHeight || 256;
      const ctx = cv.getContext("2d");
      ctx.drawImage(img, 0, 0);
      try{ resolve(cv.toDataURL("image/png")); } catch(e){ resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

/* ตัวเลขวิ่ง (count-up) — หา element ที่มี data-anim แล้ว animate จาก 0 → ค่าจริง */
function edAnimNums(root){
  root = root || document;
  const els = [...root.querySelectorAll('[data-anim]')];
  if(!els.length) return;
  const fmtOne = (kind, v, to) => {
    if(kind === 'pct') return (to<0?'▼ ':'▲ ') + Math.abs(v).toFixed(1) + '%';
    return edFmt(v);   // money (มี () สำหรับติดลบอยู่แล้ว)
  };
  const dur = 650, start = performance.now();
  const step = (now) => {
    const t = Math.min(1, (now - start) / dur);
    const e = 1 - Math.pow(1 - t, 3);
    for(const el of els){
      const to = parseFloat(el.dataset.to) || 0;
      el.textContent = fmtOne(el.dataset.anim, to * e, to);
    }
    if(t < 1) requestAnimationFrame(step);
    else for(const el of els){ const to = parseFloat(el.dataset.to) || 0; el.textContent = fmtOne(el.dataset.anim, to, to); }
  };
  requestAnimationFrame(step);
}

/* auto count-up เลขเงินทุก cell ในหน้า (แท็บอื่นที่ไม่ได้ tag data-anim)
   จับเฉพาะ pattern เงิน x,xxx.xx (ปี/วันที่/เลขบัญชี/จำนวนรายการ จะไม่โดน) + ข้ามตารางใหญ่กัน jank */
function edAnimMoney(root){
  root = root || document;
  const MONEY = /^\(?-?\d{1,3}(,\d{3})*\.\d{2}\)?$/;
  const items = [];
  for(const el of root.querySelectorAll('td, span, div, b, strong')){
    if(el.children.length) continue;            // leaf เท่านั้น
    if(el.hasAttribute('data-anim')) continue;  // ข้ามที่ทำ count-up อยู่แล้ว
    const t = el.textContent.trim();
    if(!MONEY.test(t)) continue;
    let s = t, neg = false;
    if(s[0] === '('){ neg = true; s = s.slice(1, -1); }
    if(s[0] === '-'){ neg = true; s = s.slice(1); }
    const target = (neg?-1:1) * parseFloat(s.replace(/,/g, ''));
    if(!isFinite(target)) continue;
    items.push({ el, target });
    if(items.length > 300) return;   // ตารางใหญ่เกิน (เช่น Transaction Explorer) → ไม่ animate
  }
  if(!items.length) return;
  const dur = 600, start = performance.now();
  const step = (now) => {
    const p = Math.min(1, (now - start) / dur);
    const e = 1 - Math.pow(1 - p, 3);
    for(const it of items) it.el.textContent = edFmt(it.target * e);
    if(p < 1) requestAnimationFrame(step);
    else for(const it of items) it.el.textContent = edFmt(it.target);
  };
  requestAnimationFrame(step);
}
