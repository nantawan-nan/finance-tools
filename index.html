  d.companyId = cid;
  const [invRes, venRes, accts] = await Promise.all([
    sb.from("ap_invoices").select("*,vendors(name)").eq("company_id", cid).is("deleted_at", null)
      .neq("status","void").order("due_date").limit(500),
    sb.from("vendors").select("id,name,external_code").eq("company_id", cid).is("deleted_at", null).order("name"),
    fopLoadAccounts(cid)
  ]);
  d.invoices = invRes.data || [];
  d.vendors  = venRes.data || [];
  d.accounts = accts;
}

/* enrich row with display fields */
function apoEnrich(rawInv){
  return rawInv.map(r => ({
    ...r,
    age_bucket: apoAgeBucket(r.due_date, r.status),
    _vendor: (r.vendors&&r.vendors.name) || r.vendor_name_raw || "—",
    _planned: r.planned_payment_date || ""
  }));
}

/* มี filter อะไรเปิดอยู่ไหม */
function apoHasAnyFilter(){
  const f = apoGet().filter;
  if(f.search) return true;
  if(f.planned !== "all") return true;
  if(f.overdueOnly) return true;
  if(f.colFilters && Object.keys(f.colFilters).length) return true;
  return false;
}

/* filter + sort */
function apoFilterAndSort(enriched){
  const d = apoGet();
  const f = d.filter;
  const today = new Date().toISOString().slice(0,10);
  let inv = enriched;

  // global search — ค้นทุกคอลัมน์
  if(f.search){
    const q = String(f.search).toLowerCase().trim();
    if(q){
      inv = inv.filter(r => {
        const hay = [
          r.invoice_no, r._vendor, r.vendor_name_raw, (r.vendors&&r.vendors.name),
          r.remark, r.internal_note, r.category, r.status, r.age_bucket,
          r.invoice_date, r.due_date, r.planned_payment_date,
          String(r.amount_total||""), String(r.amount_outstanding||"")
        ].filter(Boolean).join(" ").toLowerCase();
        return hay.indexOf(q) >= 0;
      });
    }
  }

  // per-column multi-select (Excel-style)
  const cf = f.colFilters || {};
  for(const col in cf){
    const vals = cf[col];
    if(!Array.isArray(vals)) continue;
    // even empty array means "filter applied → 0 rows"
    const set = new Set(vals);
    inv = inv.filter(r => {
      let v = col === "vendor_name" ? r._vendor : r[col];
      if(v == null) v = "";
      return set.has(String(v));
    });
  }

  if(f.planned === "set")   inv = inv.filter(r => !!r.planned_payment_date);
  if(f.planned === "unset") inv = inv.filter(r => !r.planned_payment_date);
  if(f.overdueOnly)         inv = inv.filter(r => r.due_date < today && Number(r.amount_outstanding) > 0);

  // sort
  const s = d.sort;
  inv = inv.slice().sort((a,b) => {
    let av = a[s.key], bv = b[s.key];
    if(s.key === "vendor_name") { av = a._vendor; bv = b._vendor; }
    if(typeof av === "number" || /amount/.test(s.key)){ av = Number(av||0); bv = Number(bv||0); }
    if(av < bv) return s.desc ? 1 : -1;
    if(av > bv) return s.desc ? -1 : 1;
    return 0;
  });
  return inv;
}

/* apply changes — partial re-render (count + table + clear button) */
function apoApplyChanges(){
  const d = apoGet();
  const enriched = apoEnrich(d.invoices || []);
  const inv = apoFilterAndSort(enriched);
  const today = new Date().toISOString().slice(0,10);
  const canWrite = fopCanWrite();

  const countEl = document.getElementById("apoCount");
  if(countEl) countEl.textContent = inv.length + " จาก " + enriched.length + " รายการ";

  const tEl = document.getElementById("apoTableContainer");
  if(tEl) tEl.innerHTML = apoBuildTable(inv, enriched, canWrite, today);

  const clearBtn = document.getElementById("apoClearBtn");
  if(clearBtn) clearBtn.style.display = apoHasAnyFilter() ? "" : "none";

  apoUpdateIndeterminate();
}

/* ตั้ง indeterminate state ของ checkbox "(เลือกทั้งหมด)" */
function apoUpdateIndeterminate(){
  const f = apoGet().filter;
  document.querySelectorAll("[data-col-selectall]").forEach(cb => {
    const col = cb.getAttribute("data-col-selectall");
    const allVals = (window._apoDistincts && window._apoDistincts[col]) || [];
    const curr = f.colFilters && f.colFilters[col];
    if(!Array.isArray(curr)){
      cb.checked = true; cb.indeterminate = false;
    } else if(curr.length === 0){
      cb.checked = false; cb.indeterminate = false;
    } else if(curr.length === allVals.length){
      cb.checked = true; cb.indeterminate = false;
    } else {
      cb.checked = false; cb.indeterminate = true;
    }
  });
}

/* col-filter dropdown HTML — Excel-style */
function apoColFilter(colKey, distinctValues, counts, fmt){
  const d = apoGet();
  const f = d.filter;
  const curr = f.colFilters && f.colFilters[colKey];
  const allCnt = distinctValues.length;
  const selCnt = Array.isArray(curr) ? curr.length : allCnt;
  const active = Array.isArray(curr);
  const isOpen = d.openCol === colKey;
  const formatter = fmt || (v => v == null || v === "" ? "(ว่าง)" : String(v));
  return `<details class="col-fdd" ${isOpen?'open':''} ontoggle="apoOnToggleCol('${colKey}', this.open)">
    <summary class="${active?'active':''}" title="กรองคอลัมน์นี้" onclick="event.stopPropagation()">▼</summary>
    <div class="col-fpop" onclick="event.stopPropagation()">
      <input type="text" class="col-fsearch" placeholder="ค้นหาใน dropdown..." oninput="apoFilterColOpts('${colKey}', this.value)" onclick="event.stopPropagation()">
      <div class="col-factions">
        <label><input type="checkbox" data-col-selectall="${colKey}" onclick="event.stopPropagation();apoSelectAllCol('${colKey}')"> (เลือกทั้งหมด)</label>
        <span>${active ? selCnt + ' / ' + allCnt : allCnt}</span>
      </div>
      <div data-col-opts="${colKey}" class="col-fopts">
        ${distinctValues.map(v => {
          const checked = !active || curr.indexOf(v) >= 0;
          const lbl = formatter(v);
          const cnt = counts[v] || 0;
          const valEsc = JSON.stringify(v).replace(/"/g,'&quot;');
          return `<label data-opt-label="${esc(lbl)}"><input type="checkbox" ${checked?'checked':''} onchange="apoToggleColVal('${colKey}', ${valEsc})"><span class="vlabel">${esc(lbl)}</span><span class="vcount">${cnt}</span></label>`;
        }).join("")}
      </div>
      <div class="col-ffooter">
        <button onclick="apoClearCol('${colKey}')">ล้างตัวกรอง</button>
        <button class="primary" onclick="apoCloseCol()">✓ ตกลง</button>
      </div>
    </div>
  </details>`;
}

/* build table — header + tbody */
function apoBuildTable(inv, enriched, canWrite, today){
  const d = apoGet();
  const s = d.sort;
  const accounts = d.accounts || [];
  const defAcc = fopDefaultAccId(accounts);
  const accById = {}; accounts.forEach(a => accById[a.id] = a);
  const sortArrow = (k) => s.key === k ? (s.desc ? " ↓" : " ↑") : "";

  // distinct + counts per filterable column
  const distinctsOf = (key, mapper) => {
    const counts = {};
    for(const r of enriched){
      let v = mapper ? mapper(r) : r[key];
      if(v == null) v = "";
      v = String(v);
      counts[v] = (counts[v]||0) + 1;
    }
    return { values: Object.keys(counts).sort(), counts };
  };
  const dInvoice = distinctsOf("invoice_no");
  const dVendor  = distinctsOf("vendor_name", r => r._vendor);
  const dInvDate = distinctsOf("invoice_date");
  const dDueDate = distinctsOf("due_date");
  const dPlanned = distinctsOf("planned_payment_date");
  const dAge     = distinctsOf("age_bucket");
  const dCat     = distinctsOf("category");
  const dStatus  = distinctsOf("status");

  // expose to global (toggle handlers)
  window._apoDistincts = {
    invoice_no: dInvoice.values, vendor_name: dVendor.values,
    invoice_date: dInvDate.values, due_date: dDueDate.values,
    planned_payment_date: dPlanned.values,
    age_bucket: dAge.values, category: dCat.values, status: dStatus.values
  };

  if(inv.length === 0){
    return `<div class="empty">${apoHasAnyFilter() ? "ไม่เจอตามตัวกรอง" : "ยังไม่มีข้อมูล — Upload CSV / XML หรือเพิ่มเอง"}</div>`;
  }

  const fmtDate = v => v ? fopDate(v) : "(ยังไม่กำหนด)";
  const th = (key, label, opts) => {
    opts = opts || {};
    const sortable = opts.sortable !== false;
    const align = opts.align || "";
    return `<th style="${align?'text-align:'+align+';':''}vertical-align:middle">
      <div style="display:flex;align-items:center;gap:6px;${align==='right'?'justify-content:flex-end;':''}">
        ${sortable ? `<span onclick="apoSetSort('${key}')" style="cursor:pointer;user-select:none">${esc(label)}${sortArrow(key)}</span>` : `<span>${esc(label)}</span>`}
        ${opts.filter ? opts.filter : ""}
      </div>
    </th>`;
  };

  return `<table>
    <thead>
      <tr>
        ${th("invoice_no", "เลขที่บิล", { filter: apoColFilter("invoice_no", dInvoice.values, dInvoice.counts) })}
        ${th("vendor_name", "ผู้ขาย", { filter: apoColFilter("vendor_name", dVendor.values, dVendor.counts) })}
        ${th("desc", "คำอธิบาย", { sortable: false })}
        ${th("invoice_date", "วันที่บิล", { filter: apoColFilter("invoice_date", dInvDate.values, dInvDate.counts, fmtDate) })}
        ${th("due_date", "ครบกำหนด", { filter: apoColFilter("due_date", dDueDate.values, dDueDate.counts, fmtDate) })}
        ${th("planned_payment_date", "วันชำระเงิน", { filter: apoColFilter("planned_payment_date", dPlanned.values, dPlanned.counts, fmtDate) })}
        ${th("pay_from", "ตัดจากบัญชี", { sortable: false })}
        ${th("amount_total", "รวม", { align: "right" })}
        ${th("amount_outstanding", "คงค้าง", { align: "right" })}
        ${th("age_bucket", "อายุหนี้", { filter: apoColFilter("age_bucket", dAge.values, dAge.counts) })}
        ${th("category", "ประเภท", { filter: apoColFilter("category", dCat.values, dCat.counts) })}
        ${th("status", "สถานะ", { filter: apoColFilter("status", dStatus.values, dStatus.counts) })}
        ${canWrite ? '<th style="text-align:center">จัดการ</th>' : ""}
      </tr>
    </thead>
    <tbody>${inv.map(r=>{
      const isOverdue = r.due_date < today && r.status !== "paid";
      const statusBadge = `<span class="matchchip ${r.status==='paid'?'ok':r.status==='partial'?'warn':'bad'}">${r.status}</span>`;
      const desc = [r.remark, r.internal_note].filter(Boolean).join(" · ") || "—";
      const hasNote = !!r.internal_note;
      return `<tr ${isOverdue?'class="warning-row"':''}>
        <td><code style="font-size:11px">${esc(r.invoice_no)}</code></td>
        <td>${esc(r._vendor)}</td>
        <td style="font-size:11px;color:var(--ink-2);max-width:280px;white-space:normal" title="${esc(desc)}">${esc(desc.length>80?desc.slice(0,80)+"…":desc)}${hasNote?' <span style="color:var(--in-ink);font-weight:700">✎</span>':''}</td>

        </td>`:''}

    }).join("")}</tbody>
  </table>`;
}

/* helper: parse ตัวเลขที่มี comma เช่น "500,000.00" → 500000 */
function apoNum(v){
  if(v == null || v === "") return 0;
  const n = parseFloat(String(v).replace(/[,\s]/g,""));
  return isNaN(n) ? 0 : n;
}

/* classify จาก remark + vendor name + invoice_no */
function apoClassify(remark, vendor, invNo){
  const t = ((remark||"") + " " + (vendor||"") + " " + (invNo||"")).toLowerCase();
  if(/เงินกู้|กู้ยืม|ดอกเบี้ย|loan|interest/.test(t)) return "เงินกู้ยืมและดอกเบี้ย";
  if(/เงินเดือน|salary|ที่ปรึกษา|consult|payroll/.test(t)) return "เงินเดือนและค่าที่ปรึกษา";
  if(/เงินสดย่อย|petty/.test(t)) return "เงินสดย่อย";
  if(/มัดจำ|เบิกล่วงหน้า|เบิกทดรอง|ทดรอง|advance|deposit/.test(t)) return "เงินมัดจำ/เงินเบิกล่วงหน้า";
  if(/ประมาณการ.*สำรอง|forecast/.test(t)) return "ประมาณการเงินสำรองจ่าย";
  if(/สำรองจ่าย|สำรองเงิน|reserve/.test(t)) return "เงินสำรองจ่าย";
  if(/ค่าโทร|อินเตอร์เน็ต|truemove|true\b|ais|dtac|ค่าน้ำ|ค่าไฟ|ค่าเช่า|ภาษี|สรรพากร|ประกันสังคม|sso|กองทุน.*สำรอง|กบช|รายเดือน|subscription|license/.test(t)) return "ค่าใช้จ่ายประจำ";
  return "เจ้าหนี้การค้า";  // default
}

/* parse Excel XML 2003 (Express AP report) — auto-detect MBark vs Benya layout */
function apoParseExpressXml(xmlText){
  const NS = "urn:schemas-microsoft-com:office:spreadsheet";
  const dom = new DOMParser().parseFromString(xmlText, "text/xml");
  if(dom.querySelector("parsererror")) throw new Error("XML parse error");
  const rows = Array.from(dom.getElementsByTagNameNS(NS, "Row"));

  function getCells(row){
    const cells = {};
    let idx = 0;
    for(const cell of row.children){
      if(cell.localName !== "Cell") continue;
      const ix = cell.getAttributeNS(NS, "Index");
      if(ix) idx = parseInt(ix, 10); else idx++;
      const data = cell.getElementsByTagNameNS(NS, "Data")[0];
      if(data){
        cells[idx] = { v: data.textContent, t: data.getAttributeNS(NS,"Type"),
                       style: cell.getAttributeNS(NS,"StyleID") };
      }
    }
    return cells;
  }

  // PASS 1: find header row → map column names → indexes (รองรับทั้ง MBark + Benya)
  const col = {};
  for(const row of rows){
    const cs = getCells(row);
    const labels = Object.entries(cs).map(([i,c]) => [parseInt(i,10), String(c.v||"").trim()]);
    if(labels.some(([_,v]) => v === "ยอดในบิล")){
      for(const [i, v] of labels){
        if(v === "วันที่") col.date = i;
        else if(v === "เอกสาร#" || v === "เอกสาร") col.doc = i;
        else if(v === "เลขที่บิล") col.billNo = i;
        else if(v === "ยอดในบิล") col.total = i;
        else if(v === "ยอดชำระ") col.paid = i;
        else if(v === "ยอดคงค้าง") col.outstanding = i;
      }
      break;
    }
  }
  if(!col.outstanding) throw new Error("หา column 'ยอดคงค้าง' ไม่เจอ — รูปแบบไฟล์อาจไม่รองรับ");

  // PASS 2: scan rows
  const invoices = [];
  const vendors = new Map();
  let curVendor = null;
  const todayISO = new Date().toISOString().slice(0,10);

  for(const row of rows){
    const cs = getCells(row);
    if(Object.keys(cs).length === 0) continue;
    const c1 = cs[1];
    if(!c1) continue;

    const text1 = String(c1.v||"").trim();
    // skip non-vendor labels
    if(/^ประเภทผู้จำหน่าย|^ตัดยอด|^ถึง|^วันที่|^เลือกแผนก|^บริษัท|^เจ้าหนี้คงค้าง|^ณ วันที่|^หมายเหตุ/.test(text1)) continue;
    if(text1.startsWith("รวม")) continue;   // รวมเจ้าหนี้ / รวมตามประเภท / รวมท้ายรายงาน

    // vendor row: col 1 = String + มี "/CODE" — ไม่ใช่ date
    if(c1.t !== "DateTime" && text1){
      const m = text1.match(/^(.+?)\s*\/\s*([A-Z0-9_-]+)\s*$/i);
      if(m){
        curVendor = { name: m[1].trim(), code: m[2].trim() };
        vendors.set(curVendor.code, curVendor.name);
        continue;
      }
      // text-only header without code — ใช้เป็น vendor name ก็ได้
      if(text1.length > 1 && !text1.match(/^\d/)){
        curVendor = { name: text1, code: null };
        continue;
      }
    }

    // invoice row: col 1 = DateTime
    if(c1.t === "DateTime" && curVendor){
      const invDate = c1.v.slice(0,10);
      const docNo = String((cs[col.doc]||{}).v || "").trim();

      // billNo: MBark = "INV-NO  AMOUNT" / Benya = "INV-NO" only
      let billNo = "", billAmtFromText = 0;
      const cBill = cs[col.billNo];
      if(cBill){
        const billText = String(cBill.v||"").trim();
        const amtMatch = billText.match(/([\d,]+\.\d{2})\s*$/);
        if(amtMatch){
          billAmtFromText = apoNum(amtMatch[1]);
          billNo = billText.slice(0, amtMatch.index).trim();
        } else billNo = billText;
      }

      const totalCell = apoNum((cs[col.total]||{}).v);
      const paidCell  = apoNum((cs[col.paid]||{}).v);
      const outCell   = apoNum((cs[col.outstanding]||{}).v);

      // aging buckets = cols after outstanding, up to last numeric col before due/remark
      let agingSum = 0;
      for(let k = col.outstanding + 1; k <= 18; k++){
        const c = cs[k];
        if(c && c.t === "Number") agingSum += apoNum(c.v);
      }

      const outstanding = outCell || agingSum || paidCell || billAmtFromText;
      const total = totalCell || billAmtFromText || outstanding;

      // due date: scan cells from col.outstanding+1 to end → first DateTime or date-string
      let dueDate = null;
      for(let k = col.outstanding + 1; k <= 20; k++){
        const c = cs[k];
        if(!c) continue;
        if(c.t === "DateTime"){ dueDate = c.v.slice(0,10); break; }
        if(typeof c.v === "string"){
          const dm = c.v.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
          if(dm){
            let y = parseInt(dm[3],10);
            if(y < 100) y += 2500;
            if(y >= 2400) y -= 543;
            dueDate = `${y}-${dm[2].padStart(2,'0')}-${dm[1].padStart(2,'0')}`;
            break;
          }
        }
      }
      if(!dueDate) dueDate = invDate;

      // remark = last text cell
      let remark = "";
      const allCols = Object.keys(cs).map(n=>parseInt(n,10)).sort((a,b)=>b-a);
      for(const k of allCols){
        const c = cs[k];
        if(c && c.t === "String" && k > col.outstanding && !/^\s*\d+\s*\d{1,2}\/\d{1,2}\/\d{2,4}/.test(c.v||"")){
          remark = String(c.v||"").trim();
          if(remark) break;
        }
      }

      invoices.push({
        vendor_name: curVendor.name,
        vendor_code: curVendor.code,
        invoice_date: invDate,
        invoice_no: billNo || docNo,
        doc_no: docNo,
        amount_total: total,
        amount_outstanding: outstanding,
        due_date: dueDate,
        po: null,
        remark,
        category: apoClassify(remark, curVendor.name, billNo || docNo),
        is_overdue: dueDate < todayISO
      });
    }
  }
  return { invoices, vendors };
}

/* อายุหนี้ตามสูตร Excel ของผู้ใช้ */
function apoAgeBucket(dueDate, status){
  if(status === "paid" || status === "void") return "—";
  if(!dueDate) return "ยังไม่มีกำหนดจ่าย";
  const days = Math.floor((new Date() - new Date(dueDate)) / 86400000);  // วันที่เกิน
  if(days < 0)   return "อยู่ในกำหนดจ่าย";
  if(days < 30)  return "เกินกำหนดจ่ายไม่ถึง 30 วัน";
  if(days < 60)  return "เกินกำหนดจ่าย 30วัน";
  if(days < 90)  return "เกินกำหนดจ่าย 60วัน";
  if(days < 120) return "เกินกำหนดจ่าย 90วัน";
  return "เกินกำหนดจ่าย 120 วันขึ้นไป";
}
function apoAgeColor(bucket){
  if(bucket === "อยู่ในกำหนดจ่าย") return "var(--in-ink)";
  if(bucket === "เกินกำหนดจ่ายไม่ถึง 30 วัน") return "var(--warn-ink)";
  if(bucket === "ยังไม่มีกำหนดจ่าย") return "var(--ink-3)";
  return "var(--out-ink)";
}

async function apoHandleXml(file){
  if(!file) return;
  let parsed;
  try{
    const text = await file.text();
    parsed = apoParseExpressXml(text);
  }catch(e){ alert("อ่าน XML ไม่สำเร็จ: " + fopErr(e)); return; }
  const { invoices, vendors } = parsed;
  if(!invoices.length){ alert("ไม่พบ invoice ใน XML"); return; }

  // preview modal
  const total = invoices.reduce((s,i) => s + Number(i.amount_outstanding||0), 0);
  const overdue = invoices.filter(i => i.is_overdue).length;
  const m = document.createElement("div");
  m.id = "fopModal";
  m.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";

    <div style="background:#fff;border-radius:14px;padding:24px;max-width:1100px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <h3 style="margin:0 0 6px;font-size:16px;font-weight:800">นำเข้า Express AP XML</h3>
      <div style="color:var(--ink-3);font-size:12.5px;margin-bottom:12px">
        ${vendors.size} เจ้าหนี้ · ${invoices.length} บิล · ยอดคงค้างรวม <b style="color:var(--out-ink)">${fopFmt(total)}</b>
        ${overdue ? ` · <b style="color:var(--warn-ink)">${overdue} บิลเกินกำหนด</b>` : ""}
      </div>
      <div style="overflow:auto;flex:1">
        <table style="font-size:11.5px;width:100%">
          <thead><tr style="position:sticky;top:0;background:#f8fafc"><th><input type="checkbox" id="apoXAll" checked onclick="document.querySelectorAll('.apo-x-cb').forEach(c=>c.checked=this.checked)"></th><th>เจ้าหนี้</th><th>เลขที่บิล</th><th>วันที่บิล</th><th>ครบกำหนด</th><th style="text-align:right">ยอดรวม</th><th style="text-align:right">คงค้าง</th><th>ประเภท</th><th>หมายเหตุ</th></tr></thead>
          <tbody>${invoices.map((it,i)=>`<tr ${it.is_overdue?'class="warning-row"':''}>
            <td><input type="checkbox" class="apo-x-cb" data-i="${i}" checked></td>
            <td><b>${esc(it.vendor_name)}</b> ${it.vendor_code?`<span style="color:var(--ink-3);font-size:10px">/${esc(it.vendor_code)}</span>`:""}</td>
            <td><code style="font-size:11px">${esc(it.invoice_no)}</code></td>
            <td>${fopDate(it.invoice_date)}</td>
            <td style="${it.is_overdue?'color:var(--out-ink);font-weight:700':''}">${fopDate(it.due_date)}</td>
            <td style="text-align:right">${fopFmt(it.amount_total)}</td>
            <td style="text-align:right;font-weight:700;color:var(--out-ink)">${fopFmt(it.amount_outstanding)}</td>
            <td><select class="apo-x-cat" data-i="${i}" style="font-size:11px;padding:3px 6px;border:1px solid var(--line);border-radius:6px;background:#fff;min-width:140px">
              ${APO_CATEGORIES.map(c => `<option value="${esc(c)}" ${c===it.category?'selected':''}>${esc(c)}</option>`).join("")}
            </select></td>
            <td style="font-size:11px;color:var(--ink-2);max-width:200px;white-space:normal">${esc(it.remark||"")}</td>
          </tr>`).join("")}</tbody>
        </table>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;justify-content:space-between;align-items:center">
        <div style="font-size:11.5px;color:var(--ink-3)">หากบิลเลขเดียวกันมีอยู่แล้ว ระบบจะอัปเดต (upsert ตาม company_id + invoice_no)</div>
        <div style="display:flex;gap:8px">
          <button onclick="document.getElementById('fopModal').remove()" class="btn ghost btn sm">ยกเลิก</button>
          <button id="apoXBtn" class="btn">นำเข้าทั้งหมดที่ติ๊ก</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(m);
  m.onclick = e=>{ if(e.target===m) m.remove(); };

  document.getElementById("apoXBtn").onclick = async () => {
    const sel = Array.from(document.querySelectorAll(".apo-x-cb:checked")).map(c => parseInt(c.dataset.i, 10));
    if(!sel.length){ alert("ไม่ได้ติ๊กรายการใด"); return; }
    const btn = document.getElementById("apoXBtn");
    btn.disabled = true; btn.textContent = "กำลังบันทึก...";
    try{
      const cid = await fopCompanyId();
      // 1) upsert vendors (by external_code)
      const vendorPayload = Array.from(vendors.entries()).map(([code, name]) => ({
        company_id: cid, external_code: code, name,
        created_by: AUTH.user ? AUTH.user.id : null
      }));
      let vendorMap = {};
      if(vendorPayload.length){
        const { data: vs, error: vErr } = await sb.from("vendors")
          .upsert(vendorPayload, { onConflict: "company_id,external_code" })
          .select("id, external_code, name");
        if(vErr) throw vErr;
        for(const v of vs) vendorMap[v.external_code] = v.id;
      }

      // 2) create import record
      const { data: imp, error: impErr } = await sb.from("csv_imports").insert({
        company_id: cid, target_table: "ap_invoices",
        file_name: file.name, row_count: sel.length, status: "validating",
        uploaded_by: AUTH.user ? AUTH.user.id : null
      }).select().single();
      if(impErr) throw impErr;

      // 3) build ap_invoices rows — อ่าน category จาก dropdown ของแต่ละ row
      const catByIdx = {};
      document.querySelectorAll(".apo-x-cat").forEach(s => { catByIdx[s.dataset.i] = s.value; });
      const rows = sel.map(i => {
        const it = invoices[i];
        return {
          company_id: cid,
          vendor_id: it.vendor_code ? vendorMap[it.vendor_code] : null,
          vendor_name_raw: it.vendor_name,
          invoice_no: it.invoice_no,
          invoice_date: it.invoice_date,
          due_date: it.due_date,
          amount_total: it.amount_total,
          category: catByIdx[i] || it.category || "เจ้าหนี้การค้า",
          remark: [it.remark, it.po ? "PO:"+it.po : null, it.doc_no ? "Express:"+it.doc_no : null].filter(Boolean).join(" · ") || null,
          csv_import_id: imp.id,
          source_row_no: i + 1,
          created_by: AUTH.user ? AUTH.user.id : null
        };
      });

      const { error: insErr } = await sb.from("ap_invoices")
        .upsert(rows, { onConflict: "company_id,invoice_no" });
      if(insErr) throw insErr;

      await sb.from("csv_imports").update({
        status: "committed", ok_count: rows.length, error_count: 0,
        committed_at: new Date().toISOString(), committed_by: AUTH.user?AUTH.user.id:null
      }).eq("id", imp.id);

      document.getElementById("fopModal").remove();
      alert(`สำเร็จ — ${rows.length} บิล (จาก ${vendors.size} เจ้าหนี้)`);
      state.apo[state.company] = null;
      renderToolApOutstanding();
    }catch(e){
      btn.disabled = false; btn.textContent = "นำเข้าทั้งหมดที่ติ๊ก";
      alert("Import error: " + fopErr(e));
    }
  };
}

async function apoHandleCsv(file){
  if(!file) return;
  const text = await file.text();
  const rows = csvParse(text);
  if(rows.length < 2){ alert("CSV ว่าง"); return; }
  const header = rows[0].map(h => String(h||"").trim().toLowerCase());
  const need = ["vendor_name","invoice_no","invoice_date","due_date","amount_total"];
  const idx = {};
  for(const n of need){
    idx[n] = header.indexOf(n);
    if(idx[n] < 0){ alert("CSV header ไม่ครบ ต้องมี: " + need.join(", ")); return; }
  }
  const cid = await fopCompanyId();
  // create import record
  const { data: imp, error: impErr } = await sb.from("csv_imports").insert({
    company_id: cid, target_table: "ap_invoices",
    file_name: file.name, row_count: rows.length-1, status: "validating",
    uploaded_by: AUTH.user ? AUTH.user.id : null
  }).select().single();
  if(impErr){ alert("สร้าง import record ไม่ได้: " + fopErr(impErr)); return; }

  // build invoices (upsert by invoice_no)
  const invoices = [];
  let errs = 0;
  for(let i=1; i<rows.length; i++){
    const r = rows[i];
    if(!r[idx.invoice_no]) continue;
    const amt = parseFloat(String(r[idx.amount_total]).replace(/[, ]/g,""));
    if(isNaN(amt) || amt < 0){ errs++; continue; }
    invoices.push({
      company_id: cid,
      vendor_name_raw: String(r[idx.vendor_name]||"").trim() || null,
      invoice_no: String(r[idx.invoice_no]).trim(),
      invoice_date: String(r[idx.invoice_date]).trim(),
      due_date: String(r[idx.due_date]).trim(),
      amount_total: amt,
      csv_import_id: imp.id,
      source_row_no: i+1,
      created_by: AUTH.user ? AUTH.user.id : null
    });
  }
  if(!invoices.length){ alert("ไม่มีแถวที่ valid"); return; }
  if(!confirm(`พบ ${invoices.length} แถว valid (skip ${errs}) — บันทึก?`)) return;

  const { error: insErr } = await sb.from("ap_invoices").upsert(invoices, { onConflict: "company_id,invoice_no" });
  if(insErr){ alert("Upload ไม่สำเร็จ: " + fopErr(insErr)); return; }
  await sb.from("csv_imports").update({
    status: "committed", ok_count: invoices.length, error_count: errs,
    committed_at: new Date().toISOString(), committed_by: AUTH.user?AUTH.user.id:null
  }).eq("id", imp.id);
  alert(`สำเร็จ — ${invoices.length} บิล`);
  state.apo[state.company] = null;
  renderToolApOutstanding();
}

async function apoSaveEdit(id){
  const err = document.getElementById("apoEErr");
  const btn = document.getElementById("apoEBtn");
  const g = k => document.getElementById(k);
  const no  = g("apoENo").value.trim();
  const ivd = g("apoEIvDate").value;

  if(!no || !ivd || !due || isNaN(amt) || amt < 0){ err.textContent="ต้องมี เลขที่บิล / วันที่บิล / ครบกำหนด / ยอดรวม (≥ 0)"; err.style.display=""; return; }

      due_date: due,
      planned_payment_date: g("apoEPlanned").value || null,
      amount_total: amt,
      status: g("apoEStatus").value,

/* โหลด + แสดงประวัติการจ่ายของบิล + ปุ่มยกเลิก/ตั้งเป็นยังไม่จ่าย */
async function apoRenderPayHist(invId){
  const box = document.getElementById("apoPayHist");
  if(!box) return;
  const { data, error } = await sb.from("ap_payments")
    .select("id,paid_date,amount,method,pv_no").eq("ap_invoice_id", invId)
    .is("deleted_at", null).order("paid_date");
  if(!document.getElementById("apoPayHist")) return;   // modal อาจถูกปิดไปแล้ว
  if(error){ box.innerHTML = `<div style="color:var(--out-ink);font-size:12px">โหลดประวัติไม่สำเร็จ: ${esc(fopErr(error))}</div>`; return; }
  const pays = data || [];
  const methodLbl = mm => ({transfer:'โอน',cheque:'เช็ค',cash:'เงินสด'})[mm] || mm || '';
  if(!pays.length){ box.innerHTML = `<div style="font-size:12px;color:var(--ink-3);padding:4px 0">— ยังไม่มีรายการจ่าย —</div>`; return; }
  const totalPaid = pays.reduce((s,p)=>s+Number(p.amount||0),0);
  box.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin:0 0 6px">
      <div style="font-size:12px;font-weight:700;color:var(--ink-2)">ประวัติการจ่าย (${pays.length})</div>
      <button class="btn ghost btn sm" style="color:var(--out-ink);border-color:var(--out)" onclick="apoUnpayAll('${invId}')" title="ยกเลิกการจ่ายทั้งหมด">↩ ตั้งเป็นยังไม่จ่าย</button>
    </div>
    <div style="border:1px solid var(--line);border-radius:8px;overflow:hidden">
      ${pays.map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--line)">
        <div style="flex:1">
          <div style="font-weight:700;color:var(--ink)">${fopFmt(p.amount)} <span style="color:var(--ink-3);font-weight:400;font-size:11px">· ${esc(methodLbl(p.method))}</span></div>
          <div style="font-size:11px;color:var(--ink-3)">${fopDate(p.paid_date)}${p.pv_no?` · ${esc(p.pv_no)}`:''}</div>
        </div>
        <button class="btn ghost btn sm" style="color:var(--out-ink);border-color:var(--out)" onclick="apoReversePayment('${p.id}','${invId}')" title="ยกเลิกการจ่ายนี้">ยกเลิก</button>
      </div>`).join("")}
      <div style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--bg);font-weight:700;font-size:12px"><span>รวมจ่ายแล้ว</span><span>${fopFmt(totalPaid)}</span></div>
    </div>`;
}
/* หลังเปลี่ยนแปลงการจ่าย — reload ตาราง + เปิด modal ใหม่ด้วยยอดล่าสุด */
async function apoAfterPayChange(invId){
  state.apo[state.company] = null;
  await renderToolApOutstanding();
  const old = document.getElementById("fopModal");
  if(old) old.remove();
  const r = (apoGet().invoices||[]).find(x => String(x.id)===String(invId));
  if(r) apoOpenPay(invId, Number(r.amount_outstanding||0));
}
/* ยกเลิกการจ่าย 1 รายการ (soft delete → trigger fn_ap_recompute คำนวณ amount_paid/status ใหม่) */
async function apoReversePayment(payId, invId){
  if(!confirm("ยกเลิกการจ่ายรายการนี้?\nยอดคงค้าง + สถานะจะถูกคำนวณใหม่อัตโนมัติ")) return;
  try{
    const { error } = await sb.from("ap_payments")
      .update({ deleted_at: new Date().toISOString(), deleted_by: AUTH.user?AUTH.user.id:null })
      .eq("id", payId);
    if(error) throw error;
    await apoAfterPayChange(invId);
  }catch(e){ alert("ยกเลิกไม่สำเร็จ: " + fopErr(e)); }
}
/* ตั้งบิลเป็น "ยังไม่จ่าย" — ยกเลิกการจ่ายทั้งหมด → คงค้างกลับเป็นยอดเต็ม */
async function apoUnpayAll(invId){
  if(!confirm("ตั้งบิลนี้เป็น 'ยังไม่จ่าย'?\nยกเลิกการจ่ายทั้งหมด — ยอดคงค้างกลับเป็นยอดเต็ม (audit log เก็บไว้)")) return;
  try{
    const { error } = await sb.from("ap_payments")
      .update({ deleted_at: new Date().toISOString(), deleted_by: AUTH.user?AUTH.user.id:null })
      .eq("ap_invoice_id", invId).is("deleted_at", null);
    if(error) throw error;
    await apoAfterPayChange(invId);
  }catch(e){ alert("ไม่สำเร็จ: " + fopErr(e)); }
}
async function apoSavePayment(invId){
  const err = document.getElementById("payErr");
  const btn = document.getElementById("payBtn");
  const dateStr = document.getElementById("payDate").value;
  const amt = parseFloat(document.getElementById("payAmt").value);
  if(!dateStr || !amt || amt<=0){ err.textContent="วันที่ + ยอด > 0"; err.style.display=""; return; }
  btn.disabled=true; btn.textContent="กำลังบันทึก...";
  try{
    const cid = await fopCompanyId();
    const { error } = await sb.from("ap_payments").insert({
      company_id: cid, ap_invoice_id: invId,
      paid_date: dateStr, amount: amt,
      pv_no: document.getElementById("payPv").value.trim() || null,
      method: document.getElementById("payMethod").value,
      created_by: AUTH.user ? AUTH.user.id : null
    });
    if(error) throw error;
    await apoAfterPayChange(invId);
  }catch(e){
    btn.disabled=false; btn.textContent="บันทึกการจ่าย";
    err.textContent=fopErr(e); err.style.display="";
  }
}

state.rec = state.rec || {};
function recGet(){
  if(!state.rec[state.company]) state.rec[state.company] = { list:null, occ:null, busy:false };
  return state.rec[state.company];
}
async function recLoad(){
  const d = recGet();
  const cid = await fopCompanyId();
  if(!cid) return;
  d.companyId = cid;
  const horizon = new Date(Date.now()+90*86400000).toISOString().slice(0,10);
  const [recRes, occRes, accts] = await Promise.all([
    sb.from("recurring_expenses").select("*").eq("company_id", cid).is("deleted_at", null).order("category").order("name"),
    sb.from("recurring_occurrences").select("*,recurring_expenses(name,category)")
      .eq("company_id", cid).is("deleted_at", null)
      .gte("due_date", new Date(Date.now()-30*86400000).toISOString().slice(0,10))
      .lte("due_date", horizon)
      .order("due_date"),
    fopLoadAccounts(cid)
  ]);
  d.list = recRes.data || [];
  d.occ  = occRes.data || [];
  d.accounts = accts;
}

async function recSave(id){
  const err = document.getElementById("recErr");
  const btn = document.getElementById("recBtn");
  const name = document.getElementById("recName").value.trim();
  const amt = parseFloat(document.getElementById("recAmt").value);
  const start = document.getElementById("recStart").value;
  if(!name || !amt || amt<=0 || !start){ err.textContent="กรอกชื่อ + ยอด + วันเริ่ม"; err.style.display=""; return; }
  btn.disabled=true; btn.textContent="กำลังบันทึก...";
  try{
    const cid = await fopCompanyId();
    const payload = {
      company_id: cid, name,
      category: document.getElementById("recCat").value,
      expected_amount: amt,
      frequency: document.getElementById("recFreq").value,
      day_of_month: parseInt(document.getElementById("recDay").value, 10),
      start_date: start,
      end_date: document.getElementById("recEnd").value || null,
      bank_account_id: document.getElementById("recAcct").value || null,
      remark: document.getElementById("recRemark").value.trim() || null
    };
    let error;
    if(id){
      payload.updated_by = AUTH.user ? AUTH.user.id : null;
      const r = await sb.from("recurring_expenses").update(payload).eq("id", id);
      error = r.error;
    } else {
      payload.created_by = AUTH.user ? AUTH.user.id : null;
      const r = await sb.from("recurring_expenses").insert(payload);
      error = r.error;
    }
    if(error) throw error;
    document.getElementById("fopModal").remove();
    state.rec[state.company] = null;
    renderToolRecurring();
  }catch(e){
    btn.disabled=false; btn.textContent=id?"อัปเดต":"บันทึก";
    err.textContent=fopErr(e); err.style.display="";
  }
}
async function recSoftDelete(id){
  if(!confirm("ลบรายการนี้? (soft-delete — recover ได้จาก audit log)")) return;
  try{
    const { error } = await sb.from("recurring_expenses")

/* parse "วันที่03 ของเดือนถัดไป" / "เข้ารอบ 15 ของเดือน" / "ตัดบัญชี 25" / "ทุกวันที่สิ้นเดือน" → day_of_month */
function recParseDay(text){
  const s = String(text||"").trim();
  if(!s) return null;
  if(/สิ้นเดือน|สิ้นเดือน|last/i.test(s)) return -1;
  const m = s.match(/(\d{1,2})/);
  if(m){
    const d = parseInt(m[1], 10);
    if(d >= 1 && d <= 31) return d;
  }
  return null;
}
/* map ประเภทค่าใช้จ่าย → schema category enum */
function recMapCategory(thaiCat, vendor){
  const txt = (thaiCat + " " + (vendor||"")).toLowerCase();
  if(/เงินเดือน|payroll|salary/.test(txt)) return "payroll";
  if(/สำรองเลี้ยงชีพ|provident/.test(txt)) return "provident_fund";
  if(/ประกันสังคม|sso|social/.test(txt)) return "social_security";
  if(/ภาษี|tax|สรรพากร/.test(txt)) return "tax";
  if(/โทรศัพท์|อินเตอร์เน็ต|internet|true|ais|dtac/.test(txt)) return "utility";
  if(/ค่าเช่า|rent|เช่า/.test(txt)) return "rent";
  if(/ประกัน|insurance/.test(txt)) return "insurance";
  if(/subscription|saas|software/.test(txt)) return "subscription";
  if(/น้ำ|ไฟฟ้า|electric|water/.test(txt)) return "utility";
  if(/กู้|loan/.test(txt)) return "loan";
  return "other";
}

async function recImportExcel(file){
  if(!file) return;
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:"array", cellDates:true });
    const sheetName = wb.SheetNames.find(n => n.indexOf("ค่าใช้จ่ายประจำ") >= 0);
    if(!sheetName){ alert("ไม่พบ sheet 'ค่าใช้จ่ายประจำ' ในไฟล์"); return; }
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header:1, defval:"", blankrows:false });

    // header row = 6 (0-indexed: 5)
    // col 1=ประเภท, 2=สั่งจ่าย, 3=ประเภทค่าใช้จ่าย, 5=กำหนดจ่าย, 6=กำหนดจ่ายทุกวันที่,
    // 9=จำนวนเงิน, 22=หมายเหตุ
    const items = [];
    for(let r = 6; r < rows.length; r++){
      const row = rows[r];
      const type = String(row[0]||"").trim();    // ฝันแปร/คงที่
      const vendor = String(row[1]||"").trim();
      const catText = String(row[2]||"").trim();
      if(!vendor || !catText) continue;
      const dueText = String(row[4]||"").trim() + " " + String(row[5]||"").trim();
      const amount = Number(row[8]);
      if(isNaN(amount) || amount <= 0) continue;
      const remark = String(row[21]||"").trim();
      const day = recParseDay(dueText);
      const cat = recMapCategory(catText, vendor);
      items.push({
        name: vendor + " — " + catText,
        category: cat,
        expected_amount: amount,
        amount_variance_pct: type === "คงที่" ? 0 : 10,   // ฝันแปร = ± 10%
        frequency: "monthly",   // ทุกรายการในไฟล์เป็นเดือน
        day_of_month: day,
        start_date: new Date().toISOString().slice(0,10),
        end_date: null,
        is_active: true,
        remark: (remark || dueText) || null,
        _vendor_raw: vendor,
        _cat_raw: catText
      });
    }
    if(!items.length){ alert("ไม่พบรายการที่ valid"); return; }

    // preview modal
    const m = document.createElement("div");
    m.id = "fopModal";
    m.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";
    m.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:24px;max-width:900px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)">
        <h3 style="margin:0 0 6px;font-size:16px;font-weight:800">นำเข้าค่าใช้จ่ายประจำ จาก Excel</h3>
        <div style="color:var(--ink-3);font-size:12.5px;margin-bottom:12px">${items.length} รายการที่จะเพิ่ม · กดติ๊กเพื่อเลือก (default ติ๊กหมด)</div>
        <div style="overflow:auto;flex:1">
          <table style="font-size:12px;width:100%">
            <thead><tr><th style="position:sticky;top:0;background:#f8fafc"><input type="checkbox" id="recImpAll" checked onclick="document.querySelectorAll('.rec-imp-cb').forEach(c=>c.checked=this.checked)"></th><th>ผู้รับ</th><th>หมวด</th><th>วัน</th><th style="text-align:right">ยอด</th><th>variance</th><th>หมายเหตุ</th></tr></thead>
            <tbody>${items.map((it,i)=>`<tr>
              <td><input type="checkbox" class="rec-imp-cb" data-i="${i}" checked></td>
              <td><b>${esc(it._vendor_raw)}</b></td>
              <td style="font-size:11px">${esc(it.category)} <span style="color:var(--ink-3)">/ ${esc(it._cat_raw)}</span></td>
              <td>${it.day_of_month === -1 ? "สิ้นเดือน" : (it.day_of_month || "—")}</td>
              <td style="text-align:right;font-weight:700">${fopFmt(it.expected_amount)}</td>
              <td style="font-size:11px;color:var(--ink-3)">${it.amount_variance_pct}%</td>
              <td style="font-size:11px;color:var(--ink-2);max-width:200px;white-space:normal">${esc(it.remark||"")}</td>
            </tr>`).join("")}</tbody>
          </table>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
          <button onclick="document.getElementById('fopModal').remove()" class="btn ghost btn sm">ยกเลิก</button>
          <button id="recImpBtn" class="btn">นำเข้าทั้งหมดที่ติ๊ก</button>
        </div>
      </div>`;
    document.body.appendChild(m);
    m.onclick = e=>{ if(e.target===m) m.remove(); };
    document.getElementById("recImpBtn").onclick = async () => {
      const checked = Array.from(document.querySelectorAll(".rec-imp-cb:checked")).map(c => parseInt(c.dataset.i, 10));
      if(!checked.length){ alert("ไม่ได้ติ๊กรายการใด"); return; }
      const btn = document.getElementById("recImpBtn");
      btn.disabled = true; btn.textContent = "กำลังบันทึก...";
      try{
        const cid = await fopCompanyId();
        const rows = checked.map(i => {
          const it = items[i];
          return {
            company_id: cid,
            name: it.name,
            category: it.category,
            expected_amount: it.expected_amount,
            amount_variance_pct: it.amount_variance_pct,
            frequency: it.frequency,
            day_of_month: it.day_of_month,
            start_date: it.start_date,
            end_date: it.end_date,
            is_active: it.is_active,
            remark: it.remark,
            created_by: AUTH.user ? AUTH.user.id : null
          };
        });
        const { error } = await sb.from("recurring_expenses").insert(rows);
        if(error) throw error;
        document.getElementById("fopModal").remove();
        alert(`สำเร็จ — เพิ่ม ${rows.length} รายการ\n\nกด '⟳ Materialise งวด 6 เดือน' เพื่อสร้างปฏิทินงวดจ่ายล่วงหน้า`);
        state.rec[state.company] = null;
        renderToolRecurring();
      }catch(e){
        btn.disabled = false; btn.textContent = "นำเข้าทั้งหมดที่ติ๊ก";

function cffSetStaffQuick(kind){
  const d=cffGet(); const dt=d.data; if(!dt) return;
  const todayISO = dt.todayISO || cffISO(new Date());
  const [Y,M,D] = todayISO.split("-").map(Number);
  const today = new Date(Y, M-1, D);
  const iso = (x)=> `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`;
  let from, to;
  if(kind==="thisWeek" || kind==="nextWeek"){
    const dow = (today.getDay()+6)%7;            // จันทร์=0 .. อาทิตย์=6
    const mon = new Date(today); mon.setDate(today.getDate()-dow + (kind==="nextWeek"?7:0));
    const sun = new Date(mon);   sun.setDate(mon.getDate()+6);
    from=iso(mon); to=iso(sun);
  } else if(kind==="toMonthEnd"){
    from=todayISO; to=iso(new Date(Y, M, 0));    // วันสุดท้ายของเดือนนี้
  } else return;
  d.staffMode='range'; d.staffFrom=from; d.staffTo=to; d.staffQuick=kind;
  cffRerender();
}
/* ระดับการดูรายงาน: ตามประเภท (cat) / ตามผู้จำหน่าย (vendor) / ตามเอกสาร (doc)
   - cat    → ย่อทุกประเภท (เห็นแค่ยอดรวมประเภท)
   - vendor → กางประเภท · ย่อผู้จำหน่าย (เห็นยอดรวมต่อผู้จำหน่าย)
   - doc    → กางทุกชั้น เห็นเอกสารทุกรายการ */
function cffStaffSetGroupLevel(level){
  const d=cffGet(); const dt=d.data; if(!dt) return;

function cffCleanDesc(s){

/* load = bank balances (latest) + AP outstanding + recurring occurrences */
async function cffLoad(){
  const d = cffGet();
  const cid = await fopCompanyId();
  if(!cid){ d.err = "หา company_id ไม่เจอ"; return; }
  d.companyId = cid;
  const startISO = cffStartDate(d).toISOString().slice(0,10);
  const endISO = cffEndDate(d).toISOString().slice(0,10);
  const todayISO = new Date().toISOString().slice(0,10);

  const [balRes, apRes, recRes, recExpRes, recSkipRes] = await Promise.all([
    sb.rpc("fn_balance_as_of", { p_company: cid, p_as_of: todayISO }),
    sb.from("ap_invoices").select("id,vendor_name_raw,vendors(name),invoice_no,due_date,planned_payment_date,internal_note,amount_outstanding,amount_total,amount_paid,status,category,remark,pay_from_account_id")
      .eq("company_id", cid).is("deleted_at", null)
      .neq("status","paid").neq("status","void"),
    sb.from("recurring_occurrences").select("id,recurring_id,due_date,expected_amount,status,recurring_expenses(name,category,bank_account_id)")
      .eq("company_id", cid).is("deleted_at", null)
      .eq("status","forecast")
      .gte("due_date", startISO).lte("due_date", endISO),
    sb.from("recurring_expenses").select("id,name,category,expected_amount,frequency,day_of_month,is_active,bank_account_id")
      .eq("company_id", cid).is("deleted_at", null).eq("is_active", true),
    // งวดค่าใช้จ่ายประจำที่ จนท. กด "ลบ" ออกจากประมาณการ (status=skipped) → ใช้ซ่อน + คืนค่า
    sb.from("recurring_occurrences").select("id,recurring_id,due_date,expected_amount,recurring_expenses(name,category)")
      .eq("company_id", cid).is("deleted_at", null).eq("status","skipped")
  ]);
  d.data = {
    balances: balRes.data || [],
    aps: apRes.data || [],
    recOccs: recRes.data || [],
    recurring: recExpRes.data || [],
    recSkips: recSkipRes.data || [],
    startISO, endISO, todayISO
  };
}

/* build forecast timeline + breakdowns */
function cffCompute(){
  const d = cffGet();
  const dt = d.data;
  if(!dt) return null;
  const startD = new Date(dt.startISO);
  const endD   = new Date(dt.endISO);
  const todayD = new Date(dt.todayISO);

  // opening cash = sum of latest bank balances (amount - hold)
  const openingCash = dt.balances.reduce((s,b) => s + Number(b.amount||0) - Number(b.hold||0), 0);
  const bankTotal = dt.balances.reduce((s,b) => s + Number(b.amount||0), 0);
  const holdTotal = dt.balances.reduce((s,b) => s + Number(b.hold||0), 0);

  // build day buckets startD..endD
  const days = [];
  for(let d = new Date(startD); d <= endD; d.setDate(d.getDate()+1)){
    days.push(new Date(d).toISOString().slice(0,10));
  }
  const buckets = {};
  days.forEach(k => buckets[k] = { in:0, out:0, payments:[], receipts:[] });

  // === PAYMENTS ===
  // 1) AP outstanding (use planned_payment_date or due_date)
  for(const ap of dt.aps){
    const due = ap.due_date;
    const k = due >= dt.startISO ? (due <= dt.endISO ? due : null) : dt.startISO;
    if(k && buckets[k] !== undefined){
      const amt = Number(ap.amount_outstanding||0);
      buckets[k].out += amt;
      buckets[k].payments.push({
        type:"ap", amount: amt, vendor: (ap.vendors&&ap.vendors.name) || ap.vendor_name_raw || "—",
        category: ap.category || "เจ้าหนี้การค้า", ref: ap.invoice_no, due_date: due,
        id: ap.id, status: ap.status
      });
    }
  }
  // 2) Recurring occurrences (already materialised)
  for(const r of dt.recOccs){
    const k = r.due_date;
    if(buckets[k] !== undefined){
      const amt = Number(r.expected_amount||0);
      buckets[k].out += amt;
      buckets[k].payments.push({
        type:"recurring", amount: amt,
        vendor: (r.recurring_expenses&&r.recurring_expenses.name)||"—",
        category: (r.recurring_expenses&&r.recurring_expenses.category)||"other",
        ref: "งวด " + r.due_date, due_date: r.due_date, id: r.id
      });
    }
  }
  // 3) Recurring expenses ที่ยังไม่ materialise (auto-forecast)
  //    ถ้า day_of_month กำหนด & ตกในช่วง → ใส่ใน bucket (ถ้ายังไม่ซ้ำกับ occ)
  const occKeys = new Set(dt.recOccs.map(r => r.recurring_expenses ? `${r.due_date}|` + (r.recurring_expenses.name||"") : ""));
  const skipSet = new Set((dt.recSkips||[]).map(s => `${s.recurring_id}|${s.due_date}`));  // ★ งวดที่กดลบไว้
  for(const r of dt.recurring){
    if(r.frequency !== "monthly") continue;
    if(!r.day_of_month) continue;
    for(let m = new Date(startD); m <= endD; m.setMonth(m.getMonth()+1)){
      const lastDay = new Date(m.getFullYear(), m.getMonth()+1, 0).getDate();
      const dom = r.day_of_month === -1 ? lastDay : Math.min(r.day_of_month, lastDay);
      const dd = new Date(m.getFullYear(), m.getMonth(), dom);
      const k = dd.toISOString().slice(0,10);
      if(k < dt.startISO || k > dt.endISO) continue;
      if(occKeys.has(`${k}|${r.name}`)) continue;     // ซ้ำกับ occ จริง
      if(skipSet.has(`${r.id}|${k}`)) continue;        // ★ ถูกกดลบออกจากประมาณการ
      const amt = Number(r.expected_amount||0);
      buckets[k].out += amt;
      buckets[k].payments.push({
        type:"recurring_auto", amount: amt,
        vendor: r.name, category: r.category||"other",
        ref:"forecast", due_date: k, id: r.id
      });
    }
  }

  // === RECEIPTS === (manual forecast only for now — Phase 2.1 จะใส่ AR + Settlement)
  // ผู้ใช้สามารถใส่ "manual receipt" ทีหลัง

  // running cash + lowest
  let running = openingCash, lowestBal = openingCash, lowestDate = dt.startISO;
  const series = days.map(k => {
    const b = buckets[k];
    running += b.in - b.out;
    if(running < lowestBal){ lowestBal = running; lowestDate = k; }
    return { date: k, in: b.in, out: b.out, net: b.in - b.out, balance: running };
  });

  const totalIn  = days.reduce((s,k) => s + buckets[k].in, 0);
  const totalOut = days.reduce((s,k) => s + buckets[k].out, 0);
  const endingCash = openingCash + totalIn - totalOut;

  // breakdowns
  const payByCat = {}, payByVendor = {};
  for(const k of days){
    for(const p of buckets[k].payments){
      payByCat[p.category] = (payByCat[p.category]||0) + p.amount;
      payByVendor[p.vendor] = (payByVendor[p.vendor]||0) + p.amount;
    }
  }

  // upcoming major payments (next 14 days, sorted by amount desc)
  const next14 = new Date(todayD); next14.setDate(next14.getDate()+14);
  const next14ISO = next14.toISOString().slice(0,10);
  const upcomingMajor = [];
  for(const k of days){
    if(k > next14ISO) break;
    for(const p of buckets[k].payments) upcomingMajor.push(p);
  }
  upcomingMajor.sort((a,b)=> b.amount - a.amount);

  // alerts
  const alerts = [];
  if(endingCash < 0) alerts.push({ sev:"high", text:"⚠ Projected ending cash ติดลบ (" + fopFmt(endingCash) + ")" });
  if(lowestBal < 0) alerts.push({ sev:"high", text:`⚠ Lowest cash ติดลบ ${fopFmt(lowestBal)} วันที่ ${fopDate(lowestDate)}` });
  else if(lowestBal < openingCash * 0.2) alerts.push({ sev:"med", text:`⚠ Lowest cash ต่ำ ${fopFmt(lowestBal)} วันที่ ${fopDate(lowestDate)}` });
  const overdueAp = dt.aps.filter(a => a.due_date < dt.todayISO).reduce((s,a) => s + Number(a.amount_outstanding||0), 0);
  if(overdueAp > 0) alerts.push({ sev:"med", text:`AP เกินกำหนด ${fopFmt(overdueAp)}` });
  // upcoming payroll within 5 days
  const next5 = new Date(todayD); next5.setDate(next5.getDate()+5);
  const next5ISO = next5.toISOString().slice(0,10);
  const upcomingPayroll = upcomingMajor.filter(p => p.category === "payroll" && p.due_date <= next5ISO).reduce((s,p)=>s+p.amount,0);
  if(upcomingPayroll > 0) alerts.push({ sev:"med", text:`เงินเดือนภายใน 5 วัน ${fopFmt(upcomingPayroll)}` });

  return {
    openingCash, bankTotal, holdTotal, endingCash, lowestBal, lowestDate,
    totalIn, totalOut, days, series, buckets,
    payByCat, payByVendor, upcomingMajor, alerts, overdueAp
  };
}

/* local-date ISO (กัน timezone shift ของ toISOString ใน TH UTC+7) */
function cffISO(x){ const p=n=>String(n).padStart(2,"0"); return `${x.getFullYear()}-${p(x.getMonth()+1)}-${p(x.getDate())}`; }
/* map รหัสหมวดค่าใช้จ่ายประจำ → ป้ายไทย (ใช้จัดกลุ่มใน pivot) */
function cffRecurCat(c){
  return ({ payroll:"เงินเดือน", rent:"ค่าเช่า", utility:"สาธารณูปโภค", subscription:"Subscription",
    insurance:"ประกัน", provident_fund:"กองทุนสำรอง", social_security:"ประกันสังคม",
    tax:"ภาษี", loan:"สินเชื่อ", other:"ค่าใช้จ่ายประจำอื่น ๆ" })[c] || (c || "ค่าใช้จ่ายประจำ");
}
/* ★ รายการจ่ายของหน้าพนักงาน = AP (ที่กรอกวันชำระแล้ว) + ค่าใช้จ่ายประจำ (ผูกตามวันจ่าย day_of_month) */
function cffStaffPayments(dt, d){
  const payments = [];
  // 1) AP ที่ จนท. กรอก planned_payment_date แล้วเท่านั้น (ยังไม่กรอก = ยังไม่ตัดสินใจจ่าย)
  for(const ap of dt.aps){
    if(Number(ap.amount_outstanding||0) <= 0) continue;
    if(!ap.planned_payment_date) continue;
    payments.push({
      type:"ap", category: ap.category || "เจ้าหนี้การค้า",
      vendor: cffCleanVendor((ap.vendors&&ap.vendors.name) || ap.vendor_name_raw || "—"),
      detail: ap.invoice_no, due_date: ap.planned_payment_date, original_due: ap.due_date,
      amount: Number(ap.amount_outstanding||0),
      remark: ap.remark || "", internalNote: ap.internal_note || "",
      payAccountId: ap.pay_from_account_id || null
    });
  }
  // 2) ค่าใช้จ่ายประจำ → ผูกตามวันจ่าย (day_of_month) ของแต่ละเดือนในช่วง
  //    window = ต้นเดือนนี้ → สิ้นเดือนถัดไป (ขยายถึง staffTo ถ้าผู้ใช้เลือกช่วงไกลกว่า)
  const today = new Date(dt.todayISO);
  const winStart = new Date(today.getFullYear(), today.getMonth(), 1);
  let winEnd = new Date(today.getFullYear(), today.getMonth()+2, 0); // สิ้นเดือนถัดไป
  if(d && d.staffTo){ const st = new Date(d.staffTo); if(st > winEnd) winEnd = st; }
  const winStartISO = cffISO(winStart), winEndISO = cffISO(winEnd);
  // ★ recurring (ประมาณการ) เริ่มนับจาก "วันนี้" — งวดประจำที่ผ่านไปแล้วในเดือนนี้ถือว่าจ่ายแล้ว ไม่เอามาคิด
  const recFromISO = dt.todayISO > winStartISO ? dt.todayISO : winStartISO;
  // dedupe กับงวดที่ materialise แล้ว (recurring_occurrences) กันนับซ้ำ
  const occKeys = new Set((dt.recOccs||[]).map(r => `${r.due_date}|${(r.recurring_expenses&&r.recurring_expenses.name)||""}`));
  // ★ งวดที่ จนท. กด "ลบ" (skipped) → ซ่อนออกจากประมาณการ (key = recurring_id|due_date)
  const skipSet = new Set((dt.recSkips||[]).map(s => `${s.recurring_id}|${s.due_date}`));
  // 2a) งวดที่ materialise แล้ว และอยู่ในช่วง
  for(const r of (dt.recOccs||[])){
    if(Number(r.expected_amount||0) <= 0) continue;
    if(r.due_date < recFromISO || r.due_date > winEndISO) continue;
    if(skipSet.has(`${r.recurring_id}|${r.due_date}`)) continue;
    payments.push({
      type:"recurring", category: "ค่าใช้จ่ายประจำ",   // ★ รวมทุก recurring ไว้กลุ่มเดียว
      vendor: cffCleanVendor((r.recurring_expenses&&r.recurring_expenses.name) || "ค่าใช้จ่ายประจำ"),
      detail:"", due_date: r.due_date, original_due: r.due_date,
      amount: Number(r.expected_amount||0), remark:"",
      internalNote: cffRecurCat(r.recurring_expenses&&r.recurring_expenses.category),  // หมวดย่อยไปอยู่คำอธิบาย
      recurringId: r.recurring_id,
      payAccountId: (r.recurring_expenses&&r.recurring_expenses.bank_account_id) || null
    });
  }
  // 2b) คำนวณจาก recurring_expenses (รายเดือน + day_of_month) ที่ยังไม่ materialise
  for(const r of (dt.recurring||[])){
    if(r.frequency !== "monthly" || !r.day_of_month) continue;
    for(let m = new Date(winStart); m <= winEnd; m.setMonth(m.getMonth()+1)){
      const lastDay = new Date(m.getFullYear(), m.getMonth()+1, 0).getDate();
      const dom = r.day_of_month === -1 ? lastDay : Math.min(r.day_of_month, lastDay);
      const k = cffISO(new Date(m.getFullYear(), m.getMonth(), dom));
      if(k < recFromISO || k > winEndISO) continue;
      if(occKeys.has(`${k}|${r.name}`)) continue;  // ซ้ำกับงวดจริง
      if(skipSet.has(`${r.id}|${k}`)) continue;     // ★ ถูกกดลบไว้
      payments.push({
        type:"recurring", category: "ค่าใช้จ่ายประจำ",   // ★ รวมทุก recurring ไว้กลุ่มเดียว
        vendor: cffCleanVendor(r.name), detail:"", due_date: k, original_due: k,
        amount: Number(r.expected_amount||0), remark:"",
        internalNote: cffRecurCat(r.category),  // หมวดย่อยไปอยู่คำอธิบาย
        recurringId: r.id,
        payAccountId: r.bank_account_id || null
      });
    }
  }
  return payments;
}
/* บัญชี default ของหน้านี้ = เลขลงท้าย 4889 (digits-only) ไม่งั้นบัญชีแรก — รับ balances จาก fn_balance_as_of */
function cffBankDefaultId(balances){
  if(!balances || !balances.length) return null;
  const m = balances.find(b => String(b.account_no||"").replace(/\D/g,"").endsWith("4889"));
  return (m || balances[0]).bank_account_id;
}
/* กระจายค่าใช้จ่ายไปตามบัญชีที่ผูกไว้ (payAccountId) — ไม่ผูก/บัญชีไม่มียอด → ไปบัญชี default */
function cffBankDistribute(filtered, balances){
  const ids = new Set((balances||[]).map(b => b.bank_account_id));
  const defId = cffBankDefaultId(balances);
  const due = {};   // bankId → total
  const cat = {};   // bankId → { catName → total }
  for(const p of (filtered||[])){
    let bid = p.payAccountId;
    if(!bid || !ids.has(bid)) bid = defId;
    if(!bid) continue;
    due[bid] = (due[bid]||0) + p.amount;
    (cat[bid] || (cat[bid] = {}))[p.category] = (cat[bid][p.category]||0) + p.amount;
  }
  return { due, cat, defId };
}
/* ลบรายการค่าใช้จ่ายประจำออกจากประมาณการ (เฉพาะวันนั้น) → upsert occurrence = skipped */
async function cffSkipRecurring(recurringId, dueDate, amount){
  if(!recurringId){ alert("ลบไม่ได้ — ไม่พบรหัสรายการ"); return; }
  if(!confirm("ลบค่าใช้จ่ายประจำรายการนี้ออกจากประมาณการ? (เฉพาะวันที่นี้ · คืนค่าได้ภายหลัง)")) return;
  try{
    const cid = await fopCompanyId();
    const { error } = await sb.from("recurring_occurrences").upsert({
      company_id: cid, recurring_id: recurringId, due_date: dueDate,
      expected_amount: Number(amount)||0, status: "skipped",
      created_by: AUTH.user ? AUTH.user.id : null, updated_by: AUTH.user ? AUTH.user.id : null
    }, { onConflict: "recurring_id,due_date" });
    if(error) throw error;
    renderToolCashflowForecast();   // โหลดใหม่ (คง filter เดิม)
  }catch(e){ alert("ลบไม่สำเร็จ: " + fopErr(e)); }
}
/* คืนค่ารายการที่ลบไว้ → occurrence กลับเป็น forecast */
async function cffUnskipRecurring(recurringId, dueDate){
  try{
    const cid = await fopCompanyId();
    const { error } = await sb.from("recurring_occurrences")
      .update({ status: "forecast", updated_by: AUTH.user ? AUTH.user.id : null })
      .eq("company_id", cid).eq("recurring_id", recurringId).eq("due_date", dueDate);
    if(error) throw error;
    renderToolCashflowForecast();
  }catch(e){ alert("คืนค่าไม่สำเร็จ: " + fopErr(e)); }
}

/* เรียงรายการในหมวดเดียวกัน: ผู้ขายเดียวกันอยู่ติดกัน → แล้วตามวันครบกำหนด → เลขอ้างอิง */
function cffItemCmp(a,b){
  const v = (a.vendor||"").localeCompare(b.vendor||"", "th");
  if(v) return v;
  const t = (a.type||"").localeCompare(b.type||"");
  if(t) return t;
  const d = (a.original_due||"").localeCompare(b.original_due||"");
  if(d) return d;
  return (a.detail||"").localeCompare(b.detail||"", "th");
}

/* ============================================================
   LOANS — ลูกหนี้คงค้าง / พอร์ตสินเชื่อ (บริษัทปล่อยกู้)
   parser รายงาน "ลูกหนี้คงค้างแบบละเอียด" · group ตามลูกหนี้ · LV=เงินต้น IV=ดอกเบี้ย
   ============================================================ */
function loanGet(){ if(!state.loan) state.loan={}; const co=state.company; if(!state.loan[co]) state.loan[co]={data:null, expanded:new Set()}; if(!state.loan[co].expanded) state.loan[co].expanded=new Set(); return state.loan[co]; }
function loanCacheKey(){ return "ft-loan-"+state.company; }
function loanSaveCache(d){ try{ localStorage.setItem(loanCacheKey(), JSON.stringify(d)); }catch(e){} }
function loanLoadCache(){ try{ const s=localStorage.getItem(loanCacheKey()); return s?JSON.parse(s):null; }catch(e){ return null; } }
function loanFmt(n){ return Math.abs(Number(n||0)).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function loanParse(book){
  const out = { company:"", asOf:"", borrowers:[] };
  const codeRe = /^[A-Z]\d/;
  for(const name of book.names){
    const rows = book.sheets[name]||[];
    let cur=null;
    for(let r=0;r<rows.length;r++){
      const row=rows[r]||[];
      const c1=String(row[0]||"").replace(/ /g," ").trim();
      if(!out.company && c1.startsWith("บริษัท")) out.company = c1.split(/\s{2,}/)[0].trim();
      if(!out.asOf){ const m=c1.match(/ณ\s*วันที่\s*(\d{1,2}\s*[ก-๙.]+\s*\d{4})/); if(m) out.asOf=m[1].replace(/\s+/g," ").trim(); }
      const code=String(row[3]||"").trim(), bname=String(row[2]||"").replace(/ /g," ").trim();
      if(codeRe.test(code) && bname){ cur={code, name:bname, lines:[], bill:0, paid:0, out:0, principal:0, interest:0}; out.borrowers.push(cur); continue; }
      if(!cur) continue;
      const dt=row[4]; if(!(dt instanceof Date)) continue;
      const doc=String(row[6]||"").trim();
      const bill=Number(row[8])||0, paid=Number(row[9])||0, o=Number(row[10])||0;
      const type = doc.startsWith("LV")?"principal":(doc.startsWith("IV")?"interest":"other");
      cur.lines.push({ date:loanDateStr(dt), doc, bill, paid, out:o, type });
      cur.bill+=bill; cur.paid+=paid; cur.out+=o;
      if(type==="principal") cur.principal+=o; else if(type==="interest") cur.interest+=o;
    }
  }
  out.borrowers = out.borrowers.filter(b=>b.lines.length);
  return out;
}
function loanDateStr(d){ const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
async function loanUpload(){
  const file = await new Promise(res=>{ const i=document.createElement("input"); i.type="file"; i.accept=".xlsx,.xls"; i.onchange=()=>res(i.files[0]); i.click(); });
  if(!file) return;
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(new Uint8Array(buf), {type:"array", cellDates:true});
    const book={ names:wb.SheetNames, sheets:{} };
    wb.SheetNames.forEach(n=> book.sheets[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:"",blankrows:false}));
    const data=loanParse(book);
    if(!data.borrowers.length){ alert("ไม่พบข้อมูลลูกหนี้ในไฟล์ — ตรวจรูปแบบรายงาน"); return; }
    data.uploadedAt=new Date().toISOString(); data.fileName=file.name;
    const d=loanGet(); d.data=data; loanSaveCache(data); renderToolLoans();
  }catch(e){ alert("อ่านไฟล์ไม่สำเร็จ: "+(e.message||e)); }
}

const LOAN_THMON={"ม.ค.":1,"ก.พ.":2,"มี.ค.":3,"เม.ย.":4,"พ.ค.":5,"มิ.ย.":6,"ก.ค.":7,"ส.ค.":8,"ก.ย.":9,"ต.ค.":10,"พ.ย.":11,"ธ.ค.":12};
const LOAN_MONAB=["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
function loanAsOfISO(txt){ if(!txt) return null; const m=String(txt).match(/(\d{1,2})\s*([ก-๙.]+)\s*(\d{4})/); if(!m) return null; const mo=LOAN_THMON[m[2].trim()]||0; if(!mo) return null; const p=n=>String(n).padStart(2,"0"); return `${m[3]}-${p(mo)}-${p(m[1])}`; }
function loanAgeDays(aISO, bISO){ const pa=aISO.split("-").map(Number), pb=bISO.split("-").map(Number); const A=new Date(pa[0],pa[1]-1,pa[2]), Bd=new Date(pb[0],pb[1]-1,pb[2]); return Math.round((A-Bd)/86400000); }
