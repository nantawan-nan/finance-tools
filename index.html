<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finance Tools — เครื่องมือคลีนข้อมูล</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --brand:#2563eb; --brand-dark:#1e40af; --brand-soft:#eff6ff;
    --ink:#0f172a; --ink-2:#475569; --ink-3:#94a3b8;
    --line:#e2e8f0; --bg:#f8fafc; --card:#ffffff;
    --ok:#16a34a; --warn:#d97706; --bad:#dc2626;
    --radius:14px; --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",-apple-system,"Sarabun",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55}
  button{font-family:inherit;cursor:pointer}
  /* ---- layout ---- */
  .topbar{display:flex;align-items:center;gap:16px;background:var(--card);border-bottom:1px solid var(--line);padding:12px 22px;position:sticky;top:0;z-index:20}
  .logo{font-weight:800;font-size:18px;color:var(--brand);letter-spacing:-.3px;white-space:nowrap}
  .logo small{display:block;font-size:11px;color:var(--ink-3);font-weight:600;letter-spacing:.3px}
  .company-switch{display:flex;gap:6px;margin-left:8px}
  .company-switch button{border:1px solid var(--line);background:#fff;color:var(--ink-2);padding:7px 16px;border-radius:999px;font-weight:600;font-size:13px;transition:.15s}
  .company-switch button.active{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 2px 8px rgba(37,99,235,.3)}
  .spacer{flex:1}
  .hint{font-size:12px;color:var(--ink-3)}
  .wrap{display:flex;min-height:calc(100vh - 57px)}
  .sidebar{width:280px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);padding:18px 12px;overflow-y:auto}
  .stage-label{font-size:11px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;padding:14px 12px 6px}
  .nav-item{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border-radius:10px;cursor:pointer;transition:.12s;margin-bottom:2px}
  .nav-item:hover{background:var(--brand-soft)}
  .nav-item.active{background:var(--brand-soft);box-shadow:inset 3px 0 0 var(--brand)}
  .nav-item .ic{font-size:18px;line-height:1.3}
  .nav-item .t{font-weight:600;font-size:14px}
  .nav-item.active .t{color:var(--brand-dark)}
  .nav-item .d{font-size:11.5px;color:var(--ink-3);margin-top:1px}
  .main{flex:1;padding:26px 30px;overflow-x:auto}
  /* ---- page header ---- */
  .page-head{margin-bottom:18px}
  .page-head h1{margin:0 0 4px;font-size:22px;letter-spacing:-.4px}
  .page-head .sub{color:var(--ink-2);font-size:14px}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--brand-soft);color:var(--brand-dark);vertical-align:middle;margin-left:8px}
  /* ---- cards ---- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
  .card h3{margin:0 0 4px;font-size:15px}
  .card .note{color:var(--ink-3);font-size:13px;margin-bottom:14px}
  /* ---- dropzone ---- */
  .drop{border:2px dashed var(--line);border-radius:12px;padding:30px;text-align:center;color:var(--ink-2);transition:.15s;background:#fcfdff}
  .drop.over{border-color:var(--brand);background:var(--brand-soft)}
  .drop .big{font-size:34px;margin-bottom:6px}
  .drop b{color:var(--brand)}
  .drop .sm{font-size:12px;color:var(--ink-3);margin-top:6px}
  .filechip{display:inline-flex;align-items:center;gap:8px;background:var(--brand-soft);color:var(--brand-dark);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;margin-top:12px}
  .filechip button{border:none;background:none;color:var(--brand-dark);font-size:15px;line-height:1}
  .sheet-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;padding:10px 14px;background:#f8fafc;border:1px solid var(--line);border-radius:10px}
  .sheet-row .sheet-lbl{font-size:13px;font-weight:700;color:var(--ink-2)}
  .sheet-row select{border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff;min-width:200px;color:var(--ink)}
  .sheet-row .sheet-auto{font-size:12px;color:var(--ok);font-weight:600}
  .sheet-row .sheet-manual{font-size:12px;color:var(--warn);font-weight:600}
  /* ---- armap multi-slot ---- */
  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  @media(max-width:1100px){.slots{grid-template-columns:1fr}}
  .slot{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
  .slot .lbl{display:flex;align-items:center;gap:6px;font-weight:700;font-size:14px;color:var(--ink)}
  .slot .lbl .step{display:inline-flex;width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;font-size:12px;align-items:center;justify-content:center}
  .slot .hint{font-size:12px;color:var(--ink-3);line-height:1.35}
  .slot .drop{padding:18px;font-size:13px}
  .slot .drop .big{font-size:24px;margin-bottom:2px}
  .slot.ready{border-color:var(--ok);background:#f0fdf4}
  .slot .files{display:flex;flex-direction:column;gap:5px}
  .slot .fchip{display:flex;align-items:center;justify-content:space-between;gap:6px;background:var(--brand-soft);color:var(--brand-dark);border-radius:8px;padding:6px 10px;font-size:12px}
  .slot .fchip .meta{font-size:10.5px;color:var(--ink-2);opacity:.85}
  .slot .fchip button{border:none;background:none;color:var(--brand-dark);font-size:14px;line-height:1;cursor:pointer}
  .slot .ok{font-size:12px;color:var(--ok);font-weight:600;margin-top:2px}
  .slot .err{font-size:12px;color:var(--bad);font-weight:600;margin-top:2px}
  .bigbtn{padding:13px 30px;font-size:15px;border-radius:12px}
  .bigbtn .ic{margin-right:6px}
  .tabs{display:flex;gap:4px;background:var(--ink-100,#f1f5f9);padding:4px;border-radius:10px;margin-bottom:14px}
  .tabs button{flex:1;border:none;background:transparent;padding:9px 14px;font-size:13px;font-weight:700;color:var(--ink-2);border-radius:8px;cursor:pointer;transition:.15s}
  .tabs button.active{background:#fff;color:var(--brand-dark);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .tabs button .c{display:inline-block;margin-left:6px;background:var(--brand-soft);color:var(--brand-dark);border-radius:999px;padding:1px 8px;font-size:11px}
  .tabs button.active .c{background:var(--brand);color:#fff}
  .warning-row{background:#fffbeb!important}
  .warning-row td:first-child{position:relative}
  .warning-row td:first-child::before{content:"⚠️";position:absolute;left:-4px;top:50%;transform:translateY(-50%);font-size:14px}
  .neg{color:var(--bad);font-weight:600}
  .pos{color:var(--ok);font-weight:600}
  /* ---- buttons ---- */
  .btn{border:1px solid var(--brand);background:var(--brand);color:#fff;padding:9px 18px;border-radius:10px;font-weight:700;font-size:14px;transition:.15s}
  .btn:hover{background:var(--brand-dark);border-color:var(--brand-dark)}
  .btn[disabled]{opacity:.45;cursor:not-allowed}
  .btn.ghost{background:#fff;color:var(--brand)}
  .btn.ghost:hover{background:var(--brand-soft)}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:16px}
  /* ---- export dropdown ---- */
  .dd{position:relative;display:inline-block}
  .dd-menu{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);min-width:170px;overflow:hidden;display:none;z-index:10}
  .dd.open .dd-menu{display:block}
  .dd-menu button{display:flex;width:100%;gap:8px;align-items:center;border:none;background:#fff;padding:11px 14px;font-size:14px;text-align:left;color:var(--ink)}
  .dd-menu button:hover{background:var(--brand-soft)}
  .dd-menu .x{font-size:11px;color:var(--ink-3)}
  /* ---- table ---- */
  .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px;margin-top:14px;max-height:430px}
  table{border-collapse:collapse;width:100%;font-size:13px;white-space:nowrap}
  th,td{border-bottom:1px solid var(--line);padding:8px 12px;text-align:left}
  th{background:#f1f5f9;position:sticky;top:0;font-weight:700;color:var(--ink-2)}
  tbody tr:hover{background:var(--brand-soft)}
  .empty{padding:36px;text-align:center;color:var(--ink-3);font-size:13px}
  /* ---- options ---- */
  .opts{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:6px}
  .opt{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-2)}
  .opt input{width:16px;height:16px;accent-color:var(--brand)}
  .pill-stat{display:flex;gap:14px;flex-wrap:wrap;margin:14px 0 0}
  .stat{background:var(--brand-soft);border-radius:10px;padding:10px 16px;min-width:110px}
  .stat .n{font-size:20px;font-weight:800;color:var(--brand-dark)}
  .stat .l{font-size:11.5px;color:var(--ink-2);font-weight:600}
  .stat.warn{background:#fffbeb}.stat.warn .n{color:var(--warn)}
  .stat.bad{background:#fef2f2}.stat.bad .n{color:var(--bad)}
  .soon{font-size:12px;color:var(--ink-3);background:#f1f5f9;border-radius:8px;padding:10px 14px;margin-top:14px;border:1px dashed var(--line)}
  @media(max-width:820px){
    .sidebar{position:fixed;left:-300px;transition:.2s;height:100%;z-index:30}
    .sidebar.show{left:0}
    .main{padding:18px}
    .menu-toggle{display:inline-block!important}
  }
  .menu-toggle{display:none;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 11px;font-size:18px}
</style>
</head>
<body>
<div class="topbar">
  <button class="menu-toggle" onclick="document.getElementById('sb').classList.toggle('show')">☰</button>
  <div class="logo">Finance Tools<small>เครื่องมือคลีน &amp; ตรวจสอบข้อมูล</small></div>
  <div class="company-switch" id="companySwitch"></div>
  <div class="spacer"></div>
  <div class="hint">🔒 ประมวลผลในเครื่อง · ข้อมูลไม่ออกนอกเบราว์เซอร์</div>
</div>

<div class="wrap">
  <aside class="sidebar" id="sb"></aside>
  <main class="main" id="main"></main>
</div>

<script>
/* ============================================================
   Finance Tools — โครงร่าง (shell)
   logic จริงของแต่ละ tool จะค่อยใส่ทีหลังตอนได้ไฟล์ตัวอย่าง
   ============================================================ */

const COMPANIES = [
  { id:"mbark", name:"M Bark" },
  { id:"benya", name:"Benya" },
];

/* sheetHints:
   - exact: ["ชื่อ"] → จับเป๊ะ (ไม่สนตัวพิมพ์/ช่องว่าง)
   - contains: ["คำ"] → ชื่อมีคำนี้อยู่ ก็พอ
   - exclude: ["คำ"] → ตัดชีตที่มีคำนี้ออก (เช่น "สรุป", "Summary")
   - หาเจอ 1 ตัว → auto-select; หาไม่เจอ → เปิด dropdown ให้เลือกเอง */
const TOOLS = [
  { id:"bigseller", stage:"Stage 1 · บัญชี — คีย์ IV", ic:"🧾",
    name:"จัดฟอร์แมต Big Seller", desc:"BigSeller → เทมเพลตคีย์ IV",
    long:"อัปไฟล์ Big Seller → จัดเป็นเทมเพลตคีย์ IV (8 คอลัมน์) — multi-line รวมในออเดอร์เดียว · ตรวจ SKU ใหม่ · ตรวจซ้ำกับประวัติ",
    multiInput:true },
  { id:"ivcheck", stage:"Stage 1 · บัญชี — คีย์ IV", ic:"✅",
    name:"ตรวจ IV ครบไหม", desc:"เทียบ Big Seller × ลูกหนี้",
    long:"อัป 2 ไฟล์ (Big Seller + รายงานลูกหนี้ Express) → ฟ้องออเดอร์ที่ยังไม่ได้คีย์ / คีย์ซ้ำ / ตกหล่น",
    sheetHints:{ contains:["ลูกหนี้","รายละเอียด","detail"], exclude:["สรุป","summary"] } },
  { id:"armap", stage:"Stage 2 · การเงิน — รับชำระ", ic:"🔗",
    name:"Map ลูกหนี้คงค้าง", desc:"3 ไฟล์ → พร้อมคีย์รับชำระ",
    long:"วาง 3 ไฟล์ — ลูกหนี้คงค้าง · รายงานขายแบบเห็นออเดอร์ · หลังบ้าน Shopee/TikTok (ลากกี่ไฟล์ก็ได้) → ระบบจะแมพ IV กับเงินเข้า แล้วออกผลเป็น 3 ชีต พร้อมคีย์เข้า AutoKey",
    multiInput:true },
  { id:"settle", stage:"Stage 2 · การเงิน — รับชำระ", ic:"💰",
    name:"จับยอด Settlement", desc:"Shopee / TikTok / Lazada",
    long:"อัปรายงานเงินเข้ากระเป๋าจากแพลตฟอร์ม → จับคู่ออเดอร์ ว่าเงินเข้าจริงกี่บาท วันไหน + คำนวณส่วนต่าง (ค่าใช้จ่ายจ่ายล่วงหน้า)",
    sheetHints:{ contains:["settlement","income","รายได้","รายละเอียด"], exclude:["สรุป","summary"] } },
  { id:"bankrec", stage:"Stage 3 · การเงิน — ผ่านเช็ค", ic:"🏦",
    name:"กระทบยอดถอนเงิน", desc:"เงินเข้าบัญชี → ผ่านเช็ค",
    long:"อัปรายงานการถอนเงินจากแพลตฟอร์ม → จับว่ายอดเข้าบัญชีบริษัทมีออเดอร์ไหนบ้าง → สร้างรายการผ่านเช็ค + อ้างอิง Bank Rec",
    sheetHints:{ contains:["withdraw","ถอน","payout","transfer"], exclude:["สรุป","summary"] } },
];

/* pick the best sheet name from a workbook for the given tool
   returns { name, auto } — auto=true if matched a hint */
function pickSheet(sheetNames, hints){
  if(!sheetNames||!sheetNames.length) return null;
  const norm = s => String(s||"").toLowerCase().replace(/\s+/g,"");
  const list = sheetNames.map(n=>({raw:n, n:norm(n)}));
  const exclude = (hints&&hints.exclude||[]).map(norm);
  const filtered = list.filter(s => !exclude.some(x => s.n.includes(x)));
  const pool = filtered.length ? filtered : list;
  // exact
  for(const x of (hints&&hints.exact||[]).map(norm)){
    const hit = pool.find(s=>s.n===x); if(hit) return {name:hit.raw, auto:true};
  }
  // contains
  for(const x of (hints&&hints.contains||[]).map(norm)){
    const hit = pool.find(s=>s.n.includes(x)); if(hit) return {name:hit.raw, auto:true};
  }
  // no hint matched → no auto pick (let user choose)
  return {name:pool[0].raw, auto:false};
}

/* ---------- state ----------
   files[key] = file name
   books[key] = { sheets:{name:rows[][]}, names:[], picked:"name", auto:true }
   ใช้ books[key].sheets[books[key].picked] เป็นข้อมูลที่แสดง/ส่งออก */
let state = { company: COMPANIES[0].id, tool: TOOLS[0].id, files:{}, books:{} };
const key = () => state.company + ":" + state.tool;   // แยกข้อมูลต่อบริษัท+tool
function currentRows(){
  const b = state.books[key()]; if(!b) return null;
  return b.sheets[b.picked] || null;
}

/* ---------- render: company switch ---------- */
function renderCompanies(){
  document.getElementById("companySwitch").innerHTML = COMPANIES.map(c =>
    `<button class="${c.id===state.company?'active':''}" onclick="setCompany('${c.id}')">${c.name}</button>`
  ).join("");
}
function setCompany(id){ state.company=id; renderCompanies(); renderTool(); }

/* ---------- render: sidebar ---------- */
function renderSidebar(){
  let html="", lastStage="";
  TOOLS.forEach(t=>{
    if(t.stage!==lastStage){ html+=`<div class="stage-label">${t.stage}</div>`; lastStage=t.stage; }
    html+=`<div class="nav-item ${t.id===state.tool?'active':''}" onclick="setTool('${t.id}')">
        <div class="ic">${t.ic}</div>
        <div><div class="t">${t.name}</div><div class="d">${t.desc}</div></div>
      </div>`;
  });
  document.getElementById("sb").innerHTML=html;
}
function setTool(id){ state.tool=id; document.getElementById('sb').classList.remove('show'); renderSidebar(); renderTool(); }

/* ---------- render: tool page ---------- */
function renderTool(){
  const t = TOOLS.find(x=>x.id===state.tool);
  if (t.multiInput) {
    if (t.id==="armap") return renderToolArmap();
    if (t.id==="bigseller") return renderToolBigSeller();
  }
  const k = key();
  const book = state.books[k];
  const rows = currentRows();
  const file = state.files[k];

  document.getElementById("main").innerHTML = `
    <div class="page-head">
      <h1>${t.ic} ${t.name} <span class="badge">${COMPANIES.find(c=>c.id===state.company).name}</span></h1>
      <div class="sub">${t.long}</div>
    </div>

    <div class="card">
      <h3>1 · อัปโหลดไฟล์</h3>
      <div class="note">รองรับ .xlsx, .xls, .csv — ลากไฟล์มาวาง หรือกดเลือกไฟล์</div>
      <div class="drop" id="drop">
        <div class="big">📂</div>
        <div>ลากไฟล์มาวางที่นี่ หรือ <b>คลิกเพื่อเลือกไฟล์</b></div>
        <div class="sm">ไฟล์ถูกอ่านในเครื่องเท่านั้น ไม่มีการอัปขึ้นเซิร์ฟเวอร์</div>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" />
      </div>
      ${file ? `<div class="filechip">📄 ${file} <button onclick="clearFile()">✕</button></div>` : ``}
      ${book && book.names.length > 1 ? `
        <div class="sheet-row">
          <span class="sheet-lbl">📑 ชีต:</span>
          <select id="sheetPick" onchange="pickSheetByName(this.value)">
            ${book.names.map(n=>`<option value="${esc(n)}" ${n===book.picked?'selected':''}>${esc(n)}${n===book.picked&&book.auto?' (เดาให้)':''}</option>`).join("")}
          </select>
          ${book.auto ? `<span class="sheet-auto">✓ เลือกอัตโนมัติ — เปลี่ยนได้</span>` : `<span class="sheet-manual">⚠️ เดาไม่ได้ เลือกชีตที่ถูกเอง</span>`}
        </div>` : ``}
    </div>

    ${rows ? `
    <div class="card">
      <h3>2 · ตัวอย่างข้อมูล / ผลลัพธ์</h3>
      <div class="note">แสดง ${Math.min(rows.length,200)} แถวแรกจากทั้งหมด ${rows.length} แถว</div>
      <div class="opts">
        <label class="opt"><input type="checkbox" id="optHeader" checked onchange="renderTool()"> แถวแรกเป็นหัวตาราง</label>
        <label class="opt"><input type="checkbox" id="optTrim" checked> ตัดช่องว่างหน้า-หลัง</label>
      </div>
      ${tableHTML(rows)}
      <div class="pill-stat">
        <div class="stat"><div class="n">${rows.length}</div><div class="l">จำนวนแถว</div></div>
        <div class="stat"><div class="n">${rows[0]?rows[0].length:0}</div><div class="l">จำนวนคอลัมน์</div></div>
      </div>
      <div class="btnrow">
        <div class="dd" id="exportDD">
          <button class="btn" onclick="document.getElementById('exportDD').classList.toggle('open')">⬇ ดาวน์โหลด ▾</button>
          <div class="dd-menu">
            <button onclick="exportFile('xlsx')">📊 Excel (.xlsx) <span class="x">— จัดรูปแบบสวย</span></button>
            <button onclick="exportFile('csv')">📄 CSV (.csv) <span class="x">— เบา นำเข้าต่อง่าย</span></button>
          </div>
        </div>
        <button class="btn ghost" onclick="copyTSV()">📋 คัดลอกตาราง</button>
      </div>
      <div class="soon">⚙️ <b>logic เฉพาะของเครื่องมือนี้ยังไม่ใส่</b> — ตอนนี้แสดง/ส่งออกข้อมูลดิบจากไฟล์ได้แล้ว

/* ---------- helpers ---------- */
function num(v){
  if(v==null||v==="") return 0;
  const n=parseFloat(String(v).replace(/[, ฿]/g,"").replace(/\(/,"-").replace(/\)/,""));
  return isNaN(n)?0:n;
}
function round2(n){ return Math.round(n*100)/100; }
function pad2(n){ return String(n).padStart(2,"0"); }

/* ISO date helpers */
function parseDate(v){
  if(v==null||v==="") return "";
  if(v instanceof Date) return `${v.getFullYear()}-${pad2(v.getMonth()+1)}-${pad2(v.getDate())}`;
  const s=String(v).trim();
  let m=s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
  if(m) return `${m[1]}-${pad2(m[2])}-${pad2(m[3])}`;
  m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})/);
  if(m){
    let y=parseInt(m[3],10);
    if(y<100) y+=2000;
    if(y>=2500) y-=543;
    return `${y}-${pad2(m[2])}-${pad2(m[1])}`;
  }
  return s;
}
function fmtDateDDMMYYYY(iso){
  if(!iso) return "";
  const m=iso.match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return iso;
  return `${m[3]}/${m[2]}/${m[1]}`;
}
function fmtDateDDMMYY(iso){
  if(!iso) return "";
  const m=iso.match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return iso;
  return `${m[3]}/${m[2]}/${m[1].slice(2)}`;
}

/* CSV parser (handles "" escapes + CRLF) */
function csvParse(text){
  const rows=[]; let row=[],field="",inQ=false,i=0;
  while(i<text.length){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false; i++; }
      else { field+=ch; i++; }
    } else {
      if(ch==='"'){ inQ=true; i++; }
      else if(ch===','){ row.push(field); field=""; i++; }
      else if(ch==='\r'){ i++; }
      else if(ch==='\n'){ row.push(field); rows.push(row); row=[]; field=""; i++; }
      else { field+=ch; i++; }
    }
  }
  if(field||row.length){ row.push(field); rows.push(row); }
  return rows;
}

/* read a file as Uint8Array (for XLSX) or decoded text (for CSV) */
function readFileSmart(file){
  return new Promise((resolve,reject)=>{
    const isCSV=/\.csv$/i.test(file.name);
    const r=new FileReader();
    r.onerror=()=>reject(r.error);
    r.onload=()=>{
      if(isCSV){
        // Express exports are TIS-620 / CP874 — decode safely
        const buf=new Uint8Array(r.result);
        let text;
        try{ text=new TextDecoder("utf-8",{fatal:true}).decode(buf); }
        catch(_){ try{ text=new TextDecoder("windows-874").decode(buf); }
                  catch(__){ text=new TextDecoder("tis-620").decode(buf); } }
        resolve({type:"csv", text});
      } else {
        const wb=XLSX.read(new Uint8Array(r.result),{type:"array",cellDates:true});
        const sheets={}, names=wb.SheetNames.slice();
        names.forEach(n=>{
          sheets[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:"",blankrows:false,raw:true});
        });
        resolve({type:"xlsx", names, sheets});
      }
    };
    r.readAsArrayBuffer(file);
  });
}

/* ---------- Parser: Express AR Outstanding (banded CSV) ---------- */
function parseExpressAR(text){
  const rows=csvParse(text);
  const out=[]; let currCode="",currName="";
  for(const r of rows){
    const c1=(r[1]||"").trim();
    const c3=(r[3]||"").trim();
    const c4=(r[4]||"").trim();
    const c5=(r[5]||"").trim();
    const c7=(r[7]||"").trim();
    // Skip subtotal/grand-total rows
    if(/^รวม|^ประเภท/.test(c1)) continue;
    // Customer header: name in c3, code in c4, no date
    if(c3 && c4 && !c5 && !/^IV|^SR|^RE/.test(c4) && !/^---/.test(c3)){
      currName=c3; currCode=c4;
      continue;
    }
    // Detail row: date in c5, doc in c7
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(c5) && /^(IV|SR|RE|CN|DN)/i.test(c7)){
      out.push({
        custCode:currCode, custName:currName,
        doc:c7, date:parseDate(c5),
        bill:num(r[9]), paid:num(r[10]), outstanding:num(r[11]),
        isReturn:/^SR|^CN/i.test(c7)
      });
    }
  }
  return out;
}

/* ---------- Parser: Express Sales Detail (banded text-in-CSV) ---------- */
function parseExpressSales(text){
  const rows=csvParse(text);
  const out=[]; let currCode="",currName="";
  for(const r of rows){
    // Each row is essentially one text line (column 0)
    const line=(r[0]||"").replace(/[ ]/g," ").trimEnd();
    if(!line.trim()) continue;
    const sline=line.trim();
    // Skip separator / header / totals
    if(/^-+$/.test(sline)) continue;
    if(/^รวม|^ทั้งหมด|^เขตการสาขา|^เขตการขาย$|^พิมพ์รายการ|^วันที่จาก|^บริษัท|^วิเคราะห์/.test(sline)) continue;
    // Customer header: "<name> /<CUSTCODE>"
    const ch=sline.match(/^(.+?)\s*\/\s*([A-Z][A-Z0-9 .\-_]*)$/);
    if(ch && !/^IV\d|^SR\d|^RE\d/.test(sline)){
      currName=ch[1].replace(/^ลูกค้าทั่วไป-?/,"").trim();
      currCode=ch[2].trim();
      continue;
    }
    // Detail row: starts with IV/SR + date
    const m=sline.match(/^(IV|SR|RE)(\d{6,15})\s+(\d{1,2}\/\d{1,2}\/\d{2,4})\s+/);
    if(m){
      const doc=m[1]+m[2];
      const date=parseDate(m[3]);
      const rest=sline.slice(m[0].length);
      const tokens=rest.split(/\s+/).filter(Boolean);
      // Find second date (ครบกำหนด)
      let dueIdx=-1;
      for(let i=0;i<tokens.length;i++){
        if(/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(tokens[i])){ dueIdx=i; break; }
      }
      // Numeric tokens BEFORE dueIdx — last one = รวมทั้งสิ้น (with VAT)
      let total=0;
      if(dueIdx>0){
        for(let i=dueIdx-1;i>=0;i--){
          const t=tokens[i].replace(/,/g,"");
          if(/^-?\d+(?:\.\d+)?$/.test(t)){ total=parseFloat(t); break; }
        }
      }
      // อ้างอิง = first long alphanumeric token after dueIdx
      let ref="";
      if(dueIdx>=0){
        for(let i=dueIdx+1;i<tokens.length;i++){
          const t=tokens[i].replace(/"+$/,"");
          if(/^[A-Z0-9]{8,}$/i.test(t) && !/^\d+\.\d+$/.test(t)){ ref=t; break; }
        }
      }
      out.push({ iv:doc, date, custCode:currCode, custName:currName, ref, total });
    }
  }
  return out;
}

/* ---------- Parser: Shopee Income ---------- */
function parseShopeeIncome(book){
  const incomeName = book.names.find(n => /^income$/i.test(n)) || book.names[0];
  const summaryName = book.names.find(n => /summary/i.test(n)) || null;
  let seller="";
  if(summaryName){
    const sumRows=book.sheets[summaryName]||[];
    for(const r of sumRows){
      const c0=String(r[0]||"");
      if(c0.includes("ชื่อผู้ขาย") || c0.includes("ผู้ขาย (ร้านค้า)")){ seller=String(r[1]||"").trim(); break; }
    }
  }
  const rows=book.sheets[incomeName]||[];
  let headerIdx=-1;
  for(let i=0;i<Math.min(15,rows.length);i++){
    const r=rows[i]||[];
    if(r.some(c=>String(c||"").includes("หมายเลขคำสั่งซื้อ"))){ headerIdx=i; break; }
  }
  if(headerIdx<0) return { rows:[], seller };
  const header=rows[headerIdx].map(h=>String(h||""));
  const find=keys=>{
    for(const k of keys){ const i=header.findIndex(h=>h.includes(k)); if(i>=0) return i; }
    return -1;
  };
  const cOrder=find(["หมายเลขคำสั่งซื้อ"]);
  // วันที่โอน: "วันที่โอนชำระเงินสำเร็จ" (โอน success) > "วันที่โอน..." ทั่วไป
  let cPaidDate=header.findIndex(h=>h.includes("วันที่โอนชำระเงินสำเร็จ"));
  if(cPaidDate<0) cPaidDate=find(["วันที่โอน","วันที่จ่ายเงิน","วันที่ปล่อยเงิน"]);
  const cOrderDate=find(["วันที่ทำการสั่งซื้อ"]);
  // ยอดเงินจริงที่ได้รับ: "จำนวนเงินทั้งหมดที่โอนแล้ว (฿)" คือยอดสุทธิที่ผู้ขายได้
  let cNet=header.findIndex(h=>h.includes("จำนวนเงินทั้งหมดที่โอนแล้ว"));
  if(cNet<0) cNet=header.findIndex(h=>h.includes("จำนวนเงินสุทธิที่ผู้ขาย"));
  if(cNet<0) cNet=header.findIndex(h=>h.includes("จำนวนเงิน")&&h.includes("฿")&&!h.includes("คืน")&&!h.includes("ค่า"));
  const cGross=find(["ราคาขายค้าปลีก","ราคาตั้ง"]);
  const out=[];
  for(let i=headerIdx+1;i<rows.length;i++){
    const r=rows[i];
    const o=String(r[cOrder]||"").trim();
    if(!o) continue;
    out.push({
      orderNo:o,
      paymentDate:parseDate(r[cPaidDate]),
      orderDate:parseDate(r[cOrderDate]),
      net:num(r[cNet]),
      gross:num(r[cGross])
    });
  }
  return { rows:out, seller };
}

/* ---------- Parser: TikTok Income ---------- */
function parseTikTokIncome(book){
  const detailName = book.names.find(n => n.includes("รายละเอียดคำสั่งซื้อ")) || book.names[0];
  const rows=book.sheets[detailName]||[];
  if(!rows.length) return { rows:[], seller:"" };
  const header=rows[0].map(h=>String(h||""));
  const find=keys=>{
    for(const k of keys){ const i=header.findIndex(h=>h.includes(k)); if(i>=0) return i; }
    return -1;
  };
  const cOrder=find(["หมายเลขคำสั่งซื้อ"]);
  const cClose=find(["เวลาที่ชำระคำสั่งซื้อ","เวลาที่ปิดคำสั่งซื้อ"]);
  const cCreate=find(["เวลาที่สร้างคำสั่งซื้อ"]);
  const cNet=find(["จำนวนเงินที่ชำระทั้งหมด","จำนวนเงินที่จะถึง"]);
  const cGross=find(["รายได้รวม","มูลค่าสั่ง"]);
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const o=String(r[cOrder]||"").trim();
    if(!o) continue;
    out.push({
      orderNo:o,
      paymentDate:parseDate(r[cClose])||parseDate(r[cCreate]),
      orderDate:parseDate(r[cCreate]),
      net:num(r[cNet]),
      gross:num(r[cGross])
    });
  }
  return { rows:out, seller:"" };
}

/* ---------- Detect platform kind + brand ---------- */
function detectPlatform(file, book){
  const nm=file.name.toLowerCase();
  const seller=(detectSeller(book)||"").toLowerCase();
  let kind="";
  if(/tiktok|รายละเอียดคำสั่งซื้อ/i.test(nm) || book.names.some(n=>/รายละเอียดคำสั่งซื้อ/.test(n))) kind="TT";
  else if(/shopee|income/i.test(nm) || book.names.some(n=>/^income$/i.test(n))) kind="SP";
  let brand="";
  const all=(nm+" "+seller);
  if(/betra|^be[ _\-]|\bbe[ _\-]/i.test(all)) brand="BT";
  else if(/qi[ _-]?care|benya_official|^qi[ _\-]|\bqi[ _\-]/i.test(all)) brand="QI";
  else if(/mbark|mmark|m[ _\-]?bark/i.test(all)) brand="MB";
  return { kind, brand, seller };
}
function detectSeller(book){
  const sumName=book.names.find(n=>/summary/i.test(n));
  if(sumName){
    for(const r of (book.sheets[sumName]||[])){
      const c0=String(r[0]||"");
      if(c0.includes("ชื่อผู้ขาย")||c0.includes("ผู้ขาย (ร้านค้า)")) return String(r[1]||"").trim();
    }
  }
  // TikTok: รายงาน sheet doesn't have explicit seller — use filename hint
  return "";
}

/* ---------- Brand guess from Express customer code ---------- */
function guessBrandFromCustCode(code){
  const c=String(code||"").toUpperCase();
  // Express ใช้รหัสสั้น: "SHOPEE BE" = Betra, "SHOPEE QI" = QI Care
  if(/BETRA|\bBT\b|\bBE\b/.test(c)) return "BT";
  if(/QI[\s-]?CARE|\bQI\b/.test(c)) return "QI";
  if(/MBARK|MMARK|M[ -]?BARK|\bMB\b/.test(c)) return "MB";
  return "";
}
function guessChannelFromCustCode(code){
  const c=String(code||"").toUpperCase();
  if(/SHOPEE|\bSP\b/.test(c)) return "SP";
  if(/TIKTOK|\bTT\b|\bTK\b/.test(c)) return "TT";
  if(/LAZADA|\bLZ\b/.test(c)) return "LZ";
  return "";
}
function bankCodeOf(kind,brand){
  const map={ "SP|BT":"SB","SP|QI":"SI","TT|BT":"TB","TT|QI":"TQ","SP|MB":"SM","TT|MB":"TM" };
  return map[kind+"|"+brand]||"";
}

/* AutoKey "เลือก Bank" command — key by BRAND × CHANNEL (ไม่ใช่บริษัท)
   ตัวเลข = ตำแหน่งของช่องทาง+แบรนด์ใน dropdown ของระบบ
   เบญญา (BT/QI brands):   SB=6, SI=7, TB=9, TQ=10
   M Bark (MB brand):       ยังไม่รู้ — รอแนนบอก  */
const BANK_DOWN = {

  QI: { SP:7, TT:10 },    // SHOPEE-QI    → 7 · TIKTOK-QI    → 10
  MB: { SP:null, TT:null } // M Bark template — TBD
};

  return n ? `{Down ${n}}` : "";
}

/* ---------- ARMAP: file slot handlers ---------- */
async function armapHandleFile(slot, files){
  const data=armapGet();
  for(const file of files){
    try{
      const parsed=await readFileSmart(file);
      if(slot==="ar"){
        if(parsed.type!=="csv"){ alert("ช่องลูกหนี้คงค้าง: ต้องเป็น CSV จาก Express"); continue; }
        const rows=parseExpressAR(parsed.text);
        data.ar={ file:file.name, rows };
      } else if(slot==="sales"){
        if(parsed.type!=="csv"){ alert("ช่องรายงานขาย: ต้องเป็น CSV จาก Express"); continue; }
        const rows=parseExpressSales(parsed.text);
        data.sales={ file:file.name, rows };
      } else if(slot==="platform"){
        if(parsed.type!=="xlsx"){ alert("ช่องหลังบ้าน: ต้องเป็น XLSX จาก Shopee/TikTok"); continue; }
        const det=detectPlatform(file,parsed);
        let parsedRows={ rows:[], seller:"" };
        if(det.kind==="SP") parsedRows=parseShopeeIncome(parsed);
        else if(det.kind==="TT") parsedRows=parseTikTokIncome(parsed);
        data.platforms.push({
          file:file.name, kind:det.kind, brand:det.brand,
          sellerName:parsedRows.seller||det.seller, rows:parsedRows.rows
        });
      }
    }catch(err){
      alert(`อ่านไฟล์ "${file.name}" ไม่สำเร็จ: `+err.message);
    }
  }
  data.result=null;   // invalidate previous result
  renderTool();
}
function armapRemoveFile(slot, idx){
  const d=armapGet();
  if(slot==="ar") d.ar=null;
  else if(slot==="sales") d.sales=null;
  else if(slot==="platform") d.platforms.splice(idx,1);
  d.result=null;
  renderTool();
}
function armapClearAll(){
  const d=armapGet();
  d.ar=null; d.sales=null; d.platforms=[]; d.result=null;
  renderTool();
}

/* ---------- ARMAP: compute ---------- */
function armapCompute(){
  const d=armapGet();
  if(!d.ar||!d.sales||!d.platforms.length){
    alert("ใส่ไฟล์ให้ครบ 3 ช่องก่อนค่ะ");
    return;
  }
  // Index sales by IV
  const salesByDoc={};
  for(const s of d.sales.rows){
    if(!s.iv) continue;
    (salesByDoc[s.iv]=salesByDoc[s.iv]||[]).push(s);
  }
  // Index platform rows by orderNo (with kind+brand tags)
  const platByOrder={};
  for(const p of d.platforms){
    for(const r of p.rows){
      if(!r.orderNo) continue;
      (platByOrder[r.orderNo]=platByOrder[r.orderNo]||[]).push({
        ...r, _kind:p.kind, _brand:p.brand, _seller:p.sellerName, _file:p.file
      });
    }
  }
  const usedOrders=new Set();
  const A=[],B=[];
  // For each outstanding IV (positive, only IV docs)
  for(const ar of d.ar.rows){
    if(!/^IV/i.test(ar.doc)) continue;
    if(ar.outstanding<=0) continue;
    const sList=salesByDoc[ar.doc];
    if(!sList||!sList.length){ B.push({ ar, reason:"ไม่เจอในรายงานขาย (ตกหล่น?)" }); continue; }
    const sale=sList[0];
    if(!sale.ref){ B.push({ ar, sale, reason:"รายงานขายไม่มีเลขออเดอร์อ้างอิง" }); continue; }
    const plats=platByOrder[sale.ref];
    if(!plats||!plats.length){ B.push({ ar, sale, reason:"รอเงินเข้า (ยังไม่อยู่ในไฟล์หลังบ้าน)" }); continue; }
    const plat=plats[0];
    usedOrders.add(sale.ref);
    const expBrand=guessBrandFromCustCode(ar.custCode);
    const expChan =guessChannelFromCustCode(ar.custCode);
    const warning=[];
    if(expBrand && plat._brand && expBrand!==plat._brand)
      warning.push(`บัญชีคีย์แบรนด์ "${expBrand}" แต่เงินเข้า "${plat._brand}"`);
    if(expChan && plat._kind && expChan!==plat._kind)
      warning.push(`บัญชีคีย์ช่องทาง "${expChan}" แต่เงินเข้า "${plat._kind}"`);
    A.push({
      arIv:ar.doc, arDate:ar.date, arCustCode:ar.custCode, arCustName:ar.custName,
      arOutstanding:ar.outstanding,
      orderNo:sale.ref, saleTotal:sale.total,
      channel:plat._kind, paymentDate:plat.paymentDate,
      netAmount:plat.net, gross:plat.gross||0,
      diff:round2(ar.outstanding-plat.net),
      actualBrand:plat._brand, sellerName:plat._seller,
      sourceFile:plat._file,
      bankCode:bankCodeOf(plat._kind,plat._brand),
      warning:warning.join(" · ")
    });
  }
  // Bucket C: platform rows not consumed
  const C=[];
  for(const p of d.platforms){
    for(const r of p.rows){
      if(!r.orderNo||usedOrders.has(r.orderNo)) continue;
      C.push({
        orderNo:r.orderNo, paymentDate:r.paymentDate,
        net:r.net, gross:r.gross,
        channel:p.kind, brand:p.brand,
        seller:p.sellerName, file:p.file
      });
    }
  }
  d.result={ A, B, C, totals:{
    arIvs:d.ar.rows.filter(r=>r.outstanding>0&&/^IV/i.test(r.doc)).length,
    salesIvs:d.sales.rows.length,
    platOrders:Object.keys(platByOrder).length,
    matched:A.length, waiting:B.length, orphan:C.length
  } };
  d.activeTab="a";
  renderTool();
}

function slotFileHTML(slot,f,idx){
  if(slot==="ar"){
    return `<div class="fchip"><span>📄 ${esc(f.file)}<div class="meta">${f.rows.length} แถว · ${f.rows.filter(r=>r.outstanding>0).length} ตัวยังค้าง</div></span><button onclick="armapRemoveFile('ar',0)">✕</button></div>`;
  }
  if(slot==="sales"){

    return `<div class="fchip"><span>📄 ${esc(f.file)}<div class="meta">${f.rows.length} IV · ${withRef} มีเลขออเดอร์อ้างอิง</div></span><button onclick="armapRemoveFile('sales',0)">✕</button></div>`;
  }

  return `<div class="fchip"><span>📄 ${esc(f.file)}<div class="meta">${kindLbl} · ${brandLbl} · ${f.rows.length} ออเดอร์${f.sellerName?` · ${esc(f.sellerName)}`:''}</div></span><button onclick="armapRemoveFile('platform',${idx})">✕</button></div>`;

function armapWireDrops(){
  document.querySelectorAll('.slot .drop').forEach(drop=>{
    const slot=drop.dataset.slot;
    const inp=document.querySelector(`input[data-slotinp="${slot}"]`);
    drop.onclick=()=>inp.click();
    inp.onchange=e=>{
      // ⚠️ ต้อง clone FileList เป็น Array ก่อน เพราะ inp.value="" จะล้าง e.target.files
      // ทำให้ async loop อ่านไฟล์ที่ 2+ ไม่ได้
      const arr=Array.from(e.target.files);
      inp.value="";
      if(arr.length) armapHandleFile(slot,arr);
    };
    drop.ondragover=e=>{e.preventDefault();drop.classList.add("over");};
    drop.ondragleave=()=>drop.classList.remove("over");
    drop.ondrop=e=>{
      e.preventDefault();drop.classList.remove("over");
      const arr=Array.from(e.dataTransfer.files);
      if(arr.length) armapHandleFile(slot,arr);
    };
  });
}

function armapExport(){
  const d=armapGet(); if(!d.result) return;
  const R=d.result;
  const company=state.company;
  const wb=XLSX.utils.book_new();
  // Sheet A — พร้อมคีย์รับชำระ (17 คอลัมน์ตรง template + หมายเหตุ)
  const aRows=[A_HEAD].concat(R.A.map((r,i)=>{
    const a=aRowOf(r,i,company);
    return [a.ลำดับ, a.iv_date, a.iv, a.brand, a.outstanding, a.orderNo, a.channel,
            a.pay_date_long, a.pay_date_short, a.net, a.diff, a.cust,
            a.lett_other, a.enter, a.bank_down, a.doc_no, a.bank_code, a.warning];
  }));
  // cols: 2=เลข IV, 5=รหัสออเดอร์, 11=รหัสลูกค้า — บังคับ text กัน Excel ตัดท้ายเลข 18+ หลัก
  const aSheet = XLSX.utils.aoa_to_sheet(aRows);
  forceTextCells(aSheet, [2, 5, 11]);
  XLSX.utils.book_append_sheet(wb, aSheet, "A พร้อมคีย์รับชำระ");
  // Sheet B
  const bRows=[["ลำดับ","วันที่ IV","เลข IV","รหัสลูกค้า","ชื่อ","ยอดค้าง","เลขออเดอร์","สาเหตุ"]].concat(R.B.map((r,i)=>{
    const ar=r.ar||{}, s=r.sale||{};
    return [i+1, fmtDateDDMMYYYY(ar.date), ar.doc, ar.custCode, ar.custName, round2(ar.outstanding), s.ref||"", r.reason];
  }));
  const bSheet = XLSX.utils.aoa_to_sheet(bRows);
  forceTextCells(bSheet, [2, 3, 6]);   // เลข IV, รหัสลูกค้า, เลขออเดอร์
  XLSX.utils.book_append_sheet(wb, bSheet, "B รอเงินเข้า");
  // Sheet C
  const cRows=[["ลำดับ","เลขออเดอร์","ช่องทาง","แบรนด์","วันรับเงิน","ยอดสุทธิ","ยอดรวม","ชื่อร้าน","ไฟล์"]].concat(R.C.map((r,i)=>[
    i+1, r.orderNo, r.channel, r.brand||"", fmtDateDDMMYYYY(r.paymentDate),
    round2(r.net), round2(r.gross), r.seller||"", r.file
  ]));
  const cSheet = XLSX.utils.aoa_to_sheet(cRows);
  forceTextCells(cSheet, [1]);          // เลขออเดอร์
  XLSX.utils.book_append_sheet(wb, cSheet, "C ไม่มี IV");
  const base=`ARMap_${COMPANIES.find(c=>c.id===state.company).name}_${stamp()}.xlsx`;
  XLSX.writeFile(wb, base);
}
function armapExportCSV(){
  const d=armapGet(); if(!d.result) return;

function bsParseIvSeed(s){
  if(!s) return null;
  const m=String(s).match(/(?:IV)?\s*(\d{2})(\d{2})(\d{6})\s*$/i);
  if(!m) return null;
  return { yy:m[1], mm:m[2], running:parseInt(m[3],10), raw:s };
}
function bsFormatIv(yy, mm, running){
  // โชว์เลขล้วน 10 หลัก ไม่มี "IV" นำหน้า (ตามที่แนนต้องการ)
  return `${yy}${mm}${String(running).padStart(6,'0')}`;
}

function bsLoadJSON(key, fallback){
  try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; }
  catch(_){ return fallback; }
}
function bsSaveJSON(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(_){}
}

/* ---------- Channel from platform ---------- */
function bsChannelFromPlatform(p){
  const s=String(p||"").toLowerCase();
  if(s.includes("shopee"))  return "SP";
  if(s.includes("tiktok"))  return "TT";
  if(s.includes("lazada"))  return "LZ";
  return "";
}

/* ---------- Customer code derivation ---------- */
function bsCustomerCode(company, channel, brand){
  if(!channel) return "";
  const chanName = { SP:"SHOPEE", TT:"TIKTOK", LZ:"LAZADA" }[channel] || channel;
  if(company==="mbark") return chanName;                    // M Bark: "SHOPEE" / "TIKTOK"
  // Benya: "SHOPEE BE" / "SHOPEE QI" / "TIKTOK BE" ...
  const brandShort = { BT:"BE", QI:"QI" }[brand] || "";
  return brandShort ? `${chanName} ${brandShort}` : chanName;
}

/* ---------- Thai date "07 มิ.ย. 2026 23:40" → ISO ---------- */
const BS_THAI_MONTH = {
  "ม.ค.":1,"ก.พ.":2,"มี.ค.":3,"เม.ย.":4,"พ.ค.":5,"มิ.ย.":6,
  "ก.ค.":7,"ส.ค.":8,"ก.ย.":9,"ต.ค.":10,"พ.ย.":11,"ธ.ค.":12,
  "มกราคม":1,"กุมภาพันธ์":2,"มีนาคม":3,"เมษายน":4,"พฤษภาคม":5,"มิถุนายน":6,
  "กรกฎาคม":7,"สิงหาคม":8,"กันยายน":9,"ตุลาคม":10,"พฤศจิกายน":11,"ธันวาคม":12
};
function bsParseDate(v){
  if(v==null||v==="") return "";
  if(v instanceof Date) return `${v.getFullYear()}-${pad2(v.getMonth()+1)}-${pad2(v.getDate())}`;
  const s=String(v).trim();
  // "07 มิ.ย. 2026 23:40"
  const m=s.match(/^(\d{1,2})\s+(\S+)\s+(\d{4})/);
  if(m && BS_THAI_MONTH[m[2]]){
    let y=parseInt(m[3],10);
    if(y>=2500) y-=543;
    return `${y}-${pad2(BS_THAI_MONTH[m[2]])}-${pad2(parseInt(m[1],10))}`;
  }
  // fallback to generic date parser
  return parseDate(s);
}

/* ---------- BigSeller parser ---------- */
function bsParse(book){
  const sheet = book.names[0];
  const rows = book.sheets[sheet] || [];
  if(rows.length<2) return { items:[], shops:[] };
  const header = rows[0].map(h=>String(h||"").trim());
  const find = name => header.findIndex(h => h===name);
  const c = {
    order:   find("หมายเลขคำสั่งซื้อ"),
    platform:find("แพลตฟอร์ม"),
    shop:    find("ร้านค้าเพลตฟอร์ม"),
    sku:     find("SKU"),
    qty:     find("จำนวน"),
    priceOrig:find("ราคาสินค้าเดิม"),   // AJ — ไม่มี mask ***
    priceFallback: find("ราคา"),
    total:   find("รวมค่าสินค้า"),
    ship:    find("ค่าจัดส่ง"),
    time:    find("เวลาสั่งซื้อ"),
    status:  find("สถานะคำสั่งซื้อ"),
    pstatus: find("สถานะแพลตฟอร์ม")
  };
  const items = [];
  const shopsSeen = new Set();
  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    const orderNo = String(r[c.order]||"").trim();
    if(!orderNo) continue;
    const platform = String(r[c.platform]||"").trim();
    const shop = String(r[c.shop]||"").trim();
    if(shop) shopsSeen.add(shop);
    const priceCell = r[c.priceOrig];
    const priceStr = String(priceCell==null?"":priceCell);
    // ถ้า "ราคาสินค้าเดิม" ว่าง/เป็น *** → ใช้ "ราคา" แทน
    let price = num(priceCell);
    if(!price || priceStr.includes("*")){
      price = num(r[c.priceFallback]);
    }
    items.push({
      orderNo,
      platform,
      shop,
      channel: bsChannelFromPlatform(platform),
      sku: String(r[c.sku]||"").trim(),
      qty: num(r[c.qty]),
      price,
      ship: num(r[c.ship]),
      saleDate: bsParseDate(r[c.time]),
      status: String(r[c.status]||"").trim(),
      pstatus: String(r[c.pstatus]||"").trim()
    });
  }
  return { items, shops:Array.from(shopsSeen) };
}

/* ---------- Build output rows ---------- */
function bsBuildResult(){
  const d = bsGet();
  if(!d.raw) return null;
  const company = state.company;
  const map = bsLoadJSON(BS_LS_SHOPBRAND, {});
  const sku = bsLoadJSON(BS_LS_SKU, {});
  const skuSet = new Set([...bsSeedSkuFor(company), ...(sku[company]||[]).map(s=>String(s).trim())]);
  const history = bsLoadJSON(BS_LS_HISTORY, {});
  const hist = new Set((history[company]||[]).map(o=>String(o)));

  // Group items by order, preserve input order
  const byOrder = {};
  const orderList = [];
  for(const it of d.raw.items){
    if(!byOrder[it.orderNo]){ byOrder[it.orderNo]=[]; orderList.push(it.orderNo); }
    byOrder[it.orderNo].push(it);
  }

  // Detect unknown shops (need brand mapping)
  const unknownShops = [];
  for(const sh of d.raw.shops){
    if(!map[sh]) unknownShops.push(sh);
  }

  // IV auto-numbering seed
  const seed = bsParseIvSeed(d.opts.lastIv);
  let nextRun = seed ? seed.running + 1 : null;
  const crossMonth = [];

  const lines = [];
  const newSku = new Set();
  const dupOrders = new Set();
  const cancelOrders = new Set();

  let seq = 0;
  for(const orderNo of orderList){
    const its = byOrder[orderNo];
    const isCancel = its.some(x => /ยกเลิก|cancel/i.test(x.status) || /cancel/i.test(x.pstatus));
    if(isCancel) cancelOrders.add(orderNo);
    if(hist.has(orderNo)) dupOrders.add(orderNo);

    // Assign IV per order (skip cancelled — ไม่กิน IV)
    let ivNo = "";
    if(seed && !isCancel){
      ivNo = bsFormatIv(seed.yy, seed.mm, nextRun);
      nextRun++;
      // Cross-month warning: order's sale month ≠ seed's mm
      const m = (its[0].saleDate||"").match(/^\d{4}-(\d{2})/);
      if(m && m[1]!==seed.mm) crossMonth.push({orderNo, expected:seed.mm, actual:m[1]});
    }

    its.forEach((it, idx) => {
      seq++;
      const m = map[it.shop] || {};
      const brand = m.brand || (company==="mbark" ? "MB" : "");
      const channel = it.channel || m.channel || "";
      const cust = bsCustomerCode(company, channel, brand);
      const isFirst = idx===0;
      const isLast  = idx===its.length-1;
      const isNewSku = it.sku && !skuSet.has(it.sku);
      if(isNewSku) newSku.add(it.sku);
      lines.push({
        seq,
        ivShow: isFirst ? ivNo : "",     // โชว์เฉพาะแถวแรกของออเดอร์
        ivNo,                             // เก็บ IV เต็มไว้สำหรับ tracking/export
        orderShow: isFirst ? orderNo : "",
        orderNo,
        saleDate: it.saleDate,
        channel, brand, cust, shop: it.shop,
        sku: it.sku,
        qty: it.qty,
        price: it.price,
        ship: isLast ? it.ship : 0,
        discount: isLast ? 0 : 0,         // ส่วนลดท้ายบิล — รอแนนบอกว่าใช้คอลัมน์ไหนใน BigSeller (ตอนนี้ปล่อย 0)
        cancelled: isCancel,
        duplicate: hist.has(orderNo),
        unknownShop: !m.brand,
        newSku: isNewSku
      });
    });
  }

  return {
    lines,
    summary:{
      orders: orderList.length,
      items: lines.length,
      cancelled: cancelOrders.size,
      duplicates: dupOrders.size,
      newSkus: Array.from(newSku),
      unknownShops,
      ivSeed: seed,
      ivAssigned: seed ? (orderList.length - cancelOrders.size) : 0,
      ivFirst: seed ? bsFormatIv(seed.yy, seed.mm, seed.running+1) : "",
      ivLast: seed && (orderList.length-cancelOrders.size>0) ? bsFormatIv(seed.yy, seed.mm, nextRun-1) : "",
      crossMonth
    }
  };
}

/* ---------- File handler ---------- */
async function bsHandleFile(file){
  try{
    const parsed = await readFileSmart(file);
    if(parsed.type!=="xlsx"){ alert("ต้องเป็นไฟล์ Excel จาก Big Seller"); return; }
    const d = bsGet();
    d.file = file.name;
    d.raw = bsParse(parsed);
    d.result = bsBuildResult();
    renderTool();
  }catch(err){
    alert(`อ่านไฟล์ไม่สำเร็จ: ${err.message}`);
  }
}
function bsClear(){
  const d = bsGet();
  d.file=null; d.raw=null; d.result=null;
  renderTool();
}
function bsToggleHideCancel(){
  const d = bsGet();
  d.opts.hideCancelled = !d.opts.hideCancelled;
  renderTool();
}
function bsSetLastIv(v){
  const d = bsGet();
  d.opts.lastIv = String(v||"").trim();
  if(d.raw) d.result = bsBuildResult();
  renderTool();
}

/* ---------- Brand mapping editor ---------- */
function bsAssignShop(shop, brand, channel){
  const map = bsLoadJSON(BS_LS_SHOPBRAND, {});
  map[shop] = { brand, channel, company:state.company };
  bsSaveJSON(BS_LS_SHOPBRAND, map);
  const d = bsGet();

/* ---------- SKU master ---------- */
async function bsImportSku(file){
  try{
    const parsed = await readFileSmart(file);
    let skus = [];
    if(parsed.type==="csv"){
      const rows = csvParse(parsed.text);
      for(const r of rows) for(const v of r){
        const s = String(v||"").trim();
        if(s && !/sku/i.test(s) && s.length<40) skus.push(s);
      }
    } else {
      // xlsx — pick all non-empty unique cells from any sheet
      for(const sn of parsed.names){
        for(const r of parsed.sheets[sn]||[]){
          for(const v of r){
            const s = String(v||"").trim();
            if(s && s.length<40 && !/^[\d\.\-\s]+$/.test(s) && !/sku/i.test(s)) skus.push(s);
          }
        }
      }
    }
    skus = Array.from(new Set(skus));
    const cur = bsLoadJSON(BS_LS_SKU, {});
    cur[state.company] = Array.from(new Set([...(cur[state.company]||[]), ...skus]));
    bsSaveJSON(BS_LS_SKU, cur);
    alert(`นำเข้า SKU ${skus.length} รายการ → รวมในระบบ ${cur[state.company].length} รายการ`);
    const d=bsGet(); if(d.raw) d.result=bsBuildResult();
    renderTool();
  }catch(err){ alert("นำเข้า SKU ไม่สำเร็จ: "+err.message); }
}
function bsClearSku(){
  if(!confirm(`ล้างรหัส SKU ที่เพิ่มเองของ ${COMPANIES.find(c=>c.id===state.company).name} (ไม่กระทบรหัส built-in)?`)) return;
  const cur = bsLoadJSON(BS_LS_SKU, {});
  delete cur[state.company];
  bsSaveJSON(BS_LS_SKU, cur);
  const d=bsGet(); if(d.raw) d.result=bsBuildResult();
  renderTool();
}

/* ---------- History ---------- */
function bsRecordHistory(){
  const d = bsGet(); if(!d.result) return;
  const cur = bsLoadJSON(BS_LS_HISTORY, {});
  const list = new Set(cur[state.company]||[]);
  for(const l of d.result.lines){ if(!l.cancelled) list.add(l.orderNo); }
  cur[state.company] = Array.from(list);
  bsSaveJSON(BS_LS_HISTORY, cur);
  d.result = bsBuildResult();
  renderTool();
}
function bsExportHistory(){
  const cur = bsLoadJSON(BS_LS_HISTORY, {});
  download(JSON.stringify(cur,null,2), `bigseller_history_${stamp()}.json`, "application/json");
}
function bsImportHistory(file){
  const isCSV=/\.csv$/i.test(file.name);
  if(isCSV){
    // รายงานขายแบบเห็นออเดอร์ (Express) — ดึงเลขออเดอร์ (ref) ที่มีเลข IV แล้ว มาเป็นประวัติคีย์
    const r=new FileReader();
    r.onload=()=>{
      try{
        const buf=new Uint8Array(r.result);
        let text;
        try{ text=new TextDecoder("utf-8",{fatal:true}).decode(buf); }
        catch(_){ try{ text=new TextDecoder("windows-874").decode(buf); }
                  catch(__){ text=new TextDecoder("tis-620").decode(buf); } }
        const rows=parseExpressSales(text);
        const cur=bsLoadJSON(BS_LS_HISTORY, {});
        const list=new Set(cur[state.company]||[]);
        let added=0;
        for(const row of rows){
          if(row.ref){ if(!list.has(row.ref)) added++; list.add(row.ref); }
        }
        cur[state.company]=Array.from(list);
        bsSaveJSON(BS_LS_HISTORY, cur);
        const d=bsGet(); if(d.raw) d.result=bsBuildResult();
        alert(`นำเข้าประวัติจาก CSV: พบ ${rows.length} ใบ IV, เพิ่มออเดอร์ใหม่ ${added} รายการ (รวม ${list.size} รายการ)`);
        renderTool();
      }catch(err){ alert("อ่านไฟล์ CSV ไม่สำเร็จ: "+err.message); }
    };
    r.readAsArrayBuffer(file);
    return;
  }
  const r=new FileReader();
  r.onload=()=>{
    try{
      const obj=JSON.parse(r.result);
      bsSaveJSON(BS_LS_HISTORY, obj);
      const d=bsGet(); if(d.raw) d.result=bsBuildResult();
      alert("นำเข้าประวัติแล้ว");
      renderTool();
    }catch(err){ alert("ไฟล์ผิดรูปแบบ"); }
  };
  r.readAsText(file);
}

function bsWireDrops(){
  document.querySelectorAll('.slot .drop').forEach(drop=>{
    const slot=drop.dataset.slot;
    const inp=document.querySelector(`input[data-slotinp="${slot}"]`);
    if(!inp) return;
    drop.onclick=()=>inp.click();
    inp.onchange=e=>{
      const arr=Array.from(e.target.files);
      inp.value="";
      if(!arr.length) return;
      if(slot==="bsmain") bsHandleFile(arr[0]);
      else if(slot==="bssku") bsImportSku(arr[0]);
    };
    drop.ondragover=e=>{e.preventDefault();drop.classList.add("over");};
    drop.ondragleave=()=>drop.classList.remove("over");
    drop.ondrop=e=>{
      e.preventDefault();drop.classList.remove("over");
      const arr=Array.from(e.dataTransfer.files);
      if(!arr.length) return;
      if(slot==="bsmain") bsHandleFile(arr[0]);
      else if(slot==="bssku") bsImportSku(arr[0]);
    };
  });
}

function bsResultHTML(R){

  const newSkuBlock = R.summary.newSkus.length ? `
    <div class="note" style="background:#fef2f2;color:#991b1b;padding:10px 14px;border-radius:8px;margin-bottom:10px">
      🚨 <b>SKU ใหม่ ${R.summary.newSkus.length} รหัส</b> ที่ยังไม่มีในระบบบัญชี:
      <code style="background:#fee2e2;padding:2px 6px;border-radius:4px;margin:0 4px">${R.summary.newSkus.map(esc).join("</code> <code style=\"background:#fee2e2;padding:2px 6px;border-radius:4px;margin:0 4px\">")}</code>
      <div style="margin-top:4px;font-size:12px">⚠️ ถ้าคีย์ตอนนี้ AutoKey จะ error ตอนเจอ SKU เหล่านี้ — แนะนำให้บัญชีเปิดรหัสในระบบก่อน</div>
    </div>` : "";
  const dupBlock = R.summary.duplicates ? `
    <div class="note" style="background:#fffbeb;color:#92400e;padding:10px 14px;border-radius:8px;margin-bottom:10px">
      ⚠️ <b>${R.summary.duplicates} ออเดอร์</b> ซ้ำกับประวัติที่เคยคีย์แล้ว (แถวสีน้ำเงิน)

  // IV input bar — ใส่เลข IV ล่าสุดในระบบ → auto-run ต่อไป
  const ivValid = !!R.summary.ivSeed;
  const ivStatus = !d.opts.lastIv ? `<span style="color:var(--ink-3)">⬅ ใส่เลข IV ล่าสุดเพื่อให้ระบบรันต่อให้</span>`
    : !ivValid ? `<span style="color:var(--bad)">⚠️ รูปแบบไม่ถูก — ต้องเป็น 10 หลัก เช่น 2606000005 หรือ IV2606000005</span>`
    : `<span style="color:var(--ok)">✓ จะรันต่อจาก <b>${esc(R.summary.ivFirst)}</b> → <b>${esc(R.summary.ivLast)}</b> (${R.summary.ivAssigned} ออเดอร์)</span>`;
  const crossBlock = R.summary.crossMonth.length ? `
    <div class="note" style="background:#fef3c7;color:#92400e;padding:8px 12px;border-radius:8px;margin-top:6px;font-size:12px">
      ⚠️ ${R.summary.crossMonth.length} ออเดอร์มีวันที่ขายไม่ตรงกับเดือนของเลข IV ที่กรอก — อาจต้องเปลี่ยน prefix YYMM
    </div>` : "";
  const ivBar = `
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-weight:700;color:#1e3a8a">📄 เลข IV ล่าสุดในระบบ:</span>
        <input type="text" value="${esc(d.opts.lastIv||'')}" placeholder="เช่น 2606000005" style="font-family:monospace;font-size:14px;padding:6px 10px;border:1px solid #93c5fd;border-radius:6px;width:170px" onchange="bsSetLastIv(this.value)" onkeyup="if(event.key==='Enter')bsSetLastIv(this.value)">
        ${ivStatus}
      </div>
      ${crossBlock}
    </div>`;

  return `
    <div class="card">
      <h3>📊 ผลลัพธ์ — เทมเพลตคีย์ IV</h3>
      ${ivBar}
      ${unknownBlock}${newSkuBlock}${dupBlock}
      <div class="pill-stat">
        <div class="stat"><div class="n">${R.summary.orders}</div><div class="l">ออเดอร์ทั้งหมด</div></div>
        <div class="stat"><div class="n">${R.summary.items}</div><div class="l">รายการสินค้า</div></div>
        <div class="stat ${R.summary.cancelled?'warn':''}"><div class="n">${R.summary.cancelled}</div><div class="l">ยกเลิก</div></div>
        <div class="stat ${R.summary.duplicates?'warn':''}"><div class="n">${R.summary.duplicates}</div><div class="l">ซ้ำประวัติ</div></div>
        <div class="stat ${R.summary.newSkus.length?'bad':''}"><div class="n">${R.summary.newSkus.length}</div><div class="l">SKU ใหม่</div></div>
      </div>
      <div class="opts" style="margin-top:12px">
        <label class="opt"><input type="checkbox" ${d.opts.hideCancelled?'checked':''} onchange="bsToggleHideCancel()"> ซ่อนออเดอร์ที่ยกเลิก (${R.summary.cancelled})</label>
      </div>
      <div class="note">แสดง ${Math.min(lines.length,400)}/${lines.length} แถว · ${visibleOrders} ออเดอร์</div>
      <div class="table-wrap"><table>
        <thead><tr>${BS_HEAD.map(h=>`<th>${h}</th>`).join("")}<th>ร้าน</th><th>หมายเหตุ</th></tr></thead>
        <tbody>${lines.slice(0,400).map(l=>bsLineHTML(l)).join("")}</tbody>
      </table></div>
      <div class="btnrow" style="margin-top:14px">
        <button class="btn" onclick="bsExport('xlsx')">⬇ ดาวน์โหลด Excel</button>
        <button class="btn ghost" onclick="bsExport('csv')">📄 CSV</button>
        <button class="btn ghost" style="margin-left:auto" onclick="bsRecordHistory()">✅ บันทึกเป็น "คีย์แล้ว" (${R.summary.items - lines.filter(l=>l.duplicate).length} ใหม่)</button>
      </div>
    </div>
  `;
}

function bsLineHTML(l){
  const cls = l.cancelled?"warning-row":(l.duplicate?"":"");
  const style = l.cancelled?'background:#fee2e2':l.duplicate?'background:#eff6ff':'';
  const notes = [];
  if(l.cancelled) notes.push("❌ ยกเลิก");
  if(l.duplicate) notes.push("🔁 ซ้ำ");
  if(l.unknownShop) notes.push("❓ ร้านไม่รู้แบรนด์");
  if(l.newSku) notes.push("🆕 SKU ใหม่");
  return `<tr class="${cls}" style="${style}">
    <td>${l.seq}</td>
    <td style="font-family:monospace;font-weight:600;color:var(--brand-dark)">${esc(l.ivShow)}</td>
    <td style="font-family:monospace">${esc(l.orderShow)}</td>
    <td>${esc(l.saleDate ? fmtDateDDMMYY(l.saleDate):"")}</td>
    <td>${esc(l.channel)}</td>
    <td>${esc(l.cust)}</td>
    <td style="font-family:monospace">${esc(l.sku)}</td>
    <td style="text-align:right">${l.qty||""}</td>
    <td style="text-align:right">${l.price?num(l.price).toLocaleString(undefined,{minimumFractionDigits:2}):""}</td>
    <td style="text-align:right">${l.ship?num(l.ship).toLocaleString(undefined,{minimumFractionDigits:2}):""}</td>
    <td style="text-align:right">${l.discount?num(l.discount).toLocaleString(undefined,{minimumFractionDigits:2}):""}</td>
    <td style="font-size:11px;color:var(--ink-3)">${esc(l.shop)}</td>
    <td style="font-size:11px">${notes.join(" · ")}</td>
  </tr>`;
}

function bsUnknownShopsHTML(shops){
  return `
    <div class="note" style="background:#fef3c7;color:#92400e;padding:12px 14px;border-radius:8px;margin-bottom:10px">
      ⚠️ <b>เจอร้าน ${shops.length} ร้าน</b>ที่ยังไม่รู้ว่าเป็นแบรนด์ไหน — เลือกแบรนด์ให้ก่อน:
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
        ${shops.map(s=>`
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <code style="background:#fde68a;padding:3px 8px;border-radius:4px;font-size:13px">${esc(s)}</code> →
            <select id="bs-brand-${esc(s)}" style="padding:4px 8px;font-family:inherit;border-radius:6px;border:1px solid #d4a574">
              <option value="">— เลือกแบรนด์ —</option>
              ${state.company==="benya"?'<option value="BT">BT (Betra)</option><option value="QI">QI (QI Care)</option>':'<option value="MB">MB (M Bark)</option>'}
            </select>
            <select id="bs-chan-${esc(s)}" style="padding:4px 8px;font-family:inherit;border-radius:6px;border:1px solid #d4a574">
              <option value="">— ช่องทาง —</option>
              <option value="SP">SP (Shopee)</option>
              <option value="TT">TT (TikTok)</option>
              <option value="LZ">LZ (Lazada)</option>
            </select>
            <button class="btn" style="font-size:12px;padding:4px 10px" onclick="bsAssignShop(${JSON.stringify(s)}, document.getElementById('bs-brand-'+${JSON.stringify(s)}).value, document.getElementById('bs-chan-'+${JSON.stringify(s)}).value)">บันทึก</button>
          </div>`).join("")}
      </div>
    </div>`;
}

/* ---------- Force text type on long-ID columns ----------
   Excel เปลี่ยน "584420620051055642" → 5.84E+17 + ตัดท้ายเป็น 0000
   เพราะ Number มี precision แค่ ~15 หลัก
   แก้: set ws cell.t='s' (string) บังคับ */
function forceTextCells(ws, textColIndices){
  if(!ws['!ref']) return;
  const range = XLSX.utils.decode_range(ws['!ref']);
  for(let R=1; R<=range.e.r; R++){            // ข้าม header (row 0)
    for(const C of textColIndices){
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      if(ws[addr] && ws[addr].v!=null && ws[addr].v!==""){
        ws[addr].t = 's';
        ws[addr].v = String(ws[addr].v);
        delete ws[addr].w;                    // clear cached display string
        delete ws[addr].z;                    // clear number format
      }
    }
  }
}

/* ---------- Export ---------- */
function bsExport(fmt){
  const d = bsGet(); if(!d.result) return;
  const lines = d.opts.hideCancelled ? d.result.lines.filter(l=>!l.cancelled) : d.result.lines;
  const aoa = [BS_HEAD.concat(["ร้าน","หมายเหตุ"])].concat(lines.map(l=>{
    const notes=[];
    if(l.cancelled) notes.push("ยกเลิก");
    if(l.duplicate) notes.push("ซ้ำประวัติ");
    if(l.unknownShop) notes.push("ร้านไม่รู้แบรนด์");
    if(l.newSku) notes.push("SKU ใหม่");
    return [l.seq, l.ivShow, l.orderShow, l.saleDate?fmtDateDDMMYY(l.saleDate):"",
            l.channel, l.cust, l.sku, l.qty||"",
            l.price||"", l.ship||"", l.discount||"", l.shop, notes.join(" · ")];
  }));
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // col indices: 1=เลข IV, 2=เลขคำสั่งซื้อ, 6=SKU — บังคับ text กัน Excel ตัดท้ายเป็น 0
  forceTextCells(ws, [1, 2, 6]);
  const base = `BigSeller_${COMPANIES.find(c=>c.id===state.company).name}_${stamp()}`;
  if(fmt==="csv"){
    download("﻿"+XLSX.utils.sheet_to_csv(ws), base+".csv", "text/csv;charset=utf-8");
  } else {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "เทมเพลตคีย์ IV");
    XLSX.writeFile(wb, base+".xlsx");
  }
}
